    + '#share-modal.open .sm-overlay{opacity:1}'
    + '.sm-card{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.96);background:var(--bg-modal);border-radius:12px;width:480px;max-width:calc(100vw - 32px);max-height:90vh;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.28);opacity:0;transition:opacity .18s,transform .18s}'
    + '#share-modal.open .sm-card{opacity:1;transform:translate(-50%,-50%) scale(1)}'
    + '.sm-header{display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border-modal)}'
    + '.sm-header h3{flex:1;margin:0;font-size:1rem;font-weight:700;color:var(--text-modal);letter-spacing:-.01em}'
    + '.sm-close{background:rgba(0,0,0,.06);border:none;width:28px;height:28px;border-radius:6px;font-size:.95rem;color:var(--text-modal-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}'
    + '.sm-close:hover{background:rgba(0,0,0,.12);color:var(--text-modal)}'
    + '.sm-body{padding:18px 20px 22px}'
    + '.sm-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#B49B7E;margin-bottom:8px}'
    + '.sm-url{background:var(--bg-modal-hover);border:1px solid var(--border-modal);border-radius:6px;padding:10px 12px;font-family:SF Mono,Menlo,monospace;font-size:.78rem;color:var(--text-modal);word-break:break-all;max-height:90px;overflow-y:auto;margin-bottom:14px;user-select:all;line-height:1.5}'
    + '.sm-action{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px 14px;border-radius:8px;border:none;font-family:inherit;font-size:.92rem;font-weight:600;cursor:pointer;transition:all .15s;margin-bottom:8px}'
    + '.sm-copy{background:#1A1A1A;color:#fff}'
    + '.sm-copy:hover{background:#2A2A2A}'
    + '.sm-copy.copied{background:#27AE60}'
    + '.sm-native{background:var(--bg-modal-hover);color:var(--text-modal);border:1px solid var(--border-modal)}'
    + '.sm-native:hover{background:var(--bg-modal-accent)}'
    + '.sm-export{background:var(--bg-modal-hover);color:var(--text-modal);border:1px solid var(--border-modal)}'
    + '.sm-export:hover{background:var(--bg-modal-accent)}'
    + '.sm-export.busy{background:var(--bg-modal-accent);cursor:wait;opacity:.7}'
    + '.sm-hint{margin-top:12px;font-size:.78rem;line-height:1.5;color:var(--text-modal-muted);padding:10px 12px;background:var(--bg-modal-hover);border-radius:6px;border:1px solid var(--border-modal)}';
  const styleEl = document.createElement('style'); styleEl.textContent = css; document.head.appendChild(styleEl);

  let modal = null;
  function ensureModal(){
    if (modal) return;
    modal = document.createElement('div');
    modal.id = 'share-modal';
    modal.innerHTML = '<div class="sm-overlay"></div>'
      + '<div class="sm-card">'
      + '<div class="sm-header">'
      + '<h3>📤 Partager cette vue</h3>'
      + '<button class="sm-close" aria-label="Fermer">✕</button>'
      + '</div>'
      + '<div class="sm-body">'
      + '<div class="sm-label">Lien direct</div>'
      + '<div class="sm-url" id="sm-url"></div>'
      + '<button class="sm-action sm-copy" id="sm-copy">📋 Copier le lien</button>'
      + '<button class="sm-action sm-native" id="sm-native" style="display:none">📱 Partager via…</button>'
      + '<button class="sm-action sm-export" id="sm-export" style="display:none">🖼️ Exporter en image</button>'
      + '<div class="sm-hint">💡 Ce lien restaure exactement la vue actuelle — élection, bureau, comparaisons, filtres, etc. L\'export image génère une visualisation prête à partager (1200×675).</div>'
      + '</div></div>';
    document.body.appendChild(modal);

    modal.querySelector('.sm-close').addEventListener('click', closeModal);
    modal.querySelector('.sm-overlay').addEventListener('click', closeModal);

    if (typeof navigator.share === 'function') {
      const nb = modal.querySelector('#sm-native');
      nb.style.display = '';
      nb.addEventListener('click', shareNative);
    }
    if (typeof window.exportShareImage === 'function') {
      const eb = modal.querySelector('#sm-export');
      eb.style.display = '';
      eb.addEventListener('click', exportImg);
    }
    modal.querySelector('#sm-copy').addEventListener('click', copyLink);
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && modal && modal.classList.contains('open')) closeModal();
    });
  }
  function copyLink(){
    const url = location.href;
    const btn = modal.querySelector('#sm-copy');
    const orig = btn.textContent;
    function flash(success){
      btn.textContent = success ? '✓ Lien copié !' : '✗ Échec — sélectionnez le lien manuellement';
      if (success) btn.classList.add('copied');
      setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1800);
    }
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(url).then(() => flash(true)).catch(() => fallbackCopy(url, flash));
    } else {
      fallbackCopy(url, flash);
    }
  }
  function fallbackCopy(text, cb){
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      const ok = document.execCommand('copy');
      ta.remove();
      cb(ok);
    } catch(_) { cb(false); }
  }
  function shareNative(){
    if (typeof navigator.share === 'function') {
      navigator.share({
        title: document.title,
        text: 'Vue partagée depuis La Rochelle Vote',
        url: location.href
      }).catch(() => {});
    }
  }
  function exportImg(){
    if (typeof window.exportShareImage !== 'function') return;
    const btn = modal.querySelector('#sm-export');
    const orig = btn.textContent;
    btn.classList.add('busy');
    btn.textContent = '⏳ Génération en cours…';
    Promise.resolve().then(() => window.exportShareImage())
      .then(() => {
        btn.textContent = '✓ Image téléchargée';
        setTimeout(() => { btn.textContent = orig; btn.classList.remove('busy'); }, 2000);
      })
      .catch(err => {
        console.error('Export failed:', err);
        btn.textContent = '✗ Erreur — réessayer';
        setTimeout(() => { btn.textContent = orig; btn.classList.remove('busy'); }, 2500);
      });
  }
  function openModal(){
    ensureModal();
    document.getElementById('sm-url').textContent = location.href;
    modal.classList.add('open');
  }
  function closeModal(){ if (modal) modal.classList.remove('open'); }
  window.openShareModal = openModal;
})();

(function setupExportImage(){
  const W = 1200, H = 675;
  const PAD = 40;
  const HEADER_H = 100;
  const FOOTER_H = 50;

  function slug(s){
    return String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  }

  // PARTI_COLORS : palette des partis (25 teintes). Définie dans shared.js.

  // Dessine le logo LR ⚓ Vote sur canvas. Retourne la largeur totale dessinée.
  // Reproduit la mise en page du logo HTML : "LR" à 95% de "Vote", voile alignée
  // bas-baseline et remontée d'1px, couleur aléatoire depuis la palette parti.
  function drawLogo(ctx, x, baselineY) {
    const fontSize = 32;            // taille de "Vote" (référence)
    const lrSize = fontSize * 0.95; // "LR" à 95%
    const sailSize = 22;            // ≈ cap-height
    const gap = 4;
    const sailColor = PARTI_COLORS[Math.floor(Math.random() * PARTI_COLORS.length)];

    ctx.textBaseline = 'alphabetic';

    // "LR" à 95%
    ctx.fillStyle = '#1A1A1A';
    ctx.font = '400 ' + lrSize + 'px "Space Grotesk", system-ui, sans-serif';
    ctx.fillText('LR', x, baselineY);
    const lrW = ctx.measureText('LR').width;

    // Voile : 6 barres alignées à droite, bas de la voile à la baseline du texte
    const sailX = x + lrW + gap;
    const sailTop = baselineY - sailSize;
    const widths = [0.17, 0.33, 0.50, 0.67, 0.83, 1.0];
    const barH = (sailSize - 5) / 6;
    ctx.fillStyle = sailColor;
    widths.forEach((wp, i) => {
      const bw = wp * sailSize;
      const by = sailTop + i * (barH + 1);
      const bx = sailX + (sailSize - bw);
      ctx.fillRect(bx, by, bw, barH);
    });

    // "Vote" à 100%
    ctx.fillStyle = '#1A1A1A';
    ctx.font = '700 ' + fontSize + 'px "Space Grotesk", system-ui, sans-serif';
    const voteX = sailX + sailSize + gap;
    ctx.fillText('Vote', voteX, baselineY);
    const voteW = ctx.measureText('Vote').width;

    return (voteX + voteW) - x; // largeur totale du logo
  }

  // Texte du sous-titre selon le mode courant
  function getCarteSubtitle() {
    const m = currentMapMode, s = currentMapSelection;
    if (m === 'candidat') {

      { n: 'Tennis-club',         lng: -1.16336, lat: 46.16609 },
      { n: 'Ec. Palissy',         lng: -1.16319, lat: 46.17011 },
      { n: 'Vélodrôme',           lng: -1.13937, lat: 46.17341 },
      { n: 'Cim. St-Éloi',        lng: -1.13180, lat: 46.16429 },
      { n: 'Ly. Valin',           lng: -1.13598, lat: 46.15569 },
      { n: 'Col. Camus',          lng: -1.13997, lat: 46.14491 },
      { n: 'Médiathèque',         lng: -1.15344, lat: 46.15289 },
      { n: 'EIGSI',               lng: -1.15448, lat: 46.13956 },
      { n: 'Pl. du Canton',       lng: -1.14619, lat: 46.14807 },
      { n: 'Mairie annexe VLS',   lng: -1.12258, lat: 46.15191 },
      { n: 'Étang Lavoisier',     lng: -1.12553, lat: 46.15470 },
      { n: 'Commissariat',        lng: -1.14614, lat: 46.16865 },
      { n: 'Cité admin.',         lng: -1.14481, lat: 46.16313 },
      { n: 'Préfec.',             lng: -1.15719, lat: 46.15709 }
    ]
  };

  // Dessine les repères sur la carte d'export (points triangulaires + labels).
  // `project` convertit lng/lat → pixel canvas.
  // `bounds`  = {minLng, maxLng, minLat, maxLat} — filtre les points hors zone visible.
  // `points`  = liste de repères à utiliser (par défaut LR_REPERES.points).
  // `frame`   = {x, y, w, h} px — si fourni, le label est repositionné (left/right/below)
  //             pour ne pas dépasser ce cadre, sans bouger le triangle.
  // `maxLabels` = nombre max de repères à afficher (priorité aux plus proches du centre).
  //             Si non fourni, tous les repères qui passent les filtres sont affichés.
  // Détection de collision : un candidat dont la bbox (triangle + label) chevauche un
  // déjà placé est sauté ; le suivant dans la liste de priorité est essayé.
  function drawReperesOnCarte(ctx, project, bounds, points, frame, maxLabels) {
    const list = points || LR_REPERES.points;
    function inBounds(lng, lat) {
      if (!bounds) return true;
      return lng >= bounds.minLng && lng <= bounds.maxLng
          && lat >= bounds.minLat && lat <= bounds.maxLat;
    }
    const TRI_W = 5, TRI_H = 7, GAP = 2;
    const FONT_PX = 9.5;
    const PAD = 2;
    ctx.save();
    ctx.font = '600 ' + FONT_PX + 'px "Space Grotesk", system-ui, sans-serif';

    // 1) Filtrer dans le cadre + projeter en pixel
    let candidates = list
      .filter(p => inBounds(p.lng, p.lat))
      .map(p => { const [px, py] = project(p.lng, p.lat); return { p: p, px: px, py: py }; });

    // 2) Trier par proximité au centre du cadre (les plus pertinents d'abord)
    if (frame) {
      const cx = frame.x + frame.w / 2;
      const cy = frame.y + frame.h / 2;
      candidates.forEach(c => { const dx = c.px - cx, dy = c.py - cy; c.d = dx*dx + dy*dy; });
      candidates.sort((a, b) => a.d - b.d);
    }

    // 3) Pour chaque candidat : essayer le layout par défaut (label au-dessus, ▼).
    //    En cas de débordement vertical du cadre OU de collision avec un déjà accepté,
    //    on retente avec le layout flipped (label en dessous, ▲). Si les deux échouent,
    //    on ignore ce repère. La limite maxLabels reste appliquée.
    function tryLayout(c, flipped) {
      const tw = ctx.measureText(c.p.n).width;
      let tx = c.px;
      let ty = flipped ? (c.py + TRI_H + GAP) : (c.py - TRI_H - GAP);
      let align = 'center';
      const baseline = flipped ? 'top' : 'alphabetic';
      if (frame) {
        // Validation verticale : le label doit tenir entièrement dans le cadre
        if (!flipped && ty - FONT_PX < frame.y + PAD) return null;
        if (flipped  && ty + FONT_PX + 2 > frame.y + frame.h - PAD) return null;
        // Horizontal : ajustement gauche/droite (le triangle ne bouge jamais)
        const halfW = tw / 2;
        if (c.px - halfW < frame.x + PAD)                  { align = 'left';  tx = c.px - TRI_W / 2; }
        else if (c.px + halfW > frame.x + frame.w - PAD)   { align = 'right'; tx = c.px + TRI_W / 2; }
      }
      // Bbox du label
      let lx1, lx2;
      if (align === 'center')      { lx1 = tx - tw / 2; lx2 = tx + tw / 2; }
      else if (align === 'left')   { lx1 = tx;          lx2 = tx + tw; }
      else                         { lx1 = tx - tw;     lx2 = tx; }
      const ly1 = (baseline === 'top') ? ty               : ty - FONT_PX;
      const ly2 = (baseline === 'top') ? ty + FONT_PX + 2 : ty + 2;
      const triTop = flipped ? c.py : c.py - TRI_H;
      const triBot = flipped ? c.py + TRI_H : c.py;
      const box = {
        x1: Math.min(lx1, c.px - TRI_W / 2) - 1,
        y1: Math.min(ly1, triTop) - 1,
        x2: Math.max(lx2, c.px + TRI_W / 2) + 1,
        y2: Math.max(ly2, triBot) + 1
      };
      return { tx: tx, ty: ty, align: align, baseline: baseline, flipped: flipped, box: box };
    }
    const limit = (typeof maxLabels === 'number') ? maxLabels : Infinity;
    const accepted = [];
    function collidesWithAccepted(b) {
      return accepted.some(a => !(b.x2 < a.box.x1 || b.x1 > a.box.x2
                              || b.y2 < a.box.y1 || b.y1 > a.box.y2));
    }
    for (const c of candidates) {
      if (accepted.length >= limit) break;
      // Essai 1 : layout normal (label au-dessus)
      let layout = tryLayout(c, false);
      if (!layout || collidesWithAccepted(layout.box)) {
        // Essai 2 : layout inversé (label en dessous)
        layout = tryLayout(c, true);
        if (!layout || collidesWithAccepted(layout.box)) continue;
      }
      accepted.push(Object.assign({ c: c }, layout));
    }

    // 4) Dessiner triangles puis labels
    accepted.forEach(a => {
      const { c, tx, ty, align, baseline, flipped } = a;
      // Triangle ▼ (label au-dessus) ou ▲ (label en dessous) — la pointe reste sur (c.px, c.py)
      ctx.beginPath();
      if (flipped) {
        // ▲ : base en bas, pointe en haut (sur la coord)
        ctx.moveTo(c.px - TRI_W / 2, c.py + TRI_H);
        ctx.lineTo(c.px + TRI_W / 2, c.py + TRI_H);
        ctx.lineTo(c.px, c.py);
      } else {
        // ▼ : base en haut, pointe en bas (sur la coord)
        ctx.moveTo(c.px - TRI_W / 2, c.py - TRI_H);
        ctx.lineTo(c.px + TRI_W / 2, c.py - TRI_H);
        ctx.lineTo(c.px, c.py);
      }
      ctx.closePath();
      ctx.fillStyle = '#1A1A1A';
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 1.2;
      ctx.stroke();
      ctx.fill();
      ctx.textAlign = align;
      ctx.textBaseline = baseline;
      ctx.lineWidth = 2.5;
      ctx.strokeStyle = 'rgba(255,255,255,0.92)';
      ctx.strokeText(c.p.n, tx, ty);
      ctx.fillStyle = '#1A1A1A';
      ctx.fillText(c.p.n, tx, ty);
    });
    ctx.restore();
  }

  // Cache de CanvasPattern par contexte canvas → par paire/triplet de couleurs.
  // Équivalent côté <canvas> du <pattern> SVG utilisé par la carte Leaflet pour
  // les bureaux ex-aequo. Canvas2D ne sait pas lire `url(#tie-XXX)`, il faut
  // construire un CanvasPattern via un tile pré-rendu + setTransform(rotation).
  const _canvasTiePatternCache = new WeakMap();
  function getCanvasTiePattern(ctx, colors) {
    if (!colors || colors.length < 2) return null;
    let cache = _canvasTiePatternCache.get(ctx);
    if (!cache) { cache = {}; _canvasTiePatternCache.set(ctx, cache); }
    const id = colors.map(c => (c || '#CCC').toUpperCase()).join('|');
    if (cache[id]) return cache[id];
    // Tile : N bandes verticales (8 px chacune), puis on appliquera une rotation
    // de 45° via pattern.setTransform pour obtenir des hachures diagonales.
    const bandW = 8;
    const size = bandW * colors.length;
    const tile = document.createElement('canvas');
    tile.width = size; tile.height = size;
    const tctx = tile.getContext('2d');
    colors.forEach((col, i) => {
      tctx.fillStyle = col || '#cccccc';
      tctx.fillRect(i * bandW, 0, bandW, size);
    });
    const pattern = ctx.createPattern(tile, 'repeat');
    if (pattern && typeof pattern.setTransform === 'function' && typeof DOMMatrix !== 'undefined') {
      pattern.setTransform(new DOMMatrix().rotate(45));
    }
    cache[id] = pattern;
    return pattern;
  }

  // Dessine la carte choroplèthe sur le canvas.
  // opts.geoJSON : geoJSON alternatif (par défaut : getMapGeoJSON() de la carte principale)
  // opts.styleFn : fonction de styling alternative (par défaut : featureStyle global)
  // Utile pour rendre une carte du comparateur (per-side styling) sans toucher
  // aux globaux de la carte principale.
  function drawCarteVisual(ctx, x, y, w, h, opts) {
    opts = opts || {};
    const gj = opts.geoJSON || (typeof getMapGeoJSON === 'function' ? getMapGeoJSON() : null);
    const getStyle = opts.styleFn || (typeof featureStyle === 'function' ? featureStyle : null);
    if (!gj || !gj.features || !gj.features.length || !getStyle) return null;

    // Calcul des bornes lat/lng (on exclut le bureau 0057 non géo)
    let minLat = Infinity, maxLat = -Infinity, minLng = Infinity, maxLng = -Infinity;
    function visit(coords) {
      if (typeof coords[0] === 'number') {
        const [lng, lat] = coords;
        if (lat < minLat) minLat = lat;
        if (lat > maxLat) maxLat = lat;
        if (lng < minLng) minLng = lng;
        if (lng > maxLng) maxLng = lng;
      } else { coords.forEach(visit); }
    }
    gj.features.forEach(f => {
      const ns = numStr(f);
      if (ns === '0057') return;
      if (!f.geometry) return;
      visit(f.geometry.coordinates);
    });
    if (minLat === Infinity) return null;

    // Conversion Mercator (les deux axes en radians, ratio géographique correct)
    const xMin = lngToX(minLng), xMax = lngToX(maxLng);
    const yMin = latToY(minLat), yMax = latToY(maxLat);
    const dataW = xMax - xMin, dataH = yMax - yMin;

    // Fit dans la zone visuelle (préserve aspect ratio)
    const dataRatio = dataW / dataH;
    const boxRatio = w / h;
    let drawW, drawH;
    if (dataRatio > boxRatio) { drawW = w; drawH = w / dataRatio; }
    else                      { drawH = h; drawW = h * dataRatio; }
    const offX = x + (w - drawW) / 2;
    const offY = y + (h - drawH) / 2;

    function project(lng, lat) {
      const px = ((lngToX(lng) - xMin) / dataW) * drawW + offX;
      const py = drawH - ((latToY(lat) - yMin) / dataH) * drawH + offY;
      return [px, py];
    }

    function drawRing(ring) {
      ctx.beginPath();
      ring.forEach((pt, i) => {
        const [px, py] = project(pt[0], pt[1]);
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      });
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }

    gj.features.forEach(f => {
      const ns = numStr(f);
      if (ns === '0057') return;
      if (!f.geometry) return;
      const style = getStyle(f);
      let fill = style.fillColor || '#ddd';
      // Ex-aequo : featureStyle renvoie 'url(#tie-XXX)' qui ne marche pas
      // en Canvas2D → on remplace par un CanvasPattern de hachures diagonales.
      if (typeof fill === 'string' && fill.startsWith('url(#tie-')) {
        const data = getBureauData(ns);
        const tied = tieCandidatesForBureau(data);
        if (tied) {
          const cols = tied.map(name => colorOfCandidate(name));
          const pat = getCanvasTiePattern(ctx, cols);
          fill = pat || colorOfCandidate(tied[0]);  // fallback couleur unique si pattern KO
        } else {
          fill = '#ddd';
        }
      }
      ctx.fillStyle = fill;
      ctx.strokeStyle = style.color || '#fff';
      ctx.lineWidth = (style.weight || 1) * 0.7;
      ctx.globalAlpha = style.fillOpacity != null ? style.fillOpacity : 1;
      const c = f.geometry.coordinates;
      if (f.geometry.type === 'Polygon') c.forEach(drawRing);
      else if (f.geometry.type === 'MultiPolygon') c.forEach(p => p.forEach(drawRing));
    });
    ctx.globalAlpha = 1;

    // Repères géographiques (KML) — dessinés par-dessus les bureaux
    drawReperesOnCarte(ctx, project, { minLng, maxLng, minLat, maxLat }, null,
      { x: offX, y: offY, w: drawW, h: drawH });

    return { drawW, drawH, offX, offY };
  }

  // Légende synthétique (selon le mode courant) en bas-droite de la zone visuelle
  function drawCarteLegend(ctx, visX, visY, visW, visH) {
    const m = currentMapMode, s = currentMapSelection;
    const shData = (typeof getSheetData === 'function') ? getSheetData() : {};
    const legPad = 4;
    const legX = visX + visW - 280 - legPad;
    const legY = visY + visH - 200 - legPad;
    const legW = 280;

    // Détermine le contenu
    const lines = []; // [{type:'item', color, label, val}, {type:'gradient', color, label, mn, mx}]

    if (m === 'candidat' && s) {
      const col = (typeof colorOfCandidate === 'function') ? colorOfCandidate(s) : '#666';
      lines.push({ type: 'gradient', color: col, mn: currentSelectionMin, mx: currentSelectionMax });
    } else if (m === 'bloc' && s) {
      const cfg = (typeof BLOC_CONFIG !== 'undefined' && (BLOC_CONFIG[s] || BLOC_CONFIG['?'])) || { color:'#666', label:s };
      lines.push({ type: 'gradient', color: cfg.color, mn: currentSelectionMin, mx: currentSelectionMax });
    } else if (m === 'candidat') {
      // Top 5 vainqueurs (Prénom Nom). Comptage cohérent avec renderMapLegend :
      // les candidats à égalité en tête comptent +1 chacun, marqués d'un ▤.
      const wins = {}, ties = {};
      Object.entries(shData).forEach(([ns, d]) => {
        if (ns==='0057' || !d) return;
        const tied = (typeof tieCandidatesForBureau === 'function') ? tieCandidatesForBureau(d) : null;
        if (tied) {
          tied.forEach(t => { wins[t] = (wins[t]||0)+1; ties[t] = (ties[t]||0)+1; });
        } else if (d.w) {
          wins[d.w] = (wins[d.w]||0)+1;
        }
      });
      const sorted = Object.entries(wins).sort((a,b)=>b[1]-a[1]).slice(0,5);
      sorted.forEach(([n, nb]) => {
        const col = (typeof colorOfCandidate === 'function') ? colorOfCandidate(n) : '#666';
        // On passe par candInfo() pour bénéficier de l'hydratation depuis PERSONS
        // quand p/n sont vides dans CAND_DATA — sinon le prénom apparaissait pour
        // certains candidats et pas d'autres, sans logique apparente.
        const ci = (typeof candInfo === 'function') ? candInfo(n) : {};
        const nom = ci.n || n.replace(/\s*\([^)]*\)$/, '');
        const prenom = ci.p ? ci.p + ' ' : '';
        // shortPa() rabote les suffixes des codes pa fins ("UDF dissident libéral"
        // → "UDF dissident") pour rester lisible dans la légende.
        const paRaw = ci.pa || '';
        const paShort = (typeof shortPa === 'function') ? shortPa(paRaw) : paRaw;
        const pa = paShort ? ' (' + paShort + ')' : '';
        const tieMark = (ties[n] || 0) > 0 ? ' ▤' : '';
        lines.push({ type:'item', color:col, label: prenom + nom + pa, val: nb + ' bur.' + tieMark });
      });
    } else if (m === 'bloc') {
      const wins = {};
      Object.entries(shData).forEach(([ns, d]) => {
        if (ns==='0057' || !d) return;
        if (typeof computeBlocs !== 'function') return;
        const bc = computeBlocs(d);
        const dom = Object.entries(bc).sort((a,b)=>b[1]-a[1])[0];
        if (dom) wins[dom[0]] = (wins[dom[0]]||0) + 1;
      });
      Object.entries(wins).sort((a,b)=>b[1]-a[1]).slice(0,6).forEach(([k, nb]) => {
        const cfg = (typeof BLOC_CONFIG !== 'undefined' && (BLOC_CONFIG[k] || BLOC_CONFIG['?'])) || { color:'#666', label:k };
        lines.push({ type:'item', color: cfg.color, label: cfg.label || k, val: nb + ' bur.' });
      });
    } else if (m === 'abstention') {
      if (typeof ensureAbstRange === 'function') ensureAbstRange();
      lines.push({ type: 'gradient', color: '#1A1A2E', mn: currentAbstMin, mx: currentAbstMax });
    } else if (m === 'bv') {
      const vals = Object.entries(shData).filter(([ns,d])=>ns!=='0057'&&d&&d.i).map(([,d])=>getBVPct(d));
      if (vals.length) {
        lines.push({ type:'gradient', color: 'rgb(90,60,120)', mn: Math.min(...vals), mx: Math.max(...vals) });
      }
    }

    if (!lines.length) return;

    const lineH = 22;
    const gradH = 38; // dégradé + min/max (sans label)
    const padTop = 12, padBottom = 10;
    let bgH = padTop + padBottom;
    lines.forEach(l => bgH += (l.type === 'gradient' ? gradH : lineH));

    const legActualY = visY + visH - bgH - legPad;

    // Fond
    ctx.fillStyle = 'rgba(255,255,255,0.96)';
    ctx.strokeStyle = '#E6DFD5';
    ctx.lineWidth = 1;
    if (typeof ctx.roundRect === 'function') {
      ctx.beginPath(); ctx.roundRect(legX, legActualY, legW, bgH, 8); ctx.fill(); ctx.stroke();
    } else {
      ctx.fillRect(legX, legActualY, legW, bgH);
      ctx.strokeRect(legX, legActualY, legW, bgH);
    }

    ctx.textBaseline = 'alphabetic';
    let cy = legActualY + padTop;

    lines.forEach(l => {
      if (l.type === 'item') {
        // Carré coloré + label + valeur
        ctx.fillStyle = l.color;
        ctx.fillRect(legX + 14, cy + 4, 12, 12);
        ctx.fillStyle = '#1A1A1A';
        ctx.font = '500 13px "Space Grotesk", system-ui, sans-serif';
        const maxW = legW - 14 - 12 - 8 - 50 - 14;
        let label = l.label;
        while (ctx.measureText(label).width > maxW && label.length > 5) label = label.slice(0, -1);
        if (label.length < l.label.length) label = label.slice(0, -1) + '…';
        ctx.fillText(label, legX + 14 + 12 + 8, cy + 14);
        ctx.fillStyle = '#5A5A5A';
        ctx.font = '700 12px "Space Grotesk", system-ui, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(l.val, legX + legW - 14, cy + 14);
        ctx.textAlign = 'left';
        cy += lineH;
      } else if (l.type === 'gradient') {
        // Dégradé direct (pas de label au-dessus)
        const gx = legX + 14, gy = cy + 4, gw = legW - 28, gh = 14;
        const grad = ctx.createLinearGradient(gx, gy, gx + gw, gy);
        grad.addColorStop(0, '#fff');
        grad.addColorStop(1, l.color);
        ctx.fillStyle = grad;
        ctx.fillRect(gx, gy, gw, gh);
        ctx.strokeStyle = '#ddd';
        ctx.strokeRect(gx, gy, gw, gh);
        // Min / max sous le dégradé
        ctx.fillStyle = '#5A5A5A';
        ctx.font = '500 11px "Space Grotesk", system-ui, sans-serif';
        ctx.fillText((l.mn||0).toFixed(1) + ' %', gx, gy + gh + 13);
        ctx.textAlign = 'right';
        ctx.fillText((l.mx||0).toFixed(1) + ' %', gx + gw, gy + gh + 13);
        ctx.textAlign = 'left';
        cy += gradH;
      }
    });
  }

  // Multiplicateur de résolution : on rend tout en 2x pour avoir une image crisp
  // sur écrans rétina et partage social. Le code de dessin garde les coordonnées
  // logiques W × H grâce au ctx.scale(SCALE, SCALE), seule la sortie bitmap est
  // doublée (2400 × 1350). Cohérent entre compose() carte ville et composeFiche().
  const SCALE = 2;

  async function compose() {
    if (!window._exportMode && document.fonts && document.fonts.ready) { try { await document.fonts.ready; } catch(_) {} }
    const canvas = document.createElement('canvas');
    canvas.width = W * SCALE; canvas.height = H * SCALE;
    const ctx = canvas.getContext('2d');
    ctx.scale(SCALE, SCALE);

    // Fond beige
    ctx.fillStyle = '#F0EAE0';
    ctx.fillRect(0, 0, W, H);

    // En-tête (bandeau beige clair)
    ctx.fillStyle = '#F7F3EE';
    ctx.fillRect(0, 0, W, HEADER_H);
    ctx.fillStyle = '#E6DFD5';
    ctx.fillRect(0, HEADER_H - 1, W, 1);

    // Logo à gauche (baseline 64 → bien centré dans HEADER_H=100)
    const logoBaseline = 64;
    const logoW = drawLogo(ctx, PAD, logoBaseline);

    // Titre + sous-titre à droite du logo
    const textX = PAD + logoW + 24; // gap horizontal entre logo et texte
    ctx.fillStyle = '#1A1A1A';
    ctx.textBaseline = 'alphabetic';
    ctx.font = '700 24px "Space Grotesk", system-ui, sans-serif';
    ctx.fillText(getCarteTitle(), textX, 48);
    ctx.fillStyle = '#5A5A5A';
    ctx.font = '500 16px "Space Grotesk", system-ui, sans-serif';
    ctx.fillText(getCarteSubtitle(), textX, 74);

    // Zone visuelle
    const visTop = HEADER_H + 20;
    const visBottom = H - FOOTER_H - 5;
    const visW = W - 2 * PAD;
    const visH = visBottom - visTop;

    drawCarteVisual(ctx, PAD, visTop, visW, visH);
    drawCarteLegend(ctx, PAD, visTop, visW, visH);

    // Pied de page
    ctx.fillStyle = '#5A5A5A';
    ctx.font = '500 13px "Space Grotesk", system-ui, sans-serif';
    const today = new Date().toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
    ctx.fillText('larochellevote.fr · @LaRochelleVote · exporté le ' + today, PAD, H - 22);

    return canvas;
  }

  // ═════════════════════════════════════════════════════════════════════════
  // ── Export comparateur (modes Abs / Rel / Diff / Nuage) ────────────────
  // ═════════════════════════════════════════════════════════════════════════
  async function composeCompare() {
    if (!window._exportMode && document.fonts && document.fonts.ready) { try { await document.fonts.ready; } catch(_) {} }
    const cmpAPI = window._cmpExport;
    if (!cmpAPI) return null;
    const state = cmpAPI.getState();
    if (!state) return null;
    const A = state.A, B = state.B;
    const mode = state.scaleMode || 'absolute';

    const canvas = document.createElement('canvas');
    canvas.width = W * SCALE; canvas.height = H * SCALE;
    const ctx = canvas.getContext('2d');
    ctx.scale(SCALE, SCALE);

    // Header minimal : juste logo + titre. Le contexte A/B/scores passe dans
    // les cartouches au-dessus de chaque carte (cf. drawCompareMap).
    const HEADER_CMP = 70;
    ctx.fillStyle = '#F0EAE0'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#F7F3EE'; ctx.fillRect(0, 0, W, HEADER_CMP);
    ctx.fillStyle = '#E6DFD5'; ctx.fillRect(0, HEADER_CMP - 1, W, 1);

    const logoBaseline = 44;
    const logoW = drawLogo(ctx, PAD, logoBaseline);
    const labA = cmpAPI.shortLabelOfSel(A);
    const labB = cmpAPI.shortLabelOfSel(B);
    const colA = cmpAPI.baseColorOfSel(A);
    const colB = cmpAPI.baseColorOfSel(B);
    const textX = PAD + logoW + 24;
    ctx.fillStyle = '#1A1A1A';
    ctx.textBaseline = 'alphabetic';
    ctx.font = '700 22px "Space Grotesk", system-ui, sans-serif';
    const modeLabel = mode === 'absolute' ? 'Échelle absolue'
      : mode === 'relative' ? 'Échelle relative'
      : mode === 'diff' ? 'Différence B − A'
      : 'Nuage de corrélation';
    ctx.fillText('Comparatif · ' + modeLabel, textX, 44);

    // Zone visuelle. On réserve une bande basse pour la légende sauf en mode Nuage.
    const showLegendBar = (mode !== 'nuage');
    const LEGEND_BAR_H = showLegendBar ? 56 : 0;
    const visTop = HEADER_CMP + 16;
    const visBottom = H - FOOTER_H - 8 - LEGEND_BAR_H;
    const visW = W - 2 * PAD;
    const visH = visBottom - visTop;

    // ── Selon le mode, on remplit la zone visuelle ──
    if (mode === 'nuage') {
      await drawNuageOnCanvas(ctx, PAD, visTop, visW, visH);
    } else if (mode === 'diff') {
      // 2 cartouches A et B (B avec delta) + 1 carte (côté affiché) à gauche,
      // tornado par quartier à droite.
      const half = Math.floor((visW - 20) / 2);
      // Calcule le delta ville pour la cartouche B.
      let deltaCity = null;
      if (cmpAPI && cmpAPI.computeCityScore && cmpAPI.getSheetForSel) {
        const sA = cmpAPI.computeCityScore(cmpAPI.getSheetForSel(A), A);
        const sB = cmpAPI.computeCityScore(cmpAPI.getSheetForSel(B), B);
        if (typeof sA === 'number' && typeof sB === 'number') deltaCity = sB - sA;
      }
      drawCartouche(ctx, PAD,              visTop, half, A, 'A');
      drawCartouche(ctx, PAD + half + 20,  visTop, half, B, 'B',
        (typeof deltaCity === 'number') ? { delta: deltaCity } : null);
      // Sous les cartouches : carte (côté affiché) à gauche + tornado quartiers à droite.
      const mapTop = visTop + CART_H + 12;
      const mapH = visH - CART_H - 12;
      const mapW = Math.round(visW * 0.62), tornadoW = visW - mapW - 20;
      const displaySide = (typeof window._cmpDisplaySide === 'function') ? window._cmpDisplaySide() : 'A';
      const selD = state[displaySide];
      const elecD = selD && (typeof ELECTIONS !== 'undefined') ? ELECTIONS[selD.elec] : null;
      const eraD = elecD ? String(elecD.my || '') : '';
      const gjD = (typeof MAPS_DATA !== 'undefined') ? MAPS_DATA[eraD] : null;
      const styleFnD = state['geo' + displaySide] && state['geo' + displaySide].options && state['geo' + displaySide].options.style;
      if (gjD && styleFnD) drawCarteVisual(ctx, PAD, mapTop, mapW, mapH, { geoJSON: gjD, styleFn: styleFnD });
      drawDiffTornado(ctx, PAD + mapW + 20, mapTop, tornadoW, mapH, state);
      // Légende en bas (gradient bicolore + bornes ±maxAbs).
      drawCompareLegend(ctx, PAD, visBottom + 12, visW, LEGEND_BAR_H - 12, state, mode, colA, colB);
    } else {
      // Abs / Rel : 2 cartes côte à côte.
      const half = Math.floor((visW - 20) / 2);
      drawCompareMap(ctx, PAD,              visTop, half, visH, state, 'A');
      drawCompareMap(ctx, PAD + half + 20,  visTop, half, visH, state, 'B');
      // Légende en bas (gradient + bornes).
      drawCompareLegend(ctx, PAD, visBottom + 12, visW, LEGEND_BAR_H - 12, state, mode, colA, colB);
    }

    // Pied de page.
    ctx.fillStyle = '#5A5A5A';
    ctx.font = '500 13px "Space Grotesk", system-ui, sans-serif';
    const today = new Date().toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
    ctx.fillText('larochellevote.fr · @LaRochelleVote · exporté le ' + today, PAD, H - 22);

    return canvas;
  }

  // Cartouche enrichie : pastille + 2 lignes texte + score à droite.
  // Utilisée par drawCompareMap (Abs/Rel/Diff) et directement en mode Diff pour
  // afficher les 2 cartouches au-dessus de l'unique carte affichée.
  const CART_H = 56;
  // opts.delta : number → si fourni, dessine "Δ ±X,X pts" sous le score, et
  // réduit la taille du score pour laisser la place. Utilisé pour la cartouche B
  // en mode Diff (le delta est B − A ; il n'a pas de sens sur la cartouche A).
  function drawCartouche(ctx, x, y, w, sel, letter, opts) {
    if (!sel) return;
    opts = opts || {};
    const cmpAPI = window._cmpExport;
    const lab = cmpAPI ? cmpAPI.shortLabelOfSel(sel) : '';
    const col = cmpAPI ? cmpAPI.baseColorOfSel(sel) : '#999';
    const cartH = CART_H;
    // Fond coloré arrondi (idem header de l'ancien design).
    ctx.fillStyle = col;
    const r = 8;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y,     x + w, y + cartH, r);
    ctx.arcTo(x + w, y + cartH, x, y + cartH, r);
    ctx.arcTo(x,     y + cartH, x, y, r);
    ctx.arcTo(x,     y, x + w, y, r);
    ctx.closePath();
    ctx.fill();
    // Helpers (parti / tour / lignes) — reproduits localement parce que les
    // closures de composeCompare ne sont pas accessibles ici.
    function partyOfSel(s) {
      if (s.type !== 'candidat') return '';
      const cand = (typeof CANDIDATURES !== 'undefined') ? CANDIDATURES[s.quoi] : null;
      return (cand && cand.pa) ? cand.pa : '';
    }
    function tourLabel(s) {
      if (typeof isReferendum === 'function' && isReferendum(s.elec)) return '';
      if (s.tour === 'T1') return '1ᵉʳ tour';
      if (s.tour === 'T2') return '2ᵉ tour';
      return '';
    }
    const pa = partyOfSel(sel);
    const topLine = lab + (pa ? ' · ' + pa : '');
    const t = tourLabel(sel);
    const ctxLine = sel.elec + (t ? ' · ' + t : '');
    // Pastille blanche avec lettre A/B en couleur du côté.
    const padX = 12, circR = 12, gapCC = 10;
    const cx = x + padX + circR, cy = y + cartH / 2;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(cx, cy, circR, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = col;
    ctx.font = '700 13px "Space Grotesk", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(letter, cx, cy + 1);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
    // Score à droite : computeCityScore. Quand un delta est fourni, on dessine
    // le score un peu plus petit et on ajoute "Δ ±X,X pts" en dessous.
    let scoreText = '';
    if (cmpAPI && cmpAPI.getSheetForSel && cmpAPI.computeCityScore) {
      const sheet = cmpAPI.getSheetForSel(sel);
      const score = cmpAPI.computeCityScore(sheet, sel);
      if (typeof score === 'number') scoreText = score.toFixed(1).replace('.', ',') + ' %';
    }
    let scoreW = 0;
    const hasDelta = (typeof opts.delta === 'number');
    // Pastille du delta dessinée AVANT le score (mesurée d'abord pour calculer l'offset).
    let pillW = 0, pillGap = 0;
    let pillData = null;
    if (hasDelta) {
      const d = opts.delta;
      const sign = d >= 0.05 ? '+' : d <= -0.05 ? '−' : '';
      const dText = sign + Math.abs(d).toFixed(1).replace('.', ',') + ' pts';
      let bg, fg, br;
      if (d >= 0.05)       { bg = '#D4EFD4'; fg = '#0F5F0F'; br = '#6FB66F'; }
      else if (d <= -0.05) { bg = '#F7D4D4'; fg = '#8B1414'; br = '#D17070'; }
      else                 { bg = 'rgba(255,255,255,0.18)'; fg = '#ffffff'; br = 'rgba(255,255,255,0.30)'; }
      ctx.font = '600 11px "Space Grotesk", system-ui, sans-serif';
      const textW = ctx.measureText(dText).width;
      const padPill = 6;
      pillW = textW + padPill * 2;
      pillGap = 10;
      pillData = { dText, bg, fg, br, padPill };
    }
    if (scoreText) {
      ctx.font = '700 24px "Space Grotesk", system-ui, sans-serif';
      scoreW = ctx.measureText(scoreText).width;
      ctx.fillStyle = '#fff';
      ctx.fillText(scoreText, x + w - padX - scoreW, y + cartH / 2 + 8);
    }
    // Dessine la pastille à GAUCHE du score (verticalement centrée avec lui).
    if (pillData) {
      const pillH = 16, pillR = 4;
      const pillX = x + w - padX - scoreW - pillGap - pillW;
      const pillY = y + cartH / 2 - pillH / 2 + 1;
      ctx.fillStyle = pillData.bg;
      ctx.beginPath();
      ctx.moveTo(pillX + pillR, pillY);
      ctx.arcTo(pillX + pillW, pillY,         pillX + pillW, pillY + pillH, pillR);
      ctx.arcTo(pillX + pillW, pillY + pillH, pillX,         pillY + pillH, pillR);
      ctx.arcTo(pillX,         pillY + pillH, pillX,         pillY,         pillR);
      ctx.arcTo(pillX,         pillY,         pillX + pillW, pillY,         pillR);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = pillData.br; ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = pillData.fg;
      ctx.font = '600 11px "Space Grotesk", system-ui, sans-serif';
      ctx.textBaseline = 'middle';
      ctx.fillText(pillData.dText, pillX + pillData.padPill, pillY + pillH / 2 + 0.5);
      ctx.textBaseline = 'alphabetic';
    }
    // Largeur réservée à droite = score + (pastille + gap si présent), pour borner le texte central.
    const rightReservedW = scoreW + (hasDelta ? (pillGap + pillW) : 0);
    // Texte central (2 lignes) — borné à droite par le score (ou le delta s'il est plus large).
    const tX = cx + circR + gapCC;
    const tRight = x + w - padX - rightReservedW - 14;
    function clipText(s, maxW) {
      if (ctx.measureText(s).width <= maxW) return s;
      let truncated = s;
      while (truncated.length > 1 && ctx.measureText(truncated + '…').width > maxW) {
        truncated = truncated.slice(0, -1);
      }
      return truncated + '…';
    }
    const availW = Math.max(40, tRight - tX);
    ctx.fillStyle = '#fff';
    ctx.font = '700 14px "Space Grotesk", system-ui, sans-serif';
    ctx.fillText(clipText(topLine, availW), tX, y + 24);
    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    ctx.font = '500 13px "Space Grotesk", system-ui, sans-serif';
    ctx.fillText(clipText(ctxLine, availW), tX, y + 44);
  }

  // Dessine cartouche + carte choroplèthe du côté demandé.
  // side = 'A' | 'B' | 'diff' (pour diff, on prend le côté affiché).
  function drawCompareMap(ctx, x, y, w, h, state, side) {
    let pickSide = side;
    if (side === 'diff') {
      pickSide = (typeof window._cmpDisplaySide === 'function') ? window._cmpDisplaySide() : 'A';
    }
    const sel = state[pickSide];
    if (!sel) return;
    const elec = (typeof ELECTIONS !== 'undefined') ? ELECTIONS[sel.elec] : null;
    const era = elec ? String(elec.my || '') : '';
    const gj = (typeof MAPS_DATA !== 'undefined') ? MAPS_DATA[era] : null;
    const styleFn = state['geo' + pickSide] && state['geo' + pickSide].options && state['geo' + pickSide].options.style;
    if (!gj || !styleFn) return;
    drawCartouche(ctx, x, y, w, sel, pickSide);
    drawCarteVisual(ctx, x, y + CART_H + 6, w, h - CART_H - 6, { geoJSON: gj, styleFn });
  }

  // Légende en bas (Abs / Rel) : barre(s) gradient avec bornes min/max.
  //  - Abs : 1 barre commune ancrée sur [minG, maxG] (gradient bicolore si A ≠ B en couleur)
  //  - Rel : 2 barres séparées, chacune avec son range local [rangeA / rangeB]
  function drawCompareLegend(ctx, x, y, w, h, state, mode, colA, colB) {
    const fmt = p => (typeof p === 'number' ? p.toFixed(1).replace('.', ',') + ' %' : '—');
    const barH = 16;
    const boundFont = '600 12px "Space Grotesk", system-ui, sans-serif';
    ctx.textBaseline = 'middle';
    if (mode === 'absolute') {
      // Une seule barre centrée. Si colA === colB → gradient simple. Sinon split
      // vertical (haut = A, bas = B), façon "live legend".
      const minG = state.minG, maxG = state.maxG;
      const barW = Math.min(560, w - 200);
      const cy = y + h / 2;
      const minLabel = fmt(minG), maxLabel = fmt(maxG);
      ctx.font = boundFont;
      const minLabelW = ctx.measureText(minLabel).width;
      const maxLabelW = ctx.measureText(maxLabel).width;
      const barX = x + (w - barW) / 2;
      // Bornes
      ctx.fillStyle = '#5A5A5A';
      ctx.fillText(minLabel, barX - minLabelW - 8, cy);
      ctx.fillText(maxLabel, barX + barW + 8, cy);
      // Gradient (1 ou 2 selon colA==colB)
      if (colA === colB) {
        const grad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
        grad.addColorStop(0, blendToWhite(colA, 0.08));
        grad.addColorStop(1, colA);
        ctx.fillStyle = grad;
        ctx.fillRect(barX, cy - barH / 2, barW, barH);
      } else {
        const gradA = ctx.createLinearGradient(barX, 0, barX + barW, 0);
        gradA.addColorStop(0, blendToWhite(colA, 0.08));
        gradA.addColorStop(1, colA);
        ctx.fillStyle = gradA;
        ctx.fillRect(barX, cy - barH / 2, barW, barH / 2);
        const gradB = ctx.createLinearGradient(barX, 0, barX + barW, 0);
        gradB.addColorStop(0, blendToWhite(colB, 0.08));
        gradB.addColorStop(1, colB);
        ctx.fillStyle = gradB;
        ctx.fillRect(barX, cy, barW, barH / 2);
      }
      // Bordure
      ctx.strokeStyle = '#D6CFC3'; ctx.lineWidth = 1;
      ctx.strokeRect(barX + 0.5, cy - barH / 2 + 0.5, barW - 1, barH - 1);
    } else if (mode === 'diff') {
      // Barre bicolore rouge → blanc → vert, centrée sur 0. Bornes ±maxAbs en POINTS.
      const maxAbs = state.diffMaxAbs || 0;
      const bound = (maxAbs).toFixed(1).replace('.', ',') + '\xa0pts';
      const minLabel = '−' + bound, maxLabel = '+' + bound;
      const cy = y + h / 2;
      const barW = Math.min(560, w - 200);
      const barX = x + (w - barW) / 2;
      ctx.font = boundFont;
      const minLabelW = ctx.measureText(minLabel).width;
      const COLOR_NEG = '#A52525', COLOR_POS = '#1F7A1F';
      // Bornes
      ctx.fillStyle = '#5A5A5A';
      ctx.fillText(minLabel, barX - minLabelW - 8, cy);
      ctx.fillText(maxLabel, barX + barW + 8, cy);
      // Gradient bicolore : rouge → blanc → vert
      const grad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
      grad.addColorStop(0,    COLOR_NEG);
      grad.addColorStop(0.25, blendToWhite(COLOR_NEG, 0.4));
      grad.addColorStop(0.5,  '#ffffff');
      grad.addColorStop(0.75, blendToWhite(COLOR_POS, 0.4));
      grad.addColorStop(1,    COLOR_POS);
      ctx.fillStyle = grad;
      ctx.fillRect(barX, cy - barH / 2, barW, barH);
      ctx.strokeStyle = '#D6CFC3'; ctx.lineWidth = 1;
      ctx.strokeRect(barX + 0.5, cy - barH / 2 + 0.5, barW - 1, barH - 1);
      // Étiquette centrale "B − A"
      ctx.font = '700 12px "Space Grotesk", system-ui, sans-serif';
      ctx.fillStyle = '#5A5A5A';
      ctx.textAlign = 'center';
      ctx.fillText('B − A', barX + barW / 2, cy - barH / 2 - 6);
      ctx.textAlign = 'left';
    } else if (mode === 'relative') {
      // 2 sous-barres côte à côte, chacune avec son range et son tag (A/B).
      const half = Math.floor((w - 24) / 2);
      const cy = y + h / 2;
      function drawSub(boxX, sub, col, letter) {
        const minLabel = fmt(sub.min), maxLabel = fmt(sub.max);
        ctx.font = boundFont;
        const minLabelW = ctx.measureText(minLabel).width;
        const maxLabelW = ctx.measureText(maxLabel).width;
        // Tag à gauche : petite pastille colorée avec letter
        const tagR = 10, tagX = boxX + tagR + 4;
        ctx.fillStyle = col;
        ctx.beginPath();
        ctx.arc(tagX, cy, tagR, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = '700 11px "Space Grotesk", system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(letter, tagX, cy + 1);
        ctx.textAlign = 'left';
        // Bornes + barre
        ctx.font = boundFont;
        const barStart = tagX + tagR + 8 + minLabelW + 6;
        const barEnd = boxX + half - maxLabelW - 6;
        const barW = Math.max(40, barEnd - barStart);
        ctx.fillStyle = '#5A5A5A';
        ctx.fillText(minLabel, tagX + tagR + 8, cy);
        ctx.fillText(maxLabel, barEnd + 6, cy);
        const grad = ctx.createLinearGradient(barStart, 0, barStart + barW, 0);
        grad.addColorStop(0, blendToWhite(col, 0.08));
        grad.addColorStop(1, col);
        ctx.fillStyle = grad;
        ctx.fillRect(barStart, cy - barH / 2, barW, barH);
        ctx.strokeStyle = '#D6CFC3'; ctx.lineWidth = 1;
        ctx.strokeRect(barStart + 0.5, cy - barH / 2 + 0.5, barW - 1, barH - 1);
      }
      const rA = state.rangeA || { min: 0, max: 100 };
      const rB = state.rangeB || { min: 0, max: 100 };
      drawSub(x,              rA, colA, 'A');
      drawSub(x + half + 24,  rB, colB, 'B');
    }
    ctx.textBaseline = 'alphabetic';
  }

  function fmtSigned(d) { return (d >= 0 ? '+' : '−') + Math.abs(d).toFixed(1).replace('.', ','); }
  // Graphique "papillon" (tornado chart) des écarts par quartier — rendu sur canvas.
  // Trié par delta signé descendant : progressions en haut (vert), reculs en bas (rouge).
  // Axe central vertical, barres horizontales partant à gauche ou à droite selon le signe,
  // largeur ∝ |delta| / maxAbs.
  function drawDiffTornado(ctx, x, y, w, h, state) {
    const cmpAPI = window._cmpExport;
    if (!cmpAPI || !cmpAPI.computeDiffByQuartier) return;
    const sheetA = cmpAPI.getSheetForSel(state.A);
    const sheetB = cmpAPI.getSheetForSel(state.B);
    const items = cmpAPI.computeDiffByQuartier(sheetA, state.A, sheetB, state.B)
      .filter(it => it.quartier && it.quartier !== 'Nul')
      .sort((a, b) => b.diff - a.diff);
    if (!items.length) return;
    // Cadre subtil identique au summary.
    ctx.fillStyle = '#F7F3EE'; ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = '#E6DFD5'; ctx.lineWidth = 1;
    ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
    // Titre
    const TITLE_H = 32;
    ctx.fillStyle = '#1A1A1A';
    ctx.font = '700 14px "Space Grotesk", system-ui, sans-serif';
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'left';
    ctx.fillText('Écart B − A par quartier', x + 16, y + 22);
    // Layout interne du tornado.
    const PAD_L = 16, PAD_R = 16, PAD_T = TITLE_H + 6, PAD_B = 10;
    const NAME_W = 110;      // colonne nom à gauche
    const VALUE_W = 60;      // colonne valeur en bout de barre
    const innerX = x + PAD_L;
    const innerY = y + PAD_T;
    const innerW = w - PAD_L - PAD_R;
    const innerH = h - PAD_T - PAD_B;
    const barAreaW = innerW - NAME_W - VALUE_W - 16; // 16 = paddings autour de bar area
    const AXIS_X = innerX + NAME_W + 8 + barAreaW / 2;
    const HALF_BAR = barAreaW / 2;
    const maxAbs = Math.max(0.01, ...items.map(it => Math.abs(it.diff)));
    const rowH = Math.max(16, Math.min(30, innerH / items.length));
    // Axe vertical
    ctx.strokeStyle = '#C7BFB1'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(AXIS_X + 0.5, innerY);
    ctx.lineTo(AXIS_X + 0.5, innerY + items.length * rowH);
    ctx.stroke();
    // Couleurs (cohérent avec drawCompareLegend diff).
    const COLOR_POS = '#1F7A1F', COLOR_NEG = '#A52525';
    items.forEach((it, i) => {
      const cy = innerY + rowH * (i + 0.5);
      // Nom (aligné à droite près de l'axe nom)
      ctx.fillStyle = '#1A1A1A';
      ctx.font = '600 12px "Space Grotesk", system-ui, sans-serif';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      let name = it.quartier;
      while (ctx.measureText(name).width > NAME_W - 4 && name.length > 1) name = name.slice(0, -1);
      if (name !== it.quartier) name += '…';
      ctx.fillText(name, innerX + NAME_W, cy);
      // Barre
      const isPos = it.diff >= 0;
      const barW = Math.abs(it.diff) / maxAbs * HALF_BAR * 0.95;
      const barH = Math.max(8, rowH * 0.55);
      ctx.fillStyle = isPos ? COLOR_POS : COLOR_NEG;
      if (isPos) {
        ctx.fillRect(AXIS_X, cy - barH / 2, barW, barH);
      } else {
        ctx.fillRect(AXIS_X - barW, cy - barH / 2, barW, barH);
      }
      // Valeur signée en bout de barre
      ctx.font = '700 11px "Space Grotesk", system-ui, sans-serif';
      ctx.fillStyle = isPos ? COLOR_POS : COLOR_NEG;
      const valStr = fmtSigned(it.diff) + ' pts';
      if (isPos) {
        ctx.textAlign = 'left';
        ctx.fillText(valStr, AXIS_X + barW + 6, cy);
      } else {
        ctx.textAlign = 'right';
        ctx.fillText(valStr, AXIS_X - barW - 6, cy);
      }
    });
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'left';
  }
  function bureauDenomFor(ns, state) {
    const displaySide = (typeof window._cmpDisplaySide === 'function') ? window._cmpDisplaySide() : 'A';
    const sel = state[displaySide];
    const elec = (typeof ELECTIONS !== 'undefined') ? ELECTIONS[sel.elec] : null;
    const era = elec ? String(elec.my || '') : '';
    const info = (typeof BUREAU_INFO !== 'undefined') ? (BUREAU_INFO[era] || {})[ns] : null;
    return (info && info.den) || ('Bureau ' + parseInt(ns));
  }

  // Mode Nuage : reconstruit le SVG aux dimensions exactes de la box d'export
  // (W=w, H=h) puis le rasterise sur le canvas. Ainsi le graphe REMPLIT la
  // box sans déformation ni letterboxing (ticks et points recalculés à la
  // bonne échelle, pas un stretch d'image).
  async function drawNuageOnCanvas(ctx, x, y, w, h) {
    const cmpAPI = window._cmpExport;
    if (!cmpAPI || typeof cmpAPI.buildNuageSvgInner !== 'function') return;
    // Fond blanc (comme dans la live view)
    ctx.fillStyle = '#ffffff'; ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = '#E6DFD5'; ctx.lineWidth = 1;
    ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
    // Construit le markup SHAPES + le tableau textElements à part. Le rasterizer
    // SVG hors-DOM n'a pas accès aux webfonts (Space Grotesk via Google Fonts)
    // → on dessine les textes APRÈS en Canvas2D, qui lui respecte les fonts.
    const result = cmpAPI.buildNuageSvgInner(w, h, { exportMode: true, collectText: true });
    if (!result || !result.html) {
      ctx.fillStyle = '#888';
      ctx.font = '500 14px "Space Grotesk", system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Rendu du nuage indisponible', x + w / 2, y + h / 2);
      ctx.textAlign = 'left';
      return;
    }
    const svgText = '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">'
      + result.html + '</svg>';
    const blob = new Blob([svgText], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    try {
      await new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          // Pas de fit : le SVG est déjà aux dimensions exactes → drawImage 1:1.
          ctx.drawImage(img, x, y, w, h);
          resolve();
        };
        img.onerror = reject;
        img.src = url;
      });
    } catch (_) {
      ctx.fillStyle = '#888';
      ctx.font = '500 14px "Space Grotesk", system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Rendu du nuage indisponible', x + w / 2, y + h / 2);
      ctx.textAlign = 'left';
    }
    URL.revokeObjectURL(url);
    // ── Textes par-dessus le SVG rasterisé ──
    // Position des éléments est relative au viewBox (0,0)→(w,h) → on translate
    // par (x, y) qui est l'offset de la box dans le canvas final.
    const anchorMap = { start: 'left', middle: 'center', end: 'right' };
    (result.textElements || []).forEach(te => {
      ctx.save();
      ctx.fillStyle = te.color;
      ctx.font = te.fontWeight + ' ' + te.fontSize + 'px "Space Grotesk", system-ui, sans-serif';
      ctx.textAlign = anchorMap[te.anchor] || 'left';
      ctx.textBaseline = 'alphabetic';
      if (te.transform && te.transform.rotate != null) {
        ctx.translate(x + te.transform.originX, y + te.transform.originY);
        ctx.rotate(te.transform.rotate * Math.PI / 180);
        ctx.fillText(te.text, 0, 0);
      } else {
        ctx.fillText(te.text, x + te.x, y + te.y);
      }
      ctx.restore();
    });
  }

  function downloadCanvas(canvas, filename) {
    return new Promise((resolve) => {
      canvas.toBlob(blob => {
        if (!blob) { resolve(false); return; }
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename;
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        resolve(true);
      }, 'image/png');
    });
  }

  // ─── Export FICHE (bureau / quartier / globale) ─────────────────────
  function isFicheOpen() {
    const ov = document.getElementById('overlay');
    if (!ov) return false;
    return ov.classList.contains('show') || (ov.style.display && ov.style.display !== 'none');
  }

  function getFicheContext() {
    if (!isFicheOpen()) return null;
    const tab = (typeof overlayTab !== 'undefined' && overlayTab) || 'bureau';
    const sheetData = (typeof getSheetData === 'function') ? getSheetData() : {};

    let title = currentElection;
    // Pas de mention de tour pour un référendum (notion non pertinente).
    const isRefForTitle = (typeof isReferendum === 'function' && isReferendum(currentElection));
    if (!isRefForTitle) {
      if (currentSheet === 'T1') title += ' · 1ᵉʳ tour';
      else if (currentSheet === 'T2') title += ' · 2ᵉ tour';
      else if (currentSheet === 'TU') title += ' · Tour unique';
    }

    function aggData(numsOrAll){
      let totI=0, totE=0, totAbst=0, totBn=0; const candTotV={};
      const apply = (d) => {
        if (!d) return;
        const an = Math.round((d.i||0)*(d.a||0)/100);
        totI += d.i||0; totE += d.e||0; totAbst += an; totBn += d.bn||0;
        Object.entries(d.c||{}).forEach(([k,v]) => { candTotV[k] = (candTotV[k]||0) + v*(d.e||0)/100; });
      };
      if (numsOrAll === 'all') Object.values(sheetData).forEach(apply);
      else (numsOrAll||[]).forEach(ns2 => apply(sheetData[ns2]));
      const avg = {};
      Object.entries(candTotV).forEach(([k,v]) => { avg[k] = +(v/Math.max(totE,1)*100).toFixed(1); });
      const winner = Object.entries(avg).sort((a,b) => b[1]-a[1])[0];
      return { c: avg, e: totE, w: winner ? winner[0] : null, i: totI, a: totI>0 ? +(totAbst/totI*100).toFixed(1) : 0, bn: totBn };
    }

    if (tab === 'global') {
      const data = aggData('all');
      return { type:'global', title, subtitle:'La Rochelle · Totalisation ville', quartier:'', data, winnerCol: data.w ? colorOfCandidate(data.w) : '#888' };
    }
    if (tab === 'quartier') {
      // Fallback sur le quartier du currentFeature si currentQuartier est null
      // (cas standard : on bascule sur l'onglet quartier sans avoir explicitement sélectionné un quartier)
      let q = (typeof currentQuartier !== 'undefined') ? currentQuartier : null;
      if (!q && typeof currentFeature !== 'undefined' && currentFeature && typeof bureauInfo === 'function' && typeof getQuartierParts === 'function') {
        const info = bureauInfo(currentFeature);
        const parts = getQuartierParts(info.quartier || '');
        if (parts.length) q = parts[0];
      }
      if (!q || typeof getBureausByQuartier !== 'function') return null;
      const nums = getBureausByQuartier(q);
      const data = aggData(nums);
      return { type:'quartier', title, subtitle:'Quartier · ' + q, quartier:'', data, bureauNums: nums, winnerCol: data.w ? colorOfCandidate(data.w) : '#888' };
    }
    if (tab === 'canton') {
      // currentCanton = id canton (ex. "1"). Le nom du canton vient de CANTON_INFO.
      const cid = (typeof currentCanton !== 'undefined') ? currentCanton : null;
      if (!cid) return null;
      const cantonEra = (typeof getCantonEraForElection === 'function') ? getCantonEraForElection(currentElection) : CURRENT_ERA_CANTON;
      const cantonsMeta = ((typeof CANTON_INFO !== 'undefined' && CANTON_INFO[cantonEra]) || {}).cantons || {};
      const cName = (cantonsMeta[cid] || {}).name || ('La Rochelle-' + cid);
      // Bureaux du canton à l'ère de l'élection courante
      const el0 = ELECTIONS[currentElection];
      const mapYear = String(el0 ? el0.my : CURRENT_ERA);
      const yearInfo = BUREAU_INFO[mapYear] || BUREAU_INFO[CURRENT_ERA] || {};
      const nums = Object.entries(yearInfo)
        .filter(([, b]) => String(b.c || '') === String(cid))
        .map(([id]) => id);
      const data = aggData(nums);
      return { type:'canton', title, subtitle:'Canton · ' + cName, quartier:'', data, bureauNums: nums, winnerCol: data.w ? colorOfCandidate(data.w) : '#888' };
    }
    // bureau
    if (typeof currentFeature === 'undefined' || !currentFeature) return null;
    const ns = numStr(currentFeature);
    const info = (typeof bureauInfo === 'function') ? bureauInfo(currentFeature) : {};
    const d = sheetData[ns];
    if (!d) return null;
    const denom = info.denomination || info.nom || '';
    const quartier = (info.quartier || '').trim();  // garde le nom complet (ex: "Tasdon/Les Minimes")
    return {
      type: 'bureau',
      title,
      subtitle: 'Bureau n°' + parseInt(ns) + (denom ? ' · ' + denom : ''),
      quartier,
      data: d,
      winnerCol: d.w ? colorOfCandidate(d.w) : '#888'
    };
  }

  // Helpers de rendu candidat (Canvas)
  function candPrenomNom(name) {
    // Source canonique : candInfo() qui essaie en cascade
    //   1. CAND_DATA[name + '|' + currentElection + '|' + currentSheet] (tour spécifique)
    //   2. CAND_DATA[name + '|' + currentElection] (élection)
    //   3. CAND_DATA[name] (générique)
    const ci = (typeof candInfo === 'function') ? candInfo(name) : {};
    // Binôme paritaire : on retourne {prenom:'', nom: "Nom1 / Nom2"} pour les contextes
    // étroits (cartouches, légende). Le label long avec prénoms s'obtient via candDisplayName.
    if (Array.isArray(ci.binome) && ci.binome.length === 2 && typeof binomeShortLabel === 'function') {
      const shortN = binomeShortLabel(name);
      // Binôme à partis hétérogènes : on retourne "PA1+PA2" via binomePartiLabel.
      // shortPa() rabote les suffixes des codes fins ("UDF dissident libéral"
      // → "UDF dissident") pour l'affichage compact dans l'image de fiche.
      const pLbl = (typeof binomePartiLabel === 'function') ? binomePartiLabel(name) : ((typeof shortPa === 'function' ? shortPa(ci.pa) : ci.pa) || '');
      if (shortN) return { prenom: '', nom: shortN, parti: pLbl };
    }
    let prenom = ci.p || '';
    let nom = ci.n || '';
    if (!nom) {
      // Fallback : splitter le nom complet (ex: "Jean Dupont (PS)" → prenom="Jean", nom="Dupont")
      const fn = (typeof candDisplayName === 'function') ? candDisplayName(name) : name.replace(/\s*\([^)]*\)\s*$/, '').trim();
      const parts = fn.trim().split(/\s+/);
      if (parts.length >= 2) {
        if (!prenom) prenom = parts.slice(0, -1).join(' ');
        nom = parts[parts.length - 1];
      } else {
        nom = fn;
      }
    }
    return { prenom, nom, parti: (typeof shortPa === 'function' ? shortPa(ci.pa) : ci.pa) || '' };
  }

  async function drawFicheVisual(ctx, x, y, w, h, fctx) {
    const data = fctx.data;
    const allCands = Object.entries(data.c || {}).sort((a,b)=>b[1]-a[1]);
    if (allCands.length === 0) {
      ctx.fillStyle = '#888';
      ctx.font = '500 16px "Space Grotesk", system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Aucune donnée disponible.', x + w/2, y + h/2);
      ctx.textAlign = 'left';
      return;
    }

    // Mini-carte à gauche (pour bureau, quartier ou canton)
    const showMap = (fctx.type === 'bureau' || fctx.type === 'quartier' || fctx.type === 'canton');
    const mapW = showMap ? 140 : 0;
    const mapGapX = showMap ? 16 : 0;
    if (showMap) await drawFicheMap(ctx, x, y, mapW, h, fctx);

    // Zone candidats : à droite de la mini-carte
    const listX = x + mapW + mapGapX;
    const listW = w - mapW - mapGapX;

    // Layout spécial pour 2 ou 3 candidats (duel / trio) — grandes cards
    if (allCands.length === 2 || allCands.length === 3) {
      drawFicheBigCards(ctx, listX, y, listW, h, allCands, data.e || 0);
      return;
    }

    // Sinon : layout standard avec barres + mini-cartouches
    // Règle : jusqu'à 6 candidats inclus on les met tous en barres normales
    // (évite le cas moche où le 6ᵉ se retrouve seul en mini-cartouche pleine
    // largeur en bas de fiche). À partir de 7, on bascule en "5 + reste".
    const TOP = allCands.length <= 6 ? allCands.length : 5;
    const top = allCands.slice(0, TOP);
    // Reste en mini-cartouches sur 1 ligne (max 7 supplémentaires)
    const rest = allCands.slice(TOP, TOP + 7);
    const hasRest = rest.length > 0;

    // Hauteur réservée aux mini-cartouches (si reste présents)
    const miniH = 44;
    const miniGap = 32;
    const listH = hasRest ? h - miniH - miniGap : h;

    const N = top.length;
    const rowGap = 10;
    const rowH = (listH - rowGap*(N-1)) / N;

    const maxPct = top[0][1] || 1;

    top.forEach((c, i) => {
      const ry = y + i*(rowH + rowGap);
      drawCandRow(ctx, listX, ry, listW, rowH, c, maxPct, data.e || 0);
    });

    if (hasRest) {
      const miniY = y + listH + miniGap;
      const miniN = rest.length;
      const miniGapX = 8;
      const miniW = (listW - miniGapX*(miniN-1)) / miniN;
      rest.forEach((c, i) => {
        drawCandMini(ctx, listX + i*(miniW + miniGapX), miniY, miniW, miniH, c);
      });
    }
  }

  // Helpers Mercator/tile
  function _lng2pX(lng, z) { return (lng + 180) / 360 * Math.pow(2, z); }
  function _lat2pY(lat, z) {
    const r = lat * Math.PI / 180;
    return (1 - Math.log(Math.tan(r) + 1 / Math.cos(r)) / Math.PI) / 2 * Math.pow(2, z);
  }
  function _loadTile(url) {
    return new Promise((resolve) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => resolve(img);
      img.onerror = () => resolve(null);
      img.src = url;
    });
  }

  // ─── Mini-carte d'export : helpers (pickTarget / computeView / tiles / mask / bureaux) ───

  // Sélectionne les features à mettre en couleur (bureau actuel ou bureaux du quartier/canton).
  function _pickTargetFeatures(fctx, allFeatures) {
    if (fctx.type === 'bureau') {
      if (typeof currentFeature === 'undefined' || !currentFeature || !currentFeature.geometry) return null;
      return [currentFeature];
    }
    if (fctx.type === 'quartier' || fctx.type === 'canton') {
      const numSet = new Set((fctx.bureauNums || []).map(String));
      return allFeatures.filter(f => f && f.geometry && numSet.has(numStr(f)));
    }
    return null;
  }

  // Calcule la vue cartographique (bbox + marge dynamique, zoom tile, ajustement aspect, projection).
  // Retourne { zoom, TS, minPxX, maxPxX, minPxY, maxPxY, scale, project, x, y } ou null si pas de coords.
  function _computeMapView(targetFeatures, x, y, w, h) {
    // 1) BBox de l'union des features cibles
    const coords = [];
    (function walk(arr) {
      if (typeof arr[0] === 'number') { coords.push(arr); return; }
      arr.forEach(walk);
    })(targetFeatures.map(f => f.geometry.coordinates));
    if (coords.length === 0) return null;

    let minLng = Infinity, maxLng = -Infinity, minLat = Infinity, maxLat = -Infinity;
    coords.forEach(([lng, lat]) => {
      if (lng < minLng) minLng = lng;
      if (lng > maxLng) maxLng = lng;
      if (lat < minLat) minLat = lat;
      if (lat > maxLat) maxLat = lat;
    });

    // Marge dynamique : petit bureau (urbain dense) → marge généreuse ; grand bureau → marge serrée.
    const span = Math.max(maxLng - minLng, maxLat - minLat);
    let M;
    if (span < 0.003)      M = 2.2;  // très petit (centre-ville dense)
    else if (span < 0.005) M = 1.4;  // petit
    else if (span < 0.008) M = 0.9;  // moyen
    else                   M = 0.22; // grand (zoom serré)
    const dxL = (maxLng - minLng) * M;
    const dyL = (maxLat - minLat) * M;
    minLng -= dxL; maxLng += dxL; minLat -= dyL; maxLat += dyL;

    // 2) Zoom tile max où la bbox tient dans le viewport (256·2^z·lngSpan/360 ≤ w → z = log2(w·360/(lngSpan·256)))
    const TS = 256;
    const zw = Math.log2(w * 360 / ((maxLng - minLng) * TS));
    const zh = Math.log2(h * 360 / ((maxLat - minLat) * TS / Math.cos(46.16 * Math.PI / 180)));
    const zoom = Math.max(10, Math.min(19, Math.floor(Math.min(zw, zh))));

    // 3) Coords pixel de la bbox au zoom choisi
    let minPxX = _lng2pX(minLng, zoom) * TS;
    let maxPxX = _lng2pX(maxLng, zoom) * TS;
    let minPxY = _lat2pY(maxLat, zoom) * TS; // maxLat → top → minPxY
    let maxPxY = _lat2pY(minLat, zoom) * TS;
    let bboxPxW = maxPxX - minPxX;
    let bboxPxH = maxPxY - minPxY;

    // Ajuste la bbox pour matcher l'aspect du conteneur (pas de bande vide, pas de surzoom).
    const aspectMini = w / h;
    const aspectBox = bboxPxW / bboxPxH;
    if (aspectBox > aspectMini) {
      const targetH = bboxPxW / aspectMini;
      const extra = (targetH - bboxPxH) / 2;
      minPxY -= extra; maxPxY += extra;
      bboxPxH = maxPxY - minPxY;
    } else if (aspectBox < aspectMini) {
      const targetW = bboxPxH * aspectMini;
      const extra = (targetW - bboxPxW) / 2;
      minPxX -= extra; maxPxX += extra;
      bboxPxW = maxPxX - minPxX;
    }
    const scale = w / bboxPxW; // = h / bboxPxH

    // Projection lng/lat → pixel canvas (capture x,y,scale,zoom dans la closure)
    function project(lng, lat) {
      const px = _lng2pX(lng, zoom) * TS;
      const py = _lat2pY(lat, zoom) * TS;
      return [x + (px - minPxX) * scale, y + (py - minPxY) * scale];
    }
    // BBox lng/lat de la vue visible APRÈS ajustement aspect (utile pour filtrer les repères
    // hors-cadre — l'ajustement aspect a élargi la bbox initiale dans une des deux directions).
    const z2 = Math.pow(2, zoom);
    function pX2lng(pXnorm) { return pXnorm * 360 - 180; }
    function pY2lat(pYnorm) { return Math.atan(Math.sinh(Math.PI * (1 - 2 * pYnorm))) * 180 / Math.PI; }
    const bbox = {
      minLng: pX2lng(minPxX / TS / z2),
      maxLng: pX2lng(maxPxX / TS / z2),
      maxLat: pY2lat(minPxY / TS / z2), // minPxY → top → max lat
      minLat: pY2lat(maxPxY / TS / z2)
    };
    return { zoom, TS, minPxX, maxPxX, minPxY, maxPxY, scale, project, x, y, bbox };
  }

  // Charge en parallèle les tiles CartoCDN couvrant la bbox et les dessine.
  async function _drawMapTiles(ctx, view) {
    const { zoom, TS, minPxX, maxPxX, minPxY, maxPxY, scale, x, y } = view;
    const tx0 = Math.floor(minPxX / TS);
    const tx1 = Math.floor(maxPxX / TS);
    const ty0 = Math.floor(minPxY / TS);
    const ty1 = Math.floor(maxPxY / TS);
    const tilePromises = [];
    for (let tx = tx0; tx <= tx1; tx++) {
      for (let ty = ty0; ty <= ty1; ty++) {
        const url = 'https://a.basemaps.cartocdn.com/light_all/' + zoom + '/' + tx + '/' + ty + '.png';
        tilePromises.push(_loadTile(url).then(img => ({ img, tx, ty })));
      }
    }
    const tiles = await Promise.all(tilePromises);
    tiles.forEach(({ img, tx, ty }) => {
      if (!img) return;
      const dx = x + (tx * TS - minPxX) * scale;
      const dy = y + (ty * TS - minPxY) * scale;
      ctx.drawImage(img, dx, dy, TS * scale, TS * scale);
    });
  }

  // Masque grisé hors La Rochelle : rect extérieur + tous les polygones LR avec règle evenodd.
  function _drawMapMask(ctx, x, y, w, h, view, allFeatures) {
    ctx.beginPath();
    ctx.rect(x, y, w, h);
    allFeatures.forEach(f => {
      if (!f || !f.geometry || !f.geometry.coordinates) return;
      function addPoly(coordinates) {
        coordinates.forEach((ring) => {
          ring.forEach(([lng, lat], j) => {
            const [px, py] = view.project(lng, lat);
            if (j === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
          });
          ctx.closePath();
        });
      }
      if (f.geometry.type === 'Polygon') addPoly(f.geometry.coordinates);
      else if (f.geometry.type === 'MultiPolygon') f.geometry.coordinates.forEach(addPoly);
    });
    ctx.fillStyle = 'rgba(80,75,70,0.28)';
    ctx.fill('evenodd');
  }

  // Voisins en contour seul, cibles en couleur winner par-dessus.
  function _drawMapBureaux(ctx, view, allFeatures, targetFeatures, winnerCol) {
    function drawFeatureGeom(geom, fillStyle, strokeStyle, lineWidth) {
      ctx.fillStyle = fillStyle;
      ctx.strokeStyle = strokeStyle;
      ctx.lineWidth = lineWidth;
      ctx.lineJoin = 'round';
      function drawPoly(coordinates) {
        ctx.beginPath();
        coordinates.forEach((ring) => {
          ring.forEach(([lng, lat], j) => {
            const [px, py] = view.project(lng, lat);
            if (j === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
          });
          ctx.closePath();
        });
        ctx.fill('evenodd');
        ctx.stroke();
      }
      if (geom.type === 'Polygon') drawPoly(geom.coordinates);
      else if (geom.type === 'MultiPolygon') geom.coordinates.forEach(drawPoly);
    }
    const targetNs = new Set(targetFeatures.map(f => numStr(f)));
    // Voisins : contour seul (le clip rect filtre visuellement les bureaux hors zone)
    allFeatures.forEach(f => {
      if (!f || !f.geometry || !f.geometry.coordinates) return;
      if (targetNs.has(numStr(f))) return;
      drawFeatureGeom(f.geometry, 'rgba(0,0,0,0)', '#3A352E', 1.0);
    });
    // Cibles par-dessus
    targetFeatures.forEach(f => {
      drawFeatureGeom(f.geometry, winnerCol, '#FFFFFF', 1.5);
    });
  }

  // Mini-carte d'export : bureau actuel (ou bureaux du quartier) en couleur winner +
  // voisins en contour, sur un fond de tiles CartoCDN light_all.
  async function drawFicheMap(ctx, x, y, w, h, fctx) {
    const eraGJ = (typeof getMapGeoJSON === 'function') ? getMapGeoJSON() : (typeof GEOJSON !== 'undefined' ? GEOJSON : { features: [] });
    const allFeatures = (eraGJ && eraGJ.features) || [];
    const targetFeatures = _pickTargetFeatures(fctx, allFeatures);
    if (!targetFeatures || targetFeatures.length === 0) return;

    // Cadre du conteneur
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(x, y, w, h);

    const view = _computeMapView(targetFeatures, x, y, w, h);
    if (!view) return;

    // Clip au cadre puis tiles + masque + bureaux dans le même save/restore
    ctx.save();
    ctx.beginPath();
    ctx.rect(x, y, w, h);
    ctx.clip();
    await _drawMapTiles(ctx, view);
    _drawMapMask(ctx, x, y, w, h, view, allFeatures);
    _drawMapBureaux(ctx, view, allFeatures, targetFeatures, fctx.winnerCol);
    // Repères géographiques : 5 max, priorité aux plus proches du centre, anti-collision activée.
    // En mode canton, on les omet : la zone est plus large et les repères surchargent la mini-carte.
    if (fctx.type !== 'canton') {
      drawReperesOnCarte(ctx, view.project, view.bbox, LR_REPERES.pointsFiche, { x: x, y: y, w: w, h: h }, 5);
    }
    ctx.restore();
  }

  function drawCandMini(ctx, x, y, w, h, candEntry) {
    const [name, pct] = candEntry;
    const col = colorOfCandidate(name);
    const { nom, parti } = candPrenomNom(name);
    // Cartouche mini : fond couleur parti, nom à gauche, score % à droite,
    // parti entre les deux si la place le permet.
    ctx.fillStyle = col;
    ctx.fillRect(x, y, w, h);

    const cy = y + h/2 + 5; // baseline approximative
    const padL = 10, padR = 10, gap = 6;

    // 1. Score (priorité absolue, occupe sa place à droite). On dessine d'abord
    //    le « % » en plus petit (gain de place), puis le chiffre en grand. Cohérent
    //    avec le rendu drawCandRow.
    ctx.textAlign = 'right';
    ctx.fillStyle = '#FFFFFF';
    let cursorScoreX = x + w - padR;
    ctx.font = '700 11px "Space Grotesk", system-ui, sans-serif';
    const percentTxt = '%';
    const percentW = ctx.measureText(percentTxt).width;
    ctx.fillText(percentTxt, cursorScoreX, cy);
    cursorScoreX -= percentW + 3;
    ctx.font = '900 17px "Space Grotesk", system-ui, sans-serif';
    const numTxt = pct.toFixed(1);
    const numW = ctx.measureText(numTxt).width;
    ctx.fillText(numTxt, cursorScoreX, cy);
    const scoreW = numW + 3 + percentW;

    // Zone restante pour nom + parti
    const leftZoneW = w - padL - padR - scoreW - gap;

    // 2. Mesurer le nom complet à sa font
    ctx.textAlign = 'left';
    ctx.font = '700 13px "Space Grotesk", system-ui, sans-serif';
    const nomFullW = ctx.measureText(nom).width;

    // 3. Si le nom rentre et qu'il reste assez de place → on tente d'afficher
    //    aussi le parti (font plus petite, opacité réduite). Sinon on ne montre
    //    que le nom (tronqué si besoin).
    let showParti = false;
    let partiTxt = '';
    let partiW = 0;
    if (parti && nomFullW <= leftZoneW) {
      // Tester la place pour " · parti"
      ctx.font = '500 11px "Space Grotesk", system-ui, sans-serif';
      partiTxt = ' · ' + parti;
      partiW = ctx.measureText(partiTxt).width;
      if (nomFullW + partiW <= leftZoneW) showParti = true;
    }

    // 4. Dessiner nom (tronqué si nécessaire dans tous les cas)
    ctx.font = '700 13px "Space Grotesk", system-ui, sans-serif';
    let displayName = nom;
    const maxNomW = showParti ? (leftZoneW - partiW) : leftZoneW;
    if (ctx.measureText(displayName).width > maxNomW) {
      while (ctx.measureText(displayName + '…').width > maxNomW && displayName.length > 1) {
        displayName = displayName.slice(0, -1);
      }
      displayName = displayName.replace(/\s*$/, '') + '…';
    }
    ctx.fillText(displayName, x + padL, cy);

    // 5. Parti à la suite si activé
    if (showParti) {
      const nomDrawnW = ctx.measureText(displayName).width;
      ctx.font = '500 11px "Space Grotesk", system-ui, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.78)';
      ctx.fillText(partiTxt, x + padL + nomDrawnW, cy);
    }
  }

  // Layout spécial duel (2 candidats) ou trio (3 candidats) — grandes cards côte à côte
  function drawFicheBigCards(ctx, x, y, w, h, cands, totE) {
    const N = cands.length;
    const gapX = 16;
    const cardW = (w - gapX*(N-1)) / N;
    const scoreSize = N === 2 ? 110 : 78;
    const prenomSize = N === 2 ? 22 : 17;
    const nomSize = N === 2 ? 50 : 34;
    const partiSize = N === 2 ? 16 : 14;
    cands.forEach((c, i) => {
      drawCandBigCard(ctx, x + i*(cardW + gapX), y, cardW, h, c, totE, scoreSize, prenomSize, nomSize, partiSize, i === 0);
    });
  }

  function drawCandBigCard(ctx, x, y, w, h, candEntry, totE, scoreSize, prenomSize, nomSize, partiSize, isWinner) {
    const [name, pct] = candEntry;
    const col = colorOfCandidate(name);
    // Source canonique unifiée (helper candPrenomNom utilise candInfo() en cascade)
    const { prenom, nom, parti } = candPrenomNom(name);
    const voix = Math.round(pct * 0.01 * totE);

    // Couleurs selon le statut (gagnant : card pleine ; perdant : boîte blanche encadrée)
    let textColor, mutedColor, scoreColor;
    if (isWinner) {
      ctx.fillStyle = col;
      ctx.fillRect(x, y, w, h);
      textColor = '#FFFFFF';
      mutedColor = 'rgba(255,255,255,0.85)';
      scoreColor = '#FFFFFF';
    } else {
      // Boîte blanche encadrée de la couleur du parti
      const bw = 5;
      ctx.fillStyle = col;
      ctx.fillRect(x, y, w, h);
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(x + bw, y + bw, w - 2*bw, h - 2*bw);
      textColor = '#1A1A1A';
      mutedColor = '#5A5A5A';
      scoreColor = col;
    }

    ctx.textAlign = 'left';
    const padX = 26;
    const padTop = 22;

    // Score énorme en haut
    ctx.fillStyle = scoreColor;
    ctx.font = '900 ' + scoreSize + 'px "Space Grotesk", system-ui, sans-serif';
    const pctText = pct.toFixed(1);
    const scoreW = ctx.measureText(pctText).width;
    const scoreBaseline = y + padTop + scoreSize * 0.85;
    ctx.fillText(pctText, x + padX, scoreBaseline);
    // % petit à droite
    ctx.font = '700 ' + Math.round(scoreSize * 0.42) + 'px "Space Grotesk", system-ui, sans-serif';
    ctx.fillText('%', x + padX + scoreW + 8, scoreBaseline);

    // Voix juste sous le score
    if (voix > 0) {
      ctx.fillStyle = mutedColor;
      ctx.font = '500 15px "Space Grotesk", system-ui, sans-serif';
      ctx.fillText(voix.toLocaleString('fr-FR') + ' voix', x + padX, scoreBaseline + 26);
    }

    // ── Prénom + Nom + Parti, ancrés vers le bas ──
    // Ordre vertical : prénom (petit) → NOM (gros) → parti (petit) — anchored bottom
    const partiH = parti ? (partiSize + 10) : 0;
    const nameY = y + h - 22 - partiH; // baseline du Nom
    const prenomY = nameY - nomSize + 4; // baseline du prénom

    // Prénom (taille moyenne, muted)
    if (prenom) {
      ctx.fillStyle = mutedColor;
      ctx.font = '500 ' + prenomSize + 'px "Space Grotesk", system-ui, sans-serif';
      ctx.fillText(prenom, x + padX, prenomY);
    }

    // NOM (très gros, fort) — pour les binômes, layout vertical en 4 lignes :
    //   • prénom1 (petit, muted)
    //   • NOM1   (gros, fort)
    //   • prénom2 (petit, muted)
    //   • NOM2   (gros, fort)
    // Le tout ancré en bas (au-dessus du parti). Cascade pour les prénoms :
    // prénom complet → initiale "M.-F." si trop large.
    ctx.fillStyle = textColor;
    const ciBinome = (typeof candInfo === 'function') ? candInfo(name) : {};
    const isBinome = Array.isArray(ciBinome.binome) && ciBinome.binome.length === 2 && typeof binomeMembers === 'function';
    if (isBinome) {
      // binomeMembers respecte déjà l'ordre paritaire (femme devant)
      const ms = binomeMembers(name);
      if (ms && ms.length === 2) {
        // Tirets insécables (U+2011) dans les noms composés pour éviter coupures laides
        const fixDash = s => (s || '').replace(/-/g, '‑');
        const p1 = (ms[0].p || '').trim(), n1 = fixDash((ms[0].n || '').trim());
        const p2 = (ms[1].p || '').trim(), n2 = fixDash((ms[1].n || '').trim());
