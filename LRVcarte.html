        const initiale = pr => pr ? pr.split(/[\s-]+/).filter(Boolean).map(s => s.charAt(0).toUpperCase() + '.').join('-') : '';

        // Tailles : nom plus petit qu'en candidat simple pour tenir 2 noms
        const nomBinSize = Math.round(nomSize * 0.75); // 50 → ~38
        const prenomBinSize = prenomSize;              // 22 inchangé (déjà petit)
        const interGap = 10;                            // gap entre membre 1 et membre 2
        const maxW = w - 2 * padX;

        // Cascade prénom : full si tient, sinon initiale, sinon vide
        function fitPrenom(prenomVal) {
          if (!prenomVal) return '';
          ctx.font = '500 ' + prenomBinSize + 'px "Space Grotesk", system-ui, sans-serif';
          if (ctx.measureText(prenomVal).width <= maxW) return prenomVal;
          const i = initiale(prenomVal);
          if (i && ctx.measureText(i).width <= maxW) return i;
          return '';
        }
        function fitNom(nomVal) {
          ctx.font = '900 ' + nomBinSize + 'px "Space Grotesk", system-ui, sans-serif';
          let l = nomVal;
          while (ctx.measureText(l).width > maxW && l.length > 3) l = l.slice(0, -1);
          if (l !== nomVal) l = l.replace(/\s*$/, '') + '…';
          return l;
        }

        const p1Disp = fitPrenom(p1);
        const p2Disp = fitPrenom(p2);
        const n1Disp = fitNom(n1);
        const n2Disp = fitNom(n2);

        // Positions bottom-up depuis nameY (= baseline du dernier nom)
        // nameY déjà calculé = y + h - 22 - partiH ; on s'y ancre pour NOM2
        const nom2BaseY = nameY;
        const prenom2BaseY = nom2BaseY - nomBinSize + 4;
        const nom1BaseY = prenom2BaseY - prenomBinSize - interGap;
        const prenom1BaseY = nom1BaseY - nomBinSize + 4;

        // Dessin top→bottom : prénom1, nom1, prénom2, nom2
        if (p1Disp) {
          ctx.fillStyle = mutedColor;
          ctx.font = '500 ' + prenomBinSize + 'px "Space Grotesk", system-ui, sans-serif';
          ctx.fillText(p1Disp, x + padX, prenom1BaseY);
        }
        ctx.fillStyle = textColor;
        ctx.font = '900 ' + nomBinSize + 'px "Space Grotesk", system-ui, sans-serif';
        ctx.fillText(n1Disp, x + padX, nom1BaseY);
        if (p2Disp) {
          ctx.fillStyle = mutedColor;
          ctx.font = '500 ' + prenomBinSize + 'px "Space Grotesk", system-ui, sans-serif';
          ctx.fillText(p2Disp, x + padX, prenom2BaseY);
        }
        ctx.fillStyle = textColor;
        ctx.font = '900 ' + nomBinSize + 'px "Space Grotesk", system-ui, sans-serif';
        ctx.fillText(n2Disp, x + padX, nom2BaseY);
      } else {
        // Fallback si binomeMembers ne retourne rien
        ctx.font = '900 ' + nomSize + 'px "Space Grotesk", system-ui, sans-serif';
        let displayNom = nom;
        while (ctx.measureText(displayNom).width > w - 2*padX && displayNom.length > 3) displayNom = displayNom.slice(0, -1);
        if (displayNom !== nom) displayNom = displayNom.replace(/\s*$/, '') + '…';
        ctx.fillText(displayNom, x + padX, nameY);
      }
    } else {
      ctx.font = '900 ' + nomSize + 'px "Space Grotesk", system-ui, sans-serif';
      let displayNom = nom;
      while (ctx.measureText(displayNom).width > w - 2*padX && displayNom.length > 3) {
        displayNom = displayNom.slice(0, -1);
      }
      if (displayNom !== nom) displayNom = displayNom.replace(/\s*$/, '') + '…';
      ctx.fillText(displayNom, x + padX, nameY);
    }

    // Parti (sous le nom)
    if (parti) {
      ctx.fillStyle = mutedColor;
      ctx.font = '500 ' + partiSize + 'px "Space Grotesk", system-ui, sans-serif';
      ctx.fillText(parti, x + padX, nameY + partiSize + 6);
    }
  }

  function drawCandRow(ctx, x, y, w, h, candEntry, maxPct, totE) {
    const [name, pct] = candEntry;
    const col = colorOfCandidate(name);
    const { prenom, nom, parti } = candPrenomNom(name);
    const voix = Math.round(pct * 0.01 * totE);

    // Layout : ligne label (nom + parti à gauche, voix · score% à droite) collée au-dessus de la barre
    const barH = 20;
    const barY = y + h - barH;
    // Baseline juste au-dessus de la barre (avec léger gap visuel)
    const baseline = barY - 6;

    // ── Gauche : Nom (gros) + parti (petit, à côté du nom) ──
    ctx.textAlign = 'left';
    ctx.fillStyle = '#1A1A1A';
    ctx.font = '700 22px "Space Grotesk", system-ui, sans-serif';
    const maxNameW = w * 0.5;
    // Pour les binômes : cascade "Prénoms complets" → "Initiales" → "Noms seuls" → ellipsis.
    // Pour un candidat simple : cascade prénom complet → prénom abrégé → nom seul → ellipsis.
    const ciRow = (typeof candInfo === 'function') ? candInfo(name) : {};
    const isBinomeRow = Array.isArray(ciRow.binome) && ciRow.binome.length === 2 && typeof binomeMembers === 'function';
    let displayName;
    if (isBinomeRow) {
      const ms = binomeMembers(name);
      if (ms && ms.length === 2) {
        const fixDash = s => (s || '').replace(/-/g, '‑');
        const p1 = (ms[0].p || '').trim(), n1 = fixDash((ms[0].n || '').trim());
        const p2 = (ms[1].p || '').trim(), n2 = fixDash((ms[1].n || '').trim());
        const initiale = pr => pr ? pr.split(/[\s-]+/).filter(Boolean).map(s => s.charAt(0).toUpperCase() + '.').join('-') : '';
        const variants = [
          (p1 ? p1 + ' ' : '') + n1 + ' / ' + (p2 ? p2 + ' ' : '') + n2,
          (p1 ? initiale(p1) + ' ' : '') + n1 + ' / ' + (p2 ? initiale(p2) + ' ' : '') + n2,
          n1 + ' / ' + n2,
        ];
        displayName = variants[variants.length - 1];
        for (const v of variants) {
          if (ctx.measureText(v).width <= maxNameW) { displayName = v; break; }
        }
        // Si même le nom seul déborde, tronquer
        while (ctx.measureText(displayName).width > maxNameW && displayName.length > 4) {
          displayName = displayName.slice(0, -1);
        }
        if (variants.indexOf(displayName) === -1 && !displayName.endsWith('…')) {
          displayName = displayName.replace(/\s*$/, '') + '…';
        }
      } else {
        displayName = nom;
      }
    } else {
      const fullName = (prenom ? prenom + ' ' : '') + nom;
      const initiale = pr => pr ? pr.split(/[\s-]+/).filter(Boolean).map(s => s.charAt(0).toUpperCase() + '.').join('-') : '';
      const variants = [
        fullName,
        (prenom ? initiale(prenom) + ' ' : '') + nom,
        nom,
      ];
      displayName = variants[variants.length - 1];
      for (const v of variants) {
        if (ctx.measureText(v).width <= maxNameW) { displayName = v; break; }
      }
      while (ctx.measureText(displayName).width > maxNameW && displayName.length > 4) {
        displayName = displayName.slice(0, -1);
      }
      if (variants.indexOf(displayName) === -1 && !displayName.endsWith('…')) {
        displayName = displayName.replace(/\s*$/, '') + '…';
      }
    }
    ctx.fillText(displayName, x, baseline);
    // Mesurer la largeur AVEC LA FONT DU NOM (22px) avant de changer
    const nomW = ctx.measureText(displayName).width;

    // Parti à droite du nom, baseline alignée
    if (parti) {
      ctx.fillStyle = '#5A5A5A';
      ctx.font = '500 14px "Space Grotesk", system-ui, sans-serif';
      ctx.fillText(parti, x + nomW + 12, baseline);
    }

    // ── Droite : voix · score % (curseur de droite à gauche) ──
    ctx.textAlign = 'right';
    let cursorX = x + w;
    // Le "%" (petit)
    ctx.fillStyle = col;
    ctx.font = '700 16px "Space Grotesk", system-ui, sans-serif';
    ctx.fillText('%', cursorX, baseline);
    cursorX -= ctx.measureText('%').width + 4;
    // Le chiffre du score (gros)
    ctx.font = '900 28px "Space Grotesk", system-ui, sans-serif';
    ctx.fillText(pct.toFixed(1), cursorX, baseline);
    cursorX -= ctx.measureText(pct.toFixed(1)).width;
    // Voix · à gauche du score (si dispo)
    if (voix > 0) {
      ctx.fillStyle = '#888';
      ctx.font = '500 14px "Space Grotesk", system-ui, sans-serif';
      cursorX -= 8;
      ctx.fillText('·', cursorX, baseline);
      cursorX -= ctx.measureText('·').width + 8;
      const voixText = voix.toLocaleString('fr-FR') + ' voix';
      ctx.fillText(voixText, cursorX, baseline);
    }

    // ── Barre horizontale (longueur proportionnelle au max) ──
    ctx.textAlign = 'left';
    ctx.fillStyle = '#EEE';
    ctx.fillRect(x, barY, w, barH);
    const fillW = (pct / maxPct) * w;
    ctx.fillStyle = col;
    ctx.fillRect(x, barY, fillW, barH);
  }

  async function composeFiche(fctx) {
    if (!window._exportMode && document.fonts && document.fonts.ready) { try { await document.fonts.ready; } catch(_) {} }
    const canvas = document.createElement('canvas');
    canvas.width = W * SCALE; canvas.height = H * SCALE;
    const ctx = canvas.getContext('2d');
    ctx.scale(SCALE, SCALE);

    // Header plus haut pour accueillir 3 lignes (titre, sous-titre, quartier)
    const FICHE_HEADER_H = fctx.quartier ? 120 : HEADER_H;

    ctx.fillStyle = '#F0EAE0'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#F7F3EE'; ctx.fillRect(0, 0, W, FICHE_HEADER_H);
    ctx.fillStyle = '#E6DFD5'; ctx.fillRect(0, FICHE_HEADER_H - 1, W, 1);

    const logoBaseline = 64;
    const logoW = drawLogo(ctx, PAD, logoBaseline);
    const textX = PAD + logoW + 24;

    // Mesurer la place nécessaire pour la titraille (titre + sous-titre + quartier sur 3 lignes)
    ctx.font = '700 24px "Space Grotesk", system-ui, sans-serif';
    const titleW = ctx.measureText(fctx.title).width;
    ctx.font = '500 16px "Space Grotesk", system-ui, sans-serif';
    const subW = ctx.measureText(fctx.subtitle).width;
    const quartW = fctx.quartier ? ctx.measureText(fctx.quartier).width : 0;
    const titrailleW = Math.max(titleW, subW, quartW);

    // Cartouches stats à droite — largeur dynamique selon place dispo
    const data = fctx.data || {};
    const idealW = 510;
    const minRightX = textX + titrailleW + 24;
    const statsRightX = Math.max(W - PAD - idealW, minRightX);
    const statsRightW = W - PAD - statsRightX;
    const statsBoxH = 64;
    const statsBoxY = (FICHE_HEADER_H - statsBoxH) / 2;
    const oneW = (statsRightW - 16) / 3;
    drawHeaderStat(ctx, statsRightX, statsBoxY, oneW, statsBoxH, 'INSCRITS', (data.i||0).toLocaleString('fr-FR'));
    drawHeaderStat(ctx, statsRightX + oneW + 8, statsBoxY, oneW, statsBoxH, 'ABSTENTION', (data.a||0).toFixed(1) + ' %');
    const votSB = (data.i||0) - Math.round((data.i||0)*(data.a||0)/100);
    const blancsPct = votSB > 0 ? +((data.bn||0)*100/votSB).toFixed(1) : 0;
    drawHeaderStat(ctx, statsRightX + 2*(oneW + 8), statsBoxY, oneW, statsBoxH, 'BLANCS / NULS', blancsPct.toFixed(1) + ' %');

    // Titraille à gauche du header — 3 lignes : titre, sous-titre, quartier
    ctx.fillStyle = '#1A1A1A';
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'left';
    ctx.font = '700 24px "Space Grotesk", system-ui, sans-serif';
    ctx.fillText(fctx.title, textX, 38);
    // Sous-titre
    ctx.fillStyle = '#5A5A5A';
    ctx.font = '500 16px "Space Grotesk", system-ui, sans-serif';
    ctx.fillText(fctx.subtitle, textX, 64);
    // Quartier (3ème ligne, plus pâle)
    if (fctx.quartier) {
      ctx.fillStyle = '#A89F94';
      ctx.font = '500 14px "Space Grotesk", system-ui, sans-serif';
      ctx.fillText(fctx.quartier, textX, 90);
    }

    const visTop = FICHE_HEADER_H + 18;
    const visBottom = H - FOOTER_H - 5;
    const visW = W - 2 * PAD;
    const visH = visBottom - visTop;

    await drawFicheVisual(ctx, PAD, visTop, visW, visH, fctx);

    ctx.fillStyle = '#5A5A5A';
    ctx.textAlign = 'left';
    ctx.font = '500 13px "Space Grotesk", system-ui, sans-serif';
    const today = new Date().toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
    ctx.fillText('larochellevote.fr · @LaRochelleVote · exporté le ' + today, PAD, H - 22);
    return canvas;
  }

  function drawHeaderStat(ctx, x, y, w, h, label, val) {
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = '#E6DFD5';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
    ctx.textAlign = 'left';
    ctx.fillStyle = '#B49B7E';
    ctx.font = '700 11px "Space Grotesk", system-ui, sans-serif';
    ctx.fillText(label, x + 12, y + 22);
    ctx.fillStyle = '#1A1A1A';
    ctx.font = '900 24px "Space Grotesk", system-ui, sans-serif';
    ctx.fillText(val, x + 12, y + 50);
  }

  window.exportShareImage = async function() {
    // Priorité : si on est en mode comparaison, on exporte la vue comparateur
    // selon le mode actif (Abs/Rel : 2 cartes, Diff : 1 carte + résumé, Nuage : scatter SVG).
    const cmp = (typeof window.getCmpState === 'function') ? window.getCmpState() : null;
    if (cmp && cmp.A && cmp.B) {
      const canvas = await composeCompare();
      if (canvas) {
        const cmpAPI = window._cmpExport;
        const labA = cmpAPI ? cmpAPI.shortLabelOfSel(cmp.A) : 'a';
        const labB = cmpAPI ? cmpAPI.shortLabelOfSel(cmp.B) : 'b';
        const fname = 'lrvote-comparaison-' + slug(labA + ' vs ' + labB + ' ' + (cmp.scaleMode || 'absolute')) + '.png';
        await downloadCanvas(canvas, fname);
        return;
      }
    }
    const fctx = getFicheContext();
    const canvas = fctx ? await composeFiche(fctx) : await compose();
    const slugBase = fctx ? (fctx.title + ' ' + fctx.subtitle) : (getCarteTitle() + ' ' + getCarteSubtitle());
    const fname = (fctx ? 'lrvote-fiche-' : 'lrvote-carte-') + slug(slugBase) + '.png';
    await downloadCanvas(canvas, fname);
  };

  // Exposition pour les tests / l'export Puppeteer sans passer par downloadCanvas (qui déclencherait un vrai download).
  window.compose         = compose;
  window.composeFiche    = composeFiche;
  window.composeCompare  = composeCompare;
  window.getFicheContext = getFicheContext;
})();

// ─── Bouton "🎲 Au hasard" : tirage aléatoire élection + niveau (carte/bureau/quartier/global) ──
function randomDiscover() {
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  const elections = Object.keys(ELECTIONS || {});
  if (!elections.length) return;
  const election = pick(elections);
  // Choisir un tour valide (T1 préféré, sinon TU, sinon T2)
  const sheets = Object.keys(ELECTIONS[election].sheets || {});
  let tour = sheets.includes('T1') ? 'T1' : sheets.includes('TU') ? 'TU' : sheets[0];
  // Tirer aussi T2 parfois si dispo, pour varier
  if (sheets.includes('T2') && Math.random() < 0.5) tour = 'T2';
  // Tirer un niveau selon une pondération (carte 30, bureau 40, quartier 20, global 10)
  const r = Math.random();
  let niveau, params = { election: election };
  if (tour && tour !== 'TU') params.tour = tour;
  if (r < 0.30) {
    niveau = 'carte';
  } else if (r < 0.70) {
    niveau = 'bureau';
    // Tirer un bureau présent dans le sheet de cette élection
    const sheet = ELECTIONS[election].sheets[tour] || {};
    const nums = Object.keys(sheet).filter(n => sheet[n] && sheet[n].c);
    if (nums.length) params.bureau = pick(nums);
    else niveau = 'carte';
  } else if (r < 0.90) {
    niveau = 'quartier';
    // Tirer un quartier dispo
    const yearInfo = (BUREAU_INFO[String(ELECTIONS[election].my || 2026)] || BUREAU_INFO[CURRENT_ERA] || {});
    const quartiers = Array.from(new Set(Object.values(yearInfo).map(b => b && b.q).filter(q => q && q !== 'Nul')));
    if (quartiers.length) params.quartier = pick(quartiers);
    else niveau = 'carte';
  } else {
    niveau = 'global';
    params.tab = 'global';
  }
  // Construire le hash et naviguer (rechargement nécessaire pour appliquer toutes les vues proprement)
  const hash = '#' + new URLSearchParams(params).toString();
  location.hash = hash;
  location.reload();
}


// ─── Cmd+K universal search ──────────────────────────────────────────────
(function setupCmdK(){
  // Normalisation : minuscules + sans accents
  function norm(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,''); }
  // Construction de l'index (une fois)
  let _index = null;
  function buildIndex(){
    if (_index) return _index;
    const items = [];
    // Bureaux carte 2026 — texte de recherche enrichi des anciens numéros/noms/dénominations.
    const b2026 = (typeof BUREAU_INFO !== 'undefined' && BUREAU_INFO[CURRENT_ERA]) || {};
    const corr = (typeof BUREAU_CORRESPONDANCES !== 'undefined' && BUREAU_CORRESPONDANCES) || {};
    // ERAS vient de shared.js (calculé dynamiquement depuis BUREAU_INFO)
    Object.entries(b2026).forEach(([id, b]) => {
      if (!b || b.q === 'Nul') return;
      const num = parseInt(id);
      const den = b.den || b.nom || '';
      const q = b.q || '';
      // Collecter alias historiques (numéros + dénominations + quartiers) de toutes les ères
      const aliasNums = new Set();   // numéros différents de l'actuel
      const aliasNames = new Set();  // noms / dénominations différents
      const aliasQs = new Set();     // quartiers différents
      const chain = corr[id] || {};
      ERAS.forEach(era => {
        const histRef = chain[era];
        if (!histRef) return;
        const histIds = Array.isArray(histRef) ? histRef : [histRef];
        histIds.forEach(hid => {
          if (!hid) return;
          const eraInfo = (BUREAU_INFO[era] || {})[hid];
          if (eraInfo) {
            if (eraInfo.den && eraInfo.den !== den) aliasNames.add(eraInfo.den);
            if (eraInfo.nom && eraInfo.nom !== den && eraInfo.nom !== b.nom) aliasNames.add(eraInfo.nom);
            if (eraInfo.q && eraInfo.q !== q) aliasQs.add(eraInfo.q);
          }
          const hNum = parseInt(hid);
          if (hNum && hNum !== num) aliasNums.add(hNum);
        });
      });
      // Sous-label : ajouter "anciennement N°XX" si le numéro a changé
      const searchExtra = [...aliasNums, ...aliasNames, ...aliasQs].join(' ');
      items.push({
        type: 'bureau', icon: '📍', label: 'N°' + num + ' — ' + den,
        badge: 'Carte ' + CURRENT_ERA,
        badgeTip: 'Découpage des bureaux de vote actuellement en vigueur.',
        sub: q ? 'Bureau · ' + q : 'Bureau',
        key: id,
        search: norm(num + ' ' + den + ' ' + (b.nom||'') + ' ' + q + ' ' + searchExtra)
      });
    });
    // Quartiers (sans doublons)
    const quartiers = new Set();
    Object.values(b2026).forEach(b => { if (b && b.q && b.q !== 'Nul') {
      // Certaines valeurs `q` peuvent contenir plusieurs quartiers séparés par /
      String(b.q).split('/').map(s => s.trim()).forEach(q => quartiers.add(q));
    }});
    [...quartiers].sort().forEach(q => {
      items.push({ type: 'quartier', icon: '🏘', label: q, sub: 'Quartier', key: q, search: norm(q) });
    });
    // Élections
    Object.keys(ELECTIONS || {}).forEach(el => {
      items.push({ type: 'election', icon: '🗳', label: el, sub: 'Élection', key: el, search: norm(el) });
    });
    // Candidat·es (uniques sur l'ensemble du corpus)
    // Candidat·es : une entrée par (candidat × élection) — un même nom peut donc apparaître
    // plusieurs fois si la personne s'est présentée à plusieurs scrutins.
    const candEntries = [];
    Object.entries(ELECTIONS || {}).forEach(([elLabel, elData]) => {
      const candsInElec = new Set();
      Object.values(elData.sheets || {}).forEach(sheet => {
        Object.values(sheet || {}).forEach(bd => {
          if (bd && bd.c) Object.keys(bd.c).forEach(c => candsInElec.add(c));
        });
      });
      candsInElec.forEach(cname => {
        // Post-M5 : cname EST le cand_id (ex. "alain-bucherie@cantonales-2004").
        // La cascade `|elLabel` était une compat M3 morte → on simplifie.
        const cd = (typeof CAND_DATA !== 'undefined' && CAND_DATA[cname]) || {};
        const nom = cd.n || cname;
        const prenom = cd.p || '';
        const pa = cd.pa || '';
        const label = nom + (prenom ? ' ' + prenom : '') + (pa ? ' (' + pa + ')' : '');
        candEntries.push({
          type: 'candidat', icon: '👤',
          label: label,
          sub: elLabel,
          key: cname,
          election: elLabel,
          search: norm(nom + ' ' + prenom + ' ' + pa + ' ' + cname + ' ' + elLabel)
        });
      });
    });
    candEntries.sort((a, b) => {
      const c = a.label.localeCompare(b.label, 'fr');
      return c !== 0 ? c : a.sub.localeCompare(b.sub, 'fr');
    });
    items.push(...candEntries);
    _index = items;
    return items;
  }
  // Score fuzzy : chaque token doit apparaître ; bonus prefix / mot-debut.
  function score(item, tokens){
    let total = 0;
    for (const tok of tokens) {
      const idx = item.search.indexOf(tok);
      if (idx < 0) return -1;
      let s = 1;
      if (idx === 0) s += 4;                        // préfixe global
      else if (item.search[idx-1] === ' ') s += 2;  // début de mot
      s += Math.max(0, 3 - idx*0.05);               // bonus position précoce
      total += s;
    }
    // Bonus type : bureau et quartier prioritaires sur candidat·e
    if (item.type === 'bureau') total += 0.3;
    else if (item.type === 'quartier') total += 0.2;
    return total;
  }
  function filter(query){
    const q = norm(query).trim();
    const items = buildIndex();
    if (!q) {
      // Sans requête, on montre quelques têtes de chacune des sections
      const head = [];
      ['bureau','quartier','election','candidat'].forEach(t => {
        head.push(...items.filter(i => i.type === t).slice(0, 5));
      });
      return head.slice(0, 50);
    }
    const tokens = q.split(/\s+/).filter(Boolean);
    return items
      .map(i => ({ i, s: score(i, tokens) }))
      .filter(o => o.s >= 0)
      .sort((a,b) => b.s - a.s)
      .slice(0, 50)
      .map(o => o.i);
  }

  // ── Action sur sélection (spécifique LRVcarte) ──
  function pickItem(item){
    closeOverlayUI();
    if (item.type === 'bureau') {
      const gj = getMapGeoJSON();
      const feat = gj.features.find(f => (f.properties.b2026 || numStr(f)) === item.key)
                || gj.features.find(f => numStr(f) === item.key);
      if (feat) {
        // Mêmes mutations que selectBureauFromList : on entre en mode "fiche bureau ouverte"
        currentFeature = feat;
        currentQuartier = null;
        overlayTab = 'bureau';
        const info = bureauInfo(feat);
        const ns = numStr(feat);
        document.getElementById('ov-title').textContent = isAggNs(ns)
          ? 'Bureaux agrégés — ' + info.quartier
          : 'Fiche bureau — ' + info.denomination;
        document.getElementById('ov-tabs').style.display = 'flex';
        setOverlayDisplay('flex');
        showBureauListSidebar();   // ← sidebar passe en mode liste (cohérent avec fiche ouverte)
        renderFiche(feat);
        updateAccentColor();
        updateOverlayTabs();
        if (mainLayer) mainLayer.setStyle(featureStyle);
        if (typeof writeURLState === 'function') writeURLState();
      }
    } else if (item.type === 'quartier') {
      // On a besoin d'un currentFeature pour l'overlay quartier ; prendre le 1er bureau
      const yearInfo = BUREAU_INFO[CURRENT_ERA] || {};
      const ids = Object.entries(yearInfo)
        .filter(([, b]) => getQuartierParts(b.q || '').includes(item.key))
        .map(([id]) => id);
      if (ids.length) {
        const gj = getMapGeoJSON();
        const feat = gj.features.find(f => numStr(f) === ids[0]);
        if (feat) { currentFeature = feat; openOverlayQuartierNamed(item.key); }
      }
    } else if (item.type === 'election') {
      setElection(item.key);
    } else if (item.type === 'candidat') {
      // Bascule sur l'élection où le candidat est apparu en dernier, puis colore la carte
      if (item.election && item.election !== currentElection) setElection(item.election);
      setMapMode('candidat');
      currentMapSelection = item.key;
      [currentSelectionMin, currentSelectionMax] = computeSelectionRange();
      if (mainLayer) mainLayer.setStyle(featureStyle);
      renderMapLegend();
      if (typeof writeURLState === 'function') writeURLState();
    }
  }

  // ── UI overlay ──
  let overlayEl = null, inputEl = null, listEl = null, results = [], cursor = 0;
  function ensureUI(){
    if (overlayEl) return;
    const css = '#cmdk-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-start;justify-content:center;padding-top:14vh;z-index:10001;font-family:Space Grotesk,system-ui,sans-serif}'
      + '#cmdk-card{background:var(--bg-modal);border-radius:12px;width:560px;max-width:92vw;max-height:70vh;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3);display:flex;flex-direction:column}'
      + '#cmdk-input{padding:14px 18px;border:none;border-bottom:1px solid var(--border-modal);font-size:1rem;font-family:inherit;outline:none;color:var(--text-modal);background:transparent}'
      + '#cmdk-list{overflow-y:auto;padding:4px 0;flex:1}'
      + '.cmdk-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;font-size:.88rem}'
      + '.cmdk-item.cur{background:var(--bg-modal-hover)}'
      + '.cmdk-item .ico{font-size:1rem;width:22px;text-align:center;flex-shrink:0}'
      + '.cmdk-item .lbl{flex:1;min-width:0;color:var(--text-modal);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:8px}'
      + '.cmdk-item .lbl-text{overflow:hidden;text-overflow:ellipsis;min-width:0}'
      + '.cmdk-item .badge{font-size:.7rem;font-weight:600;background:var(--bg-modal-accent);color:var(--text-modal-muted);padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0;cursor:help}'
      + '.cmdk-item .sub{color:var(--text-modal-muted);font-size:.78rem;flex-shrink:0;max-width:40%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}'
      + '#cmdk-tip{position:fixed;background:var(--bg-tooltip);color:var(--text-tooltip);padding:6px 10px;border-radius:4px;font-size:.72rem;font-weight:500;white-space:nowrap;pointer-events:none;z-index:10002;opacity:0;transition:opacity .15s;transform:translateX(-50%)}'
      + '#cmdk-foot{padding:8px 16px;border-top:1px solid var(--border-modal);font-size:.72rem;color:var(--text-modal-muted);display:flex;gap:14px;justify-content:flex-end;background:var(--bg-modal-hover)}'
      + '#cmdk-foot kbd{display:inline-block;background:var(--bg-modal);border:1px solid var(--border-modal);border-radius:3px;padding:1px 5px;font:inherit;font-size:.72rem;color:var(--text-modal)}'
      + '#cmdk-empty{padding:20px 16px;color:var(--text-modal-muted);text-align:center;font-size:.85rem}';
    const st = document.createElement('style'); st.textContent = css; document.head.appendChild(st);
    overlayEl = document.createElement('div'); overlayEl.id = 'cmdk-overlay';
    overlayEl.innerHTML = '<div id="cmdk-card">'
      + '<input id="cmdk-input" type="text" placeholder="Rechercher un bureau, un quartier, une élection, un·e candidat·e…" autocomplete="off" spellcheck="false">'
      + '<div id="cmdk-list"></div>'
      + '<div id="cmdk-foot"><span><kbd>↑</kbd><kbd>↓</kbd> naviguer</span><span><kbd>Entrée</kbd> sélectionner</span><span><kbd>Échap</kbd> fermer</span></div>'
      + '</div>';
    document.body.appendChild(overlayEl);
    inputEl = overlayEl.querySelector('#cmdk-input');
    listEl  = overlayEl.querySelector('#cmdk-list');
    overlayEl.addEventListener('click', e => { if (e.target === overlayEl) closeOverlayUI(); });
    inputEl.addEventListener('input', () => { runSearch(); });
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'ArrowDown') { e.preventDefault(); moveCursor(1); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); moveCursor(-1); }
      else if (e.key === 'Enter')   { e.preventDefault(); if (results[cursor]) pickItem(results[cursor]); }
      else if (e.key === 'Escape')  { e.preventDefault(); closeOverlayUI(); }
    });
  }
  function runSearch(){
    results = filter(inputEl.value);
    cursor = 0;
    render();
  }
  function render(){
    if (!results.length) {
      listEl.innerHTML = '<div id="cmdk-empty">Aucun résultat</div>';
      return;
    }
    listEl.innerHTML = results.map((r, i) =>
      '<div class="cmdk-item' + (i === cursor ? ' cur' : '') + '" data-i="' + i + '">'
      + '<span class="ico">' + r.icon + '</span>'
      + '<span class="lbl"><span class="lbl-text">' + escapeHTML(r.label) + '</span>'
      + (r.badge ? '<span class="badge" data-tip="' + (r.badgeTip ? escapeHTML(r.badgeTip) : '') + '">' + escapeHTML(r.badge) + '</span>' : '')
      + '</span>'
      + '<span class="sub">' + escapeHTML(r.sub) + '</span>'
      + '</div>').join('');
    [...listEl.querySelectorAll('.cmdk-item')].forEach(el => {
      el.addEventListener('click', () => { cursor = parseInt(el.dataset.i); pickItem(results[cursor]); });
      el.addEventListener('mousemove', () => { const i = parseInt(el.dataset.i); if (i !== cursor) { cursor = i; render(); } });
    });
    // Tooltip flottant pour le badge (position fixe pour échapper à l'overflow de la liste)
    [...listEl.querySelectorAll('.cmdk-item .badge')].forEach(b => {
      const tip = b.dataset.tip;
      if (!tip) return;
      b.addEventListener('mouseenter', () => {
        let t = document.getElementById('cmdk-tip');
        if (!t) { t = document.createElement('div'); t.id = 'cmdk-tip'; document.body.appendChild(t); }
        t.textContent = tip;
        const r = b.getBoundingClientRect();
        t.style.left = (r.left + r.width/2) + 'px';
        t.style.top  = (r.bottom + 6) + 'px';
        t.style.opacity = '1';
      });
      b.addEventListener('mouseleave', () => {
        const t = document.getElementById('cmdk-tip');
        if (t) t.style.opacity = '0';
      });
    });
    // Scroll-into-view pour l'élément courant
    const cur = listEl.querySelector('.cmdk-item.cur');
    if (cur) cur.scrollIntoView({ block: 'nearest' });
  }
  function escapeHTML(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
  function moveCursor(d){
    if (!results.length) return;
    cursor = (cursor + d + results.length) % results.length;
    render();
  }
  let _cmdkTrap = null;
  function openOverlayUI(){
    ensureUI();
    overlayEl.style.display = 'flex';
    inputEl.value = '';
    runSearch();
    setTimeout(() => inputEl.focus(), 0);
    // A11y : focus trap (cmdk a son propre input focus, le trap garde Tab dedans).
    if (!_cmdkTrap && typeof createFocusTrap === 'function') _cmdkTrap = createFocusTrap(overlayEl);
    if (_cmdkTrap) _cmdkTrap.activate();
  }
  function closeOverlayUI(){
    if (overlayEl) overlayEl.style.display = 'none';
    if (_cmdkTrap) _cmdkTrap.deactivate();
  }
  // Raccourci global Cmd/Ctrl + K
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')) {
      e.preventDefault();
      if (overlayEl && overlayEl.style.display === 'flex') closeOverlayUI();
      else openOverlayUI();
    }
  });
  // Expose pour usage externe (cheatsheet)
  window.openCmdK = openOverlayUI;
})();


// ─── Raccourcis clavier ──────────────────────────────────────────────────
(function setupShortcuts(){
  function isTypingTarget(t){
    if (!t) return false;
    const tag = (t.tagName || '').toUpperCase();
    return tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || t.isContentEditable;
  }
  // Résout le numéro de bureau dans une ère donnée à partir de son b2026.
  // BUREAU_CORRESPONDANCES[b2026][era] = string | array (cas de split historique).
  // Retourne un array de candidats à tester (1 ou plusieurs si bureau venait d'un split).
  function bureauNumsInEra(b2026, era){
    const corr = (typeof BUREAU_CORRESPONDANCES !== 'undefined') ? BUREAU_CORRESPONDANCES[b2026] : null;
    if (!corr) return [b2026]; // fallback : on tente la même clé
    const v = corr[era];
    if (!v) return [b2026];
    return Array.isArray(v) ? v : [v];
  }
  // Vrai si le contexte courant (bureau / quartier / canton / global) a au moins
  // une donnée dans l'élection donnée. Utilisé pour skip les scrutins infra-communaux
  // (cantonales/départementales) quand on est sur un bureau hors canton concerné.
  function hasDataForCurrentContext(electionLabel){
    const el = ELECTIONS[electionLabel];
    if (!el || !el.sheets) return false;
    const era = String(el.my || '');
    const tours = Object.keys(el.sheets);
    // Cantonales/Départementales = scrutins infra-communaux → exclus en mode global
    // (résultat ville non pertinent) ET en mode quartier (un quartier peut chevaucher
    // plusieurs cantons, le résultat agrégé serait incohérent). Cohérent avec la règle
    // appliquée dans daily-capture.js pour le tirage quotidien.
    const isCantonal = (typeof isCantonalElection === 'function') && isCantonalElection(electionLabel);
    if (isCantonal && (overlayTab === 'global' || overlayTab === 'quartier')) return false;
    // En mode global (et fallback sans contexte), toute autre élection est pertinente.
    if (overlayTab === 'global' || (!currentFeature && !currentQuartier && !currentCanton)) return true;
    // Mode BUREAU : bureau courant a-t-il des données dans l'une des sheets ?
    if (overlayTab === 'bureau' && currentFeature) {
      const b2026 = currentFeature.properties.b2026 || numStr(currentFeature);
      const candidates = bureauNumsInEra(b2026, era);
      for (const tour of tours) {
        for (const ns of candidates) {
          if (el.sheets[tour] && el.sheets[tour][ns]) return true;
        }
      }
      return false;
    }
    // Mode QUARTIER : au moins un bureau du quartier a-t-il des données ?
    if (overlayTab === 'quartier' && currentQuartier) {
      const yi = BUREAU_INFO[era] || {};
      for (const ns of Object.keys(yi)) {
        const q = yi[ns].q || '';
        if (q !== currentQuartier && !q.split('/').map(s => s.trim()).includes(currentQuartier)) continue;
        for (const tour of tours) {
          if (el.sheets[tour] && el.sheets[tour][ns]) return true;
        }
      }
      return false;
    }
    // Mode CANTON : au moins un bureau du canton actif a-t-il des données ?
    // currentCanton est un cid moderne (ère 2015) ; pour les anciennes élections on
    // utilise CANTON_CORRESPONDANCES (mapping ère 2015 → bureaux historiques par ère).
    if (overlayTab === 'canton' && currentCanton) {
      const yi = BUREAU_INFO[era] || {};
      // Bureaux du canton dans l'ère courante de l'élection
      const eraCanton = (typeof getCantonEraForBureauEra === 'function') ? getCantonEraForBureauEra(era) : null;
      let bureauxCanton = null;
      if (eraCanton === '2015') {
        // Canton moderne : direct
        bureauxCanton = Object.keys(yi).filter(ns => String(yi[ns].c || '') === currentCanton);
      } else {
        // Canton historique : on utilise CANTON_CORRESPONDANCES["2015:<cid>"][era]
        const key = '2015:' + currentCanton;
        const corr = (typeof CANTON_CORRESPONDANCES !== 'undefined') ? CANTON_CORRESPONDANCES[key] : null;
        bureauxCanton = (corr && corr[era]) ? corr[era] : Object.keys(yi).filter(ns => String(yi[ns].c || '') === currentCanton);
      }
      for (const ns of (bureauxCanton || [])) {
        for (const tour of tours) {
          if (el.sheets[tour] && el.sheets[tour][ns]) return true;
        }
      }
      return false;
    }
    return true;
  }
  // elecTypePriority(label) : départage les élections de même année. Définie dans shared.js.
  function neighborElection(dir){
    const all = Object.keys(ELECTIONS);
    // Garde-fou : si un label n'a pas d'année à 4 chiffres (cas non attendu mais
    // possible si on ajoute une élection mal nommée), on tombe à 0 au lieu de crash.
    const _y = lab => { const m = lab.match(/\d{4}/); return m ? parseInt(m[0]) : 0; };
    const sorted = all.slice().sort((a,b) => {
      const ya = _y(a), yb = _y(b);
      if (ya !== yb) return ya - yb;
      return elecTypePriority(a) - elecTypePriority(b);
    });
    const idx = sorted.indexOf(currentElection);
    if (idx < 0) return null;
    // Skip les élections où le contexte courant (bureau/quartier/canton) n'a pas
    // de données. Utile pour les cantonales/départementales qui ne touchent qu'un
    // canton à la fois — éviter d'envoyer l'utilisateur sur une fiche vide.
    let i = idx + dir;
    while (i >= 0 && i < sorted.length) {
      if (hasDataForCurrentContext(sorted[i])) return sorted[i];
      i += dir;
    }
    return null;
  }
  // Expose pour les boutons chevrons + mise à jour disabled state
  window.navigateElection = function(dir){
    const next = neighborElection(dir);
    if (next) setElection(next);
  };
  window.updateElectionNavButtons = function(){
    const prev = document.getElementById('tb-elec-prev');
    const next = document.getElementById('tb-elec-next');
    if (prev) prev.disabled = !neighborElection(-1);
    if (next) next.disabled = !neighborElection(1);
  };
  function neighborBureau(dir){
    if (!currentFeature) return null;
    const cur = numStr(currentFeature);
    // Utiliser l'ère de l'élection courante (pas CURRENT_ERA) : sinon les flèches
    // ↑/↓ naviguent dans les bureaux 2026 alors que la fiche affiche une élection
    // ancienne (audit medium #2).
    const era = String((ELECTIONS[currentElection] || {}).my || CURRENT_ERA);
    const erasInfo = BUREAU_INFO[era] || {};
    const sortedNums = Object.keys(erasInfo)
      .filter(id => (erasInfo[id].q || '') !== 'Nul')
      .sort((a,b) => parseInt(a) - parseInt(b));
    const i = sortedNums.indexOf(cur);
    const tgt = sortedNums[i + dir];
    if (!tgt) return null;
    const gj = getMapGeoJSON();
    return gj.features.find(f => numStr(f) === tgt) || null;
  }
  function selectFeature(feat){
    if (!feat) return;
    currentFeature = feat;
    currentQuartier = null;
    overlayTab = 'bureau';
    const info = bureauInfo(feat);
    const t = isAggNs(numStr(feat)) ? 'Bureaux agrégés — ' + info.quartier : 'Fiche bureau — ' + info.denomination;
    document.getElementById('ov-title').textContent = t;
    document.getElementById('ov-tabs').style.display = 'flex';
    setOverlayDisplay('flex');
    showBureauListSidebar();
    renderFiche(feat);
    updateAccentColor();
    updateOverlayTabs();
    if (mainLayer) mainLayer.setStyle(featureStyle);
    if (typeof writeURLState === 'function') writeURLState();
  }

  // A11y : Enter / Space déclenchent un click() sur les éléments role="button"
  // (les <button> natifs s'auto-gèrent et sont skippés). Avant les raccourcis
  // perso pour ne pas écraser leur comportement (sauf si la cible est un button-like).
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const t = e.target;
    if (!t || t.getAttribute('role') !== 'button') return;
    if (t.tagName === 'BUTTON') return;
    if (isTypingTarget(t)) return;
    e.preventDefault();
    t.click();
  });

  document.addEventListener('keydown', (e) => {
    if (isTypingTarget(e.target)) return;
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    const k = e.key;
    if (k === 'ArrowLeft' || k === 'ArrowRight') {
      const next = neighborElection(k === 'ArrowLeft' ? -1 : 1);
      if (next) { setElection(next); e.preventDefault(); }
    } else if (k === 'ArrowUp' || k === 'ArrowDown') {
      const feat = neighborBureau(k === 'ArrowUp' ? -1 : 1);
      if (feat) { selectFeature(feat); e.preventDefault(); }
    } else if (k === 'Escape') {
      const ov = document.getElementById('overlay');
      if (ov && ov.style.display !== 'none' && typeof closeOverlay === 'function') {
        closeOverlay(); e.preventDefault();
      }
    } else if (k === '?' || (e.shiftKey && k === '/')) {
      toggleShortcutsCheat(); e.preventDefault();
    }
  });

  // Cheatsheet overlay
  const cs = document.createElement('div');
  cs.id = 'shortcuts-cheat';
  cs.setAttribute('role', 'dialog');
  cs.setAttribute('aria-modal', 'true');
  cs.setAttribute('aria-label', 'Raccourcis clavier');
  cs.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:10000;font-family:Space Grotesk,system-ui,sans-serif';
  cs.innerHTML = '<div style="background:#fff;border-radius:10px;padding:24px 28px;max-width:420px;box-shadow:0 12px 40px rgba(0,0,0,.25)">'
    + '<h3 style="margin:0 0 14px;font-size:1.1rem">Raccourcis clavier</h3>'
    + '<table style="font-size:.85rem;color:#333;border-collapse:collapse;width:100%">'
    + '<tr><td style="padding:5px 8px"><kbd>⌘</kbd> <kbd>K</kbd></td><td>Recherche universelle (bureau, quartier, candidat·e, élection)</td></tr>'
    + '<tr><td style="padding:5px 8px"><kbd>←</kbd> <kbd>→</kbd></td><td>Élection précédente / suivante (chevrons en haut)</td></tr>'
    + '<tr><td style="padding:5px 8px"><kbd>↑</kbd> <kbd>↓</kbd></td><td>Bureau précédent / suivant</td></tr>'
    + '<tr><td style="padding:5px 8px"><kbd>Échap</kbd></td><td>Fermer la fiche</td></tr>'
    + '<tr><td style="padding:5px 8px"><kbd>?</kbd></td><td>Afficher / masquer ce panneau</td></tr>'
    + '</table>'
    + '<button onclick="document.getElementById(\'shortcuts-cheat\').style.display=\'none\'" style="margin-top:14px;padding:6px 14px;border:1px solid #ddd;border-radius:6px;background:#f5f5f5;cursor:pointer;font:inherit">Fermer</button>'
    + '</div>';
  cs.addEventListener('click', e => { if (e.target === cs) cs.style.display = 'none'; });
  document.body.appendChild(cs);
  // Style des kbd
  const st = document.createElement('style');
  st.textContent = '#shortcuts-cheat kbd{display:inline-block;background:#f5f5f5;border:1px solid #ddd;border-radius:4px;padding:2px 7px;font-family:Space Grotesk,system-ui,sans-serif;font-size:.8rem;color:#333;font-weight:600}';
  document.head.appendChild(st);

  let _shortcutsTrap = null;
  window.toggleShortcutsCheat = () => {
    const willOpen = cs.style.display !== 'flex';
    cs.style.display = willOpen ? 'flex' : 'none';
    // A11y : focus trap actif quand le modal s'ouvre.
    if (!_shortcutsTrap && typeof createFocusTrap === 'function') _shortcutsTrap = createFocusTrap(cs);
    if (_shortcutsTrap) {
      if (willOpen) _shortcutsTrap.activate();
      else _shortcutsTrap.deactivate();
    }
  };

  // État initial des boutons chevrons (setupShortcuts s'exécute après updateTopbar)
  updateElectionNavButtons();
})();

// ─────────────────────────────────────────────────────────────────────────
// Swipe-down sur la fiche overlay (mobile uniquement) : tirer vers le bas
// pour fermer la fiche, à la manière d'un bottom sheet iOS/Android.
// Logique :
//   • On démarre le drag quand l'utilisateur touche la zone "handle" du
//     topbar de la fiche, OU le contenu lui-même si la fiche est scrollée
//     tout en haut (sinon on laisse le scroll natif faire son boulot).
//   • Pendant le drag, on translateY l'overlay 1:1 avec le doigt pour
//     un feedback temps réel.
//   • Au relâchement : si tiré > 25 % de la hauteur viewport → fermeture
//     animée jusqu'en bas + closeOverlay(). Sinon spring-back à zéro.
// Le bouton "← Retour" reste opérationnel (les utilisateurs habitués à
// taper en haut à gauche ne perdent rien).
// ─────────────────────────────────────────────────────────────────────────
(function setupSwipeDownToClose(){
  function isMobile() {
    return window.matchMedia && window.matchMedia('(max-width: 720px)').matches;
  }
  const overlay = document.getElementById('overlay');
  const ovBody  = document.getElementById('ov-body');
  const ovTop   = document.getElementById('ov-topbar');
  if (!overlay || !ovBody || !ovTop) return;

  let startY = 0, currentY = 0;
  let dragging = false;

  function canStartDrag(target) {
    if (!isMobile()) return false;
    // Drag autorisé depuis le topbar (zone "handle") quoi qu'il arrive
    if (ovTop.contains(target)) return true;
    // Sinon, uniquement si on est au sommet du scroll du contenu
    return ovBody.scrollTop <= 0;
  }

  overlay.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) { dragging = false; return; }
    if (!canStartDrag(e.target)) { dragging = false; return; }
    startY   = e.touches[0].clientY;
    currentY = startY;
    dragging = true;
    overlay.style.transition = 'none'; // suivi temps réel, pas d'easing
  }, { passive: true });

  overlay.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    currentY = e.touches[0].clientY;
    const dy = currentY - startY;
    if (dy <= 0) {
      // Drag vers le haut : on abandonne pour ne pas bloquer le scroll natif
      overlay.style.transform = '';
      dragging = false;
      return;
    }
    overlay.style.transform = 'translateY(' + dy + 'px)';
  }, { passive: true });

  function endDrag() {
    if (!dragging) return;
    dragging = false;
    const dy = currentY - startY;
    const threshold = window.innerHeight * 0.25;  // 25 % de la viewport
    overlay.style.transition = 'transform 0.25s ease-out';
    if (dy > threshold) {
      // Glissée suffisante → on slide jusqu'en bas puis on ferme
      overlay.style.transform = 'translateY(100%)';
      setTimeout(() => {
        overlay.style.transition = '';
        overlay.style.transform  = '';
        if (typeof closeOverlay === 'function') closeOverlay();
      }, 250);
    } else {
      // Spring-back vers la position d'origine
      overlay.style.transform = '';
      setTimeout(() => { overlay.style.transition = ''; }, 250);
    }
  }
  overlay.addEventListener('touchend',    endDrag, { passive: true });
  overlay.addEventListener('touchcancel', endDrag, { passive: true });
})();

/* ─────────────────────────────────────────────────────────────────
   DUEL — setup tourniquet (marquise) sur les noms qui débordent.
   Pattern emprunté à LRVanalyse / setMarqueeText. Différences ici :
   - on cible tous les .duel-nom-host (rendus par blockWinner/blockLoser
     en mode mobile full),
   - on adapte le sens du défilement à data-align (right→+, left→−),
   - on déclenche automatiquement (MutationObserver) — pas besoin de
     hooker chaque site d'appel de renderDuel.
   ───────────────────────────────────────────────────────────────── */
(function setupDuelMarquees(){
  // Garde : si quelqu'un désactive volontairement la fonctionnalité.
  if (window._noDuelMarquees) return;
  const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduceMotion) return; // accessibilité : on laisse simplement le clip CSS

  // Largeur du fade côté extérieur (DOIT correspondre au gradient des règles
  // .has-marquee[data-align="..."] dans le CSS). On overshoote la translation
  // de cette valeur pour que la portion révélée à l'extrême de l'animation
  // dépasse la zone de fade et soit totalement opaque.
  const FADE_PX = 10;

  // Calcule l'overflow d'un host et applique/retire la marquise.
  function applyMarquee(host) {
    if (!host || !host.isConnected) return;
    const inner = host.querySelector('.duel-nom-inner');
    if (!inner) return;
    // Reset complet pour re-mesurer proprement (resize, orientation, etc.).
    host.classList.remove('has-marquee', 'prenom-abbrev', 'prenom-hidden');
    host.style.removeProperty('--duel-marquee-d');
    const containerW = host.clientWidth;
    if (!containerW) return;
    // Cascade d'abréviation AVANT la marquise (cohérence avec le mode liste) :
    //   Palier 1 — prénom complet → initiales (.prenom-abbrev)
    //   Palier 2 — prénom masqué (.prenom-hidden)
    //   Palier 3 — marquise translateX (animation)
    // ⚠️ Après chaque classList.add/remove, on FORCE un reflow synchrone via
    // offsetWidth, sinon scrollWidth peut renvoyer la mesure d'avant le swap.
    function fits() {
      // void(inner.offsetWidth) force le navigateur à recalculer le layout maintenant
      void inner.offsetWidth;
      return inner.scrollWidth <= containerW + 5;
    }
    if (fits()) return;
    // Le host a-t-il un prénom (binôme avec membre.p) ? Si oui on tente la cascade.
    const hasPrenom = !!host.querySelector('.cn-prenom-full');
    if (hasPrenom) {
      host.classList.add('prenom-abbrev');
      if (fits()) return;
      host.classList.remove('prenom-abbrev');
      host.classList.add('prenom-hidden');
      if (fits()) return;
    }
    // Sinon (ou si encore débordement) : marquise translateX
    void inner.offsetWidth; // dernier reflow avant la mesure définitive
    const overflow = inner.scrollWidth - containerW;
    if (overflow <= 5) return;
    // Overshoot de 2× FADE_PX : avec +FADE_PX seul, le bout du texte arrive pile sur
    // le bord du fade gradient et reste partiellement transparent. En doublant, le
    // bout dépasse la zone fade et est rendu 100% opaque à l'amplitude max.
    const distance = overflow + FADE_PX * 2;
    const align = host.getAttribute('data-align') || 'left';
    const sign  = (align === 'right') ? '+' : '-';
    host.style.setProperty('--duel-marquee-d', sign + distance + 'px');
    host.classList.add('has-marquee');
  }

  // Scanne le sous-arbre et applique sur chaque host non encore mesuré.
  // L'idempotence est gérée via has-marquee + data-mq-done (on remesure quand même
  // au resize, mais pas à chaque mutation parasite).
  function scanAndApply(root) {
    if (!root || !root.querySelectorAll) return;
    const hosts = root.querySelectorAll('.duel-nom-host');
    hosts.forEach(h => {
      if (h.dataset.mqDone === '1' && !h._needsRemeasure) return;
      // Double rAF : on attend que le layout soit stable (le duel vient d'être inséré).
      requestAnimationFrame(() => requestAnimationFrame(() => {
        applyMarquee(h);
        h.dataset.mqDone = '1';
        h._needsRemeasure = false;
      }));
    });
  }

  // Observateur : déclenché à chaque insertion DOM. Filtre les noeuds pertinents.
  const obs = new MutationObserver(muts => {
    for (const m of muts) {
      if (m.type !== 'childList') continue;
      m.addedNodes.forEach(n => {
        if (n.nodeType !== 1) return;
        if (n.classList && n.classList.contains('duel-nom-host')) {
          scanAndApply(n.parentNode || document.body);
        } else if (n.querySelector && n.querySelector('.duel-nom-host')) {
          scanAndApply(n);
        }
      });
    }
  });
  function startObs() {
    obs.observe(document.body, { childList: true, subtree: true });
    // Premier scan au cas où des duels seraient déjà dans le DOM.
    scanAndApply(document.body);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', startObs);
  } else {
    startObs();
  }

  // Resize / orientationchange : on remesure tout (les largeurs des blocs changent).
  // On débrouille les flags d'idempotence pour forcer un re-calcul.
  let resizeT;
  function onResize() {
    clearTimeout(resizeT);
    resizeT = setTimeout(() => {
      document.querySelectorAll('.duel-nom-host').forEach(h => { h._needsRemeasure = true; });
      scanAndApply(document.body);
    }, 150);
  }
  window.addEventListener('resize', onResize, { passive: true });
  window.addEventListener('orientationchange', onResize, { passive: true });
})();

</script>

<script>
/* ── Animation du logo voile mini (topbar) ── */
(function () {
  // PARTI_COLORS : palette des partis. Définie dans shared.js.
  const rows = Array.from(document.querySelectorAll('.sail-mini .sail-row')).reverse();
  if (!rows.length) return;
  // a11y : respect de prefers-reduced-motion → on fixe une couleur unique sans animation.
  const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduceMotion) {
    const fixed = PARTI_COLORS[Math.floor(Math.random() * PARTI_COLORS.length)];
    rows.forEach(r => { r.style.setProperty('--c1', fixed); r.style.setProperty('--c2', fixed); });
    return;
  }
  const NB = rows.length, SLIDE_DUR = 550, STEP = 200, PAUSE_END = 4000;
  function pickColor(prev) {
    let c; do { c = PARTI_COLORS[Math.floor(Math.random()*PARTI_COLORS.length)]; }
    while (c === prev); return c;
  }
  let curColor = pickColor(null), nextColor = pickColor(curColor), cursor = 0;
  rows.forEach(r => { r.style.setProperty('--c1', curColor); r.style.setProperty('--c2', nextColor); });
  function tick() {
    const row = rows[cursor], target = nextColor;
    row.classList.add('sliding');
    setTimeout(() => {
      row.classList.add('no-trans');
      row.style.setProperty('--c1', target);
      row.classList.remove('sliding');
      void row.offsetWidth;
      row.classList.remove('no-trans');
    }, SLIDE_DUR + 30);
    cursor++;
    let nextDelay = STEP;
    if (cursor >= NB) {
      cursor = 0;
      curColor = nextColor;
      nextColor = pickColor(curColor);
      const newC2 = nextColor;
      setTimeout(() => rows.forEach(r => r.style.setProperty('--c2', newC2)), SLIDE_DUR + 60);
      nextDelay = SLIDE_DUR - STEP + PAUSE_END;
    }
    setTimeout(tick, nextDelay);
  }
  tick();
})();
</script>

(function() {
  const hash = new URLSearchParams(window.location.hash.slice(1));
  if (hash.get('mode') !== 'export') return;

  window._exportMode = true;

  function tryExport() {
    if (typeof window.exportShareImage !== 'function' ||
        typeof ELECTIONS === 'undefined' ||
        Object.keys(ELECTIONS).length === 0) {
      return setTimeout(tryExport, 300);
    }
    setTimeout(async function() {
      try {
        window.downloadCanvas = function(canvas) {
          window._exportDataUrl = canvas.toDataURL('image/png');
          window._exportDone = true;
          return Promise.resolve(true);
        };
        await window.exportShareImage();
      } catch(e) {
        window._exportError = String(e);
        window._exportDone = true;

    }, 2000);
  }
  tryExport();
})();

<div id="elec-sheet" aria-hidden="true">

<script>
/* Bottom sheet mobile pour le sélecteur d'élection.
   Génère la liste depuis le <select id="el-select"> existant (qui contient les optgroups). */
function openElecSheet() {
  const sheet = document.getElementById('elec-sheet');
  const listEl = document.getElementById('elec-sheet-list');
  const sel = document.getElementById('el-select');
  if (!sheet || !listEl || !sel) return;
  // (Re)build le contenu — currentElection peut avoir changé entre 2 ouvertures.
  let html = '';
  for (const child of sel.children) {
    if (child.tagName !== 'OPTGROUP') continue;
    html += '<div class="elec-group"><div class="elec-group-label">' + child.label + '</div>';
    for (const opt of child.children) {
      if (opt.tagName !== 'OPTION') continue;
      const label = opt.value;
      const sheets = (typeof ELECTIONS !== 'undefined' && ELECTIONS[label] && ELECTIONS[label].sheets) || {};
      const has2Tours = !!sheets['T2'];
      const isCurrent = label === currentElection;
      // Italique pour les partielles (cf. CSS .is-partielle sur .elec-item / .elec-item-2t).
      const isPartielle = /partielle/i.test(label);
      const partielleCls = isPartielle ? ' is-partielle' : '';
      const safeVal = label.replace(/'/g, "\\'");
      if (has2Tours) {
        // Élection à 2 tours : nom de l'élection + 2 chips T1 / T2
        html += '<div class="elec-item-2t' + (isCurrent ? ' is-current-elec' : '') + partielleCls + '">'
              + '<div class="elec-item-name">' + opt.textContent + '</div>'
              + '<div class="elec-tour-chips">'
              +   '<button class="elec-tour-chip' + (isCurrent && currentSheet === 'T1' ? ' is-current' : '') + '"'
              +     ' onclick="setElection(\'' + safeVal + '\'); setTour(1); closeElecSheet();">1ᵉʳ tour</button>'
              +   '<button class="elec-tour-chip' + (isCurrent && currentSheet === 'T2' ? ' is-current' : '') + '"'
              +     ' onclick="setElection(\'' + safeVal + '\'); setTour(2); closeElecSheet();">2ᵉ tour</button>'
              + '</div></div>';
      } else {
        // Tour unique (TU ou T1 seul) : bouton simple
        html += '<button class="elec-item' + (isCurrent ? ' is-current' : '') + partielleCls + '"'
              + ' onclick="setElection(\'' + safeVal + '\'); closeElecSheet();">'
              + opt.textContent + '</button>';
      }
    }
    html += '</div>';
  }
  listEl.innerHTML = html;
  sheet.classList.add('open');
  sheet.setAttribute('aria-hidden', 'false');
  // Scroll vers l'élection active
  const cur = listEl.querySelector('.elec-item.is-current');
  if (cur) cur.scrollIntoView({ block: 'center' });
  // A11y : focus trap
  if (!_elecSheetTrap && typeof createFocusTrap === 'function') _elecSheetTrap = createFocusTrap(sheet);
  if (_elecSheetTrap) _elecSheetTrap.activate();
}
let _elecSheetTrap = null;
function closeElecSheet() {
  const sheet = document.getElementById('elec-sheet');
  if (!sheet) return;
  sheet.classList.remove('open');
  sheet.setAttribute('aria-hidden', 'true');
  if (_elecSheetTrap) _elecSheetTrap.deactivate();
}

// ═══════════ Side drawer mobile : nav bureaux / quartiers ═══════════
// Synchronise le contenu des listes desktop (#sb-bureau-list / #sb-quartier-list)
// vers les containers du drawer mobile (#nav-sheet-bureaux / #nav-sheet-quartiers).
// Appelée à l'ouverture du drawer pour avoir le contenu à jour.
function syncNavSheetContent() {
  const srcB = document.getElementById('sb-bureau-list');
  const srcQ = document.getElementById('sb-quartier-list');
  const srcC = document.getElementById('sb-canton-list');
  const dstB = document.getElementById('nav-sheet-bureaux');
  const dstQ = document.getElementById('nav-sheet-quartiers');
  const dstC = document.getElementById('nav-sheet-cantons');
  if (srcB && dstB) dstB.innerHTML = srcB.innerHTML;
  if (srcQ && dstQ) dstQ.innerHTML = srcQ.innerHTML;
  if (srcC && dstC) dstC.innerHTML = srcC.innerHTML;
}

function switchNavSheetTab(type) {
  const sheet = document.getElementById('nav-sheet');
  if (!sheet) return;
  const lists = {
    bureau:   document.getElementById('nav-sheet-bureaux'),
    quartier: document.getElementById('nav-sheet-quartiers'),
    canton:   document.getElementById('nav-sheet-cantons'),
  };
  const tabs = sheet.querySelectorAll('.nav-sheet-tab');
  tabs.forEach(t => t.classList.toggle('is-current', t.dataset.navType === type));
  Object.entries(lists).forEach(([k, el]) => {
    if (!el) return;
    el.style.display = (k === type) ? '' : 'none';
  });
  // Scroll vers la ligne active du nouvel onglet
  const activeList = lists[type];
  const cur = activeList && activeList.querySelector('.blist-row.cur');
  if (cur) cur.scrollIntoView({ block: 'center' });
}

let _navSheetTrap = null;
function openNavSheet() {
  const sheet = document.getElementById('nav-sheet');
  if (!sheet) return;
  syncNavSheetContent();
  // Choisir l'onglet pertinent selon le type de fiche en cours
  let initialTab = 'bureau';
  if (typeof overlayTab === 'string') {
    if (overlayTab === 'quartier') initialTab = 'quartier';
    else if (overlayTab === 'canton') initialTab = 'canton';
  }
  switchNavSheetTab(initialTab);
  sheet.classList.add('open');
  sheet.setAttribute('aria-hidden', 'false');
  // A11y : focus trap
  if (!_navSheetTrap && typeof createFocusTrap === 'function') _navSheetTrap = createFocusTrap(sheet);
  if (_navSheetTrap) _navSheetTrap.activate();
}

function closeNavSheet() {
  const sheet = document.getElementById('nav-sheet');
  if (!sheet) return;
  sheet.classList.remove('open');
  if (_navSheetTrap) _navSheetTrap.deactivate();
  sheet.setAttribute('aria-hidden', 'true');
}

// Délégation : clic sur une row dans le drawer
document.addEventListener('click', function(e) {
  const sheet = document.getElementById('nav-sheet');
  if (!sheet || !sheet.classList.contains('open')) return;
  const row = e.target.closest && e.target.closest('.blist-row');
  if (!row || !sheet.contains(row)) return;
  if (row.dataset.ns) {
    if (typeof selectBureauFromList === 'function') selectBureauFromList(row.dataset.ns);
    closeNavSheet();
  } else if (row.dataset.q) {
    if (typeof selectQuartierFromList === 'function') selectQuartierFromList(row.dataset.q);
    closeNavSheet();
  } else if (row.dataset.c) {
    if (typeof selectCantonFromList === 'function') selectCantonFromList(row.dataset.c);
    closeNavSheet();
  }
});

// Échap ferme le sheet
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeElecSheet();
    closeNavSheet();
  }
});
</script>
</div><!-- /main -->
