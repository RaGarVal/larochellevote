    function highlightDiffAt(targetDiff) {
      const maxAbs = Math.max(0.01, _cmpState.diffMaxAbs || 1);
      const tol = Math.max(0.5, Math.min(2.5, (2 * maxAbs) * 0.04));
      // Itère sur la map AFFICHÉE (la plus récente) — l'autre est cachée.
      const displaySide = _cmpDisplaySide();
      const otherSide = displaySide === 'A' ? 'B' : 'A';
      const layers = _cmpState['layers' + displaySide], geo = _cmpState['geo' + displaySide];
      const sheetSelf = getSheetForSel(_cmpState[displaySide]);
      const sheetOther = getSheetForSel(_cmpState[otherSide]);
      if (!layers || !geo) return;
      const eraSelf = String((ELECTIONS[_cmpState[displaySide].elec] || {}).my || '');
      const eraOther = String((ELECTIONS[_cmpState[otherSide].elec] || {}).my || '');
      Object.entries(layers).forEach(([ns, layer]) => {
        const dSelf = sheetSelf[ns];
        if (!dSelf) return;
        const nsOther = _crossEraNs(ns, eraSelf, eraOther);
        const dOther = nsOther ? sheetOther[nsOther] : null;
        if (!dOther) return;
        const sSelf = scoreOfSelInBureau(dSelf, _cmpState[displaySide]);
        const sOther = scoreOfSelInBureau(dOther, _cmpState[otherSide]);
        if (!sSelf.present || !sOther.present) return;
        const sA = displaySide === 'A' ? sSelf : sOther;
        const sB = displaySide === 'B' ? sSelf : sOther;
        const d = sB.pct - sA.pct;
        if (Math.abs(d - targetDiff) <= tol) {

        }

    document.querySelectorAll('#cmp-legend .cmp-legend-bar').forEach(bar => {
      const side = bar.getAttribute('data-side'); // 'A', 'B' (relatif), 'diff', ou null (absolu)
      const cursor = bar.querySelector('.cmp-legend-cursor');
      const isDiff = side === 'diff';
      const localRange = isDiff
        ? { min: -(_cmpState.diffMaxAbs || 0), max: (_cmpState.diffMaxAbs || 0) }
        : (side ? rangeOf(side) : { min: _cmpState.minG, max: _cmpState.maxG });
      // Throttle rAF (audit #3) : le mousemove sur la barre légende déclenchait
      // setStyle + bringToFront sur ~60 layers PAR PIXEL → 100-200×/sec selon
      // la souris. Le curseur visuel reste synchrone (cheap), mais le highlight
      // des layers (lourd) est différé au prochain rAF — au plus 60×/sec, et
      // seule la dernière position du mouvement gagne.
      bar.addEventListener('mousemove', e => {
        const rect = bar.getBoundingClientRect();
        const t = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        const targetPct = localRange.min + t * (localRange.max - localRange.min);
        // Curseur visuel : synchrone (juste 2-3 ops DOM, pas de Leaflet derrière).
        if (cursor) {
          cursor.style.left = (t * 100) + '%';
          const label = isDiff
            ? ((targetPct >= 0 ? '+' : '−') + Math.abs(targetPct).toFixed(1).replace('.', ',') + '\xa0pts')
            : (targetPct.toFixed(1).replace('.', ',') + ' %');
          cursor.setAttribute('data-pct', label);
          cursor.classList.add('on');
          cursor.classList.remove('ghost');

        bar._pendingT = t;
        bar._pendingTargetPct = targetPct;
        if (bar._rafScheduled) return;
        bar._rafScheduled = true;
        bar._rafId = requestAnimationFrame(() => {
          bar._rafScheduled = false;

          } else if (side) {
            // Mode relatif : highlight les 2 côtés via leurs ranges respectifs, à
            // même position relative t. Curseur fantôme sur l'autre barre.
            highlightSideAt(side, lp);

        if (bar._rafScheduled && bar._rafId != null) {

  }

  // Score ville (en %) d'une sélection : Σ voix / Σ exprimés × 100.
  // Calculé à partir des voix entières (data._voix) pour rester exact (cf. CLAUDE.md :
  // sommer des pcts arrondis introduit des drifts de ±1 voix sur les agrégats).
  function computeCityScore(sheet, sel) {
    let sumVoix = 0, sumE = 0;
    Object.entries(sheet || {}).forEach(([ns, data]) => {
      if (ns === '0057' || !data) return;
      const e = data.e || 0;
      const voix = data._voix || null;
      if (!voix) return; // sécurité — sheet déjà passé par l'IIFE de conversion
      if (sel.type === 'candidat') {
        // Bureaux où le candidat est ABSENT (cantonale hors canton) : on n'inclut
        // pas leur e dans sumE — sinon on dilue le score sur des bureaux où le
        // candidat n'avait aucune chance d'apparaître. Cohérent avec scoreOfSelInBureau.
        if (!Object.prototype.hasOwnProperty.call(voix, sel.quoi)) return;
        sumVoix += voix[sel.quoi] || 0;
        sumE += e;
      } else if (sel.type === 'bloc') {
        let bureauSum = 0; let has = false;
        Object.entries(voix).forEach(([cid, v]) => {
          const ci = candInfo(cid) || {};
          const b = (typeof BLOC_LEGACY !== 'undefined' && BLOC_LEGACY[ci.bk]) || ci.b || '?';
          if (b === sel.quoi) { bureauSum += v; has = true; }
        });
        if (!has) return;
        sumVoix += bureauSum;
        sumE += e;
      } else if (sel.type === 'famille') {
        let bureauSum = 0; let has = false;
        Object.entries(voix).forEach(([cid, v]) => {
          const ci = candInfo(cid) || {};
          if (Array.isArray(ci.t) && ci.t.indexOf(sel.quoi) !== -1) { bureauSum += v; has = true; }
        });
        if (!has) return;
        sumVoix += bureauSum;
        sumE += e;
      }
    });
    return sumE > 0 ? (sumVoix / sumE) * 100 : 0;
  }

  // Range [min, max] des scores d'un côté (1 sheet, 1 sélection). Sert pour le mode
  // RELATIF où chaque carte étire son gradient sur son amplitude locale.
  function computeRangeForSide(sheet, sel) {
    let mn = Infinity, mx = 0;
    Object.entries(sheet || {}).forEach(([ns, d]) => {
      if (ns === '0057') return;
      const { pct, present } = scoreOfSelInBureau(d, sel);
      if (!present) return;
      if (pct > mx) mx = pct;
      if (pct < mn) mn = pct;
    });
    return { min: mn === Infinity ? 0 : mn, max: mx };
  }
  // Range [min, max] partagé entre A et B (= union des 2 ranges côté). Mode ABSOLU
  // par défaut : permet la comparaison directe A vs B sur la même échelle.
  function computeSharedRange(sheetA, selA, sheetB, selB) {
    const a = computeRangeForSide(sheetA, selA);
    const b = computeRangeForSide(sheetB, selB);
    return { minG: Math.min(a.min, b.min), maxG: Math.max(a.max, b.max) };
  }
  // Max absolu de la différence B-A sur toute la ville (pour le mode "diff").
  // Symétrique autour de 0 : on prend max(|B-A|) → la palette s'étire de -max à +max,
  // 0 toujours au milieu (blanc/gris). Permet une lecture honnête du sens du swing.
  function computeDiffMaxAbs(sheetA, selA, sheetB, selB) {
    let mx = 0;
    // Itère depuis la map AFFICHÉE (la plus récente des 2 ères). Pour chaque
    // bureau du côté affiché, cross-ère vers l'autre via BUREAU_CORRESPONDANCES.
    const eraA = String((ELECTIONS[selA.elec] || {}).my || '');
    const eraB = String((ELECTIONS[selB.elec] || {}).my || '');
    const displaySide = (parseInt(eraB || '0') > parseInt(eraA || '0')) ? 'B' : 'A';
    const sheetSelf = displaySide === 'A' ? sheetA : sheetB;
    const sheetOther = displaySide === 'A' ? sheetB : sheetA;
    const selSelf = displaySide === 'A' ? selA : selB;
    const selOther = displaySide === 'A' ? selB : selA;
    const eraSelf = displaySide === 'A' ? eraA : eraB;
    const eraOther = displaySide === 'A' ? eraB : eraA;
    Object.keys(sheetSelf || {}).forEach(ns => {
      if (ns === '0057') return;
      const dSelf = sheetSelf[ns];
      if (!dSelf) return;
      const nsOther = _crossEraNs(ns, eraSelf, eraOther);
      const dOther = nsOther ? sheetOther[nsOther] : null;
      if (!dOther) return;
      const sSelf = scoreOfSelInBureau(dSelf, selSelf);
      const sOther = scoreOfSelInBureau(dOther, selOther);
      if (!sSelf.present || !sOther.present) return;
      const d = Math.abs(sSelf.pct - sOther.pct);
      if (d > mx) mx = d;

  }
  // Labels lisibles des types de redécoupage (cf. LRVanalyse).
  const _REDEC_LABELS = { creation: 'Création', majeur: 'Redécoupage majeur', mineur: 'Redécoupage mineur' };
  // Détecte les notices de redécoupage d'un bureau entre 2 ères via REDECOUPAGES.
  // Les clés sont au format "<bureauId>|<eraBureau>" — on filtre celles dont l'ère
  // tombe dans (min(A,B), max(A,B)]. Retourne [{ era, type, text }] dans l'ordre.
  function bureauModifBetween(b2026, eraA, eraB) {
    if (eraA === eraB) return [];
    if (typeof REDECOUPAGES === 'undefined') return [];
    const eMin = Math.min(+eraA, +eraB);
    const eMax = Math.max(+eraA, +eraB);
    const prefix = b2026 + '|';
    const out = [];
    Object.keys(REDECOUPAGES).forEach(k => {
      if (k.indexOf(prefix) !== 0) return;
      const eraStr = k.slice(prefix.length);
      const era = +eraStr;
      if (!(era > eMin && era <= eMax)) return;
      const r = REDECOUPAGES[k];
      if (!r) return; // null = pas de redécoupage à cette ère (entrée explicite "vide")
      out.push({ era: eraStr, type: r.type, text: r.text });
    });
    return out.sort((a, b) => +a.era - +b.era);
  }
  // Calcule la liste des bureaux comparables { ns, pctA, pctB, diff } pour le mode diff.

  function computeDiffBureauList(sheetA, selA, sheetB, selB) {
    const out = [];

    // zoomCmpToBureau qui cible les layers du côté affiché.
    const eraA = String((ELECTIONS[selA.elec] || {}).my || '');
    const eraB = String((ELECTIONS[selB.elec] || {}).my || '');
    const displaySide = (parseInt(eraB || '0') > parseInt(eraA || '0')) ? 'B' : 'A';

    const eraSelf = displaySide === 'A' ? eraA : eraB;
    const eraOther = displaySide === 'A' ? eraB : eraA;

      if (!dSelf) return;
      const nsOther = _crossEraNs(ns, eraSelf, eraOther);
      const dOther = nsOther ? sheetOther[nsOther] : null;
      if (!dOther) return;
      const sSelf = scoreOfSelInBureau(dSelf, selSelf);
      const sOther = scoreOfSelInBureau(dOther, selOther);
      if (!sSelf.present || !sOther.present) return;
      // pctA et pctB selon convention user (sB − sA reste la formule du delta).
      const pctA = displaySide === 'A' ? sSelf.pct : sOther.pct;
      const pctB = displaySide === 'B' ? sSelf.pct : sOther.pct;
      out.push({ ns, pctA, pctB, diff: pctB - pctA });
    });
    return out;
  }
  // Somme des voix ENTIÈRES (depuis data._voix) pour une sélection dans un bureau.
  // Source de vérité pour les agrégats — sommer des pcts arrondis introduit des
  // drifts de ±1 voix par bureau (cf. CLAUDE.md "PRINCIPE FONDAMENTAL").
  function sumVoixOfSelInBureau(data, sel) {
    const voix = data && data._voix;
    if (!voix) return 0;
    if (sel.type === 'candidat') return voix[sel.quoi] || 0;
    if (sel.type === 'bloc') {
      let sum = 0;
      Object.entries(voix).forEach(([cid, v]) => {
        const ci = candInfo(cid) || {};
        const b = (typeof BLOC_LEGACY !== 'undefined' && BLOC_LEGACY[ci.bk]) || ci.b || '?';
        if (b === sel.quoi) sum += v;
      });
      return sum;
    }
    if (sel.type === 'famille') {
      let sum = 0;
      Object.entries(voix).forEach(([cid, v]) => {
        const ci = candInfo(cid) || {};
        if (Array.isArray(ci.t) && ci.t.indexOf(sel.quoi) !== -1) sum += v;
      });
      return sum;
    }
    return 0;
  }
  // Agrégation par quartier (clé = quartier de l'ère de A, valeur brute).
  // Voix entières via _voix → pcts pondérés Σvoix/Σexprimés exact (pas de drift).
  // Pas de split sur '/' : "Laleu/La Pallice" est un nom de quartier complet, pas
  // un partage entre 2 quartiers (idem "Saint-Maurice/Port-Neuf" pour le bureau-frontière).
  // Quartier "Nul" (bureau 0057) exclu, idem quartiers vides.
  function computeDiffByQuartier(sheetA, selA, sheetB, selB) {
    const eraA = String((ELECTIONS[selA.elec] || {}).my || '');
    const eraB = String((ELECTIONS[selB.elec] || {}).my || '');
    // Itère depuis la map AFFICHÉE (la plus récente) → quartiers lus dans
    // BUREAU_INFO de cette ère. Cross-era pour récupérer le bureau correspondant
    // de l'autre côté.
    const displaySide = (parseInt(eraB || '0') > parseInt(eraA || '0')) ? 'B' : 'A';
    const eraSelf = displaySide === 'A' ? eraA : eraB;
    const eraOther = displaySide === 'A' ? eraB : eraA;
    const sheetSelf = displaySide === 'A' ? sheetA : sheetB;
    const sheetOther = displaySide === 'A' ? sheetB : sheetA;
    const selSelf = displaySide === 'A' ? selA : selB;
    const selOther = displaySide === 'A' ? selB : selA;
    const yi = BUREAU_INFO[eraSelf] || {};
    const agg = {}; // quartier → { voixA, eA, voixB, eB }
    Object.keys(yi).forEach(ns => {
      if (ns === '0057') return;
      const dSelf = sheetSelf[ns];
      if (!dSelf) return;
      const nsOther = _crossEraNs(ns, eraSelf, eraOther);
      const dOther = nsOther ? sheetOther[nsOther] : null;
      if (!dOther) return;
      const sSelf = scoreOfSelInBureau(dSelf, selSelf);
      const sOther = scoreOfSelInBureau(dOther, selOther);
      if (!sSelf.present || !sOther.present) return;
      const q = (yi[ns].q || '').trim();
      if (!q || q === 'Nul') return;
      if (!agg[q]) agg[q] = { voixA: 0, eA: 0, voixB: 0, eB: 0 };
      // Selon side affiché, dSelf/dOther correspondent à A ou B.
      const dA = displaySide === 'A' ? dSelf : dOther;
      const dB = displaySide === 'B' ? dSelf : dOther;
      agg[q].voixA += sumVoixOfSelInBureau(dA, selA);
      agg[q].eA    += dA.e || 0;
      agg[q].voixB += sumVoixOfSelInBureau(dB, selB);
      agg[q].eB    += dB.e || 0;
    });
    return Object.entries(agg).map(([q, a]) => {
      const pctA = a.eA > 0 ? (a.voixA / a.eA) * 100 : 0;
      const pctB = a.eB > 0 ? (a.voixB / a.eB) * 100 : 0;
      return { quartier: q, pctA, pctB, diff: pctB - pctA };
    });
  }
  // Rend le contenu de la drawer Diff. Appelée à l'entrée en mode diff et au swap.
  function renderDiffSidebar() {
    const root = document.getElementById('cmp-diff-drawer');
    if (!root || !_cmpState || _cmpState.scaleMode !== 'diff') return;
    const A = _cmpState.A, B = _cmpState.B;
    const sheetA = getSheetForSel(A), sheetB = getSheetForSel(B);
    // Bureaux comparables triés par diff (descendant pour B>A, ascendant pour B<A).
    const all = computeDiffBureauList(sheetA, A, sheetB, B);
    const topPos = [...all].sort((a, b) => b.diff - a.diff).slice(0, 5);
    const topNeg = [...all].sort((a, b) => a.diff - b.diff).slice(0, 5);
    // Quartiers triés par swing signé décroissant (gains B en haut, pertes B en bas).
    const byQuartier = computeDiffByQuartier(sheetA, A, sheetB, B)
      .sort((a, b) => b.diff - a.diff);
    // Helpers d'affichage
    const fmtSigned = d => (d >= 0.05 ? '+' : d <= -0.05 ? '−' : '') + Math.abs(d).toFixed(1).replace('.', ',') + '\xa0pts';
    const clsOf = d => d >= 0.05 ? 'pos' : d <= -0.05 ? 'neg' : 'neutral';
    // nameOfBureau lit l'ère du côté AFFICHÉ (le plus récent) car le `ns`
    // renvoyé par computeDiffBureauList est exprimé dans cette ère.
    const displaySideN = _cmpDisplaySide();
    const eraDisplay = String((ELECTIONS[_cmpState[displaySideN].elec] || {}).my || '');
    const nameOfBureau = ns => {
      return ((BUREAU_INFO[eraDisplay] || {})[ns] || {}).den || ('Bureau ' + parseInt(ns));
    };
    // Helper de rendu d'une ligne tornado. Factorisée pour le globalItem
    // (ligne "VILLE" qui ressort) et les items normaux (quartiers ou bureaux).
    // Split "23 · Nom" en prefix fixe + label marquee, pour que le numéro
    // reste figé pendant l'animation et que seul le nom du bureau défile.
    // Le `base` choisit le namespace de classes (tornado | dumbbell).
    function _cmpDiffNameHtml(name, base) {
      const SEP = '\xa0·\xa0';
      const idx = name.indexOf(SEP);
      if (idx < 0) {
        return '<span class="' + base + '-name">'
          + '<span class="' + base + '-name-inner">' + name + '</span>'
          + '</span>';
      }
      const prefix = name.slice(0, idx + SEP.length);
      const label  = name.slice(idx + SEP.length);
      return '<span class="' + base + '-name has-prefix">'
        + '<span class="' + base + '-name-prefix">' + prefix + '</span>'
        + '<span class="' + base + '-name-marquee">'
        +   '<span class="' + base + '-name-inner">' + label + '</span>'
        + '</span>'
        + '</span>';

    function renderTornadoRow(diff, name, options) {
      options = options || {};
      const isNeg = diff < 0;
      // 38 (et non 50) : on garde ~12 % de marge par côté pour que le texte
      // de valeur en bout de barre rentre sans déborder dans le cas "outside".
      const widthPct = Math.abs(diff) / options.maxAbs * 38;
      // Seuil "inside" : si la barre est ≥ 22 % de la zone bars (≈ 33-44 px
      // selon la largeur sidebar), la valeur tient à l'intérieur en blanc.
      const inOut = widthPct >= 22 ? 'inside' : 'outside';
      const onClick = options.onClick || '';
      const onEnter = options.onEnter || '';
      const onLeave = options.onLeave || '';
      const cls = 'cmp-diff-tornado-row'
        + (options.global ? ' cmp-diff-tornado-row-global' : '')
        + (onClick ? ' clickable' : '');

      // au-dessus de la ligne au hover (pas le tooltip natif lent et moche).
      const tooltipAttr = options.tooltip ? ' data-full-name="' + String(options.tooltip).replace(/"/g, '&quot;') + '"' : '';
      const handlers = (onClick ? ' onclick="' + onClick + '"' : '')
        + (onEnter ? ' onmouseenter="' + onEnter + '"' : '')
        + (onLeave ? ' onmouseleave="' + onLeave + '"' : '');
      return '<div class="' + cls + '"' + tooltipAttr + handlers + '>'
        + _cmpDiffNameHtml(name, 'cmp-diff-tornado')
        + '<div class="cmp-diff-tornado-bars">'
        + '<div class="cmp-diff-tornado-axis"></div>'
        + '<div class="cmp-diff-tornado-bar ' + (isNeg ? 'neg' : 'pos') + ' ' + inOut + '" style="width:' + widthPct.toFixed(2) + '%">'
        + '<span class="cmp-diff-tornado-value">' + fmtSigned(diff) + '</span>'
        + '</div></div></div>';
    }
    // Rend un tornado chart avec optionnellement une ligne "Ville" globale
    // INSÉRÉE dans le tri par delta signé (pas en tête). Cette ligne ressort
    // visuellement via la classe `cmp-diff-tornado-row-global` mais sa position
    // se lit comme une référence : où la ville se situe parmi les quartiers/bureaux.
    // hooks : { getOnEnter(q), getOnLeave(q) } pour le hover synchro carte/sidebar.
    function renderTornado(items, getName, getOnClick, globalItem, hooks) {
      hooks = hooks || {};
      if (!items.length && !globalItem) return '<div class="cmp-diff-empty">Pas de comparaison disponible.</div>';
      const merged = globalItem
        ? [...items, { diff: globalItem.diff, _name: globalItem.name, _isGlobal: true }]
        : [...items];
      merged.sort((a, b) => b.diff - a.diff);
      const maxAbs = Math.max(0.01, ...merged.map(q => Math.abs(q.diff)));

      let h = '<div class="' + containerClass + '">';

    // ── Dumbbell chart ────────────────────────────────────────────────────
    // Pour chaque item : axe horizontal (range dynamique min/max ± marge),
    // point de départ (score A, cercle gris), ligne vers le point d'arrivée
    // (score B, flèche), couleur selon le signe du delta.
    function renderDumbbellRow(pctA, pctB, name, options) {
      options = options || {};
      const diff = pctB - pctA;
      const isFlat = Math.abs(diff) < 0.05;
      const dirCls = isFlat ? 'neutral' : (diff < 0 ? 'neg' : 'pos');
      const range = options.axisMax - options.axisMin || 1;
      // PAD : marge réservée à chaque côté du track pour les labels A/B. La
      // donnée [axisMin, axisMax] est mappée dans [PAD, 100-PAD] % du track →
      // même au bord du range, les labels SIDE rentrent toujours sans clipper.
      const PAD = 14;
      const dataSpan = 100 - 2 * PAD;
      const leftA = Math.max(PAD, Math.min(100 - PAD, PAD + (pctA - options.axisMin) / range * dataSpan));
      const leftB = Math.max(PAD, Math.min(100 - PAD, PAD + (pctB - options.axisMin) / range * dataSpan));
      const connLeft = Math.min(leftA, leftB);
      const connWidth = Math.abs(leftB - leftA);
      const onClick = options.onClick || '';
      const onEnter = options.onEnter || '';
      const onLeave = options.onLeave || '';
      const cls0 = 'cmp-diff-dumbbell-row'
        + (options.global ? ' cmp-diff-dumbbell-row-global' : '')
        + (onClick ? ' clickable' : '');
      const tooltipAttr = options.tooltip ? ' data-full-name="' + String(options.tooltip).replace(/"/g, '&quot;') + '"' : '';
      const handlers = (onClick ? ' onclick="' + onClick + '"' : '')
        + (onEnter ? ' onmouseenter="' + onEnter + '"' : '')
        + (onLeave ? ' onmouseleave="' + onLeave + '"' : '');
      const fmtPct = v => v.toFixed(1).replace('.', ',') + '\xa0%';
      // Labels toujours sur la même ligne, côté extérieur de la connexion :
      //   pos → A à gauche du dot A, B à droite de la flèche B
      //   neg → A à droite, B à gauche
      // Le PAD ci-dessus garantit qu'ils ne clippent jamais — fini la logique `above`.
      const aClasses = 'cmp-diff-dumbbell-label cmp-diff-dumbbell-label-a ' + dirCls;
      const bClasses = 'cmp-diff-dumbbell-label cmp-diff-dumbbell-label-b ' + dirCls;
      return '<div class="' + cls0 + '"' + tooltipAttr + handlers + '>'
        + _cmpDiffNameHtml(name, 'cmp-diff-dumbbell')
        + '<div class="cmp-diff-dumbbell-track">'
        + '<div class="cmp-diff-dumbbell-conn ' + dirCls + '" style="left:' + connLeft.toFixed(2) + '%;width:' + connWidth.toFixed(2) + '%"></div>'
        + '<div class="cmp-diff-dumbbell-start" style="left:' + leftA.toFixed(2) + '%"></div>'
        + '<div class="cmp-diff-dumbbell-end ' + dirCls + '" style="left:' + leftB.toFixed(2) + '%"></div>'
        + '<span class="' + aClasses + '" style="left:' + leftA.toFixed(2) + '%">' + fmtPct(pctA) + '</span>'
        + '<span class="' + bClasses + '" style="left:' + leftB.toFixed(2) + '%">' + fmtPct(pctB) + '</span>'
        + '</div></div>';
    }
    function renderDumbbell(items, getName, getOnClick, globalItem, hooks) {
      hooks = hooks || {};
      if (!items.length && !globalItem) return '<div class="cmp-diff-empty">Pas de comparaison disponible.</div>';
      const merged = globalItem
        ? [...items, { pctA: globalItem.pctA, pctB: globalItem.pctB, diff: globalItem.diff, _name: globalItem.name, _isGlobal: true }]
        : [...items];

      merged.sort((a, b) => b.pctA - a.pctA);

      merged.forEach(q => { allPcts.push(q.pctA, q.pctB); });
      const margin = 2;
      const axisMin = Math.max(0, Math.min(...allPcts) - margin);

      //   1) Si la plage englobe 25/50/75 → on les utilise (priorité aux paliers
      //      historiques de scrutins).
      //   2) Sinon (cas typique : comparaison sur un petit score, 4-6 %), on
      //      tombe en fallback "nice ticks" — un step rond (1, 2, 5, 10, ...)
      //      calculé depuis la largeur de la plage pour qu'au moins UN repère

      const range = (axisMax - axisMin) || 1;
      const PAD_GUIDE = 14;
      const dataSpan = 100 - 2 * PAD_GUIDE;
      let guides = [50, 25, 75].filter(v => v >= axisMin && v <= axisMax);
      if (!guides.length) {
        const rawStep = range / 2;
        const expG = Math.pow(10, Math.floor(Math.log10(rawStep)));
        const f = rawStep / expG;
        const niceStep = f < 1.5 ? expG : f < 3 ? 2 * expG : f < 7 ? 5 * expG : 10 * expG;
        const startTick = Math.ceil(axisMin / niceStep) * niceStep;

          +  '</div>';

      // Wrapper .cmp-diff-dumbbell-rows isole les rows pour que :nth-child(even)
      // du zébré ne soit pas décalé par les guides (qui sont siblings du wrapper).
      let h = '<div class="' + containerClass + '">' + guidesHtml + '<div class="cmp-diff-dumbbell-rows">';
      merged.forEach(q => {
        if (q._isGlobal) {
          h += renderDumbbellRow(q.pctA, q.pctB, q._name, { axisMin, axisMax, global: true });

          h += renderDumbbellRow(q.pctA, q.pctB, getName(q), {
            axisMin, axisMax,
            onClick: getOnClick ? getOnClick(q) : '',
            onEnter: hooks.getOnEnter ? hooks.getOnEnter(q) : '',
            onLeave: hooks.getOnLeave ? hooks.getOnLeave(q) : '',
            tooltip: hooks.getTooltip ? hooks.getTooltip(q) : '',
          });
        }
      });
      h += '</div></div>';  // .cmp-diff-dumbbell-rows + .cmp-diff-dumbbell
      return h;
    }
    // ── Données ville pour le globalItem (pctA, pctB et delta). ───────────
    const scoreA = computeCityScore(sheetA, A);
    const scoreB = computeCityScore(sheetB, B);
    const globalItem = (typeof scoreA === 'number' && typeof scoreB === 'number')
      ? { pctA: scoreA, pctB: scoreB, diff: scoreB - scoreA, name: 'La Rochelle' }
      : null;
    // Tous les bureaux comparables triés par delta signé descendant (cohérent
    // avec le tri quartier : progressions en haut → reculs en bas).
    const allSorted = [...all].sort((a, b) => b.diff - a.diff);
    // Tornado (écart) — vues actuelles.
    const tornadoQuartier = renderTornado(byQuartier, q => q.quartier, null, globalItem);
    const tornadoBureau   = renderTornado(allSorted,
      r => parseInt(r.ns) + '\xa0·\xa0' + nameOfBureau(r.ns),
      r => "zoomCmpToBureau('" + r.ns + "')",
      globalItem,
      {
        containerClass: 'left',
        getOnEnter: r => "_cmpRowHover('" + r.ns + "')",
        getOnLeave: r => "_cmpRowUnhover('" + r.ns + "')",
        getTooltip: r => parseInt(r.ns) + ' · ' + nameOfBureau(r.ns),

    // Dumbbell (absolu) — nouvelles vues.
    const dumbbellQuartier = renderDumbbell(byQuartier, q => q.quartier, null, globalItem);
    const dumbbellBureau   = renderDumbbell(allSorted,
      r => parseInt(r.ns) + '\xa0·\xa0' + nameOfBureau(r.ns),
      r => "zoomCmpToBureau('" + r.ns + "')",
      globalItem,
      {
        containerClass: 'left',
        getOnEnter: r => "_cmpRowHover('" + r.ns + "')",
        getOnLeave: r => "_cmpRowUnhover('" + r.ns + "')",
        getTooltip: r => parseInt(r.ns) + ' · ' + nameOfBureau(r.ns),

    // Composition des panes : chaque tab contient les 2 vues (écart + absolu),
    // un seul est .on à la fois selon le sub-toggle.
    const paneQuartier = '<div class="cmp-diff-view on" data-mode="ecart">' + tornadoQuartier + '</div>'
      + '<div class="cmp-diff-view" data-mode="absolu">' + dumbbellQuartier + '</div>';
    const paneBureau = '<div class="cmp-diff-view on" data-mode="ecart">' + tornadoBureau + '</div>'

    // - Quartier actif par défaut (vue d'ensemble plus lisible)
    // - Écart actif par défaut (le tornado, vue habituelle "qui swing le +")
    let html = '<div class="cmp-diff-header">'
      +   '<div class="cmp-diff-tabs">'
      +     '<button data-tab="quartier" class="on" onclick="_cmpSwitchDiffTab(this)">Quartier</button>'
      +     '<button data-tab="bureau" onclick="_cmpSwitchDiffTab(this)">Bureau</button>'
      +   '</div>'
      +   '<div class="cmp-diff-header-actions">'
      +     '<div class="cmp-diff-subtoggle">'
      +       '<button data-mode="ecart" class="on" onclick="_cmpSwitchDiffMode(this)">Écart</button>'
      +       '<button data-mode="absolu" onclick="_cmpSwitchDiffMode(this)">Absolu</button>'
      +     '</div>'
      +     '<button class="cmp-diff-close" type="button" aria-label="Masquer les statistiques"'
      +     ' data-tooltip="Masquer" onclick="_cmpToggleDiffPanel(true)">✕</button>'
      +   '</div>'
      + '</div>'
      + '<div class="cmp-diff-body">'
      +   '<div class="cmp-diff-tab-pane on" data-pane="quartier">' + paneQuartier + '</div>'
      +   '<div class="cmp-diff-tab-pane" data-pane="bureau">' + paneBureau + '</div>'
      + '</div>';
    root.innerHTML = html;
  }
  // Bascule d'onglet dans la drawer Diff (déclaré global window car appelé via
  // onclick inline généré par innerHTML).
  window._cmpSwitchDiffTab = function(btn) {
    const tab = btn.getAttribute('data-tab');

    if (!root) return;
    root.querySelectorAll('.cmp-diff-tabs button').forEach(b => b.classList.toggle('on', b === btn));
    root.querySelectorAll('.cmp-diff-tab-pane').forEach(p => p.classList.toggle('on', p.getAttribute('data-pane') === tab));
  };

  window._cmpSwitchDiffMode = function(btn) {
    const mode = btn.getAttribute('data-mode');

    if (!root) return;
    root.querySelectorAll('.cmp-diff-subtoggle button').forEach(b => b.classList.toggle('on', b === btn));
    root.querySelectorAll('.cmp-diff-view').forEach(v => v.classList.toggle('on', v.getAttribute('data-mode') === mode));
  };

  window._cmpToggleDiffPanel = function(collapse) {

  // ─── Hint orientation (mobile portrait dans le drawer Diff) ──────────────
  // Dismiss persistant via localStorage. Clé partagée avec LRVanalyse → si
  // l'utilisateur a déjà fermé le hint dans Analyse, on ne le ressort pas ici.
  window.dismissCmpOrientationHint = function() {
    const el = document.getElementById('cmp-orientation-hint');

    try { localStorage.setItem('lrvote_orient_hint_dismissed', '1'); } catch(_) {}
  };
  // Au chargement, restaure l'état dismissed si l'utilisateur l'a déjà fermé.

    try {
      const persisted = localStorage.getItem('lrvote_orient_hint_dismissed') === '1';

        const el = document.getElementById('cmp-orientation-hint');
        if (el) el.classList.add('dismissed');

  // Drag de la fenêtre flottante par la barre titre. Délégation d'événement
  // au niveau document → survit aux re-renders d'innerHTML qui détruisent les
  // listeners attachés sur .cmp-diff-header.
  //   - On déclenche seulement si le mousedown est dans .cmp-diff-header ET

          + qs.map(q => '<span class="tt-quartier-dot" style="background:' + _quartierColor(q) + '"></span>' + _escapeSvg(q)).join(' / ')
          + '</div>'
        : '';
      tt.innerHTML = '<div class="tt-num">N° ' + parseInt(ns) + '</div>'
        + '<div class="tt-denom">' + _escapeSvg(cached.bureauDenom(ns)) + '</div>'
        + qsHtml
        + '<div class="tt-scores">A · ' + fmt(it.pctA) + ' <span style="opacity:.5">·</span> ' + _escapeSvg(labA) + '</div>'
        + '<div class="tt-scores">B · ' + fmt(it.pctB) + ' <span style="opacity:.5">·</span> ' + _escapeSvg(labB) + '</div>'
        + '<div class="tt-delta" style="color:' + deltaCol + '">Δ ' + deltaStr + '</div>';
      // Positionne le tooltip à côté du point dans le container, avec clamp pour
      // qu'il ne déborde jamais (à droite/à gauche/en bas/en haut). On lui pose
      // d'abord la position "par défaut" (à droite du point), on rend, on mesure,
      // puis on ajuste si nécessaire.
      const rect = el.getBoundingClientRect();
      const containerRect = document.getElementById('cmp-nuage').getBoundingClientRect();
      let xLocal = rect.left - containerRect.left + rect.width + 8;
      let yLocal = rect.top  - containerRect.top  - 4;
      tt.style.left = xLocal + 'px';
      tt.style.top  = yLocal + 'px';
      tt.classList.add('on');
      // Mesure après rendu (innerHTML déjà posé, classList.on rend l'élément visible
      // → offsetWidth/Height fiables). On clamp pour qu'aucun bord ne sorte.
      const ttW = tt.offsetWidth, ttH = tt.offsetHeight;
      const cW = containerRect.width, cH = containerRect.height;
      const PAD = 6;
      // Si déborde à droite → bascule à gauche du point (sinon clamp au bord).
      if (xLocal + ttW + PAD > cW) {
        const xLeft = rect.left - containerRect.left - ttW - 8;
        xLocal = (xLeft >= PAD) ? xLeft : Math.max(PAD, cW - ttW - PAD);
      }
      // Si déborde en bas → recale vers le haut.
      if (yLocal + ttH + PAD > cH) yLocal = Math.max(PAD, cH - ttH - PAD);
      // Garde-fou bords gauche/haut.
      if (xLocal < PAD) xLocal = PAD;
      if (yLocal < PAD) yLocal = PAD;
      tt.style.left = xLocal + 'px';
      tt.style.top  = yLocal + 'px';
    }
    // Mini-carte : illumine le polygone correspondant.
    if (_NuageCache.miniLayers && _NuageCache.miniLayers[ns]) {
      _NuageCache.miniLayers[ns].setStyle({ weight: 2.5, color: '#000', fillOpacity: 0.9 });
      if (_NuageCache.miniLayers[ns].bringToFront) _NuageCache.miniLayers[ns].bringToFront();
    }
    // Style hover du point lui-même.
    el.setAttribute('stroke-width', '2');
    el.setAttribute('stroke', '#000');
  };
  window._nuageUnhover = function(el) {
    const tt = document.getElementById('cmp-nuage-tooltip');
    if (tt) tt.classList.remove('on');
    const ns = el.getAttribute('data-ns');
    if (ns && _NuageCache.miniLayers && _NuageCache.miniLayers[ns]) {
      // Reset au style "actif" du polygone.
      _NuageCache.miniLayers[ns].setStyle(_NuageCache.miniLayers[ns]._cmpBaseStyle);
    }
    el.setAttribute('stroke-width', '0.8');
    el.setAttribute('stroke', 'rgba(0,0,0,0.25)');
  };
  // Mini-carte Leaflet — créée à l'entrée en mode nuage, détruite à la sortie.
  function setupNuageMiniMap(eraB, items) {
    const container = document.getElementById('cmp-nuage-mini-map');
    if (!container || typeof L === 'undefined') return;
    // Nettoie l'ancienne si elle existe.
    if (_NuageCache.miniMap) {
      _NuageCache.miniMap.remove();
      _NuageCache.miniMap = null;
      _NuageCache.miniLayers = null;
    }
    const geo = (typeof MAPS_DATA !== 'undefined') ? MAPS_DATA[eraB] : null;
    if (!geo) return;
    const map = L.map(container, {
      zoomControl: false, attributionControl: false,
      dragging: false, scrollWheelZoom: false, doubleClickZoom: false,
      touchZoom: false, boxZoom: false, keyboard: false,
      tap: false,
    });
    _NuageCache.miniMap = map;
    _NuageCache.miniLayers = {};
    const presentNs = new Set(items.map(it => it.ns));
    // Couleur d'un bureau dans la mini-carte : couleur du 1er quartier validé.
    function miniColorFor(ns) {
      if (!presentNs.has(ns)) return '#cccccc';
      const info = (BUREAU_INFO[eraB] || {})[ns];
      const parts = _quartierPartsForEra((info && info.q) || '', eraB);
      return parts.length ? _quartierColor(parts[0]) : '#cccccc';
    }
    const layer = L.geoJSON(geo, {
      style: feat => {
        const ns = numStr(feat);
        const present = presentNs.has(ns);
        return {
          color: '#666', weight: 0.5,
          fillColor: miniColorFor(ns),
          fillOpacity: present ? 0.45 : 0.15,
        };
      },
      onEachFeature: (feat, lyr) => {
        const ns = numStr(feat);
        _NuageCache.miniLayers[ns] = lyr;
        lyr._cmpBaseStyle = {
          color: '#666', weight: 0.5,
          fillColor: miniColorFor(ns),
          fillOpacity: presentNs.has(ns) ? 0.45 : 0.15,
        };
      },
    }).addTo(map);
    map.fitBounds(layer.getBounds(), { padding: [4, 4] });
  }
  // Cleanup mode nuage (sortie ou exitComparison).
  function cleanupNuage() {
    const svg = document.getElementById('cmp-nuage-svg');
    if (svg) svg.innerHTML = '';
    const tt = document.getElementById('cmp-nuage-tooltip');
    if (tt) { tt.classList.remove('on'); tt.innerHTML = ''; }
    const footer = document.getElementById('cmp-nuage-footer');
    if (footer) { footer.classList.remove('on'); footer.textContent = ''; }
    if (_NuageCache.miniMap) {
      try { _NuageCache.miniMap.remove(); } catch (_) {}
      _NuageCache.miniMap = null;
      _NuageCache.miniLayers = null;
    }
    _NuageCache.lastRender = null;
  }
  // Zoom sur un bureau de la map diff (action déclenchée par clic dans la sidebar).
  // Cible la map affichée (la plus récente), pas systématiquement A.
  window.zoomCmpToBureau = function(ns) {
    if (!_cmpState) return;
    const displaySide = _cmpDisplaySide();
    const layers = _cmpState['layers' + displaySide];
    const map = _cmpState['map' + displaySide];
    if (!layers || !map) return;
    const layer = layers[ns];
    if (!layer) return;
    if (layer.getBounds && map.fitBounds) {
      map.fitBounds(layer.getBounds(), { padding: [30, 30], maxZoom: 16 });
    }
    if (layer.openTooltip) setTimeout(() => layer.openTooltip(), 250);
  };

  // Hover/leave d'une ligne bureau dans la drawer Diff : reproduit le hover
  // sur la map du côté affiché (tooltip Leaflet + mid-bar mis à jour), pour
  // que le user voit le bureau actif d'un coup d'œil sans bouger la souris.
  window._cmpRowHover = function(ns) {
    if (!_cmpState) return;
    // En mobile (portrait OU paysage), on ne déclenche ni tooltip Leaflet (caché
    // par CSS) ni mid-bar quand on tape une ligne du graph — éviterait un flash
    // visuel sans valeur.
    if (window.matchMedia && window.matchMedia('(max-width: 480px), (orientation: landscape) and (max-height: 500px)').matches) return;
    const displaySide = _cmpDisplaySide();
    const layers = _cmpState['layers' + displaySide];
    if (!layers) return;
    const layer = layers[ns];
    if (!layer) return;
    if (layer.openTooltip) layer.openTooltip();
    if (typeof updateCmpMidBar === 'function') {
      updateCmpMidBar(ns, layer.feature, displaySide);
    }
  };
  window._cmpRowUnhover = function(ns) {
    if (!_cmpState) return;
    if (window.matchMedia && window.matchMedia('(max-width: 480px), (orientation: landscape) and (max-height: 500px)').matches) return;
    const displaySide = _cmpDisplaySide();
    const layers = _cmpState['layers' + displaySide];
    if (!layers) return;
    const layer = layers[ns];
    if (!layer) return;
    if (layer.closeTooltip) layer.closeTooltip();
    if (typeof hideCmpMidBar === 'function') hideCmpMidBar();
  };

  // Couleurs des pôles diff (cohérent avec --bg-delta-pos/neg utilisés ailleurs).
  // Rouge = B < A (l'avantage est côté A), Vert = B > A (avantage côté B).
  const _DIFF_COLOR_POS = '#1F7A1F'; // vert (B > A)
  const _DIFF_COLOR_NEG = '#A52525'; // rouge (B < A)
  // Retourne le range effectif pour un côté donné, selon le mode courant.
  function effectiveRangeFor(side) {
    if (!_cmpState) return { min: 0, max: 0 };
    if (_cmpState.scaleMode === 'relative') {
      return side === 'A' ? _cmpState.rangeA : _cmpState.rangeB;
    }
    return { min: _cmpState.minG, max: _cmpState.maxG };
  }

  // Initialise une map Leaflet (côté A ou B) avec :
  //   • tiles CartoCDN, fitBounds LR, animations zoom OFF (sync inter-cartes)
  //   • polygones bureaux colorés en choroplèthe (range lu via effectiveRangeFor)
  //   • tooltip enrichi : numéro/dénomination + tag "pct % · rang/total"
  // Paramètres :
  //   - containerId  : id du div hôte
  //   - sel          : { elec, tour, type, quoi } sélection de ce côté
  //   - side         : 'A' ou 'B' (pour effectiveRangeFor, qui dépend du mode courant)
  function initCmpMap(containerId, sel, side) {
    const elecData = ELECTIONS[sel.elec] || {};
    const era = String(elecData.my || '2026');
    const geojson = (era === '2026' || (typeof CURRENT_ERA !== 'undefined' && era === CURRENT_ERA))
      ? GEOJSON
      : (MAPS_DATA && MAPS_DATA[era]) || GEOJSON;
    const m = L.map(containerId, {
      center: [46.1597, -1.190], zoom: 13.5, zoomSnap: 0.1, zoomControl: false,
      attributionControl: false,
      // Anim désactivées pour que la sync inter-cartes soit instantanée
      // (sinon l'event `zoom` ne fire qu'en fin d'animation = effet différé)
      zoomAnimation: false, fadeAnimation: false, markerZoomAnimation: false,
    });
    // Tiles claires ou sombres selon le thème du site (data-theme="dark" sur <html>,
    // toggle manuel via localStorage — cohérent avec la map principale).
    // La ref est stockée sur la map (m._cmpTileLayer) pour qu'un MutationObserver
    // puisse swap au toggle de thème en cours de session.
    function buildTileLayer() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const url = isDark
        ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png'
        : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png';
      return L.tileLayer(url, { maxZoom: 19, subdomains: 'abcd' });
    }
    m._cmpTileLayer = buildTileLayer().addTo(m);
    m._cmpRebuildTiles = function() {
      if (m._cmpTileLayer) { try { m.removeLayer(m._cmpTileLayer); } catch(_) {} }
      m._cmpTileLayer = buildTileLayer().addTo(m);
    };
    const LR = L.latLngBounds(L.latLng(46.133, -1.230), L.latLng(46.193, -1.135));
    m.fitBounds(LR, { padding: [20, 20] });
    m.setMaxBounds(LR.pad(0.7));
    m.options.maxBoundsViscosity = 1.0;
    m.setMinZoom(11.5);
    // Mémoise les bounds initiales pour pouvoir y revenir au sortir du mode
    // Nuage (où les cartes sont display:none → invalidateSize sur container 0×0
    // peut casser le zoom level).
    m._cmpInitialBounds = LR;

    // ── Choroplèthe : sheet, baseColor, et style par bureau ──
    const sheet = getSheetForSel(sel);
    const baseColor = baseColorOfSel(sel);
    // Style d'un feature en fonction de sa donnée bureau.
    function styleOf(feature) {
      const ns = numStr(feature);
      const data = sheet[ns];
      // Pas de data dans ce sheet (ex. cantonale hors canton, ou bureau non utilisé
      // dans cette ère) → contour gris clair, semi-transparent.
      if (!data) return { fillColor: '#eee', fillOpacity: 0.3, color: '#bbb', weight: 0.5 };
      const { pct, present } = scoreOfSelInBureau(data, sel);
      // Mode "diff" : sur la carte A on affiche la DIFFÉRENCE B-A par bureau,
      // avec un gradient bicolore (rouge = B<A, vert = B>A, blanc = égalité).
      // Map B est masquée (cf. CSS body.is-cmp-diff). On exige A ET B présents.
      // Mode diff : la map AFFICHÉE est celle de la plus récente des 2 ères.
      // styleOf ne colorie en diff que sur cette map (l'autre est cachée par CSS).
      // Le delta affiché reste B − A (orientation choisie via les sélections).
      const displaySideS = (typeof _cmpDisplaySide === 'function') ? _cmpDisplaySide() : 'A';
      if (_cmpState && _cmpState.scaleMode === 'diff' && side === displaySideS) {
        if (!present) return { fillColor: '#ddd', fillOpacity: 0.4, color: '#fff', weight: 1 };
        const otherSide = side === 'A' ? 'B' : 'A';
        const otherSel = _cmpState[otherSide];
        const sheetOther = getSheetForSel(otherSel);
        const eraOther = String((ELECTIONS[otherSel.elec] || {}).my || '');
        const nsOther = _crossEraNs(ns, era, eraOther);
        const dOther = nsOther ? sheetOther[nsOther] : null;
        if (!dOther) return { fillColor: '#ddd', fillOpacity: 0.4, color: '#fff', weight: 1 };
        const sOther = scoreOfSelInBureau(dOther, otherSel);
        if (!sOther.present) return { fillColor: '#ddd', fillOpacity: 0.4, color: '#fff', weight: 1 };
        // delta = scoreB − scoreA (formule invariante). On reconstitue les scores
        // selon le côté affiché : `pct` est le score du côté affiché, `sOther.pct`
        // est le score de l'autre, on les place dans A et B selon `side`.
        const scoreA = side === 'A' ? pct : sOther.pct;
        const scoreB = side === 'B' ? pct : sOther.pct;
        const diff = scoreB - scoreA;
        const maxAbs = Math.max(0.01, _cmpState.diffMaxAbs || 1);
        const t = Math.max(-1, Math.min(1, diff / maxAbs));
        // Bicolore : t<0 → rouge avec intensité |t|, t>0 → vert, t≈0 → blanc.
        const pole = t >= 0 ? _DIFF_COLOR_POS : _DIFF_COLOR_NEG;
        const fill = blendToWhite(pole, Math.max(0.05, Math.abs(t)));
        return { fillColor: fill, fillOpacity: 0.85, color: '#fff', weight: 1 };
      }
      if (!present) return { fillColor: '#ddd', fillOpacity: 0.4, color: '#fff', weight: 1 };
      // Range lu depuis _cmpState selon le mode courant (absolu ou relatif).
      // Permet de basculer le mode sans rebuilder les layers — il suffit d'appeler
      // geo.setStyle(styleOf) pour recolorer (cf. switchScaleMode).
      const { min, max } = effectiveRangeFor(side);
      const range = max - min;
      const t = range > 0 ? (pct - min) / range : 0.5;
      return { fillColor: blendToWhite(baseColor, Math.max(0.08, Math.min(1, t))), fillOpacity: 0.85, color: '#fff', weight: 1 };
    }

    // Tooltip enrichi : header numéro + dénomination + tag pct % + rang.
    function tooltipOf(feature) {
      const ns = numStr(feature);
      const data = sheet[ns];
      // Dénomination = nom du lieu de vote (ex. "La Rossignolette–Saintonge"),
      // pas le "nom officiel" du bureau (ex. "Laleu"). On lit BUREAU_INFO[era].den
      // pour l'ère de la sélection — pas du geojson qui est figé sur l'ère courante.
      const eraInfo = (BUREAU_INFO[era] || BUREAU_INFO[CURRENT_ERA] || {})[ns] || {};
      const denom = eraInfo.den || (feature.properties || {}).denomination || ('Bureau ' + parseInt(ns));
      const header = '<div style="min-width:150px">'
        + '<div style="font-size:0.7rem;font-weight:700;color:var(--text-meta);margin-bottom:2px">Bureau n°' + parseInt(ns) + '</div>'
        + '<div style="font-size:0.82rem;font-weight:700;color:var(--text-modal);margin-bottom:7px">' + denom + '</div>';
      // Mode diff (sur la map affichée = la plus récente) : tooltip SIMPLIFIÉ —
      // juste delta + badge "bureau modifié". Les scores A/B détaillés sont dans
      // le mid-bar central (cf. cmp-mid-bar) pour éviter la duplication.
      const displaySideT = (typeof _cmpDisplaySide === 'function') ? _cmpDisplaySide() : 'A';
      if (_cmpState && _cmpState.scaleMode === 'diff' && side === displaySideT) {
        const otherSideT = side === 'A' ? 'B' : 'A';
        const sheetOther = getSheetForSel(_cmpState[otherSideT]);
        const eraA = String((ELECTIONS[_cmpState.A.elec] || {}).my || '');
        const eraB = String((ELECTIONS[_cmpState.B.elec] || {}).my || '');
        const eraOther = side === 'A' ? eraB : eraA;
        const nsOther = _crossEraNs(ns, era, eraOther);
        const dOther = nsOther ? sheetOther[nsOther] : null;
        const sSelf = data ? scoreOfSelInBureau(data, sel) : { present: false };
        const sOther = dOther ? scoreOfSelInBureau(dOther, _cmpState[otherSideT]) : { present: false };
        // Reconstitue sA et sB selon le côté affiché (la formule delta=B−A reste).
        const sA = side === 'A' ? sSelf : sOther;
        const sB = side === 'B' ? sSelf : sOther;
        const b2026 = _resolveB2026FromHist(ns, era);
        const mods = bureauModifBetween(b2026, eraA, eraB);
        // Badge "Bureau modifié" — type le plus "fort" rencontré entre A et B.
        let modifBlock = '';
        if (mods.length) {
          const rank = { creation: 3, majeur: 2, mineur: 1 };
          const strongest = mods.reduce((a, m) => (rank[m.type] || 0) > (rank[a] || 0) ? m.type : a, '');
          const badgeLabel = _REDEC_LABELS[strongest] || 'Bureau modifié';
          modifBlock = '<div style="margin-top:6px">'
            + '<span style="background:#FFE5B4;color:#7A4A00;font-weight:800;padding:2px 7px;border-radius:4px;font-size:0.7rem">⚠ ' + badgeLabel + '</span>'
            + '</div>';
        }
        if (!sA.present || !sB.present) {
          return header
            + '<span style="background:#aaa;color:#fff;font-size:0.68rem;font-weight:700;padding:3px 8px;border-radius:4px;white-space:nowrap">Pas de comparaison</span>'
            + modifBlock
            + '</div>';
        }
        const diff = sB.pct - sA.pct;
        const sign = diff >= 0.05 ? '+' : (diff <= -0.05 ? '−' : '');
        const cls = diff >= 0.05 ? 'pos' : (diff <= -0.05 ? 'neg' : 'neutral');
        const bg = cls === 'pos' ? '#D4EFD4' : cls === 'neg' ? '#F7D4D4' : '#eee';
        const fg = cls === 'pos' ? '#0F5F0F' : cls === 'neg' ? '#8B1414' : '#666';
        return header
          + '<span style="background:' + bg + ';color:' + fg + ';font-weight:800;padding:3px 9px;border-radius:5px;font-size:0.78rem;display:inline-block">'
          + sign + Math.abs(diff).toFixed(1).replace('.', ',') + '\xa0pts'
          + '</span>'
          + modifBlock
          + '</div>';
      }
      if (!data) return header + '<div style="font-size:0.7rem;color:var(--text-meta)">Pas de scrutin dans ce bureau</div></div>';
      const { pct, present } = scoreOfSelInBureau(data, sel);
      const label = shortLabelOfSel(sel);
      if (!present) {
        return header + '<span style="background:#aaa;color:#fff;font-size:0.68rem;font-weight:700;padding:3px 8px;border-radius:4px;white-space:nowrap">' + label + '\xa0·\xa0Pas de candidat</span></div>';
      }
      const { rank, total } = rankOfSelInBureau(data, sel);
      const bg = (sel.type === 'candidat' && typeof dotBackground === 'function')
        ? dotBackground(sel.quoi)
        : baseColor;
      const ordSuffix = rank > 0 ? ('\xa0·\xa0' + (rank === 1 ? '1<sup>er</sup>' : rank + '<sup>e</sup>') + '/' + total) : '';
      const tag = '<span style="background:' + bg + ';color:' + pickTextColorForBg(baseColor) + ';font-size:0.68rem;font-weight:700;padding:3px 8px;border-radius:4px;white-space:nowrap">' + label + '\xa0' + pct.toFixed(1) + '\xa0%' + ordSuffix + '</span>';
      return header + tag + '</div>';
    }

    // Index { bureau → layer } pour la synchro hover et highlight depuis légende.
    const layersByNs = {};
    const geoLayer = L.geoJSON(geojson, {
      style: styleOf,
      onEachFeature: function(feature, layer) {
        const ns = numStr(feature);
        layersByNs[ns] = layer;
        // sticky=false : tooltip positionné sur le centroïde du polygone
        // (déterministe, identique des 2 côtés ; sticky le ferait suivre le curseur).
        layer.bindTooltip(tooltipOf(feature), { sticky: false, direction: 'top', className: 'cmp-tooltip' });
      },
    }).addTo(m);
    // Permet à toggleCmpScale de reconstruire les tooltips au switch de mode.
    m._cmpRebuildTooltipFor = function(layer) {
      if (!layer || !layer.feature) return;
      layer.unbindTooltip();
      layer.bindTooltip(tooltipOf(layer.feature), { sticky: false, direction: 'top', className: 'cmp-tooltip' });
    };
    // Cleanup tooltips au mouvement (même pattern que la map principale) :
    //  1) Classe .map-is-moving sur le container → CSS masque .leaflet-tooltip-pane.
    //  2) tooltipopen pendant le mouvement → close immédiat.
    //  3) Triple cleanup différé en fin de mouvement (immédiat, 50ms, 200ms) pour
    //     catcher les tooltips ajoutés par Leaflet après moveend.
    let _isMoving = false;
    function cleanupTooltips() {
      try { geoLayer.eachLayer(l => { if (l.closeTooltip) l.closeTooltip(); }); } catch (_) {}
      const container = m.getContainer();
      if (container) container.querySelectorAll('.leaflet-tooltip').forEach(el => { if (el.parentNode) el.parentNode.removeChild(el); });
    }
    function setMoving(moving) {
      _isMoving = moving;
      const container = m.getContainer();
      if (container) container.classList.toggle('map-is-moving', moving);
      if (moving) {
        cleanupTooltips();
      } else {
        cleanupTooltips();
        setTimeout(cleanupTooltips, 50);
        setTimeout(cleanupTooltips, 200);
      }
    }
    m.on('movestart zoomstart', () => setMoving(true));
    m.on('moveend zoomend',     () => setMoving(false));
    m.on('tooltipopen', e => { if (_isMoving && e.tooltip && e.tooltip.close) e.tooltip.close(); });
    return { map: m, layers: layersByNs, geo: geoLayer };
  }

  // Touche Échap pour fermer
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && el('compare-modal') && el('compare-modal').classList.contains('open')) {
      closeCompareModal();
    }
  });
})();

// ── INIT ──────────────────────────────────────────────────────────────────────
updateTourUI();
updateFooter();

// Tooltip JS pour les boutons de tour T1/T2/TU sur écrans étroits.
// Posé en position:fixed pour contourner l'overflow:hidden de #sidebar.
// Tooltip maison pour la bannière du Comparateur — délégation sur tout élément
// avec [data-tooltip]. Position:fixed pour éviter les soucis de overflow/clipping.
// On réutilise le même style que #tour-btn-tip pour la cohérence visuelle.
(function setupCmpBannerTooltip() {
  let tipEl = null;
  function ensureTip() {
    if (tipEl) return tipEl;
    tipEl = document.createElement('div');
    tipEl.id = 'tour-btn-tip'; // même id = même style (économise un set de règles CSS)
    document.body.appendChild(tipEl);
    return tipEl;
  }
  function show(target) {
    const txt = target.getAttribute('data-tooltip');
    if (!txt) return;
    const r = target.getBoundingClientRect();
    const tip = ensureTip();
    tip.textContent = txt;
    tip.style.left = (r.left + r.width / 2) + 'px';
    // Si l'élément est dans la bulle légende (en bas de l'écran), on positionne
    // le tooltip AU-DESSUS pour éviter qu'il déborde sous la fenêtre.
    // Ailleurs (bannière, topbar) : en dessous comme avant.
    const above = !!target.closest('.cmp-legend');
    if (above) {
      // On force un layout pour récupérer offsetHeight après set du textContent.
      tip.style.visibility = 'hidden';
      tip.classList.add('show');
      const h = tip.offsetHeight;
      tip.style.top = (r.top - h - 6) + 'px';
      tip.style.visibility = '';
    } else {
      tip.style.top = (r.bottom + 6) + 'px';
      tip.classList.add('show');
    }
  }
  function hide() { if (tipEl) tipEl.classList.remove('show'); }
  // Délégation : tout élément [data-tooltip] dans les zones Comparateur (bannière,
  // légende, et le bouton Quitter en topbar). Limite le scope pour ne pas
  // intercepter d'autres data-tooltip ailleurs sur la page.
  const SCOPE = '.cmp-banner [data-tooltip], .cmp-legend [data-tooltip], #tb-cmp-exit[data-tooltip]';
  document.addEventListener('mouseover', e => { const t = e.target.closest(SCOPE); if (t) show(t); });
  document.addEventListener('mouseout',  e => { if (e.target.closest(SCOPE)) hide(); });
  document.addEventListener('focusin',   e => { const t = e.target.closest(SCOPE); if (t) show(t); });
  document.addEventListener('focusout',  e => { if (e.target.closest(SCOPE)) hide(); });
})();

// ─── URL state ─────────────────────────────────────────────────────────────
// Encode l'état complet de l'UI dans le hash pour permettre le partage de liens profonds.
// Rétro-compatible : les hashes existants (election/tour/bureau/quartier) continuent de marcher.
let _urlStateInit = false;        // évite d'écrire le hash pendant la lecture initiale
let _urlStateRaf = 0;             // throttle via requestAnimationFrame
function writeURLState() {
  if (!_urlStateInit) return;
  if (_urlStateRaf) return;
  _urlStateRaf = requestAnimationFrame(() => {
    _urlStateRaf = 0;
    const params = new URLSearchParams();
    // Mode Comparateur : si actif, on encode A/B et on COURT-CIRCUITE le reste
    // (les params de la map principale ne sont plus pertinents dans ce contexte).
    const cmp = (typeof window.getCmpState === 'function') ? window.getCmpState() : null;
    if (cmp && cmp.A && cmp.B) {
      params.set('compare', '1');
      params.set('cA_e', cmp.A.elec); params.set('cA_t', cmp.A.tour);
      params.set('cA_y', cmp.A.type); params.set('cA_q', cmp.A.quoi);
      params.set('cB_e', cmp.B.elec); params.set('cB_t', cmp.B.tour);
      params.set('cB_y', cmp.B.type); params.set('cB_q', cmp.B.quoi);
      if (cmp.scaleMode && cmp.scaleMode !== 'absolute') params.set('cmode', cmp.scaleMode);
      const newHashCmp = params.toString();
      const desiredCmp = newHashCmp ? location.pathname + location.search + '#' + newHashCmp : location.pathname + location.search;
      try { history.replaceState(null, '', desiredCmp); } catch(_) {}
      if (typeof updateAnalyseLink === 'function') updateAnalyseLink();
      return;
    }
    // Élection / tour : toujours sérialisés pour partage explicite
    if (currentElection) params.set('election', currentElection);
    if (currentSheet && currentSheet !== 'T1') params.set('tour', currentSheet);
    // Mode de coloration de la carte
    if (currentMapMode && currentMapMode !== 'candidat') params.set('mode', currentMapMode);
    // Sélection choroplèthe (candidat ou bloc)
    if (currentMapSelection) params.set('selection', currentMapSelection);
    // État de l'overlay (fiche ouverte)
    const ov = document.getElementById('overlay');
    const ovOpen = ov && ov.style.display !== 'none';
    if (ovOpen) {
      if (overlayTab === 'bureau' && currentFeature) {
        params.set('bureau', numStr(currentFeature));
      } else if (overlayTab === 'quartier') {
        // Fallback : si currentQuartier null, récupérer depuis le currentFeature
        let q = currentQuartier;
        if (!q && currentFeature && typeof bureauInfo === 'function' && typeof getQuartierParts === 'function') {
          const info = bureauInfo(currentFeature);
          const parts = getQuartierParts(info.quartier || '');
          if (parts.length) q = parts[0];
        }
        if (q) params.set('quartier', q);
      } else if (overlayTab === 'canton' && currentCanton) {
        params.set('canton', currentCanton);
      } else if (overlayTab === 'global') {
        params.set('tab', 'global');
      }
    }
    const newHash = params.toString();
    const target = newHash ? '#' + newHash : location.pathname + location.search;
    const desired = newHash ? location.pathname + location.search + '#' + newHash : location.pathname + location.search;
    if (location.href.split('#')[0] + (newHash ? '#' + newHash : '') !== location.href) {
      try { history.replaceState(null, '', desired); } catch(_) {}
    }
    // Met à jour aussi le lien "L'analyse" pour qu'il transmette le bureau/quartier
    // courant à la page d'analyse (sens inverse du lien existant analyse→carte).
    updateAnalyseLink();
  });
}

// Met à jour le href du lien "L'analyse" en y ajoutant le hash correspondant à
// la fiche actuellement ouverte (bureau ou quartier). Permet à l'utilisateur de
// passer sur la page d'analyse en gardant son contexte.

  const a = document.getElementById('tb-link-analyse');

// Lecture du hash (#bureau=XXXX ou #quartier=NomDuQuartier) — vient depuis la page analyse.
// On reste sur l'élection courante (la plus récente) et on ouvre directement la fiche.
(function applyHashSelection(){
  const hash = (location.hash || '').replace(/^#/, '');
  // On marquera _urlStateInit = true à la fin, qu'il y ait un hash ou non
  if (!hash) { _urlStateInit = true; writeURLState(); return; }
  const params = new URLSearchParams(hash);
  // ── Mode Comparateur : si le hash contient compare=1, on rentre directement
  // en mode split-view avec les sélections A/B. Court-circuite tout le reste
  // (on n'ouvre pas de fiche/bureau/quartier — la map principale est masquée).
  if (params.get('compare') === '1') {
    const A = { elec: params.get('cA_e'), tour: params.get('cA_t'), type: params.get('cA_y'), quoi: params.get('cA_q') };
    const B = { elec: params.get('cB_e'), tour: params.get('cB_t'), type: params.get('cB_y'), quoi: params.get('cB_q') };
    // cmode : 'relative' | 'diff' | absent (= 'absolute' par défaut, non sérialisé).
    const cmode = params.get('cmode');
    // Petit délai pour laisser la map principale s'initialiser (loadMap n'est pas
    // bloqué par notre return, donc on attend qu'il pose les globales currentX).
    setTimeout(() => {
      if (typeof window.activateComparisonFromState === 'function') {
        if (window.activateComparisonFromState(A, B) && (cmode === 'relative' || cmode === 'diff' || cmode === 'nuage')) {
          // Init en absolute par défaut → bascule vers le mode demandé.
          window.toggleCmpScale(cmode);
        }
      }
      _urlStateInit = true;
    }, 120);
    return;
  }
  const bid = params.get('bureau');
  const qname = params.get('quartier');
  const elec = params.get('election');
  const tour = params.get('tour');
  let mode = params.get('mode');
  const selection = params.get('selection');
  const tab = params.get('tab');
  // Bascule d'élection si demandé (avant ouverture du fiche)
  if (elec && ELECTIONS[elec]) {
    currentElection = elec;
    const _sel = document.getElementById('el-select'); if (_sel) _sel.value = elec;
    const newSheets = Object.keys(ELECTIONS[elec].sheets || {});
    if (tour && newSheets.includes(tour)) currentSheet = tour;
    else if (newSheets.includes('T1')) currentSheet = 'T1';
    else if (newSheets.includes('TU')) currentSheet = 'TU';
    updateTourUI(); updateFooter(); updateTopbar(); loadMap();
    updateModeButtonsAvailability();
    // Rafraîchir la sidebar globale avec la nouvelle élection (sinon elle garde le preview
    // de l'élection initiale au reload — sera écrasée plus loin si une fiche est ouverte).
    renderGlobal();
  }
  // Mode de coloration
  if (mode && ['candidat','bloc','abstention','bv'].includes(mode)) {
    // Sécurité reload : si le mode hash est "bloc" mais l'élection est un référendum, on tombe sur "candidat".
    if (mode === 'bloc' && typeof isReferendum === 'function' && isReferendum(currentElection)) {
      mode = 'candidat';
    }
    currentMapMode = mode;
    document.querySelectorAll('.mmbtn').forEach(b => b.classList.toggle('on', b.textContent.toLowerCase().startsWith(mode === 'candidat' ? 'cand' : mode === 'bloc' ? 'bloc' : mode === 'abstention' ? 'abst' : 'blanc')));
  }
  // Sélection choroplèthe (appliquée après loadMap pour avoir mainLayer)
  // Délai léger pour laisser le map et le DOM se stabiliser
  setTimeout(() => {
    if (selection && (currentMapMode === 'candidat' || currentMapMode === 'bloc')) {
      currentMapSelection = selection;
      [currentSelectionMin, currentSelectionMax] = computeSelectionRange();
    }
    // Ré-appliquer style + légende avec le mode courant (et la sélection si active).
    // Important pour les modes abstention/bv au reload : mainLayer a été créé en mode 'candidat'
    // par défaut, il faut le restyler avec le mode lu dans l'URL.
    if (mainLayer) mainLayer.setStyle(featureStyle);
    renderMapLegend();
    if (bid) {
      const gj = getMapGeoJSON();
      // Priorité au match DIRECT dans l'ère affichée : `bureau=XXXX` dans le hash
      // désigne le numéro de bureau dans l'ère de l'élection courante (c'est ce
      // que produisent daily-capture et l'analyse). Le fallback via `b2026`
      // (projection vers la numérotation 2026) ne sert que quand quelqu'un partage
      // un lien construit avec un numéro 2026 vers une élection d'une autre ère.
      // ──
      // Avant : on essayait b2026 d'abord, ce qui ouvrait le MAUVAIS bureau quand
      // l'hash venait de daily-capture sur une élection ancienne (ex. bureau=0003
      // pour Législatives 2012 ouvrait le bureau qui était n°4 en 2012 mais
      // renuméroté 0003 en 2026, donc texte du tweet ≠ image générée).
      const feat = gj.features.find(f => numStr(f) === bid)
                || gj.features.find(f => f.properties.b2026 === bid);
      if (feat) {
        currentFeature = feat;
        overlayTab = 'bureau';
        const info = bureauInfo(feat);
        document.getElementById('ov-title').textContent = isAggNs(numStr(feat)) ? 'Bureaux agrégés — ' + info.quartier : 'Fiche bureau — ' + info.denomination;
        setOverlayDisplay('flex');
        renderFiche(feat);
        // Sidebar en mode "liste de bureaux" (cohérent avec openOverlay() — pas de preview du bureau actuel)
        showBureauListSidebar();
        updateAccentColor();
        // Génère les onglets « Le quartier : XXX » en haut de fiche (sinon ils manquent au reload).
        updateOverlayTabs();
      }
    } else if (tab === 'global') {
      // Ouvrir directement la fiche globale (cohérent avec openGlobalOverlay)
      overlayTab = 'global';
      currentFeature = null;
      document.getElementById('ov-title').textContent = 'La Rochelle — Résultats globaux';
      document.getElementById('ov-tabs').style.display = 'none';
      setOverlayDisplay('flex');
      if (typeof renderGlobalFiche === 'function') renderGlobalFiche();
      showBureauListSidebar();
      updateAccentColor();
    } else if (qname) {
      // Construire un currentFeature « factice » via le 1er bureau du quartier
      const yearInfo = BUREAU_INFO[CURRENT_ERA] || {};
      const ids = Object.entries(yearInfo)
        .filter(([, b]) => getQuartierParts(b.q || '').includes(qname))
        .map(([id]) => id);
      if (ids.length) {
        const gj = getMapGeoJSON();
        const feat = gj.features.find(f => numStr(f) === ids[0]);
        if (feat) {
          currentFeature = feat;
          openOverlayQuartierNamed(qname);
        }
      }
    } else {
      // #canton=X : ouvrir directement la fiche canton via selectCantonFromList.
      // On le traite en dernier car les autres hooks (bureau/quartier/global) sont
      // plus fréquents — le canton est plus rare.
      const cname = params.get('canton');
      if (cname) selectCantonFromList(cname);
    }
    // Activation de l'écriture du hash après lecture initiale
    _urlStateInit = true;
    writeURLState();
  }, 50);
})();

// ─── Visite guidée (moteur générique) ────────────────────────────────────
(function setupTourEngine(){
  // Injecte le CSS du tour
  const css = '.tour-spot{position:fixed;border-radius:6px;box-shadow:0 0 0 9999px rgba(0,0,0,.55);pointer-events:none;z-index:10100;transition:all .3s cubic-bezier(.33,0,.4,1)}'
    + '.tour-back{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:10100;pointer-events:none}'
    + '.tour-card{position:fixed;background:var(--bg-modal);border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,.28);max-width:380px;width:calc(100vw - 32px);padding:18px 20px;z-index:10200;font-family:Space Grotesk,system-ui,sans-serif;transition:all .3s cubic-bezier(.33,0,.4,1);opacity:0}'
    + '.tour-card.visible{opacity:1}'
    + '.tour-step-num{font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#B49B7E;margin-bottom:6px}'
    + '.tour-card h3{font-size:1.05rem;font-weight:700;margin-bottom:8px;color:var(--text-modal);letter-spacing:-.01em}'
    + '.tour-card p{font-size:.86rem;line-height:1.55;color:var(--text-modal);margin-bottom:14px}'
    + '.tour-card kbd{display:inline-block;background:var(--bg-modal-hover);border:1px solid var(--border-modal);border-radius:3px;padding:1px 5px;font-family:inherit;font-size:.78rem;color:var(--text-modal);font-weight:600}'
    + '.tour-actions{display:flex;gap:6px;justify-content:flex-end;align-items:center;flex-wrap:wrap}'
    + '.tour-actions button{background:none;border:1px solid transparent;border-radius:6px;padding:6px 12px;font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .12s;white-space:nowrap}'
    + '.tour-actions .skip{color:var(--text-modal-muted);margin-right:auto;padding-left:0}'
    + '.tour-actions .skip:hover{color:var(--text-modal)}'
    + '.tour-actions .prev{color:var(--text-modal-muted);border-color:var(--border-modal)}'
    + '.tour-actions .prev:hover{background:var(--bg-modal-hover);color:var(--text-modal)}'
    + '.tour-actions .next,.tour-actions .finish{background:#1A1A1A;color:#fff}'
    + '.tour-actions .next:hover,.tour-actions .finish:hover{background:#2A2A2A}'
    + '.tour-actions .cta{background:#B49B7E;color:#fff}'
    + '.tour-actions .cta:hover{background:#9F876B}';
  const styleEl = document.createElement('style');
  styleEl.textContent = css;
  document.head.appendChild(styleEl);

  function placeCard(card, rect, placement){
    const cw = card.offsetWidth, ch = card.offsetHeight;
    const vw = window.innerWidth, vh = window.innerHeight;
    let x, y;
    if (!rect || placement === 'center') {
      x = (vw - cw) / 2; y = (vh - ch) / 2;
    } else {
      const gap = 14;
      switch (placement) {
        case 'top':    x = rect.left + rect.width/2 - cw/2; y = rect.top - ch - gap; break;
        case 'left':   x = rect.left - cw - gap; y = rect.top + rect.height/2 - ch/2; break;
        case 'right':  x = rect.right + gap; y = rect.top + rect.height/2 - ch/2; break;
        case 'bottom':
        default:       x = rect.left + rect.width/2 - cw/2; y = rect.bottom + gap; break;
      }
    }
    // Clamp dans le viewport
    x = Math.max(12, Math.min(x, vw - cw - 12));
    y = Math.max(12, Math.min(y, vh - ch - 12));
    card.style.left = x + 'px';
    card.style.top  = y + 'px';
  }

  window.startGuidedTour = function(steps, opts) {
    opts = opts || {};
    if (!steps || !steps.length) return;
    let i = 0, finished = false;

    const back = document.createElement('div'); back.className = 'tour-back';
    const spot = document.createElement('div'); spot.className = 'tour-spot'; spot.style.display = 'none';
    const card = document.createElement('div'); card.className = 'tour-card';
    document.body.appendChild(back);
    document.body.appendChild(spot);
    document.body.appendChild(card);

    function destroy(skipped){
      if (finished) return;
      finished = true;
      back.remove(); spot.remove(); card.remove();
      document.removeEventListener('keydown', onKey);
      window.removeEventListener('resize', onResize);
      if (opts.tourId) {
        try { localStorage.setItem('lrvote_tour_' + opts.tourId + '_seen', '1'); } catch(_) {}
      }
      if (!skipped && opts.onFinish) opts.onFinish();
    }
    function next(){ if (i < steps.length - 1) { i++; show(); } else destroy(false); }
    function prev(){ if (i > 0) { i--; show(); } }
    function skip(){ destroy(true); }

    // Calcule le rect englobant — gère cible unique, liste de cibles, et padding optionnel
    function resolveTargetRect(target, pad) {
      if (!target) return null;
      const sels = Array.isArray(target) ? target : [target];
      const rects = [];
      sels.forEach(s => document.querySelectorAll(s).forEach(el => rects.push(el.getBoundingClientRect())));
      if (!rects.length) return null;
      let base;
      if (rects.length === 1) {
        const r = rects[0];
        base = { left: r.left, top: r.top, right: r.right, bottom: r.bottom, width: r.width, height: r.height };
      } else {
        let l = Infinity, t = Infinity, r = -Infinity, b = -Infinity;
        rects.forEach(rc => {
          l = Math.min(l, rc.left); t = Math.min(t, rc.top);
          r = Math.max(r, rc.right); b = Math.max(b, rc.bottom);
        });
        base = { left: l, top: t, right: r, bottom: b, width: r-l, height: b-t };
      }
      if (pad) {
        if (pad.top)    { base.top    -= pad.top;    base.height += pad.top;    }
        if (pad.bottom) {                            base.height += pad.bottom; }
        if (pad.left)   { base.left   -= pad.left;   base.width  += pad.left;   }
        if (pad.right)  {                            base.width  += pad.right;  }
        base.right  = base.left + base.width;
        base.bottom = base.top  + base.height;
      }
      return base;
    }
    function show(){
      const step = steps[i];
      // Setup hook (peut modifier le DOM avant le rendu)
      if (step.setup) { try { step.setup(); } catch(_) {} }
      requestAnimationFrame(() => render(step));
    }
    function render(step){
      const isLast = i === steps.length - 1;
      const rect = (step.placement !== 'center') ? resolveTargetRect(step.target, step.targetPad) : null;

      // Spotlight
      if (rect) {
        const pad = 0;
        spot.style.display = 'block';
        spot.style.left   = (rect.left - pad) + 'px';
        spot.style.top    = (rect.top - pad) + 'px';
        spot.style.width  = (rect.width + pad*2) + 'px';
        spot.style.height = (rect.height + pad*2) + 'px';
        back.style.display = 'none';
      } else {
        spot.style.display = 'none';
        back.style.display = 'block';
      }

      // Card content
      const total = steps.length;
      const cta = step.finalCta || opts.finalCta;
      let actionsHtml = '<div class="tour-actions">';
      actionsHtml += '<button class="skip" data-act="skip">Passer</button>';
      if (i > 0) actionsHtml += '<button class="prev" data-act="prev">‹ Précédent</button>';
      if (isLast && cta) {
        actionsHtml += '<button class="finish" data-act="finish">Terminer</button>';
        actionsHtml += '<button class="cta" data-act="cta">' + cta.label + '</button>';
      } else if (isLast) {
        actionsHtml += '<button class="finish" data-act="finish">Terminer</button>';
      } else {
        actionsHtml += '<button class="next" data-act="next">Suivant ›</button>';
      }
      actionsHtml += '</div>';

      card.innerHTML = '<div class="tour-step-num">Étape ' + (i+1) + ' / ' + total + '</div>'
        + '<h3>' + step.title + '</h3>'
        + '<p>' + step.body + '</p>'
        + actionsHtml;

      // Position
      placeCard(card, rect, step.placement || 'bottom');
      requestAnimationFrame(() => card.classList.add('visible'));

      // Bind actions
      card.querySelectorAll('[data-act]').forEach(b => {
        b.addEventListener('click', () => {
          const act = b.dataset.act;
          if (act === 'next') next();
          else if (act === 'prev') prev();
          else if (act === 'skip') skip();
          else if (act === 'finish') destroy(false);
          else if (act === 'cta' && cta) {
            // Mark as seen, then navigate
            if (opts.tourId) {
              try { localStorage.setItem('lrvote_tour_' + opts.tourId + '_seen', '1'); } catch(_) {}
            }
            if (cta.href) location.href = cta.href;
          }
        });
      });
    }
    function onKey(e){
      if (e.key === 'Escape') skip();
      else if (e.key === 'ArrowRight') next();
      else if (e.key === 'ArrowLeft') prev();
    }
    function onResize(){
      if (i < steps.length) {
        const step = steps[i];
        const rect = (step.placement !== 'center') ? resolveTargetRect(step.target, step.targetPad) : null;
        if (rect) {
          const pad = 0;
          spot.style.left = (rect.left - pad) + 'px';
          spot.style.top  = (rect.top - pad) + 'px';
          spot.style.width  = (rect.width + pad*2) + 'px';
          spot.style.height = (rect.height + pad*2) + 'px';
        }
        placeCard(card, rect, step.placement || 'bottom');
      }
    }
    document.addEventListener('keydown', onKey);
    window.addEventListener('resize', onResize);
    show();
  };
})();

// ─── Visite guidée : étapes pour LRVcarte ────────────────────────────────
(function setupTourCarte(){
  const STEPS = [

(function setupShareModal(){
  const css = '#share-modal{position:fixed;inset:0;display:none;z-index:10500;font-family:Space Grotesk,system-ui,sans-serif}'
    + '#share-modal.open{display:block}'
