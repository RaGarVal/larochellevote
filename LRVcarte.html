function setOverlayAccent(color){
  var tb=document.getElementById('ov-topbar');if(!tb)return;
  // Reset systématique de l'état bicolor (au cas où on bascule entre 2 fiches).
  tb.classList.remove('ov-topbar-bicolor');
  tb.style.removeProperty('--ov-acc-c1');
  tb.style.removeProperty('--ov-acc-c2');
  if(!color){tb.style.borderBottomColor='transparent';tb.style.background='#fff';return;}
  // Cas bicolor : array [c1, c2] (binôme à 2 vrais partis). On désactive la
  // border-bottom uniforme et on active le pseudo-element ::after via la classe.
  // Le tint background reste basé sur c1 pour rester sobre (un dégradé tinté serait
  // visuellement chargé sur 44px de hauteur de topbar).
  if (Array.isArray(color)) {
    var c1 = color[0], c2 = color[1];
    tb.classList.add('ov-topbar-bicolor');
    tb.style.setProperty('--ov-acc-c1', c1);
    tb.style.setProperty('--ov-acc-c2', c2);
    tb.style.borderBottomColor = 'transparent';
    var r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
    tb.style.background='rgba('+r1+','+g1+','+b1+',0.08)';
    return;
  }
  var r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
  tb.style.borderBottomColor=color;tb.style.background='rgba('+r+','+g+','+b+',0.08)';
}
function updateAccentColor(){
  if(document.getElementById('overlay').style.display==='none'){setOverlayAccent(null);return;}
  if(overlayTab==='bureau'){
    // sailColorForWinner gère le cas binôme à 2 vrais partis (retourne [c1, c2]).
    var _bdat = currentFeature ? getBureauData(numStr(currentFeature)) : null;
    setOverlayAccent(_bdat && _bdat.w ? sailColorForWinner(_bdat.w) : null);
  } else if(overlayTab==='quartier'){
    // Agréger les bureaux du quartier pour trouver le gagnant
    var el0=ELECTIONS[currentElection];var mapYear=String(el0?el0.my:2026);
    var yearInfo=BUREAU_INFO[mapYear]||BUREAU_INFO[CURRENT_ERA]||{};
    var q=currentQuartier||(currentFeature?(getQuartierParts(bureauInfo(currentFeature).quartier||'')[0]||''):'');
    var shData=getSheetData();var candTotV={};var totE=0;
    Object.keys(yearInfo).forEach(function(ns){
      if(getQuartierParts(yearInfo[ns].q||'').indexOf(q)<0)return;
      var d=shData[ns];if(!d)return;
      totE+=d.e||0;Object.entries(d.c||{}).forEach(function(kv){candTotV[kv[0]]=(candTotV[kv[0]]||0)+kv[1]*(d.e||0)/100;});
    });
    var winner=Object.entries(candTotV).sort(function(a,b){return b[1]-a[1];})[0];
    setOverlayAccent(winner&&totE>0?sailColorForWinner(winner[0]):null);
  } else if(overlayTab==='global'){
    var shData2=getSheetData();var candTotV2={};var totE2=0;
    Object.values(shData2).forEach(function(d){if(!d)return;totE2+=d.e||0;Object.entries(d.c||{}).forEach(function(kv){candTotV2[kv[0]]=(candTotV2[kv[0]]||0)+kv[1]*(d.e||0)/100;});});
    var winner2=Object.entries(candTotV2).sort(function(a,b){return b[1]-a[1];})[0];
    setOverlayAccent(winner2&&totE2>0?sailColorForWinner(winner2[0]):null);
  } else if(overlayTab==='canton'){
    // Agrégation des bureaux du canton courant pour trouver le gagnant.
    var el0c=ELECTIONS[currentElection];var mapYearC=String(el0c?el0c.my:CURRENT_ERA);
    var yearInfoC=BUREAU_INFO[mapYearC]||BUREAU_INFO[CURRENT_ERA]||{};
    var shDataC=getSheetData();var candTotVC={};var totEC=0;
    Object.keys(yearInfoC).forEach(function(ns){
      if(String(yearInfoC[ns].c||'')!==String(currentCanton))return;
      var d=shDataC[ns];if(!d)return;
      totEC+=d.e||0;Object.entries(d.c||{}).forEach(function(kv){candTotVC[kv[0]]=(candTotVC[kv[0]]||0)+kv[1]*(d.e||0)/100;});
    });
    var winnerC=Object.entries(candTotVC).sort(function(a,b){return b[1]-a[1];})[0];
    setOverlayAccent(winnerC&&totEC>0?sailColorForWinner(winnerC[0]):null);
  }
}
function openCandFloat(btn,titleStr,bodyHtml){
  var fl=document.getElementById('cand-float');
  var body=document.getElementById('cand-float-body');
  body.innerHTML=bodyHtml;
  var sig=btn.closest?btn.closest('.sig-block'):null;
  if(!sig){var t=btn;while(t&&!t.classList.contains('sig-block'))t=t.parentNode;sig=t;}
  if(sig){var sr=sig.getBoundingClientRect();fl.style.position='fixed';fl.style.left=sr.left+'px';fl.style.top=sr.top+'px';fl.style.width=sr.width+'px';fl.style.height=sr.height+'px';fl.style.maxHeight=sr.height+'px';}
  fl.style.display='flex';
  document.getElementById('cand-float-overlay').style.display='block';
  // #cand-float est hors de #ov-body, donc le MutationObserver de
  // adjustCandNameAbbreviation ne le voit pas. On appelle la cascade
  // explicitement (après l'affichage, sinon les éléments ont offsetTop/Height
  // à 0 et la détection wrap rate). requestAnimationFrame suffit : à ce point
  // le layout est posé.
  requestAnimationFrame(() => {
    if (typeof adjustCandNameAbbreviation === 'function') adjustCandNameAbbreviation(body);
  });
}

  var elB=document.getElementById('sb-bureau-list');

  var elC=document.getElementById('sb-canton-list');
  // Élection cantonale : la fiche quartier est suspendue (ambiguïté quartier × canton).

  var isCantonal = (typeof isCantonalElection === 'function') && isCantonalElection(currentElection);

  //   quartier → bureaux + quartiers ouvertes (50/50), cantons fermée
  //   canton   → bureaux + cantons ouvertes (50/50), quartiers fermée
  function setState(b, q, c) {
    elB.classList.toggle('expanded', b);  elB.classList.toggle('collapsed', !b);
    elQ.classList.toggle('expanded', q);  elQ.classList.toggle('collapsed', !q);

// Toggle individuel d'une liste de la sidebar (bureau/quartier/canton).
// Règle : on peut avoir 1 à 3 listes ouvertes en même temps. Si on essaie
// de fermer la SEULE qui reste ouverte → on ouvre la suivante par défaut
// (bureau si on ferme quartier/canton, quartier si on ferme bureau).
function toggleSbList(type){
  var els = {
    bureau:   document.getElementById('sb-bureau-list'),
    quartier: document.getElementById('sb-quartier-list'),
    canton:   document.getElementById('sb-canton-list'),
  };
  if (!els[type]) return;
  var openCount = ['bureau','quartier','canton'].filter(t => els[t] && els[t].classList.contains('expanded')).length;
  var nowOpen = els[type].classList.contains('expanded');
  if (nowOpen && openCount === 1) {
    // C'est la seule ouverte → on n'autorise pas à fermer sans en réouvrir une autre
    var fallback = type === 'bureau' ? 'quartier' : 'bureau';
    if (els[fallback]) {
      els[fallback].classList.remove('collapsed'); els[fallback].classList.add('expanded');
      els[type].classList.remove('expanded'); els[type].classList.add('collapsed');
    }
    return;
  }
  // Toggle normal
  if (nowOpen) {
    els[type].classList.remove('expanded'); els[type].classList.add('collapsed');
  } else {
    els[type].classList.remove('collapsed'); els[type].classList.add('expanded');
  }
}

function elecType(label) { return label.split(' ')[0]; }
// Helper : retourne {prev, next} pour la navigation entre scrutins du même type.
// Si l'élection courante a une `serie` (cantonales avec renouvellement partiel,
// série A = cantons 1/3/4/5/6 ; série B = 2/7/8/9), on filtre pour rester dans
// la même série — sinon la nav pointerait vers un scrutin où les cantons en
// jeu sont disjoints (placeholder gris trompeur).
function _adjacentElections(currentLabel, currentCantonId) {
  const curType = elecType(currentLabel);
  const curYear = parseInt(currentLabel.match(/\d{4}$/) || [0]);
  const curEl = ELECTIONS[currentLabel] || {};
  const curSerie = curEl.serie || null;
  // Pour les cantonales-like (incluant partielles au singulier), on regroupe
  // Cantonale/Cantonales/Départementale/Départementales dans une seule famille
  // via isCantonalElection. Sinon on s'en tient à elecType (1er mot).
  let sameType;
  if (typeof isCantonalElection === 'function' && isCantonalElection(currentLabel)) {
    sameType = Object.keys(ELECTIONS)
      .filter(l => l !== currentLabel && isCantonalElection(l))
      .sort((a, b) => parseInt(a.match(/\d{4}$/)) - parseInt(b.match(/\d{4}$/)));
  } else {
    sameType = allElecOfType(curType).filter(l => l !== currentLabel);
  }
  // Filtre série : on garde les scrutins sans série OU de la même série (sinon les
  // cantonales A vs B auraient des cantons disjoints). Aligné sur tools/build-scrutins.js.
  if (curSerie) sameType = sameType.filter(l => !(ELECTIONS[l] || {}).serie || (ELECTIONS[l] || {}).serie === curSerie);
  // Sur une fiche canton : on saute les scrutins multi-canton qui ne couvrent pas
  // `currentCantonId` (typiquement les partielles n'incluant qu'un autre canton),
  // pour pointer vers le vrai voisin pertinent — sinon le triptyque restait vide.
  const hasCanton = function(l) {
    if (!currentCantonId) return true;
    const e = ELECTIONS[l];
    if (!e || !e.par_canton) return true;
    return !!e.par_canton[currentCantonId];
  };
  return {
    prev: sameType.filter(l => parseInt(l.match(/\d{4}$/)) < curYear && hasCanton(l)).pop(),
    next: sameType.find(l => parseInt(l.match(/\d{4}$/)) > curYear && hasCanton(l)),
  };
}
// Note : pour la fiche BUREAU, la nav prev/next est inlinée dans renderBlocTriptych
// (avec recherche du 1er voisin valide qui a des données pour CE bureau), pas via
// ce helper — d'où l'absence d'une variante _adjacentElectionsForBureau ici.
function allElecOfType(type) {
  // Draft : on exclut les scrutins marqués `draft: true` du flux public
  // (navigation, comparateur, triptyque, etc.). Le test isDraftElection
  // protège aussi les HISTORIQUE qui pourraient référencer un label draft.
  const isDraft = (typeof isDraftElection === 'function') ? isDraftElection : (() => false);
  const s = new Set(Object.keys(ELECTIONS).filter(l => elecType(l) === type && !isDraft(l)));
  Object.values(HISTORIQUE).forEach(arr => arr.forEach(r => { if(elecType(r.l)===type && !isDraft(r.l)) s.add(r.l); }));
  return [...s].sort((a,b) => parseInt(a.match(/\d{4}$/)) - parseInt(b.match(/\d{4}$/)));
}

function isAggNs(ns) { return /^\d{4}-\d{2}$/.test(ns); }
function aggNumList(ns) {
  const from = parseInt(ns.slice(0,4));
  const to = parseInt(ns.slice(0,2) + ns.slice(5,7));

function fmtAggNums(nums) {

}
// Cache pour la résolution inverse (era + bureauId historique → b2026).
// BUREAU_CORRESPONDANCES est la source de vérité (donnees.js), pas le champ
// b2026 des GeoJSON (qui peut être faussement identique au numéro historique
// pour les anciens fichiers — cf. bug Cité des Géraniums 1992).
const _b2026Cache = new Map();
function _resolveB2026FromHist(bureauId, era) {
  const key = era + '|' + bureauId;
  if (_b2026Cache.has(key)) return _b2026Cache.get(key);
  let found = bureauId; // fallback : on garde l'ID brut si pas de mapping
  if (typeof BUREAU_CORRESPONDANCES !== 'undefined') {
    for (const b2026 of Object.keys(BUREAU_CORRESPONDANCES)) {
      const corr = BUREAU_CORRESPONDANCES[b2026];
      if (!corr || typeof corr !== 'object') continue;
      const ref = corr[era];
      if (ref === bureauId) { found = b2026; break; }
      if (Array.isArray(ref)) {
        const hit = ref.some(r => (typeof r === 'string' ? r : r && r.id) === bureauId);
        if (hit) { found = b2026; break; }
      }
    }
  }
  _b2026Cache.set(key, found);
  return found;
}

// Helper: convert GeoJSON geometry outer ring(s) to Leaflet [lat,lng] hole arrays
function geomToHoles(geometry) {
  const rings = [];
  if (geometry.type === 'Polygon') {
    rings.push(geometry.coordinates[0].map(c => [c[1], c[0]]));
  } else if (geometry.type === 'MultiPolygon') {
    geometry.coordinates.forEach(poly => rings.push(poly[0].map(c => [c[1], c[0]])));
  }
  return rings;
}

// Inverse-mask: big world rect with holes for selected area(s)
// Selected zones appear clear (street map visible), rest is greyed
function addInverseMask(map, holeRings, color) {
  const outer = [[85, -180], [85, 180], [-85, 180], [-85, -180]];
  // Colored border on each hole ring
  holeRings.forEach(ring => {
    L.polygon([ring], { fillOpacity: 0, color: color, weight: 2.5, opacity: 0.9 }).addTo(map);
  });
  // Grey overlay with holes cut out
  L.polygon([outer, ...holeRings], {
    fillColor: '#555', fillOpacity: 0.38,
    stroke: false
  }).addTo(map);
}

function initMinimap(feature, winCol) {

// ── CANTON OVERLAY ────────────────────────────────────────────────────────────
// Fiche canton : agrège tous les bureaux du canton sélectionné (currentCanton)
// pour l'élection courante. Pattern calqué sur renderQuartier.
function renderCanton(){
  const cid = currentCanton;
  if (!cid) {
    document.getElementById('ov-body').innerHTML = '<div style="padding:20px;color:var(--text-meta)">Canton non sélectionné.</div>';
    return;
  }
  const el0 = ELECTIONS[currentElection];
  const mapYear = String(el0 ? el0.my : CURRENT_ERA);
  const yearInfo = BUREAU_INFO[mapYear] || BUREAU_INFO[CURRENT_ERA] || {};
  const cantonEra = (typeof getCantonEraForElection === 'function') ? getCantonEraForElection(currentElection) : CURRENT_ERA_CANTON;
  const cantonsMeta = ((typeof CANTON_INFO !== 'undefined' && CANTON_INFO[cantonEra]) || {}).cantons || {};
  const cantonName = (cantonsMeta[cid] || {}).name || ('La Rochelle-' + cid);
  // Bureaux du canton pour cette ère
  const bureauNums = Object.keys(yearInfo).filter(ns => String(yearInfo[ns].c || '') === String(cid));
  const shData = getSheetData();
  // En cantonale, le canton est la référence — pas de "vs canton" sur la fiche canton elle-même.
  // Pour les élections non-cantonales, on garde la comparaison canton vs ville (pertinente).
  const cityAvg = (typeof isCantonalElection === 'function' && isCantonalElection(currentElection)) ? {} : cityAverage();
  let totI=0, totE=0, totAbst=0, totBn=0;
  const candTotV = {};       // float accumulé via pct*e/100 (legacy, gardé pour cAvg)
  const candTotVoix = {};    // entier exact sommé depuis _voix par bureau
  bureauNums.forEach(ns2 => {
    const d = shData[ns2]; if (!d) return;
    const abst_nb = Math.round((d.i||0)*(d.a||0)/100);
    totI += d.i||0; totE += d.e||0; totAbst += abst_nb; totBn += d.bn||0;
    Object.entries(d.c || {}).forEach(([k,v]) => { candTotV[k] = (candTotV[k]||0) + v*(d.e||0)/100; });
    if (d._voix) {
      Object.entries(d._voix).forEach(([k,v]) => { candTotVoix[k] = (candTotVoix[k]||0) + v; });
    }
  });
  const cAvg = {};
  // Recalcule cAvg depuis les voix entières quand disponibles (précis), sinon depuis candTotV.
  Object.entries(candTotV).forEach(([k,v]) => {
    const vExact = candTotVoix[k];
    cAvg[k] = vExact != null
      ? +(vExact/Math.max(totE,1)*100).toFixed(1)
      : +(v/Math.max(totE,1)*100).toFixed(1);
  });
  const cWinner = Object.entries(cAvg).sort((a,b) => b[1]-a[1])[0];
  const cWinCol = cWinner ? colorOfCandidate(cWinner[0]) : '#ccc';
  const abst_pct = totI > 0 ? +(totAbst/totI*100).toFixed(1) : 0;
  // Quartiers présents dans le canton (pour affichage en métadonnée)
  const quartiersSet = new Set();
  bureauNums.forEach(ns2 => {
    const i0 = yearInfo[ns2];
    if (i0 && i0.q) getQuartierParts(i0.q).forEach(q => quartiersSet.add(q));
  });
  const quartiersList = [...quartiersSet].sort();
  // Header
  let h = '<div class="fiche-id">'
    + ficheSail(sailColorForWinner(cWinner && cWinner[0]), false)
    + '<div class="fiche-text">'
    + '<div class="fiche-num">Canton</div><div class="fiche-name">'+formatDenomination(cantonName)+'</div>'
    + '<div class="fiche-meta">'
    +   '<span><strong>Bureaux</strong> '+bureauNums.length+'</span>'
    +   '<span><strong>Inscrits</strong> '+totI.toLocaleString('fr-FR')+'</span>'
    +   (quartiersList.length ? '<span><strong>Quartier'+(quartiersList.length>1?'s':'')+'</strong> '+quartiersList.join(', ')+'</span>' : '')
    + '</div>'
    + '</div>'
    + '</div>';
  // Avertissement spécifique aux cantons historiques (ère 1985) qui débordaient
  // sur les communes voisines. Les chiffres affichés ne couvrent que la partie
  // rochelaise (bureaux La Rochelle).
  const _alertes1985 = {
    '5': 'Le canton La Rochelle-5 (1985) comprenait aussi les communes de Puilboreau, Saint-Xandre, Marsilly et Esnandes. Cette page ne présente que la totalisation de la partie rochelaise du canton.',
    '8': 'Le canton La Rochelle-8 (1985) comprenait aussi les communes de Périgny et Dompierre-sur-Mer. Cette page ne présente que la totalisation de la partie rochelaise du canton.',
    '9': 'Le canton La Rochelle-9 (1985) comprenait aussi les communes de L\'Houmeau, Lagord et Nieul-sur-Mer. Cette page ne présente que la totalisation de la partie rochelaise du canton.',
  };
  if (String(cantonEra) === '1985' && _alertes1985[String(cid)]) {
    h += '<div style="background:#fff8e1;border:1px solid #ffe082;border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:0.72rem;color:#7a6000;line-height:1.5">'
      + '<strong>Avertissement</strong> — ' + _alertes1985[String(cid)]
      + '</div>';
  }
  if (totE > 0) {
    const cData = { c: cAvg, _voix: candTotVoix, e: totE, w: cWinner ? cWinner[0] : null, i: totI, a: abst_pct, bn: totBn };
    let sig = '<div class="sig-block">';
    if (typeof isReferendum === 'function' && isReferendum(currentElection)) {
      const qRef = (ELECTIONS[currentElection] || {}).q || '';
      if (qRef) sig += '<div class="ref-question">' + qRef + '</div>';
    }
    // En cantonale/départementale : pas de badges meilleur/pire canton. Un binôme ne se
    // présente que dans son canton donc il a mécaniquement le meilleur ET le pire score
    // parmi les cantons (un seul canton renseigné) — badge sans valeur informative.
    // On passe un extr vide pour neutraliser isBest/isWorst dans candRow et renderDuel.
    const extrForCanton = (typeof isCantonalElection === 'function' && isCantonalElection(currentElection))
      ? { best: {}, worst: {} }
      : getExtremesByCanton();
    sig += renderCandidates(cData, cid, cityAvg, extrForCanton, false, 'canton');
    sig += '</div>';
    const abst_nb_tot = Math.round(totI*abst_pct/100);
    const blancsPct = (totI-abst_nb_tot) > 0 ? +(totBn*100/(totI-abst_nb_tot)).toFixed(1) : 0;
    h += '<div class="fiche-section-participation" style="margin-bottom:14px">'+particiHTML(totI, abst_pct, abst_nb_tot, blancsPct, totBn, totE)+'</div>';
    h += '<div class="split"><div id="mm-wrap"></div>'+sig+'</div>';
    {
      // renderBlocTriptychQuartier gère elle-même les référendums
      // (duo Oui/Non pour 1992/2005, vide pour 2000).
      const _btc = renderBlocTriptychQuartier(cData, bureauNums, cid);
      if (_btc) h += '<div class="fiche-section-blocs" style="margin-bottom:18px"><div class="sec-ttl">Blocs politiques</div>'+_btc+'</div>';
    }
  } else {
    h += '<div style="padding:12px;color:var(--text-meta);font-style:italic">Données non disponibles pour ce scrutin dans ce canton.</div>';
  }
  // Liste des bureaux du canton
  h += '<div class="fiche-section-bureaux-list" style="margin-bottom:18px"><div class="sec-ttl">Bureaux du canton</div>';
  h += '<div style="display:flex;align-items:center;gap:10px;padding:4px 10px;margin-bottom:2px">'
    +'<span style="font-size:0.6rem;font-weight:700;color:var(--text-meta);width:28px;flex-shrink:0">N°</span>'
    +'<span style="font-size:0.6rem;font-weight:700;color:var(--text-meta);flex:1">Dénomination</span>'
    +'<span style="font-size:0.6rem;font-weight:700;color:var(--text-meta);width:68px;text-align:right;flex-shrink:0">Abstention</span>'
    +'<span style="font-size:0.6rem;font-weight:700;color:var(--text-meta);flex:2;margin-left:12px">'+((typeof isReferendum === 'function' && isReferendum(currentElection)) ? 'Oui / Non' : 'Blocs')+'</span></div>';
  const sortedNums = bureauNums.slice().sort();
  function bureauRowC(ns2) {
    const d = shData[ns2];
    const eraInfo2 = (BUREAU_INFO[mapYear] || BUREAU_INFO[CURRENT_ERA] || {})[ns2];
    const denom = eraInfo2 ? (eraInfo2.den || eraInfo2.nom) : 'Bureau ' + parseInt(ns2);
    const isActive = currentFeature && ns2 === numStr(currentFeature);
    const abst2 = d ? (d.a || 0) : null;
    const bar = _blocsBarHTML(d, { height:14 });
    return '<div class="q-brow'+(isActive?' active':'')+'" onclick="selectBureauFromList(\''+ns2+'\')">'
      +'<span style="font-size:0.63rem;font-weight:700;color:var(--text-meta);width:28px;flex-shrink:0;padding-top:1px">'+parseInt(ns2)+'</span>'
      +'<span style="font-size:0.74rem;font-weight:500;color:var(--text-modal);flex:1;line-height:1.35">'+denom+'</span>'
      +'<span style="font-size:0.72rem;font-weight:700;color:var(--text-modal-muted);width:68px;text-align:right;flex-shrink:0;padding-top:1px">'
      +(abst2!==null?abst2.toFixed(1)+' %':'—')+'</span>'
      +'<div style="flex:2;min-width:0;margin-left:12px;padding-top:3px">'+bar+'</div></div>';
  }
  const BFOLD = 8;
  sortedNums.slice(0, BFOLD).forEach(ns2 => { h += bureauRowC(ns2); });
  const hiddenNums = sortedNums.slice(BFOLD);
  if (hiddenNums.length) {
    const uid2 = 'cb_' + cid;
    h += '<div id="'+uid2+'" style="display:none">';
    hiddenNums.forEach(ns2 => { h += bureauRowC(ns2); });
    h += '</div>';
    h += '<button class="show-more-btn" onclick="var e=document.getElementById(\''+uid2+'\');e.style.display=\'block\';this.remove()">+ '+hiddenNums.length+' autre'+(hiddenNums.length>1?'s':'')+' bureau'+(hiddenNums.length>1?'x':'')+'</button>';
  }
  h += '</div>';
  // LRVanalyse attend un cantonKey au format '<era>:<cid>' (ex. '1985:9' pour
  // canton 9 historique, '2015:1' pour canton moderne). Sans ce préfixe d'ère,
  // un cid '9' serait mal mappé puisque les ères 1985 et 2015 ont toutes les
  // deux des cantons avec ce numéro (et pas le même bureau physique derrière).
  h += renderMoreLinks('canton', cantonEra + ':' + cid, 'du canton ', fmtCanton(cid));
  document.getElementById('ov-body').innerHTML = h;
  document.getElementById('ov-body').scrollTop = 0;
  // Mini-carte : tous les bureaux du canton
  if (totE > 0) {
    const cNums = new Set(bureauNums);
    if (mmMap) { mmMap.remove(); mmMap = null; }
    const wrap = document.getElementById('mm-wrap');
    if (wrap) {
      wrap.innerHTML = '<div id="mm-inner" style="width:100%;height:100%;min-height:220px;border-radius:8px;overflow:hidden"></div>';
      mmMap = L.map('mm-inner', { zoomControl:false, attributionControl:false, dragging:false, scrollWheelZoom:false, zoomSnap:0 });
      L.tileLayer('https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png', { maxZoom:20 }).addTo(mmMap);
      const gj = getMapGeoJSON();
      const cFeats = gj.features.filter(f => cNums.has(numStr(f)));
      const allHoles = [];
      cFeats.forEach(f => { allHoles.push(...geomToHoles(f.geometry)); });
      addInverseMask(mmMap, allHoles, cWinCol);
      if (cFeats.length) mmMap.fitBounds(L.geoJSON({ type:'FeatureCollection', features:cFeats }).getBounds().pad(0.06));
    }
  }
}

// Ouvre la fiche canton depuis la liste sidebar. Choisit un bureau "ancre"
// (le 1er du canton) pour permettre la navigation vers ce canton.
function selectCantonFromList(cid) {
  const el0 = ELECTIONS[currentElection];
  const mapYear = String(el0 ? el0.my : CURRENT_ERA);
  const yearInfo = BUREAU_INFO[mapYear] || BUREAU_INFO[CURRENT_ERA] || {};
  let ns = null;
  Object.keys(yearInfo).forEach(num => {
    if (ns) return;
    if (String(yearInfo[num].c || '') === String(cid)) ns = num;
  });
  if (!ns) return;
  const gj = getMapGeoJSON();
  const feat = gj.features.find(f => numStr(f) === ns);
  if (!feat) return;
  currentFeature = feat;
  currentCanton = String(cid);
  overlayTab = 'canton';
  const cantonEra = (typeof getCantonEraForElection === 'function') ? getCantonEraForElection(currentElection) : CURRENT_ERA_CANTON;
  const cantonsMeta = ((typeof CANTON_INFO !== 'undefined' && CANTON_INFO[cantonEra]) || {}).cantons || {};
  const cantonName = (cantonsMeta[cid] || {}).name || ('La Rochelle-' + cid);
  document.getElementById('ov-title').textContent = 'Canton — ' + cantonName;
  setOverlayDisplay('flex');
  // Bascule la sidebar en mode "liste" (calque openOverlayQuartierNamed / selectBureauFromList).
  // Sans cet appel, l'arrivée via #canton=X depuis LRVanalyse n'affichait pas les listes.
  showBureauListSidebar();
  renderCanton();
  updateAccentColor();
  if (typeof updateOverlayTabs === 'function') updateOverlayTabs();
  if (typeof writeURLState === 'function') writeURLState();
}


// ── ELECTION / SHEET SELECTION ────────────────────────────────────────────────

function getQuartierParts(q){
  if(!q)return[];
  var parts=q.split('/').map(function(s){return s.trim();}).filter(Boolean);
  if(parts.length<=1)return parts;
  var el0=ELECTIONS[currentElection];var mapYear0=String(el0?el0.my:2026);
  var yearInfo=BUREAU_INFO[mapYear0]||BUREAU_INFO[CURRENT_ERA]||{};var allQ={};
  Object.values(yearInfo).forEach(function(b){if(b.q)allQ[b.q]=1;});
  return parts.every(function(p){return allQ[p];})?parts:[q];
}
// Liste tous les quartiers d'un bureau : q officiel (split sur "/") + overrides
// via QUARTIER_CORRESPONDANCES (bureaux partagés entre plusieurs quartiers)
function getQuartiersForInfo(info){
  if(!info||!info.quartier)return[];
  var quartiers=getQuartierParts(info.quartier);
  if(typeof QUARTIER_CORRESPONDANCES==='undefined')return quartiers;
  var el=ELECTIONS[currentElection];var mapYear=String(el?el.my:2026);
  Object.keys(QUARTIER_CORRESPONDANCES).forEach(function(qName){
    if(qName.indexOf('/')>=0)return;
    var arr=QUARTIER_CORRESPONDANCES[qName]&&QUARTIER_CORRESPONDANCES[qName][mapYear];
    if(arr&&arr.indexOf(info.num2026)>=0&&quartiers.indexOf(qName)<0){
      quartiers.push(qName);
    }
  });
  return quartiers;
}
function setOverlayDisplay(v) {
  const ov = document.getElementById('overlay');
  const wasVisible = ov.style.display && ov.style.display !== 'none';
  ov.style.display = v;
  // Synchronise la classe .show pour les sélecteurs CSS qui en dépendent (ex bouton flottant mobile).
  ov.classList.toggle('show', v !== 'none');
  // Synchronise data-tab (bureau / quartier / global) pour les sélecteurs CSS différenciés.
  if (v !== 'none' && typeof overlayTab === 'string') ov.dataset.tab = overlayTab;
  const leg = document.getElementById('map-legend');
  if (leg) leg.style.display = (v === 'none') ? '' : 'none';
  // A11y : focus trap actif quand le modal s'ouvre (Tab/Shift+Tab boucle dans le
  // modal au lieu de tabber les éléments derrière), désactivé à la fermeture.
  if (v !== 'none' && !wasVisible) {
    _enableOverlayFocusTrap();
  } else if (v === 'none' && wasVisible) {
    _disableOverlayFocusTrap();
  }
}

// ── A11y : focus trap pour le modal #overlay ─────────────────────────────
// Utilise createFocusTrap (shared.js) — helper réutilisable WCAG 2.4.3.
let _overlayTrap = null;
function _enableOverlayFocusTrap() {
  if (!_overlayTrap && typeof createFocusTrap === 'function') {
    _overlayTrap = createFocusTrap(document.getElementById('overlay'));
  }
  if (_overlayTrap) _overlayTrap.activate();
}
function _disableOverlayFocusTrap() {
  if (_overlayTrap) _overlayTrap.deactivate();
}
// Met à jour l'état (activé/désactivé) des boutons de mode selon le scrutin courant.
// Sur un référendum, le mode "Blocs" est désactivé (pas de familles politiques pertinentes).
function updateModeButtonsAvailability() {
  const isRef = (typeof isReferendum === 'function' && isReferendum(currentElection));
  document.querySelectorAll('.mmbtn').forEach(b => {
    const t = b.textContent.toLowerCase();
    const isBlocBtn = t.startsWith('bloc');
    if (isRef && isBlocBtn) {
      b.disabled = true;
      b.setAttribute('title', 'Indisponible pour un référendum');
      b.style.opacity = '0.42';
      b.style.cursor = 'not-allowed';
    } else {
      b.disabled = false;
      b.removeAttribute('title');
      b.style.opacity = '';
      b.style.cursor = '';
    }
  });
}

function setMapMode(mode) {
  // Garde-fou : le mode "bloc" est ignoré sur un référendum.
  if (mode === 'bloc' && typeof isReferendum === 'function' && isReferendum(currentElection)) {
    return;
  }
  currentMapMode = mode;
  clearMapSelection();
  document.querySelectorAll('.mmbtn').forEach(b => b.classList.toggle('on', b.textContent.toLowerCase().startsWith(mode === 'candidat' ? 'cand' : mode === 'bloc' ? 'bloc' : mode === 'abstention' ? 'abst' : 'blanc')));
  if (mainLayer) {
    mainLayer.setStyle(featureStyle);
    // Rebuild les tooltips déjà attachés (sinon ils gardent leur ancien contenu en cache)
    mainLayer.eachLayer(layer => {
      const feat = layer.feature; if (!feat) return;
      const ns = numStr(feat); const info = bureauInfo(feat);
      try { layer.setTooltipContent(buildTooltipHtml(feat, ns, info)); } catch(_) {}
    });
  }
  renderMapLegend();
  if (typeof writeURLState === 'function') writeURLState();
}
// Légende carte : sur desktop, ouverte par défaut (la classe .expanded est
// ajoutée au load). Sur mobile (≤720 px), elle reste fermée par défaut
// (l'utilisateur déploie via le chevron). Le HTML n'a pas .expanded à la base
// pour éviter de pré-déployer la légende sur mobile.
(function initLegendDefaultExpanded(){
  function init() {
    const leg = document.getElementById('map-legend');
    if (!leg) return;
    if (!window.matchMedia('(max-width: 720px)').matches) {
      leg.classList.add('expanded');
      const btn = document.getElementById('legend-toggle');
      if (btn) btn.setAttribute('aria-expanded', 'true');
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

// Filtre canton pour la légende mode "candidat" en élection cantonale.
// null = pas de filtre (élection non-cantonale) ; "1"/"2"/"3" = canton sélectionné.
let legendCantonFilter = '1';

function setLegendCanton(cid) {
  legendCantonFilter = String(cid);
  // Si un candidat était choroplèthé (mode candidat avec sélection), on revient
  // au rendu "gagnants par bureau" : la sélection précédente porte sur un autre
  // canton et n'aurait plus de sens dans la nouvelle vue.
  if (currentMapMode === 'candidat' && currentMapSelection) {
    clearMapSelection();
    if (mainLayer) mainLayer.setStyle(featureStyle);
    if (typeof writeURLState === 'function') writeURLState();
  }
  renderMapLegend();
}

function renderMapLegend() {
  const el = document.getElementById('map-legend-body');
  if (!el) return;
  const shData = getSheetData();
  if (currentMapMode === 'candidat') {
    // Cas spécial : élection cantonale → 3 boutons (canton 1/2/3) filtrent la liste
    // des candidats sur les bureaux du canton choisi. La carte affiche toujours
    // les 3 cantons, seule la légende est restreinte pour rester lisible.
    const isCantonal = (typeof isCantonalElection === 'function') && isCantonalElection(currentElection);
    let cantonTabsHtml = '';
    let filteredShData = shData;
    if (isCantonal) {
      const el0 = ELECTIONS[currentElection];
      const mapYear = String(el0 ? el0.my : CURRENT_ERA);
      const yearInfo = BUREAU_INFO[mapYear] || BUREAU_INFO[CURRENT_ERA] || {};
      // Liste DYNAMIQUE des cantons disponibles : pour les Départementales modernes
      // (ère canton 2015) ce sera ['1','2','3'] ; pour les Cantonales 2011 (ère
      // canton 1985, partielle), on ne montre que les cantons effectivement
      // renouvelés (extraits de par_canton, sinon inférés depuis les bureaux).
      let availableCantons = [];
      if (el0 && el0.par_canton && Object.keys(el0.par_canton).length) {
        availableCantons = Object.keys(el0.par_canton).sort((a,b) => parseInt(a) - parseInt(b));
      } else {
        // Fallback legacy : déduire des bureaux du sheet (utile pour les anciens
        // formats multi-entrées qui n'ont pas par_canton).
        const set = new Set();
        Object.keys(shData).forEach(ns => {
          const c = (yearInfo[ns]||{}).c;
          if (c != null && c !== '') set.add(String(c));
        });
        availableCantons = [...set].sort((a,b) => parseInt(a) - parseInt(b));
      }
      // Cantons "pourvus au T1" : en T2, ils n'ont pas de sheet T2 (élu d'office).
      // On les affiche grisés dans les tabs, désactivés, avec tooltip explicatif.
      const cantonsPourvus = new Set();
      if (currentSheet === 'T2' && el0 && el0.par_canton) {
        Object.keys(el0.par_canton).forEach(c => {
          const cd = el0.par_canton[c];
          if (cd && cd.sheets && cd.sheets.T1 && !cd.sheets.T2) cantonsPourvus.add(String(c));
        });
      }
      // Sécurité : le filtre ne peut pas pointer vers un canton absent OU un
      // canton pourvu au T1 (sinon la liste candidats serait vide). On bascule
      // sur le 1er canton valide.
      const _validCantons = availableCantons.filter(c => !cantonsPourvus.has(c));
      if (!availableCantons.includes(legendCantonFilter) || cantonsPourvus.has(legendCantonFilter)) {
        legendCantonFilter = _validCantons[0] || availableCantons[0] || '1';
      }
      // Tabs UI — sur mobile, placés en BAS de la légende (cf. ordre concat plus bas),
      // donc on remplace margin-bottom par margin-top pour préserver l'espacement.
      const _isMobLeg = window.matchMedia && window.matchMedia('(max-width: 720px)').matches;
      const _tabsMg = _isMobLeg ? 'margin-top:8px' : 'margin-bottom:6px';
      // flex-wrap au cas où 5+ cantons (ex. Cantonales 2011) : on autorise un retour
      // à la ligne plutôt que des boutons écrasés et illisibles.
      cantonTabsHtml = '<div class="leg-canton-tabs" style="display:flex;flex-wrap:wrap;gap:4px;'+_tabsMg+'">';
      availableCantons.forEach(c => {
        const sel = c === legendCantonFilter;
        const disabled = cantonsPourvus.has(c);
        // Grisage par COULEUR (pas opacity) : sinon l'opacity du <button> se
        // propage au pseudo ::after du tooltip → bulle illisible.
        const _border = disabled ? '#e3e3e3' : (sel ? '#1a1a2e' : '#ccc');
        const _bg     = disabled ? '#f5f5f5' : (sel ? '#1a1a2e' : '#fff');
        const _fg     = disabled ? '#a8a8a8' : (sel ? '#fff'    : '#333');
        const _cursor = disabled ? 'not-allowed' : 'pointer';
        const _click  = disabled ? '' : ' onclick="setLegendCanton(\''+c+'\')"';
        const _tip    = disabled ? ' class="has-tooltip" data-tooltip="Canton pourvu au premier tour"' : '';
        const _dis    = disabled ? ' disabled' : '';
        cantonTabsHtml += '<button'+_dis+_click+_tip+' '
          + 'style="flex:1 0 auto;min-width:64px;padding:3px 6px;border:1px solid '+_border+';border-radius:4px;'
          + 'background:'+_bg+';color:'+_fg+';cursor:'+_cursor+';'
          + 'font-size:0.7rem;font-weight:'+(sel?'700':'500')+';">Canton '+c+'</button>';
      });
      cantonTabsHtml += '</div>';
      // Filtrer shData sur les bureaux du canton sélectionné
      filteredShData = {};
      Object.entries(shData).forEach(([ns,d]) => {
        if (String((yearInfo[ns]||{}).c||'') === legendCantonFilter) filteredShData[ns] = d;
      });
    }
    const wins = {}, ties = {}, totals = {}, counts = {};
    Object.entries(filteredShData).forEach(([ns,d]) => {
      if (!d || ns==='0057') return;
      // Ex-aequo : tous les candidats à égalité en tête comptent +1 chacun
      // (le bureau "appartient" autant à chacun). Sans ce traitement, seul le
      // d.w déclaré serait compté → sous-comptage des autres candidats à égalité.
      const tied = tieCandidatesForBureau(d);
      if (tied) {
        tied.forEach(t => { wins[t] = (wins[t]||0)+1; ties[t] = (ties[t]||0)+1; });
      } else if (d.w) {
        wins[d.w] = (wins[d.w]||0)+1;
      }
      Object.entries(d.c||{}).forEach(([n,v]) => { totals[n]=(totals[n]||0)+v; counts[n]=(counts[n]||0)+1; });
    });
    const avgs = {}; Object.keys(totals).forEach(n => avgs[n] = totals[n]/(counts[n]||1));
    const isFiltered = /^(Législatives|Europ)/i.test(currentElection);
    let allCands = Object.keys(avgs);
    if (isFiltered) allCands = allCands.filter(n => avgs[n] >= 1);
    allCands.sort((a,b) => { const d=(wins[b]||0)-(wins[a]||0); return d!==0?d:avgs[b]-avgs[a]; });
    const rows = allCands.map(name => {
      const ci = candInfo(name); const col = colorOfCandidate(name);
      // Binôme : label court "Nom1 / Nom2" (femme devant). Sinon, dernier nom du label brut.
      const isBinome = Array.isArray(ci.binome) && ci.binome.length === 2;
      const label = isBinome
        ? (binomeShortLabel(name) || ci.n)
        : (ci.n || name.replace(/\s*\([^)]*\)$/,'').split(/\s+/).pop());
      const coal = name.match(/\(([^)]+)\)$/);
      // Binôme à partis hétérogènes : étiquette "PA1+PA2" et carré bicolore (split
      // diagonal 135°). Sinon comportement standard (pa simple + carré uni).
      const pa = (isBinome && typeof binomePartiLabel === 'function' ? binomePartiLabel(name) : '') || shortPa(ci.pa) || (coal&&coal[1]) || '';
      const dotBg = (typeof dotBackground === 'function') ? dotBackground(name) : col;
      const nb = wins[name]||0;
      const tieN = ties[name]||0;
      const isSel = currentMapSelection === name;
      // Si ex-aequo : on ajoute un petit ▤ après le compteur, avec tooltip détaillé
      const tieMark = tieN > 0
        ? '<span style="color:#888;font-size:0.66em;margin-left:3px;letter-spacing:-1px" title="dont '+tieN+' bureau'+(tieN>1?'x':'')+' à égalité (hachures sur la carte)">▤</span>'
        : '';
      const burLabel = nb > 0 ? nb+' bur.'+tieMark : '<span style="color:#ccc">–</span>';
      return '<div class="leg-row leg-row-click'+(isSel?' leg-row-sel':'')+'" onclick="selectMapItem(\''+name.replace(/'/g,"\\'")+'\')" title="Choroplèthe : '+label+'">'
        +'<div class="leg-dot" style="background:'+dotBg+';'+(isSel?'box-shadow:0 0 0 2px #fff,0 0 0 4px '+col:'')+'"></div>'
        +'<span class="leg-label">'+label+(pa?'<span style="color:#aaa;font-size:0.58rem;margin-left:3px">'+pa+'</span>':'')+'</span>'
        +'<span class="leg-pct">'+(isSel?'✓ ':'')+burLabel+'</span></div>';
    }).join('');
    let grad = '';
    if (currentMapSelection && currentSelectionMax > 0) {
      const col = colorOfCandidate(currentMapSelection);
      grad = '<div style="margin-top:6px;padding-top:6px;border-top:1px solid #eee">'
        +'<div class="leg-grad" style="background:linear-gradient(to right,'+blendToWhite(col,0.08)+','+col+')"></div>'
        +'<div class="leg-grad-labels"><span>'+currentSelectionMin.toFixed(1)+'%</span><span style="color:'+col+';font-weight:700">'+currentSelectionMax.toFixed(1)+'%</span></div>'
        +'</div>';
    }
    // Ordre des blocs dans la légende :
    //   - Desktop : tabs canton en HAUT, puis rows, puis gradient
    //   - Mobile  : rows + gradient en haut, tabs canton en BAS (mieux à proximité
    //               du pouce sur petit écran, et la liste candidats reste visible).
    const _isMobLegOrder = window.matchMedia && window.matchMedia('(max-width: 720px)').matches;
    el.innerHTML = _isMobLegOrder ? (rows + grad + cantonTabsHtml) : (cantonTabsHtml + rows + grad);
  } else if (currentMapMode === 'bloc') {
    const wins = {}, present = new Set();
    Object.entries(shData).forEach(([ns,d]) => {
      if (!d || ns==='0057') return;
      const bc = computeBlocs(d);
      Object.keys(bc).forEach(k => present.add(k));
      const dom = Object.entries(bc).sort((a,b)=>b[1]-a[1])[0];
      if (dom) wins[dom[0]] = (wins[dom[0]]||0)+1;
    });
    const rows = Object.entries(BLOC_CONFIG).map(([k,v]) => {
      if (!present.has(k)) return '';
      const nb = wins[k]||0;
      const isSel = currentMapSelection === k;
      const burLabel = nb > 0 ? nb+' bur.' : '<span style="color:#ccc">–</span>';
      return '<div class="leg-row leg-row-click'+(isSel?' leg-row-sel':'')+'" onclick="selectMapItem(\''+k+'\')" title="Choroplèthe : '+v.label+'">'
        +'<div class="leg-dot" style="background:'+v.color+';'+(isSel?'box-shadow:0 0 0 2px #fff,0 0 0 4px '+v.color:'')+'"></div>'
        +'<span class="leg-label">'+v.label+'</span>'
        +'<span class="leg-pct">'+(isSel?'✓ ':'')+burLabel+'</span></div>';
    }).join('');
    let grad = '';
    if (currentMapSelection && currentSelectionMax > 0) {
      const col = (BLOC_CONFIG[currentMapSelection]||BLOC_CONFIG['?']).color;
      grad = '<div style="margin-top:6px;padding-top:6px;border-top:1px solid #eee">'
        +'<div class="leg-grad" style="background:linear-gradient(to right,'+blendToWhite(col,0.08)+','+col+')"></div>'
        +'<div class="leg-grad-labels"><span>'+currentSelectionMin.toFixed(1)+'%</span><span style="color:'+col+';font-weight:700">'+currentSelectionMax.toFixed(1)+'%</span></div>'
        +'</div>';
    }
    el.innerHTML = rows + grad;
  } else if (currentMapMode === 'abstention') {
    const vals = Object.entries(shData).filter(([ns,d])=>ns!=='0057'&&d&&d.a!=null).map(([,d])=>d.a);
    if (!vals.length) { el.innerHTML=''; return; }
    const mn = Math.min(...vals), mx = Math.max(...vals);
    el.innerHTML = '<div class="leg-grad" style="background:linear-gradient(to right,'+abstentionColor(mn,mn,mx)+','+abstentionColor(mx,mn,mx)+');border:1px solid #ddd"></div>'
      +'<div class="leg-grad-labels"><span>'+mn.toFixed(1)+'%</span><span>Abstention</span><span>'+mx.toFixed(1)+'%</span></div>';
  } else if (currentMapMode === 'bv') {
    const vals = Object.entries(shData).filter(([ns,d])=>ns!=='0057'&&d&&d.i).map(([,d])=>getBVPct(d));
    if (!vals.length) { el.innerHTML=''; return; }
    const mn = Math.min(...vals), mx = Math.max(...vals);
    el.innerHTML = '<div class="leg-grad" style="background:linear-gradient(to right,'+bvColor(mn)+','+bvColor(mx)+');border:1px solid #ddd"></div>'
      +'<div class="leg-grad-labels"><span>'+mn.toFixed(1)+'%</span><span>Blancs/nuls</span><span>'+mx.toFixed(1)+'%</span></div>';
  }
}
function setElection(label){
  const prevFeature=currentFeature;
  const overlayWasOpen=document.getElementById('overlay').style.display!=='none';
  const prevSheet=currentSheet;
  // Si on bascule vers un référendum alors qu'on était en mode bloc, switch automatique en mode candidat
  // (le mode bloc n'a pas de sens pour un référendum Oui/Non).
  if (currentMapMode === 'bloc' && typeof isReferendum === 'function' && isReferendum(label)) {
    currentMapMode = 'candidat';
    clearMapSelection();
  }
  // Conserver la sélection bloc entre élections (les blocs sont stables d'un scrutin à l'autre)
  const preservedBlocSel = (currentMapMode === 'bloc' && currentMapSelection) ? currentMapSelection : null;
  // Mémoriser l'ère de l'ancienne élection AVANT de basculer
  const oldEra = String(ELECTIONS[currentElection]?.my || CURRENT_ERA);
  const newEra = String(ELECTIONS[label]?.my || CURRENT_ERA);
  const prevNumero = prevFeature ? numStr(prevFeature) : null;
  const prevB2026 = prevFeature ? (prevFeature.properties.b2026 || prevNumero) : null;
  currentElection=label; currentFeature=null;
  if (typeof _invalidateExtremesCache === 'function') _invalidateExtremesCache();
  if (preservedBlocSel) {
    // On garde la sélection ; on recomputera le range après avoir fixé currentSheet
    currentMapSelection = preservedBlocSel;
  } else {
    clearMapSelection();
  }
  const _sel=document.getElementById('el-select'); if(_sel)_sel.value=label;
  // Tenter de conserver le tour en cours ; sinon revenir au T1
  const newEl=ELECTIONS[label];
  const newSheets=newEl?Object.keys(newEl.sheets||{}):[];
  if(prevSheet==='T2'&&newSheets.includes('T2')) currentSheet='T2';
  else if(prevSheet==='TU'&&newSheets.includes('TU')) currentSheet='TU';
  else currentSheet='T1';
  // Recalcul du range pour la nouvelle élection (impose le nouveau dégradé)
  if (preservedBlocSel) {
    [currentSelectionMin, currentSelectionMax] = computeSelectionRange();
  }
  updateTourUI(); updateFooter(); updateTopbar(); loadMap();
  if (typeof updateModeButtonsAvailability === 'function') updateModeButtonsAvailability();

  // Trouver le feature équivalent dans la nouvelle ère.
  // Logique : continuité d'identité (même numéro) > continuité territoriale.
  // - Forward (oldEra → newEra plus récent) : recherche inverse dans BUREAU_CORRESPONDANCES.
  //   Plusieurs 2026 IDs peuvent dériver du même bureau historique → préférer celui qui
  //   conserve le numéro actuel (= continuité d'identité).
  // - Backward (vers ancien) : utiliser BUREAU_CORRESPONDANCES[bid2026][newEra] direct
  //   (continuité territoriale, car le bureau actuel peut avoir un autre numéro historique).
  let newFeature = null;
  if (prevFeature) {
    const gj = getMapGeoJSON();
    if (oldEra === newEra) {
      // Même ère : conserver simplement le bureau (par numero ou b2026)
      newFeature = gj.features.find(f => numStr(f) === prevNumero)
                || gj.features.find(f => f.properties.b2026 === prevB2026);
    } else if (parseInt(newEra) < parseInt(oldEra)) {
      // Backward : suivre le bureau 2026 actuel jusqu'à son ancêtre territorial.
      // Mais d'abord on cherche la continuité d'IDENTITÉ : un bureau 2026 dont la chaîne
      // historique contient prevNumero à oldEra. Cette identité prime sur b2026 (territorial),
      // car certains bureaux 1993 ont un b2026 qui pointe vers un voisin actuel (ex 1993 0023
      // « Coligny / Genette » a b2026=0027 « Parc Charruyer », alors que la vraie chaîne est
      // BUREAU_CORRESPONDANCES["0023"] avec 1988=["0017","0018","0019"]).
      let bestB26 = null;
      Object.entries(BUREAU_CORRESPONDANCES).forEach(([b26, c]) => {
        if (!c || typeof c !== 'object') return;
        const v = c[oldEra];
        if (v === undefined) return;
        const ids = Array.isArray(v) ? v.map(r => typeof r==='string'?r:r.id) : [v];
        if (ids.includes(prevNumero)) {
          // Préférer un match qui partage l'ID 2026 ou le b2026 territorial déjà trouvé
          if (!bestB26 || b26 === prevB2026 || b26 === prevNumero) bestB26 = b26;
        }
      });
      const baseB26 = bestB26 || prevB2026;
      const corr = BUREAU_CORRESPONDANCES[baseB26] || {};
      const ref = corr[newEra];
      const targets = ref === undefined ? [prevNumero]
                    : Array.isArray(ref) ? ref.map(r => typeof r==='string'?r:r.id)
                    : [ref];
      // Préférer la cible qui partage le numero actuel (rare en backward mais possible)
      const sortedT = targets.includes(prevNumero) ? [prevNumero, ...targets.filter(t=>t!==prevNumero)] : targets;
      for (const t of sortedT) {
        newFeature = gj.features.find(f => numStr(f) === t);
        if (newFeature) break;
      }
      // Fallback agrégat : certaines ères (ex 1988) ne contiennent pas les bureaux individuels
      // 0035, 0036, 0037 mais une seule feature agrégée "0035-37". On vérifie si l'une des
      // cibles est couverte par un tel agrégat dans le GeoJSON.
      if (!newFeature) {
        for (const f of gj.features) {
          const ns = numStr(f);
          if (typeof isAggNs === 'function' && isAggNs(ns)) {
            const nums = (typeof aggNumList === 'function' ? aggNumList(ns) : [])
                          .map(n => String(n).padStart(4, '0'));
            if (sortedT.some(t => nums.includes(t))) { newFeature = f; break; }
          }
        }
      }
    } else {
      // Forward : recherche inverse — quels 2026 IDs descendent de prevNumero à oldEra ?
      // Si prevNumero est un agrégat (ex "0035-37" en 1988), on l'éclate en numéros individuels
      // pour interroger BUREAU_CORRESPONDANCES (qui ne connaît que les numéros individuels).
      const prevNumList = (typeof isAggNs === 'function' && isAggNs(prevNumero) && typeof aggNumList === 'function')
        ? aggNumList(prevNumero).map(n => String(n).padStart(4, '0'))
        : [prevNumero];
      const candidates = [];
      Object.entries(BUREAU_CORRESPONDANCES).forEach(([b26, c]) => {
        if (!c || typeof c !== 'object') return;
        const v = c[oldEra];
        if (v === undefined) return;
        const ids = Array.isArray(v) ? v.map(r => typeof r==='string'?r:r.id) : [v];
        if (prevNumList.some(p => ids.includes(p))) candidates.push(b26);
      });
      // Préférer le candidat qui partage le numero actuel (continuité d'identité)
      let target = candidates.includes(prevNumero) ? prevNumero : candidates[0];
      if (!target) target = prevB2026 || prevNumero;
      newFeature = gj.features.find(f => f.properties.b2026 === target)
                || gj.features.find(f => numStr(f) === target);
    }
  }

  if(overlayWasOpen && newFeature){
    currentFeature=newFeature; showBureauSidebar(currentFeature); refreshOverlayIfOpen();
  } else if(overlayWasOpen&&overlayTab==='global') {
    renderGlobal(); renderGlobalFiche(); updateAccentColor();
  } else if (overlayWasOpen && overlayTab === 'canton') {
    // Fiche canton sans newFeature (bureau ancre perdu) : on garde currentCanton et on
    // laisse refreshOverlayIfOpen re-mapper sur la nouvelle ère (avec garde-fou intégré).
    refreshOverlayIfOpen();
  } else if (newFeature) {
    currentFeature=newFeature; showBureauSidebar(currentFeature);
  } else { currentFeature=null; renderGlobal(); }
  if(document.getElementById('sb-bureau-list').style.display!=='none') renderBureauList();
  if(document.getElementById('sb-quartier-list').style.display!=='none') renderQuartierList();
  if (typeof writeURLState === 'function') writeURLState();
}

function setSheet(sheet){
  // Conserver la sélection bloc entre tours (T1 → T2 par exemple)
  const preservedBlocSel = (currentMapMode === 'bloc' && currentMapSelection) ? currentMapSelection : null;
  currentSheet=sheet;
  if (typeof _invalidateExtremesCache === 'function') _invalidateExtremesCache();
  if (preservedBlocSel) {
    currentMapSelection = preservedBlocSel;
    [currentSelectionMin, currentSelectionMax] = computeSelectionRange();
  } else {
    clearMapSelection();
  }
  loadMap();
  // Restaure le surlignage du bureau sélectionné si besoin
  if(currentFeature){
    const ns=numStr(currentFeature);
    mainLayer.eachLayer(function(l){
      if(numStr(l.feature)===ns){
        selectedLayer=l;
        l.setStyle({fillOpacity:1,weight:3,color:'#1a1a2e'});
      }
    });
  }
  updateTopbar();
  if(currentFeature)showBureauSidebar(currentFeature); else renderGlobal();
  refreshOverlayIfOpen();
  updateAccentColor();
  if(document.getElementById('sb-bureau-list').style.display!=='none') renderBureauList();
  if(document.getElementById('sb-quartier-list').style.display!=='none') renderQuartierList();
  if (typeof writeURLState === 'function') writeURLState();
}

function setTour(n) {
  const sh = n === 2 ? 'T2' : (HAS_TU.has(currentElection) ? 'TU' : 'T1');
  document.querySelectorAll('.tbtn').forEach((b, i) => b.className = 'tbtn' + (i + 1 === n ? ' on' : ''));

}

function updateTourUI() {
  const hasT2 = HAS_T2.has(currentElection);

  const btns = document.getElementById('tour-btns');
  // Helper : pose le label en double span (long + court) pour swap CSS

    if (!btn) return;
    btn.innerHTML = '<span class="tb-long">' + longText + '</span><span class="tb-short">' + shortText + '</span>';
    btn.setAttribute('data-tooltip', longText);

  if (hasT2) {
    btns.style.display = 'flex';
    setTbtnLabel(document.getElementById('btn1'), '1er tour', 'T1');
    setTbtnLabel(document.getElementById('btn2'), '2e tour', 'T2');

    document.getElementById('btn2').className = 'tbtn'+(currentSheet==='T2'?' on':'');
    document.getElementById('btn1').style.cursor = '';
    document.getElementById('btn2').style.display = '';
  } else if (hasTU) {
    btns.style.display = 'flex';
    setTbtnLabel(document.getElementById('btn1'), 'Tour unique', 'TU');

    document.getElementById('btn1').className = 'tbtn on';
    document.getElementById('btn2').className = 'tbtn';
    document.getElementById('btn2').style.display = 'none';
    currentSheet = 'TU';
  } else {
    btns.style.display = 'flex';

function updateFooter() {

    const sheets = (ELECTIONS[elec] || {}).sheets || {};
    const sh = sheets[tour] || sheets.TU || sheets.T1;
    if (!sh) return [];
    const cids = new Set();
    Object.values(sh).forEach(bd => {
      if (bd && bd.c) Object.keys(bd.c).forEach(c => cids.add(c));

    cids.forEach(cid => {

      if (Array.isArray(cd.binome) && cd.binome.length === 2) {

  function populateQuoi(side) {

  // Helper : ID d'un bureau dans une ère donnée, à partir de son b2026 canonique.
  // Retourne null si aucune correspondance n'existe (bureau créé après l'ère, ou
  // disparu avant). Si la valeur est un array (lignée multi-bureaux fusionnés),

  function _bureauIdInEra(b2026, era) {

  function _crossEraNs(ns, eraFrom, eraOther) {

  // Le calcul du delta reste B − A (orientation choisie par l'utilisateur via

  function _cmpDisplaySide() {
    if (!_cmpState) return 'A';
    const eraA = parseInt(((ELECTIONS[_cmpState.A.elec] || {}).my || '0')) || 0;
    const eraB = parseInt(((ELECTIONS[_cmpState.B.elec] || {}).my || '0')) || 0;
    return eraB > eraA ? 'B' : 'A';
  }

  function bindCmpHoverSync(layersFrom, layersTo, sideFrom) {
    Object.keys(layersFrom).forEach(function(ns) {
      const lFrom = layersFrom[ns];
      if (!lFrom) return;
      // Résout l'ID dans l'ère de l'AUTRE côté via BUREAU_CORRESPONDANCES, pour
      // que la sync hover marche aussi quand A et B sont sur des ères différentes
      // (et que le même bureau a été renuméroté). Si le bureau n'existe pas dans
      // l'autre ère, lTo sera null → on bind quand même le mouseover (mid-bar
      // affichera "inexistant" côté manquant) mais on n'ouvre pas de tooltip.
      const eraFrom = String((ELECTIONS[_cmpState[sideFrom].elec] || {}).my || '');
      const otherSide = sideFrom === 'A' ? 'B' : 'A';
      const eraOther = String((ELECTIONS[_cmpState[otherSide].elec] || {}).my || '');
      let nsOther = ns;
      if (eraFrom !== eraOther) {
        const b2026 = _resolveB2026FromHist(ns, eraFrom);
        nsOther = _bureauIdInEra(b2026, eraOther);
      }
      const lTo = nsOther ? layersTo[nsOther] : null;
      lFrom.on('mouseover', function() {
        if (lTo) lTo.openTooltip();
        updateCmpMidBar(ns, lFrom.feature, sideFrom);
      });
      lFrom.on('mouseout', function() {
        if (lTo) lTo.closeTooltip();
        hideCmpMidBar();
      });
    });
  }

  // ── Mini-bandeau central (Abs+Rel) — mirroir réduit de la banner du haut ───
  // Layout : 3 cols × 2 rangées.
  //   Rangée 1 : Bureau A | badge =/≠ (span 2 rangées) | Bureau B
  //   Rangée 2 : Score A  |                            | Score B + delta
  // Le bureau A est lu dans l'ère de A (BUREAU_INFO[eraA]), idem côté B.
  // Badge "=" : frontières inchangées entre les 2 ères ; "≠" : redécoupage
  // détecté via REDECOUPAGES sur l'intervalle d'ères.
  // Masqué en mode Diff (la sidebar dédiée couvre ce besoin) et hors hover.
  function updateCmpMidBar(ns, feature, sideFrom) {
    if (!_cmpState) return;
    const bar = document.getElementById('cmp-mid-bar');
    if (!bar) return;
    const eraA = String((ELECTIONS[_cmpState.A.elec] || {}).my || '');
    const eraB = String((ELECTIONS[_cmpState.B.elec] || {}).my || '');
    // Résout les IDs des 2 côtés via BUREAU_CORRESPONDANCES.
    // - Côté hovered : on garde ns tel quel (déjà dans la bonne ère).
    // - Autre côté : on remonte au b2026 canonique puis on redescend dans son ère.
    // Si null → le bureau n'existe pas dans cette ère (création/disparition).
    // On résout TOUJOURS depuis BUREAU_CORRESPONDANCES via _resolveB2026FromHist
    // (cache interne), pas depuis feature.properties.b2026 qui peut être faux.
    const fromSide = sideFrom || 'A';
    const eraFrom = fromSide === 'A' ? eraA : eraB;
    const b2026 = _resolveB2026FromHist(ns, eraFrom);
    const nsA = (fromSide === 'A') ? ns : _crossEraNs(ns, eraFrom, eraA);
    const nsB = (fromSide === 'B') ? ns : _crossEraNs(ns, eraFrom, eraB);
    const sheetA = getSheetForSel(_cmpState.A);
    const sheetB = getSheetForSel(_cmpState.B);
    const dA = nsA ? sheetA[nsA] : null;
    const dB = nsB ? sheetB[nsB] : null;
    const sA = dA ? scoreOfSelInBureau(dA, _cmpState.A) : { pct: 0, present: false };
    const sB = dB ? scoreOfSelInBureau(dB, _cmpState.B) : { pct: 0, present: false };
    const infoA = nsA ? ((BUREAU_INFO[eraA] || {})[nsA] || {}) : {};
    const infoB = nsB ? ((BUREAU_INFO[eraB] || {})[nsB] || {}) : {};
    // Helper : pose le texte de denom dans un span inner (pour le marquee mobile).
    // Détecte le débordement après rendu et applique .has-marquee + variable
    // CSS --marquee-d pour le translateX de l'animation.
    function setDenom(denomEl, text) {
      denomEl.innerHTML = '<span class="cmp-mid-bar-bureau-denom-inner"></span>';
      const inner = denomEl.firstChild;
      inner.textContent = text;
      // Mesure différée pour laisser le layout se faire.
      requestAnimationFrame(() => {
        if (!inner.isConnected) return;
        const overflow = inner.scrollWidth - denomEl.clientWidth;
        // Seuil 8 px (au lieu de 2) pour ne pas déclencher sur des noms qui
        // tiennent presque entièrement → on évite les marquees sur des bordures
        // imperceptibles à l'œil.
        if (overflow > 8) {
          denomEl.classList.add('has-marquee');
          denomEl.style.setProperty('--marquee-d', '-' + overflow + 'px');
        } else {
          denomEl.classList.remove('has-marquee');
          denomEl.style.removeProperty('--marquee-d');
        }
      });
    }
    // Bureau A : si nsA est null → "Bureau inexistant" (état muted/italic).
    // data-num : utilisé par la CSS mobile pour inliner "23 · " avant le denom (gain de hauteur).
    const elBA = bar.querySelector('.cmp-mid-bar-bureau-a');
    if (nsA) {
      elBA.querySelector('.cmp-mid-bar-bureau-num').textContent  = 'Bureau n°' + parseInt(nsA);
      elBA.setAttribute('data-num', parseInt(nsA));
      setDenom(elBA.querySelector('.cmp-mid-bar-bureau-denom'), infoA.den || infoA.nom || '');
      elBA.classList.remove('inexistant');
    } else {
      elBA.querySelector('.cmp-mid-bar-bureau-num').textContent  = '';
      elBA.removeAttribute('data-num');
      setDenom(elBA.querySelector('.cmp-mid-bar-bureau-denom'), 'Bureau inexistant');
      elBA.classList.add('inexistant');
    }
    // Bureau B : idem côté droit.
    const elBB = bar.querySelector('.cmp-mid-bar-bureau-b');
    if (nsB) {
      elBB.querySelector('.cmp-mid-bar-bureau-num').textContent  = 'Bureau n°' + parseInt(nsB);
      elBB.setAttribute('data-num', parseInt(nsB));
      setDenom(elBB.querySelector('.cmp-mid-bar-bureau-denom'), infoB.den || infoB.nom || '');
      elBB.classList.remove('inexistant');
    } else {
      elBB.querySelector('.cmp-mid-bar-bureau-num').textContent  = '';
      elBB.removeAttribute('data-num');
      setDenom(elBB.querySelector('.cmp-mid-bar-bureau-denom'), 'Bureau inexistant');
      elBB.classList.add('inexistant');
    }
    // Badge "=" ou "≠" : forcé "≠" si un côté manque (frontières objectivement
    // différentes), sinon détection REDECOUPAGES habituelle.
    const oneMissing = !nsA || !nsB;
    const mods = (typeof bureauModifBetween === 'function' && b2026)
      ? bureauModifBetween(b2026, eraA, eraB)
      : [];
    const frontEl = bar.querySelector('.cmp-mid-bar-frontiers-badge');
    if (!oneMissing && mods.length === 0) {
      frontEl.textContent = '=';
      frontEl.className = 'cmp-mid-bar-frontiers-badge same';
    } else {
      frontEl.textContent = '≠';
      frontEl.className = 'cmp-mid-bar-frontiers-badge unequal';
    }
    // Scores — tag coloré, même traitement que .cmp-banner-score (fond = couleur
    // de la sélection, texte adaptatif). Réutilise baseColorOfSel + pickTextColorForBg.
    const fmtP = p => p.toFixed(1).replace('.', ',');
    const pickTxt = (typeof pickTextColorForBg === 'function') ? pickTextColorForBg : () => '#fff';
    const bgA = baseColorOfSel(_cmpState.A);
    const bgB = baseColorOfSel(_cmpState.B);
    bar.querySelectorAll('.cmp-mid-bar-score').forEach(el => {
      const isA = el.dataset.side === 'A';
      const s = isA ? sA : sB;
      if (s.present) {
        el.textContent = fmtP(s.pct) + ' %';
        const bg = isA ? bgA : bgB;
        el.style.background = bg;
        el.style.color = pickTxt(bg);
        el.classList.remove('missing');
      } else {
        el.textContent = '—';
        el.style.background = '';
        el.style.color = '';
        el.classList.add('missing');
      }
    });
    // Delta uniquement sous le score B (cohérent avec la banner du haut).
    const deltaEl = bar.querySelector('.cmp-mid-bar-delta');
    if (!sA.present || !sB.present) {
      deltaEl.textContent = '–';
      deltaEl.className = 'cmp-mid-bar-delta neutral';
    } else {
      const diff = sB.pct - sA.pct;
      const sign = diff >= 0.05 ? '+' : (diff <= -0.05 ? '−' : '');
      const cls  = diff >= 0.05 ? 'pos' : (diff <= -0.05 ? 'neg' : 'neutral');
      deltaEl.textContent = sign + Math.abs(diff).toFixed(1).replace('.', ',') + ' pts';
      deltaEl.className = 'cmp-mid-bar-delta ' + cls;
    }
    bar.classList.add('visible');
  }
  function hideCmpMidBar() {
    const bar = document.getElementById('cmp-mid-bar');
    if (bar) bar.classList.remove('visible');
  }

  function activateCompareMode(A, B) {
    // Conserve scaleMode si déjà défini (swap/edit/restart). Sinon : absolu par défaut.
    const prevMode = (_cmpState && _cmpState.scaleMode) || 'absolute';
    _cmpState = { A, B, mapA: null, mapB: null, syncing: false, scaleMode: prevMode };
    document.body.classList.add('is-compare');
    // Si on restaure le mode diff (depuis URL ou swap), repose les classes
    // is-cmp-diff-show-a/b selon la plus récente des 2 ères (cf. _cmpDisplaySide).
    if (prevMode === 'diff') {
      const ds = _cmpDisplaySide();
      document.body.classList.add('is-cmp-diff');
      document.body.classList.toggle('is-cmp-diff-show-a', ds === 'A');
      document.body.classList.toggle('is-cmp-diff-show-b', ds === 'B');
    } else {
      document.body.classList.remove('is-cmp-diff', 'is-cmp-diff-show-a', 'is-cmp-diff-show-b');
    }
    // Sheets + scores ville + ranges (par côté + partagé).
    const sheetA = getSheetForSel(A);
    const sheetB = getSheetForSel(B);
    const scoreA = computeCityScore(sheetA, A);
    const scoreB = computeCityScore(sheetB, B);
    // Range par côté pour le mode RELATIF + range partagé pour le mode ABSOLU.
    _cmpState.rangeA = computeRangeForSide(sheetA, A);
    _cmpState.rangeB = computeRangeForSide(sheetB, B);
    const { minG, maxG } = computeSharedRange(sheetA, A, sheetB, B);
    _cmpState.minG = minG; _cmpState.maxG = maxG;
    // Max absolu de la diff B-A pour le mode "diff" — symétrique autour de 0.
    _cmpState.diffMaxAbs = computeDiffMaxAbs(sheetA, A, sheetB, B);
    // Bannière titres (avec score ville en tag coloré, à côté du label de la sélection).
    // Delta B-A affiché uniquement côté B pour matérialiser l'écart d'un coup d'œil.
    el('cmp-banner-a').innerHTML = buildBannerTitle(A, scoreA);
    el('cmp-banner-b').innerHTML = buildBannerTitle(B, scoreB, scoreB - scoreA);
    // Légende : utilise le mode courant pour rendre 1 ou 2 barres.
    renderCmpLegend('cmp-legend', A, B);
    // Init des 2 maps (délai pour laisser le CSS s'appliquer avant la mesure).
    // initCmpMap retourne { map, layers } : map = instance Leaflet ; layers = index
    // { bureau → layer } pour permettre la synchro hover entre les 2 cartes.
    setTimeout(() => {
      const a = initCmpMap('cmp-map-a', A, 'A');
      const b = initCmpMap('cmp-map-b', B, 'B');
      _cmpState.mapA = a.map;     _cmpState.mapB = b.map;
      _cmpState.layersA = a.layers; _cmpState.layersB = b.layers;
      _cmpState.geoA = a.geo;     _cmpState.geoB = b.geo;
      // Synchronisation pan/zoom entre les 2 cartes.
      // Flag _cmpState.syncing pour éviter la récursion infinie.
      function syncFromTo(from, to) {
        return function() {
          if (!_cmpState || _cmpState.syncing) return;
          _cmpState.syncing = true;
          to.setView(from.getCenter(), from.getZoom(), { animate: false });
          _cmpState.syncing = false;
        };
      }
      // `move zoom` = continu pendant le drag ; `moveend zoomend` = filet de sécurité
      // pour l'état final (notamment après un double-clic zoom ou wheel zoom).
      _cmpState.mapA.on('move zoom moveend zoomend', syncFromTo(_cmpState.mapA, _cmpState.mapB));
      _cmpState.mapB.on('move zoom moveend zoomend', syncFromTo(_cmpState.mapB, _cmpState.mapA));
      // Synchro hover : tooltips jumeaux (hover bureau X sur A → tooltip aussi sur B).
      bindCmpHoverSync(a.layers, b.layers, 'A');
      bindCmpHoverSync(b.layers, a.layers, 'B');
      // Highlight bureaux au survol du gradient de légende (sur les 2 cartes).
      bindLegendHover();
      // Si on est resté en mode diff (swap, edit), rendre la sidebar dédiée.
      if (_cmpState.scaleMode === 'diff') renderDiffSidebar();
      // Idem mode nuage : re-générer le scatter + mini-carte avec les nouvelles A/B.
      if (_cmpState.scaleMode === 'nuage') renderNuage();
      // URL partageable : encode A/B dans le hash (lecture via getCmpState).
      syncCmpUrl();
    }, 50);
  }
  // API publique pour activer le mode comparaison depuis l'URL au boot.
  // Reproduit startComparison() sans passer par la modale.
  window.activateComparisonFromState = function(A, B) {
    if (!A || !B || !A.elec || !B.elec || !A.quoi || !B.quoi) return false;
    if (!ELECTIONS[A.elec] || !ELECTIONS[B.elec]) return false;
    if (_cmpState) cleanCmpResources();
    activateCompareMode(A, B);
    return true;
  };

  function buildBannerTitle(sel, score, delta) {
    const elec = sel.elec;
    const tour = sel.tour;
    // Tour : masqué pour TU + référendums (pas pertinent).
    const isRef = (typeof isReferendum === 'function') && isReferendum(elec);
    let tourLabel = '';
    if (!isRef) {
      if (tour === 'T1') tourLabel = '1ᵉʳ tour';
      else if (tour === 'T2') tourLabel = '2ᵉ tour';
      // TU : pas de tour affiché (un seul tour, pas pertinent)
    }
    // quoiLabel : version FULL (desktop) + version SHORT (mobile) dans 2 spans,
    // CSS bascule l'un ou l'autre selon le viewport.
    let quoiLabel = sel.quoi;
    if (sel.type === 'candidat') {
      const cd = CAND_DATA[sel.quoi] || {};
      if (Array.isArray(cd.binome) && cd.binome.length === 2 && typeof binomeMembers === 'function') {
        const ms = binomeMembers(sel.quoi);
        if (ms) {
          const full = ms.map(m => ((m.p ? m.p + ' ' : '') + (m.n || '')).trim()).join(' / ');
          const short = ms.map(m => {
            const inits = (m.p || '').split('-').map(p => (p[0] || '').toUpperCase()).filter(Boolean).join('');
            return ((inits ? inits + '. ' : '') + (m.n || '')).trim();
          }).join(' / ');
          const pa = cd.pa || '';
          quoiLabel = '<span class="cb-name-full">' + full + (pa ? ' (' + pa + ')' : '') + '</span>'
                    + '<span class="cb-name-short">' + short + (pa ? ' · ' + pa : '') + '</span>';
        }
      } else {
        const person = cd.person ? (PERSONS[cd.person] || {}) : {};
        const prenom = (person.p || cd.p || '').trim();
        const nom = (person.n || cd.n || sel.quoi).trim();
        const inits = prenom.split('-').map(p => (p[0] || '').toUpperCase()).filter(Boolean).join('');
        const full = ((prenom ? prenom + ' ' : '') + nom).trim();
        const short = ((inits ? inits + '. ' : '') + nom).trim();
        const pa = cd.pa || '';
        quoiLabel = '<span class="cb-name-full">' + full + (pa ? ' (' + pa + ')' : '') + '</span>'
                  + '<span class="cb-name-short">' + short + (pa ? ' · ' + pa : '') + '</span>';
      }
    } else if (sel.type === 'bloc') {
      quoiLabel = (BLOC_CONFIG[sel.quoi] || {}).label || sel.quoi;
      quoiLabel = 'Bloc ' + quoiLabel.toLowerCase();
    } else if (sel.type === 'famille') {
      quoiLabel = 'Famille ' + (FAMILY_CONFIG[sel.quoi] ? FAMILY_CONFIG[sel.quoi].label.toLowerCase() : sel.quoi);
    }
    // Score ville : tag coloré (couleur de base de la sélection, texte adaptatif).
    const bg = baseColorOfSel(sel);
    const txtCol = (typeof pickTextColorForBg === 'function') ? pickTextColorForBg(bg) : '#fff';
    const scoreStr = (typeof score === 'number') ? score.toFixed(1).replace('.', ',') + '\xa0%' : '';
    const scoreTag = scoreStr
      ? '<span class="cmp-banner-score" style="background:' + bg + ';color:' + txtCol + '">' + scoreStr + '</span>'
      : '';
    // Delta B-A : visible uniquement côté B (passé en argument). Vert si > 0,
    // rouge si < 0, neutre si ≈ 0 (< 0.1 pt). Vrai signe "−" U+2212 pour les négatifs.
    let deltaTag = '';
    if (typeof delta === 'number') {
      const abs = Math.abs(delta).toFixed(1).replace('.', ',');
      let cls = 'neutral', sign = '';
      if (delta >= 0.1)       { cls = 'pos'; sign = '+'; }
      else if (delta <= -0.1) { cls = 'neg'; sign = '−'; }
      else                    { cls = 'neutral'; sign = '='; }
      const txt = (cls === 'neutral') ? '= pts' : (sign + abs + '\xa0pts');
      deltaTag = '<span class="cmp-banner-delta cmp-banner-delta-' + cls + '" data-tooltip="Écart vs A">' + txt + '</span>';
    }
    // Colonne "chiffres" (score + delta empilés verticalement) à côté de la colonne
    // texte (label + sub). L'ordre DOM est constant ; le sens visuel diffère via
    // flex-direction sur .cmp-banner-title-{a,b} (B = row, A = row-reverse).
    const numbers = '<div class="cmp-banner-numbers">' + scoreTag + deltaTag + '</div>';
    const subText = elec + (tourLabel ? ' · ' + tourLabel : '');
    const txt = '<div class="cmp-banner-txt"><strong>' + quoiLabel + '</strong><span class="cmp-banner-sub">' + subText + '</span></div>';
    return numbers + txt;
  }

  // ─── Helpers de score (phase 3) ────────────────────────────────────────
  // Retourne le sheet (dict bureau → data) pour la sélection donnée.
  function getSheetForSel(sel) {
    const el0 = ELECTIONS[sel.elec];
    if (!el0 || !el0.sheets) return {};
    return el0.sheets[sel.tour] || {};
  }
  // Couleur de base d'une sélection (candidat → couleur paritaire, bloc/famille → couleur config).
  function baseColorOfSel(sel) {
    if (sel.type === 'candidat') return colorOfCandidate(sel.quoi) || '#888';
    if (sel.type === 'bloc')     return (BLOC_CONFIG[sel.quoi] || BLOC_CONFIG['?']).color;
    if (sel.type === 'famille')  return (FAMILY_CONFIG[sel.quoi] || { color: '#888' }).color;
    return '#888';
  }
  // Libellé court d'une sélection (utilisé dans le tooltip de bureau).
  function shortLabelOfSel(sel) {
    if (sel.type === 'candidat') {
      const ci = candInfo(sel.quoi) || {};
      if (Array.isArray(ci.binome) && ci.binome.length === 2 && typeof binomeShortLabel === 'function') {
        return binomeShortLabel(sel.quoi) || ci.n || sel.quoi;
      }
      return ci.n || sel.quoi;
    }
    if (sel.type === 'bloc')    return (BLOC_CONFIG[sel.quoi] || BLOC_CONFIG['?']).label;
    if (sel.type === 'famille') return (FAMILY_CONFIG[sel.quoi] || { label: sel.quoi }).label;
    return String(sel.quoi);
  }
  // Score pour un bureau (en %) d'une sélection donnée.
  // Retourne { pct, present } — present=false si la sélection n'a pas de candidat
  // dans ce bureau (cantonale hors canton, bloc sans candidat, famille sans candidat).
  function scoreOfSelInBureau(data, sel) {
    if (!data || !data.c) return { pct: 0, present: false };
    if (sel.type === 'candidat') {
      if (!Object.prototype.hasOwnProperty.call(data.c, sel.quoi)) return { pct: 0, present: false };
      return { pct: data.c[sel.quoi] || 0, present: true };
    }
    if (sel.type === 'bloc') {
      if (!hasBlocCandidates(data, sel.quoi)) return { pct: 0, present: false };
      const blocs = computeBlocs(data);
      return { pct: blocs[sel.quoi] || 0, present: true };
    }
    if (sel.type === 'famille') {
      let sum = 0; let has = false;
      Object.entries(data.c).forEach(([cid, pct]) => {
        const ci = candInfo(cid) || {};
        if (Array.isArray(ci.t) && ci.t.indexOf(sel.quoi) !== -1) {
          has = true; sum += pct;
        }
      });
      return { pct: sum, present: has };
    }
    return { pct: 0, present: false };
  }
  // Rang du candidat/bloc/famille parmi les autres dans un bureau (1 = top).
  function rankOfSelInBureau(data, sel) {
    if (!data || !data.c) return { rank: 0, total: 0 };
    if (sel.type === 'candidat') {
      const sorted = Object.entries(data.c).sort((a, b) => b[1] - a[1]);
      return { rank: sorted.findIndex(([k]) => k === sel.quoi) + 1, total: sorted.length };
    }
    if (sel.type === 'bloc') {
      const sorted = Object.entries(computeBlocs(data)).sort((a, b) => b[1] - a[1]);
      return { rank: sorted.findIndex(([k]) => k === sel.quoi) + 1, total: sorted.length };
    }
    if (sel.type === 'famille') {
      // Recompose tous les scores famille du bureau, puis trie.
      const fam = {};
      Object.entries(data.c).forEach(([cid, pct]) => {
        const ci = candInfo(cid) || {};
        (ci.t || []).forEach(t => { if (FAMILY_CONFIG[t]) fam[t] = (fam[t] || 0) + pct; });
      });
      const sorted = Object.entries(fam).sort((a, b) => b[1] - a[1]);
      return { rank: sorted.findIndex(([k]) => k === sel.quoi) + 1, total: sorted.length };
    }
    return { rank: 0, total: 0 };
  }
  // Rend la légende partagée sous les 2 cartes.
  // Cas 1 : A et B ont la même baseColor → une seule barre (cas typique "même
  // candidat sur 2 élections", "même bloc sur 2 tours", etc.).
  // Cas 2 : baseColors différentes → deux mini-barres côte à côte ("A: gradient"
  // + "B: gradient") pour ne pas faire mentir le choroplèthe.
  function renderCmpLegend(containerId, A, B) {
    const root = document.getElementById(containerId);
    if (!root || !_cmpState) return;
    const colA = baseColorOfSel(A), colB = baseColorOfSel(B);
    const labA = shortLabelOfSel(A), labB = shortLabelOfSel(B);
    const mode = _cmpState.scaleMode || 'absolute';
    // Helper gradient bas→haut (cohérent avec blendToWhite : plancher 0.08 = bas, 1 = haut).
    function gradFor(c) {
      const lowEnd = blendToWhite(c, 0.08);
      return 'linear-gradient(to right, ' + lowEnd + ' 0%, ' + c + ' 100%)';
    }
    function fmt(p) { return p.toFixed(1).replace('.', ',') + ' %'; }
    // Toggle Abs/Rel/Diff/Nuage — structure miroir de #map-mode-btns (avec
     // class .mmbtn → réutilise le styling existant du mode carte normal).
    const onCls = m => mode === m ? ' mmbtn on' : ' mmbtn';
    const toggle = ''
      + '<div class="cmp-mode-btns" role="group" aria-label="Échelle">'
      + '  <button type="button" class="' + onCls('absolute').trim() + '" data-mode="absolute" data-tooltip="Échelle absolue (partagée A/B)" onclick="toggleCmpScale(\'absolute\')">Abs</button>'

      function side(letter, lab, col, range) {

          + '<span class="cmp-legend-side"><span class="cmp-legend-side-tag" style="background:' + col + '">' + letter + '</span>'
          + '<span class="cmp-legend-bound">' + fmt(range.min) + '</span>'
          + '<div class="cmp-legend-bar" data-side="' + letter + '" style="background:' + gradFor(col) + '"><div class="cmp-legend-cursor"></div></div>'
          + '<span class="cmp-legend-bound">' + fmt(range.max) + '</span></span>';

    const bodyWrap = '<div class="cmp-legend-body">' + body + '</div>';
    const chev = '<button class="cmp-legend-toggle" type="button" aria-label="Afficher/masquer la légende" onclick="_cmpToggleLegend()"><span class="legend-toggle-chev">▾</span></button>';

  }
  // Toggle escamotable de la légende sur mobile.
  window._cmpToggleLegend = function() {
    const root = document.getElementById('cmp-legend');
    if (root) root.classList.toggle('expanded');
  };
  // Bascule du mode d'échelle (absolu / relatif / diff). Recolorie les cartes,
  // re-rend la légende, et adapte le layout (1 map en mode diff, 2 sinon).
  window.toggleCmpScale = function(mode) {
    if (!_cmpState || _cmpState.scaleMode === mode) return;
    const prevMode = _cmpState.scaleMode;
    _cmpState.scaleMode = mode;
    // Layout : mode diff = 1 seule map (celle de l'ère la plus RÉCENTE), pleine
    // largeur. Les classes is-cmp-diff-show-a/b pilotent quel cmp-wrap-* est
    // affiché. is-cmp-diff reste posée pour les règles génériques (drawer diff).
    const displaySide = _cmpDisplaySide();
    document.body.classList.toggle('is-cmp-diff', mode === 'diff');
    document.body.classList.toggle('is-cmp-diff-show-a', mode === 'diff' && displaySide === 'A');
    document.body.classList.toggle('is-cmp-diff-show-b', mode === 'diff' && displaySide === 'B');
    document.body.classList.toggle('is-cmp-nuage', mode === 'nuage');
    // Fenêtre flottante FERMÉE par défaut à l'entrée en Diff — on veut que la

    // Hors Diff (abs/rel) : on retire la classe pour nettoyer.
    document.body.classList.toggle('is-cmp-diff-collapsed', mode === 'diff');
    // invalidateSize après le re-layout pour que Leaflet recompute les dimensions.
    // Si on QUITTE Nuage spécifiquement (les cartes étaient hidden → leur zoom level
    // peut être corrompu), on re-fit aux bounds initiales (La Rochelle) après l'invalidate.
    // Ne PAS refit pour les autres transitions de mode, sinon on écraserait le pan/zoom utilisateur.
    const leavingNuage = (prevMode === 'nuage' && mode !== 'nuage');

    // avec un contenu obsolète (le mid-bar reste visible en Diff aussi).
    hideCmpMidBar();
    // Recolorie : geo.setStyle(geo.options.style) re-évalue styleOf, qui branche
    // diff/abs/rel via _cmpState.scaleMode.
    if (_cmpState.geoA) _cmpState.geoA.setStyle(_cmpState.geoA.options.style);
    if (_cmpState.geoB) _cmpState.geoB.setStyle(_cmpState.geoB.options.style);
    // Reconstruire les tooltips DU CÔTÉ AFFICHÉ en diff (le contenu change avec

    const sidesToRebuild = (mode === 'diff') ? [displaySide] : ['A', 'B'];
    sidesToRebuild.forEach(s => {
      const geo = _cmpState['geo' + s], map = _cmpState['map' + s];
      if (!geo || !map || !map._cmpRebuildTooltipFor) return;

    // avoir changé via swap ou edit). En sortie du mode diff, on vide le HTML.
    if (mode === 'diff') renderDiffSidebar();
    else { const sb = document.getElementById('cmp-diff-drawer'); if (sb) sb.innerHTML = ''; }
    // Mode Nuage : rendre le scatter + mini-carte. À chaque entrée car les
    // données peuvent avoir changé (swap, edit). À la sortie, on nettoie.

  // Synchro highlight bureaux ↔ survol gradient.

  // POSITION RELATIVE t∈[0,1]. À t donné sur la barre survolée, on highlight :
  //   • côté hovered : pct = rangeHovered.min + t * (rangeHovered.max - min)

  function bindLegendHover() {
    if (!_cmpState) return;

      if (!layers || !geo || !sel) return;
      const r = rangeOf(side);
      const amp = Math.max(0.01, r.max - r.min);
      const tol = Math.max(0.5, Math.min(2.5, amp * 0.04));
      const sheet = getSheetForSel(sel);
      Object.entries(layers).forEach(([ns, layer]) => {
        const data = sheet[ns]; if (!data) return;
        const { pct, present } = scoreOfSelInBureau(data, sel);
        if (!present) return;
        if (Math.abs(pct - targetPct) <= tol) {
          layer.setStyle({ weight: 2.6, color: '#000' });
          if (layer.bringToFront) layer.bringToFront();
          highlighted.push({ layer, geo });

      });
    }
    // Curseur fantôme sur l'AUTRE barre (mode relatif uniquement) : matérialise

    function updateGhostCursor(hoveredSide, t) {
      const otherSide = hoveredSide === 'A' ? 'B' : 'A';
      const otherBar = document.querySelector('#cmp-legend .cmp-legend-bar[data-side="' + otherSide + '"]');
      if (!otherBar) return;

      if (!otherCursor) return;
