// Encode l'état complet de l'UI dans le hash pour permettre le partage de liens profonds.
// Rétro-compatible : les hashes existants (election/tour/bureau/quartier) continuent de marcher.
let _urlStateInit = false;        // évite d'écrire le hash pendant la lecture initiale
let _urlStateRaf = 0;             // throttle via requestAnimationFrame
function writeURLState() {
  if (!_urlStateInit) return;
  if (_urlStateRaf) return;
  _urlStateRaf = requestAnimationFrame(() => {
    _urlStateRaf = 0;
    const params = new URLSearchParams();
    // Élection / tour : toujours sérialisés pour partage explicite
    if (currentElection) params.set('election', currentElection);
    if (currentSheet && currentSheet !== 'T1') params.set('tour', currentSheet);
    // Mode de coloration de la carte
    if (currentMapMode && currentMapMode !== 'candidat') params.set('mode', currentMapMode);
    // Sélection choroplèthe (candidat ou bloc)
    if (currentMapSelection) params.set('selection', currentMapSelection);
    // État de l'overlay (fiche ouverte)
    const ov = document.getElementById('overlay');
    const ovOpen = ov && ov.style.display !== 'none';
    if (ovOpen) {
      if (overlayTab === 'bureau' && currentFeature) {
        params.set('bureau', numStr(currentFeature));
      } else if (overlayTab === 'quartier') {
        // Fallback : si currentQuartier null, récupérer depuis le currentFeature
        let q = currentQuartier;
        if (!q && currentFeature && typeof bureauInfo === 'function' && typeof getQuartierParts === 'function') {
          const info = bureauInfo(currentFeature);
          const parts = getQuartierParts(info.quartier || '');
          if (parts.length) q = parts[0];
        }
        if (q) params.set('quartier', q);
      } else if (overlayTab === 'global') {
        params.set('tab', 'global');
      }
    }
    const newHash = params.toString();
    const target = newHash ? '#' + newHash : location.pathname + location.search;
    const desired = newHash ? location.pathname + location.search + '#' + newHash : location.pathname + location.search;
    if (location.href.split('#')[0] + (newHash ? '#' + newHash : '') !== location.href) {
      try { history.replaceState(null, '', desired); } catch(_) {}
    }
  });
}

// Lecture du hash (#bureau=XXXX ou #quartier=NomDuQuartier) — vient depuis la page analyse.
// On reste sur l'élection courante (la plus récente) et on ouvre directement la fiche.
(function applyHashSelection(){
  const hash = (location.hash || '').replace(/^#/, '');
  // On marquera _urlStateInit = true à la fin, qu'il y ait un hash ou non
  if (!hash) { _urlStateInit = true; writeURLState(); return; }
  const params = new URLSearchParams(hash);
  const bid = params.get('bureau');
  const qname = params.get('quartier');
  const elec = params.get('election');
  const tour = params.get('tour');
  const mode = params.get('mode');
  const selection = params.get('selection');
  const tab = params.get('tab');
  // Bascule d'élection si demandé (avant ouverture du fiche)
  if (elec && ELECTIONS[elec]) {
    currentElection = elec;
    const _sel = document.getElementById('el-select'); if (_sel) _sel.value = elec;
    const newSheets = Object.keys(ELECTIONS[elec].sheets || {});
    if (tour && newSheets.includes(tour)) currentSheet = tour;
    else if (newSheets.includes('T1')) currentSheet = 'T1';
    else if (newSheets.includes('TU')) currentSheet = 'TU';
    updateTourUI(); updateFooter(); updateTopbar(); loadMap();
    updateModeButtonsAvailability();
    // Rafraîchir la sidebar globale avec la nouvelle élection (sinon elle garde le preview
    // de l'élection initiale au reload — sera écrasée plus loin si une fiche est ouverte).
    renderGlobal();
  }
  // Mode de coloration
  if (mode && ['candidat','bloc','abstention','bv'].includes(mode)) {
    // Sécurité reload : si le mode hash est "bloc" mais l'élection est un référendum, on tombe sur "candidat".
    if (mode === 'bloc' && typeof isReferendum === 'function' && isReferendum(currentElection)) {
      mode = 'candidat';
    }
    currentMapMode = mode;
    document.querySelectorAll('.mmbtn').forEach(b => b.classList.toggle('on', b.textContent.toLowerCase().startsWith(mode === 'candidat' ? 'cand' : mode === 'bloc' ? 'bloc' : mode === 'abstention' ? 'abst' : 'blanc')));
  }
  // Sélection choroplèthe (appliquée après loadMap pour avoir mainLayer)
  // Délai léger pour laisser le map et le DOM se stabiliser
  setTimeout(() => {
    if (selection && (currentMapMode === 'candidat' || currentMapMode === 'bloc')) {
      currentMapSelection = selection;
      [currentSelectionMin, currentSelectionMax] = computeSelectionRange();
    }
    // Ré-appliquer style + légende avec le mode courant (et la sélection si active).
    // Important pour les modes abstention/bv au reload : mainLayer a été créé en mode 'candidat'
    // par défaut, il faut le restyler avec le mode lu dans l'URL.
    if (mainLayer) mainLayer.setStyle(featureStyle);
    renderMapLegend();
    if (bid) {
      const gj = getMapGeoJSON();
      const feat = gj.features.find(f => (f.properties.b2026 || numStr(f)) === bid)
                || gj.features.find(f => numStr(f) === bid);
      if (feat) {
        currentFeature = feat;
        overlayTab = 'bureau';
        const info = bureauInfo(feat);
        document.getElementById('ov-title').textContent = isAggNs(numStr(feat)) ? 'Bureaux agrégés — ' + info.quartier : 'Fiche bureau — ' + info.denomination;
        setOverlayDisplay('flex');
        renderFiche(feat);
        // Sidebar en mode "liste de bureaux" (cohérent avec openOverlay() — pas de preview du bureau actuel)
        showBureauListSidebar();
        updateAccentColor();
        // Génère les onglets « Le quartier : XXX » en haut de fiche (sinon ils manquent au reload).
        updateOverlayTabs();
      }
    } else if (tab === 'global') {
      // Ouvrir directement la fiche globale (cohérent avec openGlobalOverlay)
      overlayTab = 'global';
      currentFeature = null;
      document.getElementById('ov-title').textContent = 'La Rochelle — Résultats globaux';
      document.getElementById('ov-tabs').style.display = 'none';
      setOverlayDisplay('flex');
      if (typeof renderGlobalFiche === 'function') renderGlobalFiche();
      showBureauListSidebar();
      updateAccentColor();
    } else if (qname) {
      // Construire un currentFeature « factice » via le 1er bureau du quartier
      const yearInfo = BUREAU_INFO['2026'] || {};
      const ids = Object.entries(yearInfo)
        .filter(([, b]) => getQuartierParts(b.q || '').includes(qname))
        .map(([id]) => id);
      if (ids.length) {
        const gj = getMapGeoJSON();
        const feat = gj.features.find(f => numStr(f) === ids[0]);
        if (feat) {
          currentFeature = feat;
          openOverlayQuartierNamed(qname);
        }
      }
    }
    // Activation de l'écriture du hash après lecture initiale
    _urlStateInit = true;
    writeURLState();
  }, 50);
})();

    + '.tour-actions .next:hover,.tour-actions .finish:hover{background:#2A2A2A}'
    + '.tour-actions .cta{background:#B49B7E;color:#fff}'
    + '.tour-actions .cta:hover{background:#9F876B}';
  const styleEl = document.createElement('style');
  styleEl.textContent = css;
  document.head.appendChild(styleEl);

  function placeCard(card, rect, placement){
    const cw = card.offsetWidth, ch = card.offsetHeight;
    const vw = window.innerWidth, vh = window.innerHeight;
    let x, y;
    if (!rect || placement === 'center') {
      x = (vw - cw) / 2; y = (vh - ch) / 2;
    } else {
      const gap = 14;
      switch (placement) {
        case 'top':    x = rect.left + rect.width/2 - cw/2; y = rect.top - ch - gap; break;
        case 'left':   x = rect.left - cw - gap; y = rect.top + rect.height/2 - ch/2; break;
        case 'right':  x = rect.right + gap; y = rect.top + rect.height/2 - ch/2; break;
        case 'bottom':
        default:       x = rect.left + rect.width/2 - cw/2; y = rect.bottom + gap; break;
      }
    }
    // Clamp dans le viewport
    x = Math.max(12, Math.min(x, vw - cw - 12));
    y = Math.max(12, Math.min(y, vh - ch - 12));
    card.style.left = x + 'px';
    card.style.top  = y + 'px';
  }

  window.startGuidedTour = function(steps, opts) {
    opts = opts || {};
    if (!steps || !steps.length) return;
    let i = 0, finished = false;

    const back = document.createElement('div'); back.className = 'tour-back';
    const spot = document.createElement('div'); spot.className = 'tour-spot'; spot.style.display = 'none';
    const card = document.createElement('div'); card.className = 'tour-card';
    document.body.appendChild(back);
    document.body.appendChild(spot);
    document.body.appendChild(card);

    function destroy(skipped){
      if (finished) return;
      finished = true;
      back.remove(); spot.remove(); card.remove();
      document.removeEventListener('keydown', onKey);
      window.removeEventListener('resize', onResize);
      if (opts.tourId) {
        try { localStorage.setItem('lrvote_tour_' + opts.tourId + '_seen', '1'); } catch(_) {}
      }
      if (!skipped && opts.onFinish) opts.onFinish();
    }
    function next(){ if (i < steps.length - 1) { i++; show(); } else destroy(false); }
    function prev(){ if (i > 0) { i--; show(); } }
    function skip(){ destroy(true); }

    // Calcule le rect englobant — gère cible unique, liste de cibles, et padding optionnel
    function resolveTargetRect(target, pad) {
      if (!target) return null;
      const sels = Array.isArray(target) ? target : [target];
      const rects = [];
      sels.forEach(s => document.querySelectorAll(s).forEach(el => rects.push(el.getBoundingClientRect())));
      if (!rects.length) return null;
      let base;
      if (rects.length === 1) {
        const r = rects[0];
        base = { left: r.left, top: r.top, right: r.right, bottom: r.bottom, width: r.width, height: r.height };
      } else {
        let l = Infinity, t = Infinity, r = -Infinity, b = -Infinity;
        rects.forEach(rc => {
          l = Math.min(l, rc.left); t = Math.min(t, rc.top);
          r = Math.max(r, rc.right); b = Math.max(b, rc.bottom);
        });
        base = { left: l, top: t, right: r, bottom: b, width: r-l, height: b-t };
      }
      if (pad) {
        if (pad.top)    { base.top    -= pad.top;    base.height += pad.top;    }
        if (pad.bottom) {                            base.height += pad.bottom; }
        if (pad.left)   { base.left   -= pad.left;   base.width  += pad.left;   }
        if (pad.right)  {                            base.width  += pad.right;  }
        base.right  = base.left + base.width;
        base.bottom = base.top  + base.height;
      }
      return base;
    }
    function show(){
      const step = steps[i];
      // Setup hook (peut modifier le DOM avant le rendu)
      if (step.setup) { try { step.setup(); } catch(_) {} }
      requestAnimationFrame(() => render(step));
    }
    function render(step){
      const isLast = i === steps.length - 1;
      const rect = (step.placement !== 'center') ? resolveTargetRect(step.target, step.targetPad) : null;

      // Spotlight
      if (rect) {
        const pad = 0;
        spot.style.display = 'block';
        spot.style.left   = (rect.left - pad) + 'px';
        spot.style.top    = (rect.top - pad) + 'px';
        spot.style.width  = (rect.width + pad*2) + 'px';
        spot.style.height = (rect.height + pad*2) + 'px';
        back.style.display = 'none';
      } else {
        spot.style.display = 'none';
        back.style.display = 'block';
      }

      // Card content
      const total = steps.length;
      const cta = step.finalCta || opts.finalCta;
      let actionsHtml = '<div class="tour-actions">';
      actionsHtml += '<button class="skip" data-act="skip">Passer</button>';
      if (i > 0) actionsHtml += '<button class="prev" data-act="prev">‹ Précédent</button>';
      if (isLast && cta) {
        actionsHtml += '<button class="finish" data-act="finish">Terminer</button>';
        actionsHtml += '<button class="cta" data-act="cta">' + cta.label + '</button>';
      } else if (isLast) {
        actionsHtml += '<button class="finish" data-act="finish">Terminer</button>';
      } else {
        actionsHtml += '<button class="next" data-act="next">Suivant ›</button>';
      }
      actionsHtml += '</div>';

      card.innerHTML = '<div class="tour-step-num">Étape ' + (i+1) + ' / ' + total + '</div>'
        + '<h3>' + step.title + '</h3>'
        + '<p>' + step.body + '</p>'
        + actionsHtml;

      // Position
      placeCard(card, rect, step.placement || 'bottom');
      requestAnimationFrame(() => card.classList.add('visible'));

      // Bind actions
      card.querySelectorAll('[data-act]').forEach(b => {
        b.addEventListener('click', () => {
          const act = b.dataset.act;
          if (act === 'next') next();
          else if (act === 'prev') prev();
          else if (act === 'skip') skip();
          else if (act === 'finish') destroy(false);
          else if (act === 'cta' && cta) {
            // Mark as seen, then navigate
            if (opts.tourId) {
              try { localStorage.setItem('lrvote_tour_' + opts.tourId + '_seen', '1'); } catch(_) {}
            }
            if (cta.href) location.href = cta.href;
          }
        });
      });
    }
    function onKey(e){
      if (e.key === 'Escape') skip();
      else if (e.key === 'ArrowRight') next();
      else if (e.key === 'ArrowLeft') prev();
    }
    function onResize(){
      if (i < steps.length) {
        const step = steps[i];
        const rect = (step.placement !== 'center') ? resolveTargetRect(step.target, step.targetPad) : null;
        if (rect) {
          const pad = 0;
          spot.style.left = (rect.left - pad) + 'px';
          spot.style.top  = (rect.top - pad) + 'px';
          spot.style.width  = (rect.width + pad*2) + 'px';
          spot.style.height = (rect.height + pad*2) + 'px';
        }
        placeCard(card, rect, step.placement || 'bottom');
      }
    }
    document.addEventListener('keydown', onKey);
    window.addEventListener('resize', onResize);
    show();
  };
})();

// ─── Export image (LRVcarte) ─────────────────────────────────────────────
(function setupExportImage(){
  const W = 1200, H = 675;
  const PAD = 40;
  const HEADER_H = 100;
  const FOOTER_H = 50;

  function slug(s){
    return String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  }

  // PARTI_COLORS : palette des partis (25 teintes). Définie dans shared.js.

  // Dessine le logo LR ⚓ Vote sur canvas. Retourne la largeur totale dessinée.
  // Reproduit la mise en page du logo HTML : "LR" à 95% de "Vote", voile alignée
  // bas-baseline et remontée d'1px, couleur aléatoire depuis la palette parti.
  function drawLogo(ctx, x, baselineY) {
    const fontSize = 32;            // taille de "Vote" (référence)
    const lrSize = fontSize * 0.95; // "LR" à 95%
    const sailSize = 22;            // ≈ cap-height
    const gap = 4;
    const sailColor = PARTI_COLORS[Math.floor(Math.random() * PARTI_COLORS.length)];

    ctx.textBaseline = 'alphabetic';

    // "LR" à 95%
    ctx.fillStyle = '#1A1A1A';
    ctx.font = '400 ' + lrSize + 'px "Space Grotesk", system-ui, sans-serif';
    ctx.fillText('LR', x, baselineY);
    const lrW = ctx.measureText('LR').width;

    // Voile : 6 barres alignées à droite, bas de la voile à la baseline du texte
    const sailX = x + lrW + gap;
    const sailTop = baselineY - sailSize;
    const widths = [0.17, 0.33, 0.50, 0.67, 0.83, 1.0];
    const barH = (sailSize - 5) / 6;
    ctx.fillStyle = sailColor;
    widths.forEach((wp, i) => {
      const bw = wp * sailSize;
      const by = sailTop + i * (barH + 1);
      const bx = sailX + (sailSize - bw);
      ctx.fillRect(bx, by, bw, barH);
    });

    // "Vote" à 100%
    ctx.fillStyle = '#1A1A1A';
    ctx.font = '700 ' + fontSize + 'px "Space Grotesk", system-ui, sans-serif';
    const voteX = sailX + sailSize + gap;
    ctx.fillText('Vote', voteX, baselineY);
    const voteW = ctx.measureText('Vote').width;

    return (voteX + voteW) - x; // largeur totale du logo
  }

  // Texte du sous-titre selon le mode courant
  function getCarteSubtitle() {
    const m = currentMapMode, s = currentMapSelection;
    if (m === 'candidat') {
      if (s) {
        const cd = (typeof CAND_DATA !== 'undefined' && (CAND_DATA[s + '|' + currentElection] || CAND_DATA[s])) || {};
        const nom = cd.n || s.replace(/\s*\([^)]*\)$/, '');
        const prenom = cd.p ? cd.p + ' ' : '';
        const pa = cd.pa ? ' (' + cd.pa + ')' : '';
        return 'Score de ' + prenom + nom + pa;
      }
      return 'Vainqueur·e par bureau';
    }
    if (m === 'bloc') {
      if (s) {
        const cfg = (typeof BLOC_CONFIG !== 'undefined' && BLOC_CONFIG[s]) || {};
        return 'Score du bloc « ' + (cfg.label || s) + ' »';
      }
      return 'Bloc dominant par bureau';
    }
    if (m === 'abstention') return 'Taux d’abstention par bureau';
    if (m === 'bv')         return 'Bulletins blancs et nuls par bureau';
    return '';
  }

  function getCarteTitle() {
    let t = currentElection;
    // Pas de mention de tour pour un référendum (notion non pertinente).
    if (typeof isReferendum === 'function' && isReferendum(currentElection)) return t;

  // Projection Web Mercator (lng et lat convertis en radians pour avoir un ratio cohérent)
  function lngToX(lng){ return lng * Math.PI / 180; }

  // Repères géographiques pour les exports cartes :
  //  • `points`      : 10 repères principaux pour la carte GLOBALE (vue d'ensemble lisible)
  //  • `pointsFiche` : 37 repères détaillés pour les MINI-CARTES de fiches (zoom plus serré,
  //                    plus de repères pour aider au repérage local)
  // Le filtrage hors-cadre est fait par drawReperesOnCarte via le bbox passé.

  // Dessine les repères sur la carte d'export (points triangulaires + labels).
  // `project` convertit lng/lat → pixel canvas.
  // `bounds`  = {minLng, maxLng, minLat, maxLat} — filtre les points hors zone visible.
  // `points`  = liste de repères à utiliser (par défaut LR_REPERES.points).
  // `frame`   = {x, y, w, h} px — si fourni, le label est repositionné (left/right/below)
  //             pour ne pas dépasser ce cadre, sans bouger le triangle.
  // `maxLabels` = nombre max de repères à afficher (priorité aux plus proches du centre).
  //             Si non fourni, tous les repères qui passent les filtres sont affichés.
  // Détection de collision : un candidat dont la bbox (triangle + label) chevauche un
  // déjà placé est sauté ; le suivant dans la liste de priorité est essayé.
  function drawReperesOnCarte(ctx, project, bounds, points, frame, maxLabels) {
    const list = points || LR_REPERES.points;
    function inBounds(lng, lat) {
      if (!bounds) return true;
      return lng >= bounds.minLng && lng <= bounds.maxLng
          && lat >= bounds.minLat && lat <= bounds.maxLat;
    }
    const TRI_W = 5, TRI_H = 7, GAP = 2;
    const FONT_PX = 9.5;
    const PAD = 2;
    ctx.save();
    ctx.font = '600 ' + FONT_PX + 'px "Space Grotesk", system-ui, sans-serif';

    // 1) Filtrer dans le cadre + projeter en pixel
    let candidates = list
      .filter(p => inBounds(p.lng, p.lat))
      .map(p => { const [px, py] = project(p.lng, p.lat); return { p: p, px: px, py: py }; });

    // 2) Trier par proximité au centre du cadre (les plus pertinents d'abord)
    if (frame) {
      const cx = frame.x + frame.w / 2;
      const cy = frame.y + frame.h / 2;
      candidates.forEach(c => { const dx = c.px - cx, dy = c.py - cy; c.d = dx*dx + dy*dy; });
      candidates.sort((a, b) => a.d - b.d);
    }

    // 3) Pour chaque candidat : essayer le layout par défaut (label au-dessus, ▼).
    //    En cas de débordement vertical du cadre OU de collision avec un déjà accepté,
    //    on retente avec le layout flipped (label en dessous, ▲). Si les deux échouent,
    //    on ignore ce repère. La limite maxLabels reste appliquée.
    function tryLayout(c, flipped) {
      const tw = ctx.measureText(c.p.n).width;
      let tx = c.px;
      let ty = flipped ? (c.py + TRI_H + GAP) : (c.py - TRI_H - GAP);
      let align = 'center';
      const baseline = flipped ? 'top' : 'alphabetic';
      if (frame) {
        // Validation verticale : le label doit tenir entièrement dans le cadre
        if (!flipped && ty - FONT_PX < frame.y + PAD) return null;
        if (flipped  && ty + FONT_PX + 2 > frame.y + frame.h - PAD) return null;
        // Horizontal : ajustement gauche/droite (le triangle ne bouge jamais)
        const halfW = tw / 2;
        if (c.px - halfW < frame.x + PAD)                  { align = 'left';  tx = c.px - TRI_W / 2; }
        else if (c.px + halfW > frame.x + frame.w - PAD)   { align = 'right'; tx = c.px + TRI_W / 2; }
      }
      // Bbox du label
      let lx1, lx2;
      if (align === 'center')      { lx1 = tx - tw / 2; lx2 = tx + tw / 2; }
      else if (align === 'left')   { lx1 = tx;          lx2 = tx + tw; }
      else                         { lx1 = tx - tw;     lx2 = tx; }
      const ly1 = (baseline === 'top') ? ty               : ty - FONT_PX;
      const ly2 = (baseline === 'top') ? ty + FONT_PX + 2 : ty + 2;
      const triTop = flipped ? c.py : c.py - TRI_H;
      const triBot = flipped ? c.py + TRI_H : c.py;
      const box = {
        x1: Math.min(lx1, c.px - TRI_W / 2) - 1,
        y1: Math.min(ly1, triTop) - 1,
        x2: Math.max(lx2, c.px + TRI_W / 2) + 1,
        y2: Math.max(ly2, triBot) + 1
      };
      return { tx: tx, ty: ty, align: align, baseline: baseline, flipped: flipped, box: box };
    }
    const limit = (typeof maxLabels === 'number') ? maxLabels : Infinity;
    const accepted = [];
    function collidesWithAccepted(b) {
      return accepted.some(a => !(b.x2 < a.box.x1 || b.x1 > a.box.x2
                              || b.y2 < a.box.y1 || b.y1 > a.box.y2));
    }
    for (const c of candidates) {
      if (accepted.length >= limit) break;
      // Essai 1 : layout normal (label au-dessus)
      let layout = tryLayout(c, false);
      if (!layout || collidesWithAccepted(layout.box)) {
        // Essai 2 : layout inversé (label en dessous)
        layout = tryLayout(c, true);
        if (!layout || collidesWithAccepted(layout.box)) continue;
      }
      accepted.push(Object.assign({ c: c }, layout));
    }

    // 4) Dessiner triangles puis labels
    accepted.forEach(a => {
      const { c, tx, ty, align, baseline, flipped } = a;
      // Triangle ▼ (label au-dessus) ou ▲ (label en dessous) — la pointe reste sur (c.px, c.py)
      ctx.beginPath();
      if (flipped) {
        // ▲ : base en bas, pointe en haut (sur la coord)
        ctx.moveTo(c.px - TRI_W / 2, c.py + TRI_H);
        ctx.lineTo(c.px + TRI_W / 2, c.py + TRI_H);
        ctx.lineTo(c.px, c.py);
      } else {
        // ▼ : base en haut, pointe en bas (sur la coord)
        ctx.moveTo(c.px - TRI_W / 2, c.py - TRI_H);
        ctx.lineTo(c.px + TRI_W / 2, c.py - TRI_H);
        ctx.lineTo(c.px, c.py);
      }
      ctx.closePath();
      ctx.fillStyle = '#1A1A1A';
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 1.2;
      ctx.stroke();
      ctx.fill();
      ctx.textAlign = align;
      ctx.textBaseline = baseline;
      ctx.lineWidth = 2.5;
      ctx.strokeStyle = 'rgba(255,255,255,0.92)';
      ctx.strokeText(c.p.n, tx, ty);
      ctx.fillStyle = '#1A1A1A';
      ctx.fillText(c.p.n, tx, ty);
    });
    ctx.restore();
  }

  // Dessine la carte choroplèthe sur le canvas
  function drawCarteVisual(ctx, x, y, w, h) {
    if (typeof getMapGeoJSON !== 'function') return null;
    const gj = getMapGeoJSON();
    if (!gj || !gj.features || !gj.features.length) return null;

    // Calcul des bornes lat/lng (on exclut le bureau 0057 non géo)
    let minLat = Infinity, maxLat = -Infinity, minLng = Infinity, maxLng = -Infinity;
    function visit(coords) {
      if (typeof coords[0] === 'number') {
        const [lng, lat] = coords;
        if (lat < minLat) minLat = lat;
        if (lat > maxLat) maxLat = lat;
        if (lng < minLng) minLng = lng;
        if (lng > maxLng) maxLng = lng;
      } else { coords.forEach(visit); }
    }
    gj.features.forEach(f => {
      const ns = numStr(f);
      if (ns === '0057') return;
      if (!f.geometry) return;
      visit(f.geometry.coordinates);
    });
    if (minLat === Infinity) return null;

    // Conversion Mercator (les deux axes en radians, ratio géographique correct)
    const xMin = lngToX(minLng), xMax = lngToX(maxLng);
    const yMin = latToY(minLat), yMax = latToY(maxLat);
    const dataW = xMax - xMin, dataH = yMax - yMin;

    // Fit dans la zone visuelle (préserve aspect ratio)
    const dataRatio = dataW / dataH;
    const boxRatio = w / h;
    let drawW, drawH;
    if (dataRatio > boxRatio) { drawW = w; drawH = w / dataRatio; }
    else                      { drawH = h; drawW = h * dataRatio; }
    const offX = x + (w - drawW) / 2;
    const offY = y + (h - drawH) / 2;

    function project(lng, lat) {
      const px = ((lngToX(lng) - xMin) / dataW) * drawW + offX;
      const py = drawH - ((latToY(lat) - yMin) / dataH) * drawH + offY;
      return [px, py];
    }

    function drawRing(ring) {
      ctx.beginPath();
      ring.forEach((pt, i) => {
        const [px, py] = project(pt[0], pt[1]);
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      });
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }

    gj.features.forEach(f => {
      const ns = numStr(f);
      if (ns === '0057') return;
      if (!f.geometry) return;
      const style = featureStyle(f);
      ctx.fillStyle = style.fillColor || '#ddd';
      ctx.strokeStyle = style.color || '#fff';
      ctx.lineWidth = (style.weight || 1) * 0.7;
      ctx.globalAlpha = style.fillOpacity != null ? style.fillOpacity : 1;
      const c = f.geometry.coordinates;
      if (f.geometry.type === 'Polygon') c.forEach(drawRing);
      else if (f.geometry.type === 'MultiPolygon') c.forEach(p => p.forEach(drawRing));
    });
    ctx.globalAlpha = 1;

    // Repères géographiques (KML) — dessinés par-dessus les bureaux
    drawReperesOnCarte(ctx, project, { minLng, maxLng, minLat, maxLat }, null,
      { x: offX, y: offY, w: drawW, h: drawH });

    return { drawW, drawH, offX, offY };
  }

  // Légende synthétique (selon le mode courant) en bas-droite de la zone visuelle
  function drawCarteLegend(ctx, visX, visY, visW, visH) {
    const m = currentMapMode, s = currentMapSelection;
    const shData = (typeof getSheetData === 'function') ? getSheetData() : {};
    const legPad = 4;
    const legX = visX + visW - 280 - legPad;
    const legY = visY + visH - 200 - legPad;
    const legW = 280;

    // Détermine le contenu
    const lines = []; // [{type:'item', color, label, val}, {type:'gradient', color, label, mn, mx}]

    if (m === 'candidat' && s) {
      const col = (typeof colorOfCandidate === 'function') ? colorOfCandidate(s) : '#666';
      lines.push({ type: 'gradient', color: col, mn: currentSelectionMin, mx: currentSelectionMax });
    } else if (m === 'bloc' && s) {
      const cfg = (typeof BLOC_CONFIG !== 'undefined' && (BLOC_CONFIG[s] || BLOC_CONFIG['?'])) || { color:'#666', label:s };
      lines.push({ type: 'gradient', color: cfg.color, mn: currentSelectionMin, mx: currentSelectionMax });
    } else if (m === 'candidat') {
      // Top 5 vainqueurs (Prénom Nom)
      const wins = {};
      Object.entries(shData).forEach(([ns, d]) => { if (ns==='0057' || !d || !d.w) return; wins[d.w] = (wins[d.w]||0) + 1; });
      const sorted = Object.entries(wins).sort((a,b)=>b[1]-a[1]).slice(0,5);
      sorted.forEach(([n, nb]) => {
        const col = (typeof colorOfCandidate === 'function') ? colorOfCandidate(n) : '#666';
        const cd = (typeof CAND_DATA !== 'undefined' && (CAND_DATA[n + '|' + currentElection] || CAND_DATA[n])) || {};
        const nom = cd.n || n.replace(/\s*\([^)]*\)$/, '');
        const prenom = cd.p ? cd.p + ' ' : '';
        const pa = cd.pa ? ' (' + cd.pa + ')' : '';
        lines.push({ type:'item', color:col, label: prenom + nom + pa, val: nb + ' bur.' });
      });
    } else if (m === 'bloc') {
      const wins = {};
      Object.entries(shData).forEach(([ns, d]) => {
        if (ns==='0057' || !d) return;
        if (typeof computeBlocs !== 'function') return;
        const bc = computeBlocs(d);
        const dom = Object.entries(bc).sort((a,b)=>b[1]-a[1])[0];
        if (dom) wins[dom[0]] = (wins[dom[0]]||0) + 1;
      });
      Object.entries(wins).sort((a,b)=>b[1]-a[1]).slice(0,6).forEach(([k, nb]) => {
        const cfg = (typeof BLOC_CONFIG !== 'undefined' && (BLOC_CONFIG[k] || BLOC_CONFIG['?'])) || { color:'#666', label:k };
        lines.push({ type:'item', color: cfg.color, label: cfg.label || k, val: nb + ' bur.' });
      });
    } else if (m === 'abstention') {
      if (typeof ensureAbstRange === 'function') ensureAbstRange();
      lines.push({ type: 'gradient', color: '#1A1A2E', mn: currentAbstMin, mx: currentAbstMax });
    } else if (m === 'bv') {
      const vals = Object.entries(shData).filter(([ns,d])=>ns!=='0057'&&d&&d.i).map(([,d])=>getBVPct(d));
      if (vals.length) {
        lines.push({ type:'gradient', color: 'rgb(90,60,120)', mn: Math.min(...vals), mx: Math.max(...vals) });
      }
    }

    if (!lines.length) return;

    const lineH = 22;
    const gradH = 38; // dégradé + min/max (sans label)
    const padTop = 12, padBottom = 10;
    let bgH = padTop + padBottom;
    lines.forEach(l => bgH += (l.type === 'gradient' ? gradH : lineH));

    const legActualY = visY + visH - bgH - legPad;

    // Fond
    ctx.fillStyle = 'rgba(255,255,255,0.96)';
    ctx.strokeStyle = '#E6DFD5';
    ctx.lineWidth = 1;
    if (typeof ctx.roundRect === 'function') {
      ctx.beginPath(); ctx.roundRect(legX, legActualY, legW, bgH, 8); ctx.fill(); ctx.stroke();
    } else {
      ctx.fillRect(legX, legActualY, legW, bgH);
      ctx.strokeRect(legX, legActualY, legW, bgH);
    }

    ctx.textBaseline = 'alphabetic';
    let cy = legActualY + padTop;

    lines.forEach(l => {
      if (l.type === 'item') {
        // Carré coloré + label + valeur
        ctx.fillStyle = l.color;
        ctx.fillRect(legX + 14, cy + 4, 12, 12);
        ctx.fillStyle = '#1A1A1A';
        ctx.font = '500 13px "Space Grotesk", system-ui, sans-serif';
        const maxW = legW - 14 - 12 - 8 - 50 - 14;
        let label = l.label;
        while (ctx.measureText(label).width > maxW && label.length > 5) label = label.slice(0, -1);
        if (label.length < l.label.length) label = label.slice(0, -1) + '…';
        ctx.fillText(label, legX + 14 + 12 + 8, cy + 14);
        ctx.fillStyle = '#5A5A5A';
        ctx.font = '700 12px "Space Grotesk", system-ui, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(l.val, legX + legW - 14, cy + 14);
        ctx.textAlign = 'left';
        cy += lineH;
      } else if (l.type === 'gradient') {
        // Dégradé direct (pas de label au-dessus)
        const gx = legX + 14, gy = cy + 4, gw = legW - 28, gh = 14;
        const grad = ctx.createLinearGradient(gx, gy, gx + gw, gy);
        grad.addColorStop(0, '#fff');
        grad.addColorStop(1, l.color);
        ctx.fillStyle = grad;
        ctx.fillRect(gx, gy, gw, gh);
        ctx.strokeStyle = '#ddd';
        ctx.strokeRect(gx, gy, gw, gh);
        // Min / max sous le dégradé
        ctx.fillStyle = '#5A5A5A';
        ctx.font = '500 11px "Space Grotesk", system-ui, sans-serif';
        ctx.fillText((l.mn||0).toFixed(1) + ' %', gx, gy + gh + 13);
        ctx.textAlign = 'right';
        ctx.fillText((l.mx||0).toFixed(1) + ' %', gx + gw, gy + gh + 13);
        ctx.textAlign = 'left';
        cy += gradH;
      }
    });
  }

  async function compose() {
    if (document.fonts && document.fonts.ready) { try { await document.fonts.ready; } catch(_) {} }
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');

    // Fond beige
    ctx.fillStyle = '#F0EAE0';
    ctx.fillRect(0, 0, W, H);

    // En-tête (bandeau beige clair)
    ctx.fillStyle = '#F7F3EE';
    ctx.fillRect(0, 0, W, HEADER_H);
    ctx.fillStyle = '#E6DFD5';
    ctx.fillRect(0, HEADER_H - 1, W, 1);

    // Logo à gauche (baseline 64 → bien centré dans HEADER_H=100)
    const logoBaseline = 64;
    const logoW = drawLogo(ctx, PAD, logoBaseline);

    // Titre + sous-titre à droite du logo
    const textX = PAD + logoW + 24; // gap horizontal entre logo et texte
    ctx.fillStyle = '#1A1A1A';
    ctx.textBaseline = 'alphabetic';
    ctx.font = '700 24px "Space Grotesk", system-ui, sans-serif';
    ctx.fillText(getCarteTitle(), textX, 48);
    ctx.fillStyle = '#5A5A5A';
    ctx.font = '500 16px "Space Grotesk", system-ui, sans-serif';
    ctx.fillText(getCarteSubtitle(), textX, 74);

    // Zone visuelle
    const visTop = HEADER_H + 20;
    const visBottom = H - FOOTER_H - 5;
    const visW = W - 2 * PAD;
    const visH = visBottom - visTop;

    drawCarteVisual(ctx, PAD, visTop, visW, visH);
    drawCarteLegend(ctx, PAD, visTop, visW, visH);

    // Pied de page
    ctx.fillStyle = '#5A5A5A';
    ctx.font = '500 13px "Space Grotesk", system-ui, sans-serif';
    const today = new Date().toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
    ctx.fillText('lrvote.fr · @LaRochelleVote · exporté le ' + today, PAD, H - 22);

    return canvas;
  }

  function downloadCanvas(canvas, filename) {
    return new Promise((resolve) => {
      canvas.toBlob(blob => {
        if (!blob) { resolve(false); return; }
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename;
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        resolve(true);
      }, 'image/png');
    });
  }

  // ─── Export FICHE (bureau / quartier / globale) ─────────────────────
  function isFicheOpen() {
    const ov = document.getElementById('overlay');
    if (!ov) return false;
    return ov.classList.contains('show') || (ov.style.display && ov.style.display !== 'none');
  }

  function getFicheContext() {
    if (!isFicheOpen()) return null;
    const tab = (typeof overlayTab !== 'undefined' && overlayTab) || 'bureau';
    const sheetData = (typeof getSheetData === 'function') ? getSheetData() : {};

    let title = currentElection;
    // Pas de mention de tour pour un référendum (notion non pertinente).
    const isRefForTitle = (typeof isReferendum === 'function' && isReferendum(currentElection));
    if (!isRefForTitle) {
      if (currentSheet === 'T1') title += ' · 1ᵉʳ tour';
      else if (currentSheet === 'T2') title += ' · 2ᵉ tour';
      else if (currentSheet === 'TU') title += ' · Tour unique';
    }

    function aggData(numsOrAll){
      let totI=0, totE=0, totAbst=0, totBn=0; const candTotV={};
      const apply = (d) => {
        if (!d) return;
        const an = Math.round((d.i||0)*(d.a||0)/100);
        totI += d.i||0; totE += d.e||0; totAbst += an; totBn += d.bn||0;
        Object.entries(d.c||{}).forEach(([k,v]) => { candTotV[k] = (candTotV[k]||0) + v*(d.e||0)/100; });
      };
      if (numsOrAll === 'all') Object.values(sheetData).forEach(apply);
      else (numsOrAll||[]).forEach(ns2 => apply(sheetData[ns2]));
      const avg = {};
      Object.entries(candTotV).forEach(([k,v]) => { avg[k] = +(v/Math.max(totE,1)*100).toFixed(1); });
      const winner = Object.entries(avg).sort((a,b) => b[1]-a[1])[0];
      return { c: avg, e: totE, w: winner ? winner[0] : null, i: totI, a: totI>0 ? +(totAbst/totI*100).toFixed(1) : 0, bn: totBn };
    }

    if (tab === 'global') {
      const data = aggData('all');
      return { type:'global', title, subtitle:'La Rochelle · Totalisation ville', quartier:'', data, winnerCol: data.w ? colorOfCandidate(data.w) : '#888' };
    }
    if (tab === 'quartier') {
      // Fallback sur le quartier du currentFeature si currentQuartier est null
      // (cas standard : on bascule sur l'onglet quartier sans avoir explicitement sélectionné un quartier)
      let q = (typeof currentQuartier !== 'undefined') ? currentQuartier : null;
      if (!q && typeof currentFeature !== 'undefined' && currentFeature && typeof bureauInfo === 'function' && typeof getQuartierParts === 'function') {
        const info = bureauInfo(currentFeature);
        const parts = getQuartierParts(info.quartier || '');
        if (parts.length) q = parts[0];
      }
      if (!q || typeof getBureausByQuartier !== 'function') return null;
      const nums = getBureausByQuartier(q);
      const data = aggData(nums);
      return { type:'quartier', title, subtitle:'Quartier · ' + q, quartier:'', data, bureauNums: nums, winnerCol: data.w ? colorOfCandidate(data.w) : '#888' };
    }
    // bureau
    if (typeof currentFeature === 'undefined' || !currentFeature) return null;
    const ns = numStr(currentFeature);
    const info = (typeof bureauInfo === 'function') ? bureauInfo(currentFeature) : {};
    const d = sheetData[ns];
    if (!d) return null;
    const denom = info.denomination || info.nom || '';
    const quartier = (info.quartier || '').trim();  // garde le nom complet (ex: "Tasdon/Les Minimes")
    return {
      type: 'bureau',
      title,
      subtitle: 'Bureau n°' + parseInt(ns) + (denom ? ' · ' + denom : ''),
      quartier,
      data: d,
      winnerCol: d.w ? colorOfCandidate(d.w) : '#888'
    };
  }

  // Helpers de rendu candidat (Canvas)
  function candPrenomNom(name) {
    // Source canonique : candInfo() qui essaie en cascade
    //   1. CAND_DATA[name + '|' + currentElection + '|' + currentSheet] (tour spécifique)
    //   2. CAND_DATA[name + '|' + currentElection] (élection)
    //   3. CAND_DATA[name] (générique)
    const ci = (typeof candInfo === 'function') ? candInfo(name) : {};
    let prenom = ci.p || '';
    let nom = ci.n || '';
    if (!nom) {
      // Fallback : splitter le nom complet (ex: "Jean Dupont (PS)" → prenom="Jean", nom="Dupont")
      const fn = (typeof candDisplayName === 'function') ? candDisplayName(name) : name.replace(/\s*\([^)]*\)\s*$/, '').trim();
      const parts = fn.trim().split(/\s+/);
      if (parts.length >= 2) {
        if (!prenom) prenom = parts.slice(0, -1).join(' ');
        nom = parts[parts.length - 1];
      } else {
        nom = fn;
      }
    }
    return { prenom, nom, parti: ci.pa || '' };
  }

  async function drawFicheVisual(ctx, x, y, w, h, fctx) {
    const data = fctx.data;
    const allCands = Object.entries(data.c || {}).sort((a,b)=>b[1]-a[1]);
    if (allCands.length === 0) {
      ctx.fillStyle = '#888';
      ctx.font = '500 16px "Space Grotesk", system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Aucune donnée disponible.', x + w/2, y + h/2);
      ctx.textAlign = 'left';
      return;
    }

    // Mini-carte à gauche (pour bureau OU quartier)
    const showMap = (fctx.type === 'bureau' || fctx.type === 'quartier');
    const mapW = showMap ? 140 : 0;
    const mapGapX = showMap ? 16 : 0;
    if (showMap) await drawFicheMap(ctx, x, y, mapW, h, fctx);

    // Zone candidats : à droite de la mini-carte
    const listX = x + mapW + mapGapX;
    const listW = w - mapW - mapGapX;

    // Layout spécial pour 2 ou 3 candidats (duel / trio) — grandes cards
    if (allCands.length === 2 || allCands.length === 3) {
      drawFicheBigCards(ctx, listX, y, listW, h, allCands, data.e || 0);
      return;
    }

    // Sinon : layout standard avec barres + mini-cartouches
    // Top 5 (ou moins) en barres horizontales
    const TOP = 5;
    const top = allCands.slice(0, TOP);
    // Reste en mini-cartouches sur 1 ligne (max 7 supplémentaires)
    const rest = allCands.slice(TOP, TOP + 7);
    const hasRest = rest.length > 0;

    // Hauteur réservée aux mini-cartouches (si reste présents)
    const miniH = 44;
    const miniGap = 32;
    const listH = hasRest ? h - miniH - miniGap : h;

    const N = top.length;
    const rowGap = 10;
    const rowH = (listH - rowGap*(N-1)) / N;

    const maxPct = top[0][1] || 1;

    top.forEach((c, i) => {
      const ry = y + i*(rowH + rowGap);
      drawCandRow(ctx, listX, ry, listW, rowH, c, maxPct, data.e || 0);
    });

    if (hasRest) {
      const miniY = y + listH + miniGap;
      const miniN = rest.length;
      const miniGapX = 8;
      const miniW = (listW - miniGapX*(miniN-1)) / miniN;
      rest.forEach((c, i) => {
        drawCandMini(ctx, listX + i*(miniW + miniGapX), miniY, miniW, miniH, c);
      });
    }
  }

  // Helpers Mercator/tile
  function _lng2pX(lng, z) { return (lng + 180) / 360 * Math.pow(2, z); }
  function _lat2pY(lat, z) {
    const r = lat * Math.PI / 180;
    return (1 - Math.log(Math.tan(r) + 1 / Math.cos(r)) / Math.PI) / 2 * Math.pow(2, z);
  }
  function _loadTile(url) {
    return new Promise((resolve) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => resolve(img);
      img.onerror = () => resolve(null);
      img.src = url;
    });
  }

  // ─── Mini-carte d'export : helpers (pickTarget / computeView / tiles / mask / bureaux) ───

  // Sélectionne les features à mettre en couleur (bureau actuel ou bureaux du quartier).
  function _pickTargetFeatures(fctx, allFeatures) {
    if (fctx.type === 'bureau') {
      if (typeof currentFeature === 'undefined' || !currentFeature || !currentFeature.geometry) return null;
      return [currentFeature];
    }
    if (fctx.type === 'quartier') {
      const numSet = new Set((fctx.bureauNums || []).map(String));
      return allFeatures.filter(f => f && f.geometry && numSet.has(numStr(f)));
    }
    return null;
  }

  // Calcule la vue cartographique (bbox + marge dynamique, zoom tile, ajustement aspect, projection).
  // Retourne { zoom, TS, minPxX, maxPxX, minPxY, maxPxY, scale, project, x, y } ou null si pas de coords.
  function _computeMapView(targetFeatures, x, y, w, h) {
    // 1) BBox de l'union des features cibles
    const coords = [];
    (function walk(arr) {
      if (typeof arr[0] === 'number') { coords.push(arr); return; }
      arr.forEach(walk);
    })(targetFeatures.map(f => f.geometry.coordinates));
    if (coords.length === 0) return null;

    let minLng = Infinity, maxLng = -Infinity, minLat = Infinity, maxLat = -Infinity;
    coords.forEach(([lng, lat]) => {
      if (lng < minLng) minLng = lng;
      if (lng > maxLng) maxLng = lng;
      if (lat < minLat) minLat = lat;
      if (lat > maxLat) maxLat = lat;
    });

    // Marge dynamique : petit bureau (urbain dense) → marge généreuse ; grand bureau → marge serrée.
    const span = Math.max(maxLng - minLng, maxLat - minLat);
    let M;
    if (span < 0.003)      M = 2.2;  // très petit (centre-ville dense)
    else if (span < 0.005) M = 1.4;  // petit
    else if (span < 0.008) M = 0.9;  // moyen
    else                   M = 0.22; // grand (zoom serré)
    const dxL = (maxLng - minLng) * M;
    const dyL = (maxLat - minLat) * M;
    minLng -= dxL; maxLng += dxL; minLat -= dyL; maxLat += dyL;

    // 2) Zoom tile max où la bbox tient dans le viewport (256·2^z·lngSpan/360 ≤ w → z = log2(w·360/(lngSpan·256)))
    const TS = 256;
    const zw = Math.log2(w * 360 / ((maxLng - minLng) * TS));
    const zh = Math.log2(h * 360 / ((maxLat - minLat) * TS / Math.cos(46.16 * Math.PI / 180)));
    const zoom = Math.max(10, Math.min(19, Math.floor(Math.min(zw, zh))));

    // 3) Coords pixel de la bbox au zoom choisi
    let minPxX = _lng2pX(minLng, zoom) * TS;
    let maxPxX = _lng2pX(maxLng, zoom) * TS;
    let minPxY = _lat2pY(maxLat, zoom) * TS; // maxLat → top → minPxY
    let maxPxY = _lat2pY(minLat, zoom) * TS;
    let bboxPxW = maxPxX - minPxX;
    let bboxPxH = maxPxY - minPxY;

    // Ajuste la bbox pour matcher l'aspect du conteneur (pas de bande vide, pas de surzoom).
    const aspectMini = w / h;
    const aspectBox = bboxPxW / bboxPxH;
    if (aspectBox > aspectMini) {
      const targetH = bboxPxW / aspectMini;
      const extra = (targetH - bboxPxH) / 2;
      minPxY -= extra; maxPxY += extra;
      bboxPxH = maxPxY - minPxY;
    } else if (aspectBox < aspectMini) {
      const targetW = bboxPxH * aspectMini;
      const extra = (targetW - bboxPxW) / 2;
      minPxX -= extra; maxPxX += extra;
      bboxPxW = maxPxX - minPxX;
    }
    const scale = w / bboxPxW; // = h / bboxPxH

    // Projection lng/lat → pixel canvas (capture x,y,scale,zoom dans la closure)
    function project(lng, lat) {
      const px = _lng2pX(lng, zoom) * TS;
      const py = _lat2pY(lat, zoom) * TS;
      return [x + (px - minPxX) * scale, y + (py - minPxY) * scale];
    }
    // BBox lng/lat de la vue visible APRÈS ajustement aspect (utile pour filtrer les repères
    // hors-cadre — l'ajustement aspect a élargi la bbox initiale dans une des deux directions).
    const z2 = Math.pow(2, zoom);
    function pX2lng(pXnorm) { return pXnorm * 360 - 180; }
    function pY2lat(pYnorm) { return Math.atan(Math.sinh(Math.PI * (1 - 2 * pYnorm))) * 180 / Math.PI; }
    const bbox = {
      minLng: pX2lng(minPxX / TS / z2),
      maxLng: pX2lng(maxPxX / TS / z2),
      maxLat: pY2lat(minPxY / TS / z2), // minPxY → top → max lat
      minLat: pY2lat(maxPxY / TS / z2)
    };
    return { zoom, TS, minPxX, maxPxX, minPxY, maxPxY, scale, project, x, y, bbox };
  }

  // Charge en parallèle les tiles CartoCDN couvrant la bbox et les dessine.
  async function _drawMapTiles(ctx, view) {
    const { zoom, TS, minPxX, maxPxX, minPxY, maxPxY, scale, x, y } = view;
    const tx0 = Math.floor(minPxX / TS);
    const tx1 = Math.floor(maxPxX / TS);
    const ty0 = Math.floor(minPxY / TS);
    const ty1 = Math.floor(maxPxY / TS);
    const tilePromises = [];
    for (let tx = tx0; tx <= tx1; tx++) {
      for (let ty = ty0; ty <= ty1; ty++) {
        const url = 'https://a.basemaps.cartocdn.com/light_all/' + zoom + '/' + tx + '/' + ty + '.png';
        tilePromises.push(_loadTile(url).then(img => ({ img, tx, ty })));
      }
    }
    const tiles = await Promise.all(tilePromises);
    tiles.forEach(({ img, tx, ty }) => {
      if (!img) return;
      const dx = x + (tx * TS - minPxX) * scale;
      const dy = y + (ty * TS - minPxY) * scale;
      ctx.drawImage(img, dx, dy, TS * scale, TS * scale);
    });
  }

  // Masque grisé hors La Rochelle : rect extérieur + tous les polygones LR avec règle evenodd.
  function _drawMapMask(ctx, x, y, w, h, view, allFeatures) {
    ctx.beginPath();
    ctx.rect(x, y, w, h);
    allFeatures.forEach(f => {
      if (!f || !f.geometry || !f.geometry.coordinates) return;
      function addPoly(coordinates) {
        coordinates.forEach((ring) => {
          ring.forEach(([lng, lat], j) => {
            const [px, py] = view.project(lng, lat);
            if (j === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
          });
          ctx.closePath();
        });
      }
      if (f.geometry.type === 'Polygon') addPoly(f.geometry.coordinates);
      else if (f.geometry.type === 'MultiPolygon') f.geometry.coordinates.forEach(addPoly);
    });
    ctx.fillStyle = 'rgba(80,75,70,0.28)';
    ctx.fill('evenodd');
  }

  // Voisins en contour seul, cibles en couleur winner par-dessus.
  function _drawMapBureaux(ctx, view, allFeatures, targetFeatures, winnerCol) {
    function drawFeatureGeom(geom, fillStyle, strokeStyle, lineWidth) {
      ctx.fillStyle = fillStyle;
      ctx.strokeStyle = strokeStyle;
      ctx.lineWidth = lineWidth;
      ctx.lineJoin = 'round';
      function drawPoly(coordinates) {
        ctx.beginPath();
        coordinates.forEach((ring) => {
          ring.forEach(([lng, lat], j) => {
            const [px, py] = view.project(lng, lat);
            if (j === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
          });
          ctx.closePath();
        });
        ctx.fill('evenodd');
        ctx.stroke();
      }
      if (geom.type === 'Polygon') drawPoly(geom.coordinates);
      else if (geom.type === 'MultiPolygon') geom.coordinates.forEach(drawPoly);
    }
    const targetNs = new Set(targetFeatures.map(f => numStr(f)));
    // Voisins : contour seul (le clip rect filtre visuellement les bureaux hors zone)
    allFeatures.forEach(f => {
      if (!f || !f.geometry || !f.geometry.coordinates) return;
      if (targetNs.has(numStr(f))) return;
      drawFeatureGeom(f.geometry, 'rgba(0,0,0,0)', '#3A352E', 1.0);
    });
    // Cibles par-dessus
    targetFeatures.forEach(f => {
      drawFeatureGeom(f.geometry, winnerCol, '#FFFFFF', 1.5);
    });
  }

  // Mini-carte d'export : bureau actuel (ou bureaux du quartier) en couleur winner +
  // voisins en contour, sur un fond de tiles CartoCDN light_all.
  async function drawFicheMap(ctx, x, y, w, h, fctx) {
    const eraGJ = (typeof getMapGeoJSON === 'function') ? getMapGeoJSON() : (typeof GEOJSON !== 'undefined' ? GEOJSON : { features: [] });
    const allFeatures = (eraGJ && eraGJ.features) || [];
    const targetFeatures = _pickTargetFeatures(fctx, allFeatures);
    if (!targetFeatures || targetFeatures.length === 0) return;

    // Cadre du conteneur
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(x, y, w, h);

    const view = _computeMapView(targetFeatures, x, y, w, h);
    if (!view) return;

    // Clip au cadre puis tiles + masque + bureaux dans le même save/restore
    ctx.save();
    ctx.beginPath();
    ctx.rect(x, y, w, h);
    ctx.clip();
    await _drawMapTiles(ctx, view);
    _drawMapMask(ctx, x, y, w, h, view, allFeatures);
    _drawMapBureaux(ctx, view, allFeatures, targetFeatures, fctx.winnerCol);
    // Repères géographiques : 5 max, priorité aux plus proches du centre, anti-collision activée.
    drawReperesOnCarte(ctx, view.project, view.bbox, LR_REPERES.pointsFiche, { x: x, y: y, w: w, h: h }, 5);
    ctx.restore();
  }

  function drawCandMini(ctx, x, y, w, h, candEntry) {
    const [name, pct] = candEntry;
    const col = colorOfCandidate(name);
    const { nom } = candPrenomNom(name);
    // Cartouche mini : fond couleur parti, nom à gauche, score % à droite
    ctx.fillStyle = col;
    ctx.fillRect(x, y, w, h);

    const cy = y + h/2 + 5; // baseline approximative

    // Nom (gauche)
    ctx.textAlign = 'left';
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '700 13px "Space Grotesk", system-ui, sans-serif';
    let displayName = nom;
    const maxNameW = w * 0.55;
    while (ctx.measureText(displayName).width > maxNameW && displayName.length > 3) {
      displayName = displayName.slice(0, -1);
    }
    if (displayName !== nom) displayName = displayName.replace(/\s*$/, '') + '…';
    ctx.fillText(displayName, x + 10, cy);

    // Score % (droite)
    ctx.textAlign = 'right';
    ctx.font = '900 17px "Space Grotesk", system-ui, sans-serif';
    ctx.fillText(pct.toFixed(1) + ' %', x + w - 10, cy);
  }

  // Layout spécial duel (2 candidats) ou trio (3 candidats) — grandes cards côte à côte
  function drawFicheBigCards(ctx, x, y, w, h, cands, totE) {
    const N = cands.length;
    const gapX = 16;
    const cardW = (w - gapX*(N-1)) / N;
    const scoreSize = N === 2 ? 110 : 78;
    const prenomSize = N === 2 ? 22 : 17;
    const nomSize = N === 2 ? 50 : 34;
    const partiSize = N === 2 ? 16 : 14;
    cands.forEach((c, i) => {
      drawCandBigCard(ctx, x + i*(cardW + gapX), y, cardW, h, c, totE, scoreSize, prenomSize, nomSize, partiSize, i === 0);
    });
  }

  function drawCandBigCard(ctx, x, y, w, h, candEntry, totE, scoreSize, prenomSize, nomSize, partiSize, isWinner) {
    const [name, pct] = candEntry;
    const col = colorOfCandidate(name);
    // Source canonique unifiée (helper candPrenomNom utilise candInfo() en cascade)
    const { prenom, nom, parti } = candPrenomNom(name);
    const voix = Math.round(pct * 0.01 * totE);

    // Couleurs selon le statut (gagnant : card pleine ; perdant : boîte blanche encadrée)
    let textColor, mutedColor, scoreColor;
    if (isWinner) {
      ctx.fillStyle = col;
      ctx.fillRect(x, y, w, h);
      textColor = '#FFFFFF';
      mutedColor = 'rgba(255,255,255,0.85)';
      scoreColor = '#FFFFFF';
    } else {
      // Boîte blanche encadrée de la couleur du parti
      const bw = 5;
      ctx.fillStyle = col;
      ctx.fillRect(x, y, w, h);
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(x + bw, y + bw, w - 2*bw, h - 2*bw);
      textColor = '#1A1A1A';
      mutedColor = '#5A5A5A';
      scoreColor = col;
    }

    ctx.textAlign = 'left';
    const padX = 26;
    const padTop = 22;

    // Score énorme en haut
    ctx.fillStyle = scoreColor;
    ctx.font = '900 ' + scoreSize + 'px "Space Grotesk", system-ui, sans-serif';
    const pctText = pct.toFixed(1);
    const scoreW = ctx.measureText(pctText).width;
    const scoreBaseline = y + padTop + scoreSize * 0.85;
    ctx.fillText(pctText, x + padX, scoreBaseline);
    // % petit à droite
    ctx.font = '700 ' + Math.round(scoreSize * 0.42) + 'px "Space Grotesk", system-ui, sans-serif';
    ctx.fillText('%', x + padX + scoreW + 8, scoreBaseline);

    // Voix juste sous le score
    if (voix > 0) {
      ctx.fillStyle = mutedColor;
      ctx.font = '500 15px "Space Grotesk", system-ui, sans-serif';
      ctx.fillText(voix.toLocaleString('fr-FR') + ' voix', x + padX, scoreBaseline + 26);
    }

    // ── Prénom + Nom + Parti, ancrés vers le bas ──
    // Ordre vertical : prénom (petit) → NOM (gros) → parti (petit) — anchored bottom
    const partiH = parti ? (partiSize + 10) : 0;
    const nameY = y + h - 22 - partiH; // baseline du Nom
    const prenomY = nameY - nomSize + 4; // baseline du prénom

    // Prénom (taille moyenne, muted)
    if (prenom) {
      ctx.fillStyle = mutedColor;
      ctx.font = '500 ' + prenomSize + 'px "Space Grotesk", system-ui, sans-serif';
      ctx.fillText(prenom, x + padX, prenomY);
    }

    // NOM (très gros, fort)
    ctx.fillStyle = textColor;
    ctx.font = '900 ' + nomSize + 'px "Space Grotesk", system-ui, sans-serif';
    let displayNom = nom;
    while (ctx.measureText(displayNom).width > w - 2*padX && displayNom.length > 3) {
      displayNom = displayNom.slice(0, -1);
    }
    if (displayNom !== nom) displayNom = displayNom.replace(/\s*$/, '') + '…';
    ctx.fillText(displayNom, x + padX, nameY);

    // Parti (sous le nom)
    if (parti) {
      ctx.fillStyle = mutedColor;
      ctx.font = '500 ' + partiSize + 'px "Space Grotesk", system-ui, sans-serif';
      ctx.fillText(parti, x + padX, nameY + partiSize + 6);
    }
  }

  function drawCandRow(ctx, x, y, w, h, candEntry, maxPct, totE) {
    const [name, pct] = candEntry;
    const col = colorOfCandidate(name);
    const { prenom, nom, parti } = candPrenomNom(name);
    const voix = Math.round(pct * 0.01 * totE);

    // Layout : ligne label (nom + parti à gauche, voix · score% à droite) collée au-dessus de la barre
    const barH = 20;
    const barY = y + h - barH;
    // Baseline juste au-dessus de la barre (avec léger gap visuel)
    const baseline = barY - 6;

    // ── Gauche : Nom (gros) + parti (petit, à côté du nom) ──
    ctx.textAlign = 'left';
    ctx.fillStyle = '#1A1A1A';
    ctx.font = '700 22px "Space Grotesk", system-ui, sans-serif';
    const fullName = (prenom ? prenom + ' ' : '') + nom;
    // Tronquer si trop long
    let displayName = fullName;
    const maxNameW = w * 0.5;
    while (ctx.measureText(displayName).width > maxNameW && displayName.length > 4) {
      displayName = displayName.slice(0, -1);
    }
    if (displayName !== fullName) displayName = displayName.replace(/\s*$/, '') + '…';
    ctx.fillText(displayName, x, baseline);
    // Mesurer la largeur AVEC LA FONT DU NOM (22px) avant de changer
    const nomW = ctx.measureText(displayName).width;

    // Parti à droite du nom, baseline alignée
    if (parti) {
      ctx.fillStyle = '#5A5A5A';
      ctx.font = '500 14px "Space Grotesk", system-ui, sans-serif';
      ctx.fillText(parti, x + nomW + 12, baseline);
    }

    // ── Droite : voix · score % (curseur de droite à gauche) ──
    ctx.textAlign = 'right';
    let cursorX = x + w;
    // Le "%" (petit)
    ctx.fillStyle = col;
    ctx.font = '700 16px "Space Grotesk", system-ui, sans-serif';
    ctx.fillText('%', cursorX, baseline);
    cursorX -= ctx.measureText('%').width + 4;
    // Le chiffre du score (gros)
    ctx.font = '900 28px "Space Grotesk", system-ui, sans-serif';
    ctx.fillText(pct.toFixed(1), cursorX, baseline);
    cursorX -= ctx.measureText(pct.toFixed(1)).width;
    // Voix · à gauche du score (si dispo)
    if (voix > 0) {
      ctx.fillStyle = '#888';
      ctx.font = '500 14px "Space Grotesk", system-ui, sans-serif';
      cursorX -= 8;
      ctx.fillText('·', cursorX, baseline);
      cursorX -= ctx.measureText('·').width + 8;
      const voixText = voix.toLocaleString('fr-FR') + ' voix';
      ctx.fillText(voixText, cursorX, baseline);
    }

    // ── Barre horizontale (longueur proportionnelle au max) ──
    ctx.textAlign = 'left';
    ctx.fillStyle = '#EEE';
    ctx.fillRect(x, barY, w, barH);
    const fillW = (pct / maxPct) * w;
    ctx.fillStyle = col;
    ctx.fillRect(x, barY, fillW, barH);
  }

  async function composeFiche(fctx) {
    if (document.fonts && document.fonts.ready) { try { await document.fonts.ready; } catch(_) {} }
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');

    // Header plus haut pour accueillir 3 lignes (titre, sous-titre, quartier)
    const FICHE_HEADER_H = fctx.quartier ? 120 : HEADER_H;

    ctx.fillStyle = '#F0EAE0'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#F7F3EE'; ctx.fillRect(0, 0, W, FICHE_HEADER_H);
    ctx.fillStyle = '#E6DFD5'; ctx.fillRect(0, FICHE_HEADER_H - 1, W, 1);

    const logoBaseline = 64;
    const logoW = drawLogo(ctx, PAD, logoBaseline);
    const textX = PAD + logoW + 24;

    // Mesurer la place nécessaire pour la titraille (titre + sous-titre + quartier sur 3 lignes)
    ctx.font = '700 24px "Space Grotesk", system-ui, sans-serif';
    const titleW = ctx.measureText(fctx.title).width;
    ctx.font = '500 16px "Space Grotesk", system-ui, sans-serif';
    const subW = ctx.measureText(fctx.subtitle).width;
    const quartW = fctx.quartier ? ctx.measureText(fctx.quartier).width : 0;
    const titrailleW = Math.max(titleW, subW, quartW);

    // Cartouches stats à droite — largeur dynamique selon place dispo
    const data = fctx.data || {};
    const idealW = 510;
    const minRightX = textX + titrailleW + 24;
    const statsRightX = Math.max(W - PAD - idealW, minRightX);
    const statsRightW = W - PAD - statsRightX;
    const statsBoxH = 64;
    const statsBoxY = (FICHE_HEADER_H - statsBoxH) / 2;
    const oneW = (statsRightW - 16) / 3;
    drawHeaderStat(ctx, statsRightX, statsBoxY, oneW, statsBoxH, 'INSCRITS', (data.i||0).toLocaleString('fr-FR'));
    drawHeaderStat(ctx, statsRightX + oneW + 8, statsBoxY, oneW, statsBoxH, 'ABSTENTION', (data.a||0).toFixed(1) + ' %');
    const votSB = (data.i||0) - Math.round((data.i||0)*(data.a||0)/100);
    const blancsPct = votSB > 0 ? +((data.bn||0)*100/votSB).toFixed(1) : 0;
    drawHeaderStat(ctx, statsRightX + 2*(oneW + 8), statsBoxY, oneW, statsBoxH, 'BLANCS / NULS', blancsPct.toFixed(1) + ' %');

    // Titraille à gauche du header — 3 lignes : titre, sous-titre, quartier
    ctx.fillStyle = '#1A1A1A';
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'left';
    ctx.font = '700 24px "Space Grotesk", system-ui, sans-serif';
    ctx.fillText(fctx.title, textX, 38);
    // Sous-titre
    ctx.fillStyle = '#5A5A5A';
    ctx.font = '500 16px "Space Grotesk", system-ui, sans-serif';
    ctx.fillText(fctx.subtitle, textX, 64);
    // Quartier (3ème ligne, plus pâle)
    if (fctx.quartier) {
      ctx.fillStyle = '#A89F94';
      ctx.font = '500 14px "Space Grotesk", system-ui, sans-serif';
      ctx.fillText(fctx.quartier, textX, 90);
    }

    const visTop = FICHE_HEADER_H + 18;
    const visBottom = H - FOOTER_H - 5;
    const visW = W - 2 * PAD;
    const visH = visBottom - visTop;

    await drawFicheVisual(ctx, PAD, visTop, visW, visH, fctx);

    ctx.fillStyle = '#5A5A5A';
    ctx.textAlign = 'left';
    ctx.font = '500 13px "Space Grotesk", system-ui, sans-serif';
    const today = new Date().toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
    ctx.fillText('lrvote.fr · @LaRochelleVote · exporté le ' + today, PAD, H - 22);
    return canvas;
  }

  function drawHeaderStat(ctx, x, y, w, h, label, val) {
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = '#E6DFD5';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
    ctx.textAlign = 'left';
    ctx.fillStyle = '#B49B7E';
    ctx.font = '700 11px "Space Grotesk", system-ui, sans-serif';
    ctx.fillText(label, x + 12, y + 22);
    ctx.fillStyle = '#1A1A1A';
    ctx.font = '900 24px "Space Grotesk", system-ui, sans-serif';
    ctx.fillText(val, x + 12, y + 50);
  }

  window.exportShareImage = async function() {
    const fctx = getFicheContext();
    const canvas = fctx ? await composeFiche(fctx) : await compose();
    const slugBase = fctx ? (fctx.title + ' ' + fctx.subtitle) : (getCarteTitle() + ' ' + getCarteSubtitle());
    const fname = (fctx ? 'lrvote-fiche-' : 'lrvote-carte-') + slug(slugBase) + '.png';
    await downloadCanvas(canvas, fname);
  };
})();
