// ─── Cmd+K universal search ──────────────────────────────────────────────
(function setupCmdK(){
  // Normalisation : minuscules + sans accents
  function norm(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,''); }
  // Construction de l'index (une fois)
  let _index = null;
  function buildIndex(){
    if (_index) return _index;
    const items = [];
    // Bureaux carte 2026 — texte de recherche enrichi des anciens numéros/noms/dénominations.
    const b2026 = (typeof BUREAU_INFO !== 'undefined' && BUREAU_INFO['2026']) || {};
    const corr = (typeof BUREAU_CORRESPONDANCES !== 'undefined' && BUREAU_CORRESPONDANCES) || {};
    const ERAS = ['1988','1993','1996','2004','2007','2010','2012','2015','2022','2026'];
    Object.entries(b2026).forEach(([id, b]) => {
      if (!b || b.q === 'Nul') return;
      const num = parseInt(id);
      const den = b.den || b.nom || '';
      const q = b.q || '';
      // Collecter alias historiques (numéros + dénominations + quartiers) de toutes les ères
      const aliasNums = new Set();   // numéros différents de l'actuel
      const aliasNames = new Set();  // noms / dénominations différents
      const aliasQs = new Set();     // quartiers différents
      const chain = corr[id] || {};
      ERAS.forEach(era => {
        const histRef = chain[era];
        if (!histRef) return;
        const histIds = Array.isArray(histRef) ? histRef : [histRef];
        histIds.forEach(hid => {
          if (!hid) return;
          const eraInfo = (BUREAU_INFO[era] || {})[hid];
          if (eraInfo) {
            if (eraInfo.den && eraInfo.den !== den) aliasNames.add(eraInfo.den);
            if (eraInfo.nom && eraInfo.nom !== den && eraInfo.nom !== b.nom) aliasNames.add(eraInfo.nom);
            if (eraInfo.q && eraInfo.q !== q) aliasQs.add(eraInfo.q);
          }
          const hNum = parseInt(hid);
          if (hNum && hNum !== num) aliasNums.add(hNum);
        });
      });
      // Sous-label : ajouter "anciennement N°XX" si le numéro a changé
      const searchExtra = [...aliasNums, ...aliasNames, ...aliasQs].join(' ');
      items.push({
        type: 'bureau', icon: '📍', label: 'N°' + num + ' — ' + den,
        badge: 'Carte 2026',
        badgeTip: 'Découpage des bureaux de vote actuellement en vigueur.',
        sub: q ? 'Bureau · ' + q : 'Bureau',
        key: id,
        search: norm(num + ' ' + den + ' ' + (b.nom||'') + ' ' + q + ' ' + searchExtra)
      });
    });
    // Quartiers (sans doublons)
    const quartiers = new Set();
    Object.values(b2026).forEach(b => { if (b && b.q && b.q !== 'Nul') {
      // Certaines valeurs `q` peuvent contenir plusieurs quartiers séparés par /
      String(b.q).split('/').map(s => s.trim()).forEach(q => quartiers.add(q));
    }});
    [...quartiers].sort().forEach(q => {
      items.push({ type: 'quartier', icon: '🏘', label: q, sub: 'Quartier', key: q, search: norm(q) });
    });
    // Élections
    Object.keys(ELECTIONS || {}).forEach(el => {
      items.push({ type: 'election', icon: '🗳', label: el, sub: 'Élection', key: el, search: norm(el) });
    });
    // Candidat·es (uniques sur l'ensemble du corpus)
    // Candidat·es : une entrée par (candidat × élection) — un même nom peut donc apparaître
    // plusieurs fois si la personne s'est présentée à plusieurs scrutins.
    const candEntries = [];
    Object.entries(ELECTIONS || {}).forEach(([elLabel, elData]) => {
      const candsInElec = new Set();
      Object.values(elData.sheets || {}).forEach(sheet => {
        Object.values(sheet || {}).forEach(bd => {
          if (bd && bd.c) Object.keys(bd.c).forEach(c => candsInElec.add(c));
        });
      });
      candsInElec.forEach(cname => {
        const cd = (typeof CAND_DATA !== 'undefined' && (CAND_DATA[cname + '|' + elLabel] || CAND_DATA[cname])) || {};
        const nom = cd.n || cname;
        const prenom = cd.p || '';
        const pa = cd.pa || '';
        const label = nom + (prenom ? ' ' + prenom : '') + (pa ? ' (' + pa + ')' : '');
        candEntries.push({
          type: 'candidat', icon: '👤',
          label: label,
          sub: elLabel,
          key: cname,
          election: elLabel,
          search: norm(nom + ' ' + prenom + ' ' + pa + ' ' + cname + ' ' + elLabel)
        });
      });
    });
    candEntries.sort((a, b) => {
      const c = a.label.localeCompare(b.label, 'fr');
      return c !== 0 ? c : a.sub.localeCompare(b.sub, 'fr');
    });
    items.push(...candEntries);
    _index = items;
    return items;
  }
  // Score fuzzy : chaque token doit apparaître ; bonus prefix / mot-debut.
  function score(item, tokens){
    let total = 0;
    for (const tok of tokens) {
      const idx = item.search.indexOf(tok);
      if (idx < 0) return -1;
      let s = 1;
      if (idx === 0) s += 4;                        // préfixe global
      else if (item.search[idx-1] === ' ') s += 2;  // début de mot
      s += Math.max(0, 3 - idx*0.05);               // bonus position précoce
      total += s;
    }
    // Bonus type : bureau et quartier prioritaires sur candidat·e
    if (item.type === 'bureau') total += 0.3;
    else if (item.type === 'quartier') total += 0.2;
    return total;
  }
  function filter(query){
    const q = norm(query).trim();
    const items = buildIndex();
    if (!q) {
      // Sans requête, on montre quelques têtes de chacune des sections
      const head = [];
      ['bureau','quartier','election','candidat'].forEach(t => {
        head.push(...items.filter(i => i.type === t).slice(0, 5));
      });
      return head.slice(0, 50);
    }
    const tokens = q.split(/\s+/).filter(Boolean);
    return items
      .map(i => ({ i, s: score(i, tokens) }))
      .filter(o => o.s >= 0)
      .sort((a,b) => b.s - a.s)
      .slice(0, 50)
      .map(o => o.i);
  }

  // ── Action sur sélection (spécifique LRVcarte) ──
  function pickItem(item){
    closeOverlayUI();
    if (item.type === 'bureau') {
      const gj = getMapGeoJSON();
      const feat = gj.features.find(f => (f.properties.b2026 || numStr(f)) === item.key)
                || gj.features.find(f => numStr(f) === item.key);
      if (feat) {
        // Mêmes mutations que selectBureauFromList : on entre en mode "fiche bureau ouverte"
        currentFeature = feat;
        currentQuartier = null;
        overlayTab = 'bureau';
        const info = bureauInfo(feat);
        const ns = numStr(feat);
        document.getElementById('ov-title').textContent = isAggNs(ns)
          ? 'Bureaux agrégés — ' + info.quartier
          : 'Fiche bureau — ' + info.denomination;
        document.getElementById('ov-tabs').style.display = 'flex';
        setOverlayDisplay('flex');
        showBureauListSidebar();   // ← sidebar passe en mode liste (cohérent avec fiche ouverte)
        renderFiche(feat);
        updateAccentColor();
        updateOverlayTabs();
        if (mainLayer) mainLayer.setStyle(featureStyle);
        if (typeof writeURLState === 'function') writeURLState();
      }
    } else if (item.type === 'quartier') {
      // On a besoin d'un currentFeature pour l'overlay quartier ; prendre le 1er bureau
      const yearInfo = BUREAU_INFO['2026'] || {};
      const ids = Object.entries(yearInfo)
        .filter(([, b]) => getQuartierParts(b.q || '').includes(item.key))
        .map(([id]) => id);
      if (ids.length) {
        const gj = getMapGeoJSON();
        const feat = gj.features.find(f => numStr(f) === ids[0]);
        if (feat) { currentFeature = feat; openOverlayQuartierNamed(item.key); }
      }
    } else if (item.type === 'election') {
      setElection(item.key);
    } else if (item.type === 'candidat') {
      // Bascule sur l'élection où le candidat est apparu en dernier, puis colore la carte
      if (item.election && item.election !== currentElection) setElection(item.election);
      setMapMode('candidat');
      currentMapSelection = item.key;
      [currentSelectionMin, currentSelectionMax] = computeSelectionRange();
      if (mainLayer) mainLayer.setStyle(featureStyle);
      renderMapLegend();
      if (typeof writeURLState === 'function') writeURLState();
    }
  }

  // ── UI overlay ──
  let overlayEl = null, inputEl = null, listEl = null, results = [], cursor = 0;
  function ensureUI(){
    if (overlayEl) return;
    const css = '#cmdk-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-start;justify-content:center;padding-top:14vh;z-index:10001;font-family:Space Grotesk,system-ui,sans-serif}'
      + '#cmdk-card{background:var(--bg-modal);border-radius:12px;width:560px;max-width:92vw;max-height:70vh;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3);display:flex;flex-direction:column}'
      + '#cmdk-input{padding:14px 18px;border:none;border-bottom:1px solid var(--border-modal);font-size:1rem;font-family:inherit;outline:none;color:var(--text-modal);background:transparent}'
      + '#cmdk-list{overflow-y:auto;padding:4px 0;flex:1}'
      + '.cmdk-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;font-size:.88rem}'
      + '.cmdk-item.cur{background:var(--bg-modal-hover)}'
      + '.cmdk-item .ico{font-size:1rem;width:22px;text-align:center;flex-shrink:0}'
      + '.cmdk-item .lbl{flex:1;min-width:0;color:var(--text-modal);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:8px}'
      + '.cmdk-item .lbl-text{overflow:hidden;text-overflow:ellipsis;min-width:0}'
      + '.cmdk-item .badge{font-size:.7rem;font-weight:600;background:var(--bg-modal-accent);color:var(--text-modal-muted);padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0;cursor:help}'
      + '.cmdk-item .sub{color:var(--text-modal-muted);font-size:.78rem;flex-shrink:0;max-width:40%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}'
      + '#cmdk-tip{position:fixed;background:var(--bg-tooltip);color:var(--text-tooltip);padding:6px 10px;border-radius:4px;font-size:.72rem;font-weight:500;white-space:nowrap;pointer-events:none;z-index:10002;opacity:0;transition:opacity .15s;transform:translateX(-50%)}'
      + '#cmdk-foot{padding:8px 16px;border-top:1px solid var(--border-modal);font-size:.72rem;color:var(--text-modal-muted);display:flex;gap:14px;justify-content:flex-end;background:var(--bg-modal-hover)}'
      + '#cmdk-foot kbd{display:inline-block;background:var(--bg-modal);border:1px solid var(--border-modal);border-radius:3px;padding:1px 5px;font:inherit;font-size:.72rem;color:var(--text-modal)}'
      + '#cmdk-empty{padding:20px 16px;color:var(--text-modal-muted);text-align:center;font-size:.85rem}';
    const st = document.createElement('style'); st.textContent = css; document.head.appendChild(st);
    overlayEl = document.createElement('div'); overlayEl.id = 'cmdk-overlay';
    overlayEl.innerHTML = '<div id="cmdk-card">'
      + '<input id="cmdk-input" type="text" placeholder="Rechercher un bureau, un quartier, une élection, un·e candidat·e…" autocomplete="off" spellcheck="false">'
      + '<div id="cmdk-list"></div>'
      + '<div id="cmdk-foot"><span><kbd>↑</kbd><kbd>↓</kbd> naviguer</span><span><kbd>Entrée</kbd> sélectionner</span><span><kbd>Échap</kbd> fermer</span></div>'
      + '</div>';
    document.body.appendChild(overlayEl);
    inputEl = overlayEl.querySelector('#cmdk-input');
    listEl  = overlayEl.querySelector('#cmdk-list');
    overlayEl.addEventListener('click', e => { if (e.target === overlayEl) closeOverlayUI(); });
    inputEl.addEventListener('input', () => { runSearch(); });
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'ArrowDown') { e.preventDefault(); moveCursor(1); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); moveCursor(-1); }
      else if (e.key === 'Enter')   { e.preventDefault(); if (results[cursor]) pickItem(results[cursor]); }
      else if (e.key === 'Escape')  { e.preventDefault(); closeOverlayUI(); }
    });
  }
  function runSearch(){
    results = filter(inputEl.value);
    cursor = 0;
    render();
  }
  function render(){
    if (!results.length) {
      listEl.innerHTML = '<div id="cmdk-empty">Aucun résultat</div>';
      return;
    }
    listEl.innerHTML = results.map((r, i) =>
      '<div class="cmdk-item' + (i === cursor ? ' cur' : '') + '" data-i="' + i + '">'
      + '<span class="ico">' + r.icon + '</span>'
      + '<span class="lbl"><span class="lbl-text">' + escapeHTML(r.label) + '</span>'
      + (r.badge ? '<span class="badge" data-tip="' + (r.badgeTip ? escapeHTML(r.badgeTip) : '') + '">' + escapeHTML(r.badge) + '</span>' : '')
      + '</span>'
      + '<span class="sub">' + escapeHTML(r.sub) + '</span>'
      + '</div>').join('');
    [...listEl.querySelectorAll('.cmdk-item')].forEach(el => {
      el.addEventListener('click', () => { cursor = parseInt(el.dataset.i); pickItem(results[cursor]); });
      el.addEventListener('mousemove', () => { const i = parseInt(el.dataset.i); if (i !== cursor) { cursor = i; render(); } });
    });
    // Tooltip flottant pour le badge (position fixe pour échapper à l'overflow de la liste)
    [...listEl.querySelectorAll('.cmdk-item .badge')].forEach(b => {
      const tip = b.dataset.tip;
      if (!tip) return;
      b.addEventListener('mouseenter', () => {
        let t = document.getElementById('cmdk-tip');
        if (!t) { t = document.createElement('div'); t.id = 'cmdk-tip'; document.body.appendChild(t); }
        t.textContent = tip;
        const r = b.getBoundingClientRect();
        t.style.left = (r.left + r.width/2) + 'px';
        t.style.top  = (r.bottom + 6) + 'px';
        t.style.opacity = '1';
      });
      b.addEventListener('mouseleave', () => {
        const t = document.getElementById('cmdk-tip');
        if (t) t.style.opacity = '0';
      });
    });
    // Scroll-into-view pour l'élément courant
    const cur = listEl.querySelector('.cmdk-item.cur');
    if (cur) cur.scrollIntoView({ block: 'nearest' });
  }
  function escapeHTML(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
  function moveCursor(d){
    if (!results.length) return;
    cursor = (cursor + d + results.length) % results.length;
    render();
  }
  function openOverlayUI(){
    ensureUI();
    overlayEl.style.display = 'flex';
    inputEl.value = '';
    runSearch();
    setTimeout(() => inputEl.focus(), 0);
  }
  function closeOverlayUI(){
    if (overlayEl) overlayEl.style.display = 'none';
  }
  // Raccourci global Cmd/Ctrl + K
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')) {
      e.preventDefault();
      if (overlayEl && overlayEl.style.display === 'flex') closeOverlayUI();
      else openOverlayUI();
    }
  });
  // Expose pour usage externe (cheatsheet)
  window.openCmdK = openOverlayUI;
})();


// ─── Raccourcis clavier ──────────────────────────────────────────────────
(function setupShortcuts(){
  function isTypingTarget(t){
    if (!t) return false;
    const tag = (t.tagName || '').toUpperCase();
    return tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || t.isContentEditable;
  }
  // elecTypePriority(label) : départage les élections de même année. Définie dans shared.js.
  function neighborElection(dir){
    const all = Object.keys(ELECTIONS);
    const sorted = all.slice().sort((a,b) => {
      const ya = parseInt(a.match(/\d{4}/)[0]);
      const yb = parseInt(b.match(/\d{4}/)[0]);
      if (ya !== yb) return ya - yb;
      return elecTypePriority(a) - elecTypePriority(b);
    });
    const idx = sorted.indexOf(currentElection);
    if (idx < 0) return null;
    return sorted[idx + dir] || null;
  }
  // Expose pour les boutons chevrons + mise à jour disabled state
  window.navigateElection = function(dir){
    const next = neighborElection(dir);
    if (next) setElection(next);
  };
  window.updateElectionNavButtons = function(){
    const prev = document.getElementById('tb-elec-prev');
    const next = document.getElementById('tb-elec-next');
    if (prev) prev.disabled = !neighborElection(-1);
    if (next) next.disabled = !neighborElection(1);
  };
  function neighborBureau(dir){
    if (!currentFeature) return null;
    const cur = numStr(currentFeature);
    const sortedNums = Object.keys(BUREAU_INFO['2026'] || {})
      .filter(id => (BUREAU_INFO['2026'][id].q || '') !== 'Nul')
      .sort((a,b) => parseInt(a) - parseInt(b));
    const i = sortedNums.indexOf(cur);
    const tgt = sortedNums[i + dir];
    if (!tgt) return null;
    const gj = getMapGeoJSON();
    return gj.features.find(f => numStr(f) === tgt) || null;
  }
  function selectFeature(feat){
    if (!feat) return;
    currentFeature = feat;
    currentQuartier = null;
    overlayTab = 'bureau';
    const info = bureauInfo(feat);
    const t = isAggNs(numStr(feat)) ? 'Bureaux agrégés — ' + info.quartier : 'Fiche bureau — ' + info.denomination;
    document.getElementById('ov-title').textContent = t;
    document.getElementById('ov-tabs').style.display = 'flex';
    setOverlayDisplay('flex');
    showBureauListSidebar();
    renderFiche(feat);
    updateAccentColor();
    updateOverlayTabs();
    if (mainLayer) mainLayer.setStyle(featureStyle);
    if (typeof writeURLState === 'function') writeURLState();
  }

  document.addEventListener('keydown', (e) => {
    if (isTypingTarget(e.target)) return;
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    const k = e.key;
    if (k === 'ArrowLeft' || k === 'ArrowRight') {
      const next = neighborElection(k === 'ArrowLeft' ? -1 : 1);
      if (next) { setElection(next); e.preventDefault(); }
    } else if (k === 'ArrowUp' || k === 'ArrowDown') {
      const feat = neighborBureau(k === 'ArrowUp' ? -1 : 1);
      if (feat) { selectFeature(feat); e.preventDefault(); }
    } else if (k === 'Escape') {
      const ov = document.getElementById('overlay');
      if (ov && ov.style.display !== 'none' && typeof closeOverlay === 'function') {
        closeOverlay(); e.preventDefault();
      }
    } else if (k === '?' || (e.shiftKey && k === '/')) {
      toggleShortcutsCheat(); e.preventDefault();
    }
  });

  // Cheatsheet overlay
  const cs = document.createElement('div');
  cs.id = 'shortcuts-cheat';
  cs.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:10000;font-family:Space Grotesk,system-ui,sans-serif';
  cs.innerHTML = '<div style="background:#fff;border-radius:10px;padding:24px 28px;max-width:420px;box-shadow:0 12px 40px rgba(0,0,0,.25)">'
    + '<h3 style="margin:0 0 14px;font-size:1.1rem">Raccourcis clavier</h3>'
    + '<table style="font-size:.85rem;color:#333;border-collapse:collapse;width:100%">'
    + '<tr><td style="padding:5px 8px"><kbd>⌘</kbd> <kbd>K</kbd></td><td>Recherche universelle (bureau, quartier, candidat·e, élection)</td></tr>'
    + '<tr><td style="padding:5px 8px"><kbd>←</kbd> <kbd>→</kbd></td><td>Élection précédente / suivante (chevrons en haut)</td></tr>'
    + '<tr><td style="padding:5px 8px"><kbd>↑</kbd> <kbd>↓</kbd></td><td>Bureau précédent / suivant</td></tr>'
    + '<tr><td style="padding:5px 8px"><kbd>Échap</kbd></td><td>Fermer la fiche</td></tr>'
    + '<tr><td style="padding:5px 8px"><kbd>?</kbd></td><td>Afficher / masquer ce panneau</td></tr>'
    + '</table>'
    + '<button onclick="document.getElementById(\'shortcuts-cheat\').style.display=\'none\'" style="margin-top:14px;padding:6px 14px;border:1px solid #ddd;border-radius:6px;background:#f5f5f5;cursor:pointer;font:inherit">Fermer</button>'
    + '</div>';
  cs.addEventListener('click', e => { if (e.target === cs) cs.style.display = 'none'; });
  document.body.appendChild(cs);
  // Style des kbd
  const st = document.createElement('style');
  st.textContent = '#shortcuts-cheat kbd{display:inline-block;background:#f5f5f5;border:1px solid #ddd;border-radius:4px;padding:2px 7px;font-family:Space Grotesk,system-ui,sans-serif;font-size:.8rem;color:#333;font-weight:600}';
  document.head.appendChild(st);

  window.toggleShortcutsCheat = () => {
    cs.style.display = cs.style.display === 'flex' ? 'none' : 'flex';
  };

  // État initial des boutons chevrons (setupShortcuts s'exécute après updateTopbar)
  updateElectionNavButtons();
})();

</script>

<script>
/* ── Animation du logo voile mini (topbar) ── */
(function () {
  // PARTI_COLORS : palette des partis. Définie dans shared.js.
  const rows = Array.from(document.querySelectorAll('.sail-mini .sail-row')).reverse();
  if (!rows.length) return;
  // a11y : respect de prefers-reduced-motion → on fixe une couleur unique sans animation.
  const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduceMotion) {
    const fixed = PARTI_COLORS[Math.floor(Math.random() * PARTI_COLORS.length)];
    rows.forEach(r => { r.style.setProperty('--c1', fixed); r.style.setProperty('--c2', fixed); });
    return;
  }
  const NB = rows.length, SLIDE_DUR = 550, STEP = 200, PAUSE_END = 4000;
  function pickColor(prev) {
    let c; do { c = PARTI_COLORS[Math.floor(Math.random()*PARTI_COLORS.length)]; }
    while (c === prev); return c;
  }
  let curColor = pickColor(null), nextColor = pickColor(curColor), cursor = 0;
  rows.forEach(r => { r.style.setProperty('--c1', curColor); r.style.setProperty('--c2', nextColor); });
  function tick() {
    const row = rows[cursor], target = nextColor;
    row.classList.add('sliding');
    setTimeout(() => {
      row.classList.add('no-trans');
      row.style.setProperty('--c1', target);
      row.classList.remove('sliding');
      void row.offsetWidth;
      row.classList.remove('no-trans');
    }, SLIDE_DUR + 30);
    cursor++;
    let nextDelay = STEP;
    if (cursor >= NB) {
      cursor = 0;
      curColor = nextColor;
      nextColor = pickColor(curColor);
      const newC2 = nextColor;
      setTimeout(() => rows.forEach(r => r.style.setProperty('--c2', newC2)), SLIDE_DUR + 60);
      nextDelay = SLIDE_DUR - STEP + PAUSE_END;
    }
    setTimeout(tick, nextDelay);
  }
  tick();
})();
</script>
