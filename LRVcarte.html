<script>

// ── DATA ─────────────────────────────────────────────────────────────────────
// GEOJSON chargé depuis geodata.js
// MAPS_DATA chargé depuis geodata.js







const HAS_T2 = new Set(['Présidentielle 1988','Présidentielle 1995','Présidentielle 2002','Présidentielle 2007',
  'Présidentielle 2012','Présidentielle 2017','Présidentielle 2022',
  'Législatives 1988','Législatives 1993','Législatives 1997','Législatives 2002','Législatives 2007',
  'Législatives 2012','Législatives 2017','Législatives 2022','Législatives 2024',
  'Municipales 2014','Municipales 2020','Municipales 2026',
  'Régionales 2004','Régionales 2010','Régionales 2015','Régionales 2021',
  'Cantonales 1988','Cantonales 1992','Cantonales 1994','Cantonales 1998','Cantonale partielle 1999','Cantonales 2001','Cantonale partielle 2002','Cantonales 2004','Cantonales 2008','Cantonales 2011','Départementales 2015','Départementales 2021']);
const HAS_TU = new Set(['Législatives 1986','Régionales 1986','Municipales 1989','Municipales 1995','Régionales 1992','Régionales 1998','Européennes 1989','Européennes 1994','Européennes 1999','Européennes 2004','Européennes 2009','Européennes 2014','Européennes 2019','Européennes 2024']);

// ── STATE ─────────────────────────────────────────────────────────────────────
// Élection initiale : on prend la plus récente parmi les Municipales (la plus
// emblématique d'une ère cartographique). Si jamais le label de la municipale
// la plus récente change (ex. 2032), pas besoin de patch ici.
function _defaultInitialElection() {
  const labels = Object.keys(ELECTIONS || {});
  const muns = labels.filter(l => l.startsWith('Municipales '))
    .sort((a,b) => parseInt(b.match(/\d{4}/)) - parseInt(a.match(/\d{4}/)));
  if (muns.length) return muns[0];
  // Fallback : élection la plus récente toutes catégories confondues (hors référendums).
  const sorted = labels.filter(l => !/^Référendum/.test(l))
    .sort((a,b) => parseInt(b.match(/\d{4}/)) - parseInt(a.match(/\d{4}/)));
  return sorted[0] || labels[0] || 'Municipales 2026';
}
let currentElection = _defaultInitialElection();
let currentSheet    = 'T1';
let currentFeature  = null;
let mainLayer       = null;
let selectedLayer   = null;
let overlayTab      = 'bureau';
let currentQuartier = null;
let currentCanton = null;   // id du canton actif (ex. "1", "2", ...) quand overlayTab === 'canton'
let mmMap           = null;  // minimap Leaflet instance
let currentMapMode  = 'candidat'; // 'candidat' | 'bloc' | 'abstention'
let currentMapSelection = null;   // candidateName | blocKey | null (choroplèthe)
let currentSelectionMin = 0;
let currentSelectionMax = 0;

// Détection "vrai pointeur fin" (souris/trackpad) vs tactile, évaluée UNE FOIS
// au load. Invariant pendant la session (un user qui swap souris ↔ touch n'est
// pas notre cible). Évite de ré-appeler matchMedia à chaque mouseover des bureaux.
const _HAS_HOVER = !!(window.matchMedia && window.matchMedia('(hover: hover)').matches);

// ── HELPERS ───────────────────────────────────────────────────────────────────

function numStr(feature) {
  const p = feature.properties;
  return p.numero || p.num_bureau || String(p.id_bureau || '').padStart(4, '0');
}

// Bureau static info — uses era-specific data from BUREAU_INFO (Excel source)
function bureauInfo(feature) {
  const ns = numStr(feature);
  const b26 = feature.properties.b2026 || ns;
  const el = ELECTIONS[currentElection];
  const mapYear = String(el ? el.my : 2026);
  // Look up in the Excel data for the current map era, by native bureau number
  // Fallback to 2026 info for bureaux non présents dans l'ère courante (ex: bureau 57 sur carte 2015)
  const eraInfo = (BUREAU_INFO[mapYear] || {})[ns] || (BUREAU_INFO[CURRENT_ERA] || {})[ns];
  if (eraInfo && eraInfo.den) {
    return {
      numero:       ns,
      num2026:      b26,
      nom:          eraInfo.nom || eraInfo.den,
      denomination: eraInfo.den,
      quartier:     eraInfo.q || null,
      canton:       eraInfo.c || null,
    };
  }
  // Fallback: 2026 GEOJSON
  const f26 = GEOJSON.features.find(f => f.properties.numero === b26);
  if (f26) {
    const p = f26.properties;
    return {
      numero: ns, num2026: b26,
      nom: p.nom || 'Bureau ' + parseInt(ns),
      denomination: p.denomination || p.nom || 'Bureau ' + parseInt(ns),
      quartier: p.quartier || null,
      canton: p.canton || null,
    };
  }
  return { numero: ns, num2026: ns, nom: 'Bureau ' + parseInt(ns), denomination: 'Bureau ' + parseInt(ns), quartier: null, canton: null };
}

// Bureaux in the same quartier, using era-specific data
function getBureausByQuartier(quartier){
  if(!quartier)return[];
  const el=ELECTIONS[currentElection];const mapYear=String(el?el.my:2026);
  const yearInfo=BUREAU_INFO[mapYear]||BUREAU_INFO[CURRENT_ERA]||{};
  // Bureaux dont q correspond directement (split sur "/" gardé pour rétrocompatibilité)
  const direct=Object.keys(yearInfo).filter(num=>{
    const q=yearInfo[num].q||'';
    return q===quartier||q.split('/').map(s=>s.trim()).includes(quartier);
  });
  // Override explicite via QUARTIER_CORRESPONDANCES — bureaux partagés (ex : 0004 entre Port-Neuf et La Genette depuis 2015)
  const override=(typeof QUARTIER_CORRESPONDANCES!=='undefined' &&
                  QUARTIER_CORRESPONDANCES[quartier] &&
                  QUARTIER_CORRESPONDANCES[quartier][mapYear])||[];
  return Array.from(new Set([...direct,...override])).sort();
}

// Election data for current election/sheet
function getSheetData() {
  const el = ELECTIONS[currentElection];
  if (!el) return {};
  return el.sheets[currentSheet] || el.sheets['T1'] || el.sheets['TU'] || {};
}

function getBureauData(ns) {
  const sh = getSheetData();
  if (sh[ns]) return sh[ns];
  // Aggregate key e.g. "0017-19" or "0035-37"
  const aggMatch = ns.match(/^(\d{4})-(\d{2})$/);
  if (aggMatch) {
    const prefix = aggMatch[1].slice(0,2);
    const from = parseInt(aggMatch[1]);
    const to = parseInt(prefix + aggMatch[2]);
    const datas = [];
    for (let i = from; i <= to; i++) { const d = sh[String(i).padStart(4,'0')]; if (d) datas.push(d); }
    if (!datas.length) return null;
    return aggregateBureauData(datas);
  }
  return null;
}
function aggregateBureauData(datas) {
  const n = datas.length;
  const res = { i: 0, e: 0, bn: 0, a: 0, c: {}, w: null };
  datas.forEach(d => {
    res.i += (d.i||0); res.e += (d.e||0); res.bn += (d.bn||0);
    res.a = +(res.a + (d.a||0)/n).toFixed(2);
    Object.entries(d.c||{}).forEach(([k,v]) => { res.c[k] = +((res.c[k]||0) + v/n).toFixed(2); });
  });
  res.w = Object.entries(res.c).sort((a,b)=>b[1]-a[1])[0]?.[0] || null;
  return res;
}

// Winner color


// City-wide average per candidate for current sheet
function cityAverage() {
  let totE = 0; const totals = {};
  Object.values(getSheetData()).forEach(d => {
    if (!d) return; totE += d.e || 0;
    Object.entries(d.c || {}).forEach(([k, v]) => {
      totals[k] = (totals[k] || 0) + v * (d.e || 0) / 100;
    });
  });
  const avg = {};
  if (totE > 0) Object.entries(totals).forEach(([k, v]) => { avg[k] = +(v / totE * 100).toFixed(1); });
  return avg;
}

// Moyenne de référence pour comparer un bureau ("vs X") :
//   - Élections cantonales (Départementales/Cantonales) : moyenne du canton du bureau
//     (chaque binôme n'est candidat que dans son canton, comparer à la ville n'a pas de sens).
//   - Sinon : moyenne ville (cityAverage classique).
function refAverageForBureau(bureauNs) {
  if (typeof isCantonalElection === 'function' && isCantonalElection(currentElection)) {
    const el0 = ELECTIONS[currentElection];
    const mapYear = String(el0 ? el0.my : CURRENT_ERA);
    const yearInfo = BUREAU_INFO[mapYear] || {};
    const cid = bureauNs ? String((yearInfo[bureauNs] || {}).c || '') : '';
    if (cid) {
      let totE = 0; const totals = {};
      Object.entries(getSheetData()).forEach(([n, d]) => {
        if (!d) return;
        if (String((yearInfo[n] || {}).c || '') !== cid) return;
        totE += d.e || 0;
        Object.entries(d.c || {}).forEach(([k, v]) => {
          totals[k] = (totals[k] || 0) + v * (d.e || 0) / 100;
        });
      });
      const avg = {};
      if (totE > 0) Object.entries(totals).forEach(([k, v]) => { avg[k] = +(v / totE * 100).toFixed(1); });
      return avg;
    }
  }
  return cityAverage();
}

// Label affiché dans "vs X" : "canton" pour cantonale, "ville" sinon.
function refLabelForCurrent() {
  return (typeof isCantonalElection === 'function' && isCantonalElection(currentElection)) ? 'canton' : 'ville';
}

// Best/worst bureau per candidate
// Cache pour getExtremes / getExtremesByQuartier / getExtremesByCanton — invalidé
// au changement d'élection/tour (cf. _invalidateExtremesCache appelé dans setElection
// et setSheet). Coût des recalculs : O(bureaux × candidats) → ~1800 ops sur 60×30 ;
// appelés à chaque mouseover via renderCandidates dans la sidebar preview, donc
// le cache économise des cycles significatifs en hover continu.
let _extrCacheKey = '';
let _extrCache = null;
let _extrQCache = null;
let _extrCCache = null;
function _currentExtrKey() { return currentElection + '|' + currentSheet; }
function _invalidateExtremesCache() {
  _extrCacheKey = '';
  _extrCache = null; _extrQCache = null; _extrCCache = null;
}
function getExtremes() {
  const key = _currentExtrKey();
  if (_extrCache && _extrCacheKey === key) return _extrCache;
  const best = {}, worst = {};
  const NON_GEO = new Set(['0057']);
  Object.entries(getSheetData()).forEach(([num, d]) => {
    if (!d || NON_GEO.has(num)) return;
    Object.entries(d.c || {}).forEach(([k, pct]) => {
      if (!best[k]  || pct > best[k].pct)  best[k]  = { pct, num };
      if (!worst[k] || pct < worst[k].pct) worst[k] = { pct, num };
    });
  });
  _extrCacheKey = key;
  _extrCache = { best, worst };
  return _extrCache;
}

// Extrêmes par QUARTIER : pour chaque candidat, retourne le quartier où il a fait le meilleur/pire score
function getExtremesByQuartier() {
  const key = _currentExtrKey();
  if (_extrQCache && _extrCacheKey === key) return _extrQCache;
  const best = {}, worst = {};
  const shData = getSheetData();
  const el0 = ELECTIONS[currentElection];
  const mapYear = String(el0 ? el0.my : 2026);
  const yearInfo = BUREAU_INFO[mapYear] || BUREAU_INFO[CURRENT_ERA] || {};
  // Agrégation par quartier (en respectant les multi-quartiers via getQuartierParts)
  const qAg = {};
  Object.keys(yearInfo).forEach(ns => {
    const q = yearInfo[ns].q;
    if (!q) return;
    getQuartierParts(q).forEach(qp => {
      const d = shData[ns]; if (!d) return;
      if (!qAg[qp]) qAg[qp] = { totE: 0, candTotV: {} };
      qAg[qp].totE += d.e || 0;
      Object.entries(d.c || {}).forEach(([k, pct]) => {
        qAg[qp].candTotV[k] = (qAg[qp].candTotV[k] || 0) + pct * (d.e || 0) / 100;
      });
    });
  });
  // Calcul moyenne par quartier + détection des extrêmes
  Object.entries(qAg).forEach(([qName, ag]) => {
    if (ag.totE <= 0) return;
    Object.entries(ag.candTotV).forEach(([k, v]) => {
      const pct = +(v / ag.totE * 100).toFixed(1);
      if (!best[k]  || pct > best[k].pct)  best[k]  = { pct, num: qName };
      if (!worst[k] || pct < worst[k].pct) worst[k] = { pct, num: qName };
    });
  });
  _extrCacheKey = key;
  _extrQCache = { best, worst };
  return _extrQCache;
}

// Extrêmes par CANTON : pour chaque candidat, retourne le canton où il a fait
// le meilleur/pire score. Calque getExtremesByQuartier mais agrège par .c.
function getExtremesByCanton() {
  const key = _currentExtrKey();
  if (_extrCCache && _extrCacheKey === key) return _extrCCache;
  const best = {}, worst = {};
  const shData = getSheetData();
  const el0 = ELECTIONS[currentElection];
  const mapYear = String(el0 ? el0.my : CURRENT_ERA);
  const yearInfo = BUREAU_INFO[mapYear] || BUREAU_INFO[CURRENT_ERA] || {};
  const cAg = {};
  Object.keys(yearInfo).forEach(ns => {
    const c = yearInfo[ns].c;
    if (!c) return;
    const cid = String(c);
    const d = shData[ns]; if (!d) return;
    if (!cAg[cid]) cAg[cid] = { totE: 0, candTotV: {} };
    cAg[cid].totE += d.e || 0;
    Object.entries(d.c || {}).forEach(([k, pct]) => {
      cAg[cid].candTotV[k] = (cAg[cid].candTotV[k] || 0) + pct * (d.e || 0) / 100;
    });
  });
  Object.entries(cAg).forEach(([cid, ag]) => {
    if (ag.totE <= 0) return;
    Object.entries(ag.candTotV).forEach(([k, v]) => {
      const pct = +(v / ag.totE * 100).toFixed(1);
      if (!best[k]  || pct > best[k].pct)  best[k]  = { pct, num: cid };
      if (!worst[k] || pct < worst[k].pct) worst[k] = { pct, num: cid };
    });
  });
  _extrCacheKey = _currentExtrKey();
  _extrCCache = { best, worst };
  return _extrCCache;
}

// Candidates sharing same quartier as given bureau

// ── COLORS ────────────────────────────────────────────────────────────────────

// Cache parti → couleur, calculé à la demande. Quand un candidat n'a pas de
// couleur propre dans CAND_DATA, on cherche un AUTRE candidat du même parti
// qui en a une et on prend la sienne. Si aucun candidat de ce parti n'a de
// couleur, on retombe sur le gris. C'est cohérent avec la convention de
// l'éditeur de candidats (un parti = une couleur, héritée).
let _partiColorCache = null;
function getPartiColor(pa) {
  if (!pa) return null;
  if (!_partiColorCache) {
    _partiColorCache = {};
    Object.values(CAND_DATA).forEach(ci => {
      if (ci && ci.pa && ci.c && !_partiColorCache[ci.pa]) {
        _partiColorCache[ci.pa] = ci.c;
      }
    });
  }
  return _partiColorCache[pa] || null;
}

// Helper "version courte" : pour les codes pa fins ("UDF dissident libéral",
// "UDF dissident souverainiste"), on rabote le suffixe précisant la sensibilité
// pour ne garder que l'étiquette courte ("UDF dissident") destinée aux chips/tags.
// Le code complet reste utilisé pour le lookup PARTI_NAMES (nom long) et les
// agrégations — c'est purement cosmétique au moment de l'affichage compact.
function shortPa(pa) {
  if (!pa) return pa;
  return pa.replace(/\s+(libéral|souverainiste)$/, '');
}

function candInfo(name) {
  // Post-migration M4 : `name` est un cand_id (ex. "alain-bucherie@cantonales-2004").
  // Le merge avec tour_specific[currentSheet] applique les variations par tour
  // (ex. Rousset 2015 al T1=PRG,PCF vs T2=PRG,PCF,EELV — Fountaine 2014 al T2=EELV).
  // Compat legacy : si on tombe sur une ancienne clé "Nom Parti" via URL/cache,
  // la cascade |Élection / |Tour fait le fallback (sera no-op après cleanup M5).
  // Référendums : plusieurs call sites utilisent les noms courts "Oui" et "Non"
  // (raccourci historique) ; on dérive le cand_id réel depuis l'élection courante.
  if ((name === 'Oui' || name === 'Non') && typeof isReferendum === 'function' && isReferendum(currentElection)) {
    const yr = (currentElection.match(/(\d{4})/) || [])[1];
    if (yr) {
      const cid = name.toLowerCase() + '@referendum-' + yr;
      if (CAND_DATA[cid]) return CAND_DATA[cid];
    }
  }
  // Post-M5 : le format pipe-key (`Nom|Élection`, `Nom|Élection|Tour`) n'existe plus
  // dans CAND_DATA — les 2 lookups étaient des no-op. Variations par tour gérées via
  // `merged.tour_specific[currentSheet]` ci-dessous.
  const merged = { ...(CAND_DATA[name] || {}) };
  // Applique tour_specific (M4.4) si présent
  if (merged.tour_specific && merged.tour_specific[currentSheet]) {
    Object.assign(merged, merged.tour_specific[currentSheet]);
  }
  // Hydratation depuis PERSONS : si la candidature pointe sur une `person` connue
  // mais que ses champs identité (p/n/s) sont vides côté CAND_DATA, on les comble
  // depuis PERSONS. Évite que les fiches/tooltips affichent juste le nom de famille
  // (ou le cid brut) quand l'injection initiale n'a pas pré-rempli p/n/s.
  if (merged.person && typeof PERSONS !== 'undefined' && PERSONS[merged.person]) {
    const pers = PERSONS[merged.person];
    if (!merged.p) merged.p = pers.p || '';
    if (!merged.n) merged.n = pers.n || '';
    if (!merged.s) merged.s = pers.s || '';
  }
  return merged;
}

// ── BINÔMES (Départementales/Cantonales) ───────────────────────────────────
// Si CAND_DATA[name].binome est défini, le candidat est un binôme paritaire
// (ex. "Gonnet/Lesauvage PCF") composé de 2 membres individuels. On expose
// 2 formats d'affichage : full (avec prénoms, en fiche) et short (noms seuls,
// en légende/tooltip étroits). Convention : femme devant puis homme (selon `s`).
function binomeMembers(name) {
  const ci = candInfo(name);
  if (!Array.isArray(ci.binome) || ci.binome.length !== 2) return null;
  // M5 : les membres sont des person_ids → lecture directe de PERSONS qui
  // contient {p, n, s}. Plus rapide et clair que de passer par candInfo.
  const m1 = (typeof PERSONS !== 'undefined' && PERSONS[ci.binome[0]]) || {};
  const m2 = (typeof PERSONS !== 'undefined' && PERSONS[ci.binome[1]]) || {};
  // Tri : femme devant. On inverse dès que m2 est F et m1 ne l'est pas (couvre
  // les cas où le sexe de m1 est inconnu/H et celui de m2 explicitement F).
  if (m1.s !== 'F' && m2.s === 'F') return [m2, m1];
  return [m1, m2];
}
function binomeFullLabel(name) {
  const ms = binomeMembers(name);
  if (!ms) return null;
  return ms.map(m => ((m.p ? m.p + ' ' : '') + (m.n || '')).trim()).join(' / ');
}
function binomeShortLabel(name) {
  const ms = binomeMembers(name);
  if (!ms) return null;
  return ms.map(m => m.n || '').join(' / ');
}
// Alliés (`al`) : pour un binôme, l'entrée binôme n'a généralement pas de `al`,
// on dérive depuis les 2 membres. Pour un candidat simple, retourne ci.al direct.
//  - Même `al` sur les 2 membres → "Falorniste"
//  - `al` différents → "Falorniste / Fountainiste"
//  - Un seul a `al` → "Falorniste"
//  - Aucun → ""
function binomeAllies(name) {
  const ci = candInfo(name);
  if (ci.al) return ci.al;
  if (!Array.isArray(ci.binome) || ci.binome.length !== 2) return '';
  const ms = binomeMembers(name);
  if (!ms) return '';
  const als = ms.map(m => (m && m.al) ? m.al : '').filter(Boolean);
  if (!als.length) return '';
  if (als.length === 2 && als[0] === als[1]) return als[0];
  return als.join(' / ');
}
// ── BINÔMES À PARTIS HÉTÉROGÈNES ───────────────────────────────────────────
// "Divers" (pattern élargi : tout pa qui commence par DV — DVG/DVD/DVC/DVE/DVP/...).
// Règle paritaire (mai 2026) : quand un binôme paritaire associe 2 vrais partis
// distincts, la candidate F passe devant l'homme H dans l'ordre d'affichage.
// Pour les binômes "vrai + divers", on ne combine pas (le pa dérivé reste le vrai
// seul) — voir derivePaForBinome dans shared.js.
function isDiversParti(pa) {
  return typeof pa === 'string' && /^DV/i.test(pa.trim());
}
// Index du membre F dans c.binome (0/1), -1 sinon.
// Sert à appliquer la règle paritaire (couleur de la candidate, label femme devant).
function _femaleIdxOfBinome(ci) {
  if (!Array.isArray(ci.binome) || ci.binome.length !== 2) return -1;
  if (typeof PERSONS === 'undefined') return -1;
  const s0 = (PERSONS[ci.binome[0]] || {}).s;
  const s1 = (PERSONS[ci.binome[1]] || {}).s;
  if (s0 === 'F' && s1 !== 'F') return 0;
  if (s1 === 'F' && s0 !== 'F') return 1;
  return -1;
}
// Renvoie le couple [pa1, pa2] dans l'ordre d'affichage (femme devant).
// Null si binôme homogène ou non-binôme.
// Post-M4.5 : lit directement le champ binome_partis sur la candidature binôme.
function _orderedBinomePartis(name) {
  const ci = candInfo(name);
  if (!Array.isArray(ci.binome) || ci.binome.length !== 2) return null;
  if (!Array.isArray(ci.binome_partis) || ci.binome_partis.length !== 2) return null;
  const pa1 = (ci.binome_partis[0] || '').trim();
  const pa2 = (ci.binome_partis[1] || '').trim();
  if (!pa1 || !pa2 || pa1 === pa2) return null;
  // Règle paritaire : femme devant. Fallback (pas de F identifié) : ordre brut.
  const idxF = _femaleIdxOfBinome(ci);
  if (idxF === 1) return [pa2, pa1];
  return [pa1, pa2];
}
// Étiquette parti à afficher pour un binôme : "PS+PRG" si mixte, "PS" sinon.
// Pour un non-binôme : retourne le pa simple via candInfo.
function binomePartiLabel(name) {
  const ord = _orderedBinomePartis(name);
  if (!ord) return (candInfo(name).pa || '');
  return ord[0] + '+' + ord[1];
}
// Couleurs des 2 partis pour le visuel bicolore (dot/carré split diagonal).
// Retourne [c1, c2] UNIQUEMENT si les 2 partis sont des "vrais partis" (= pas DV*).
// Sinon (homogène, non-binôme, OU mixte vrai parti + divers) → null = couleur unique.
// Rationnel : un binôme PRG + DVG, c'est une seule famille politique avec un membre
// non-encarté sous une étiquette administrative DVG → bicoloriser donnerait
// l'impression trompeuse de 2 forces politiques distinctes. Le label "PRG+DVG"
// reste affiché en texte (informatif), mais visuellement la couleur reste unique.
function binomePartiColors(name) {
  const ord = _orderedBinomePartis(name);
  if (!ord) return null;
  const [pa1, pa2] = ord;
  // Restreindre la bicolorisation aux binômes à DEUX vrais partis (= pas de divers).
  if (isDiversParti(pa1) || isDiversParti(pa2)) return null;
  // Post-M4.5 : couleur dérivée du parti (les person_id n'ont plus de couleur
  // propre dans PERSONS). getPartiColor lit donnees.js qui a la couleur de
  // référence par code parti.
  const c1 = (typeof getPartiColor === 'function' && getPartiColor(pa1)) || '#bbbbbb';
  const c2 = (typeof getPartiColor === 'function' && getPartiColor(pa2)) || '#bbbbbb';
  return [c1, c2];
}
// Helper de style inline pour un dot/carré bicolore. Retourne un string CSS
// (background) prêt à injecter en inline. Pour binôme homogène ou non-binôme,
// retourne juste la couleur simple. Angle 135deg = split du coin haut-gauche au
// coin bas-droit (diagonale "split" classique).
function dotBackground(name) {
  const cs = binomePartiColors(name);
  if (!cs) return colorOfCandidate(name);
  return 'linear-gradient(135deg,' + cs[0] + ' 50%,' + cs[1] + ' 50%)';
}
// Couleur unique d'un candidat ou d'un binôme.
// Règle paritaire (mai 2026) pour les binômes : couleur du parti de la candidate F
// par défaut. Exception : si F est DV* et H un vrai parti, on prend H (lisibilité
// politique — un divers DV* n'a pas de couleur signifiante).
// Hors binômes / fallback : couleur propre du candidat si définie, sinon dérivée du parti.
function colorOfCandidate(name) {
  const ci = candInfo(name);
  if (Array.isArray(ci.binome) && ci.binome.length === 2 && Array.isArray(ci.binome_partis) && ci.binome_partis.length === 2) {
    const idxF = _femaleIdxOfBinome(ci);
    if (idxF >= 0) {
      const paF = (ci.binome_partis[idxF] || '').trim();
      const paH = (ci.binome_partis[1 - idxF] || '').trim();
      const pick = (isDiversParti(paF) && paH && !isDiversParti(paH)) ? paH : paF;
      if (pick) return getPartiColor(pick) || '#bbbbbb';
    }
  }
  return ci.c || getPartiColor(ci.pa) || '#bbbbbb';
}
function winnerColor(data) { if (!data || !data.w) return '#ccc'; return colorOfCandidate(data.w); }

// ─── 'En savoir plus' : liens Wikipédia (élection) + LRVanalyse (objet) ─────
// Helper pour dériver l'URL Wikipédia FR d'une élection. Combine un mapping
// d'overrides (cas spéciaux : municipales LR, référendums avec sous-titre,
// partielle sans page WP dédiée) et une dérivation par pattern.
function getElectionWikipediaURL(label) {
  if (!label) return null;
  const OVERRIDES = {
    'Référendum 1992': 'https://fr.wikipedia.org/wiki/R%C3%A9f%C3%A9rendum_fran%C3%A7ais_sur_le_trait%C3%A9_de_Maastricht',
    'Référendum 2000': 'https://fr.wikipedia.org/wiki/R%C3%A9f%C3%A9rendum_fran%C3%A7ais_de_2000_sur_le_quinquennat',
    'Référendum 2005': 'https://fr.wikipedia.org/wiki/R%C3%A9f%C3%A9rendum_fran%C3%A7ais_sur_le_trait%C3%A9_%C3%A9tablissant_une_constitution_pour_l%27Europe',
    // 1995, 2001 et 2008 : pas de page Wikipédia dédiée à La Rochelle ni à la
    // Charente-Maritime → fallback sur la page nationale.
    'Municipales 1995': 'https://fr.wikipedia.org/wiki/%C3%89lections_municipales_fran%C3%A7aises_de_1995',
    'Municipales 2001': 'https://fr.wikipedia.org/wiki/%C3%89lections_municipales_fran%C3%A7aises_de_2001',
    'Municipales 2008': 'https://fr.wikipedia.org/wiki/%C3%89lections_municipales_fran%C3%A7aises_de_2008',
    'Municipales 2014': 'https://fr.wikipedia.org/wiki/%C3%89lections_municipales_de_2014_%C3%A0_La_Rochelle',
    'Municipales 2020': 'https://fr.wikipedia.org/wiki/%C3%89lections_municipales_de_2020_%C3%A0_La_Rochelle',
    'Municipales 2026': 'https://fr.wikipedia.org/wiki/%C3%89lections_municipales_de_2026_%C3%A0_La_Rochelle',
    'Cantonale partielle 2002': null,  // pas de page WP dédiée pour les partielles
    // Cantonales 2001 : pas de page Charente-Maritime → fallback nationale.
    // (2004, 2008, 2011 ont leur page Charente-Maritime confirmée.)
    'Cantonales 2001': 'https://fr.wikipedia.org/wiki/%C3%89lections_cantonales_fran%C3%A7aises_de_2001'
  };
  if (label in OVERRIDES) return OVERRIDES[label];
  const ym = label.match(/(\d{4})/);
  if (!ym) return null;
  const y = ym[1];
  const enc = s => encodeURIComponent(s).replace(/%20/g, '_');
  // Préférence : page Wikipédia déclinée au niveau Charente-Maritime quand elle
  // existe (Législatives, Cantonales, Départementales). Plus pertinent pour LR
  // que la page nationale. Pour Présidentielles / Européennes / Référendums :
  // pas de version locale (scrutins nationaux), on garde la page nationale.
  if (/^Présidentielle/i.test(label))   return 'https://fr.wikipedia.org/wiki/' + enc('Élection présidentielle française de ' + y);
  if (/^Européennes/i.test(label))      return 'https://fr.wikipedia.org/wiki/' + enc('Élections européennes de ' + y + ' en France');
  if (/^Législatives/i.test(label))     return 'https://fr.wikipedia.org/wiki/' + enc('Élections législatives de ' + y + ' en Charente-Maritime');
  if (/^Régionales/i.test(label)) {
    const region = parseInt(y) < 2015 ? 'Poitou-Charentes' : 'Nouvelle-Aquitaine';
    return 'https://fr.wikipedia.org/wiki/' + enc('Élections régionales de ' + y + ' en ' + region);
  }
  if (/^Cantonales/i.test(label))       return 'https://fr.wikipedia.org/wiki/' + enc('Élections cantonales de ' + y + ' en Charente-Maritime');
  if (/^Départementales/i.test(label))  return 'https://fr.wikipedia.org/wiki/' + enc('Élections départementales de ' + y + ' en Charente-Maritime');
  if (/^Référendum/i.test(label))       return 'https://fr.wikipedia.org/wiki/' + enc('Référendum français de ' + y);
  return null;
}

// URL LRVanalyse pour pré-sélectionner un niveau + objet courant.
function getAnalyseURL(level, id) {
  if (level === 'ville') return 'LRVanalyse.html';
  const params = new URLSearchParams();
  params.set('niveau', level);
  if (id) params.set(level, String(id));
  return 'LRVanalyse.html#' + params.toString();
}

// Descriptor d'élection : sépare préfixe (article) et partie distinctive en gras.
// - Référendum : 'le ' + 'Référendum YYYY'
// - 1er mot pluriel (-s) : 'les élections ' + label (Cantonales, Européennes...)
// - sinon singulier : "l'élection " + label
function getElectionDescriptor(label) {
  if (!label) return { prefix: "l'élection ", bold: '' };
  if (/^Référendum/i.test(label)) return { prefix: 'le ', bold: label };
  const firstWord = label.split(' ')[0];
  if (/s$/i.test(firstWord)) return { prefix: 'les élections ', bold: label };
  return { prefix: "l'élection ", bold: label };
}

// Rendu HTML du bloc 'En savoir plus' en bas de fiche (bureau/quartier/canton/ville).
// `level` ∈ {bureau, quartier, canton, ville} ; `id` = identifiant ;
// `prefix` = texte non-gras précédant le gras (ex. 'du bureau de vote ') ;
// `bold` = partie distinctive en gras (ex. 'n° 50 · Dénomination', 'Tasdon').
function renderMoreLinks(level, id, prefix, bold) {
  const wpUrl = getElectionWikipediaURL(currentElection);
  const analyseUrl = getAnalyseURL(level, id);
  const ed = getElectionDescriptor(currentElection);
  // Markup en classes CSS (au lieu de styles inline) pour permettre l'adaptation
  // mobile via @media (cf. shared.css / styles de page).
  let h = '<div class="fiche-section-more">';
  h += '<a class="fsm-link" href="' + analyseUrl + '">'
     + '<span class="fsm-arrow">→</span>'
     + '<span class="fsm-text">En savoir plus sur l\'histoire électorale '
     + _esc(prefix) + '<strong>' + _esc(bold) + '</strong></span></a>';
  if (wpUrl) {
    h += '<a class="fsm-link" href="' + wpUrl + '" target="_blank" rel="noopener">'
       + '<span class="fsm-arrow">→</span>'
       + '<span class="fsm-text">En savoir plus sur '
       + _esc(ed.prefix) + '<strong>' + _esc(ed.bold) + '</strong>'
       + ' <span class="fsm-source">(Wikipédia ↗)</span></span></a>';
  }
  h += '</div>';
  return h;
}

// Helper local : escape HTML basique pour les liens 'En savoir plus'.
function _esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── EX-AEQUO : hachures diagonales pour les bureaux où plusieurs candidats sont
// strictement à égalité en tête. Convention cartographique classique pour
// "valeur partagée". On détecte sur _voix (entiers, précis), pas sur c (pct
// flottants potentiellement entachés d'arrondis).
function tieCandidatesForBureau(data) {
  if (!data || !data._voix) return null;
  const entries = Object.entries(data._voix);
  if (entries.length < 2) return null;
  const maxV = Math.max(...entries.map(([,v]) => v));
  if (maxV <= 0) return null;
  const tied = entries.filter(([,v]) => v === maxV).map(([k]) => k);
  return tied.length > 1 ? tied : null;
}

// Cache des IDs de pattern déjà injectés dans le <defs> de la carte.
const _tiePatternCache = new Set();

// Crée (ou réutilise) un <pattern> SVG de hachures diagonales aux couleurs
// passées. Les patterns sont stockés dans un SVG global invisible attaché au
// <body>, partagé entre TOUTES les maps Leaflet (principale et minimaps).
// Les <path> Leaflet référencent les patterns via fill="url(#id)" qui résout
// par rapport au document, donc un host global suffit.
function ensureTiePattern(colors) {
  if (!colors || colors.length < 2) return null;
  const norm = c => (c || '#ccc').replace('#','').toUpperCase().slice(0,6);
  const id = 'tie-' + colors.map(norm).join('-');
  if (_tiePatternCache.has(id) && document.getElementById(id)) return id;
  // SVG host global (créé une seule fois, jamais détruit)
  let host = document.getElementById('lrv-tie-patterns');
  if (!host) {
    host = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    host.id = 'lrv-tie-patterns';
    host.setAttribute('width', '0');
    host.setAttribute('height', '0');
    host.setAttribute('aria-hidden', 'true');
    host.style.position = 'absolute';
    host.style.pointerEvents = 'none';
    document.body.appendChild(host);
  }
  let defs = host.querySelector('defs');
  if (!defs) {
    defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
    host.appendChild(defs);
  }
  if (defs.querySelector('#' + id)) { _tiePatternCache.add(id); return id; }
  // Pattern : N bandes verticales égales, le tout pivoté à 45°. Largeur de
  // bande = 8 px en espace SVG (équivaut à ~8 px visuels, userSpaceOnUse).
  const bandW = 8;
  const totalW = bandW * colors.length;
  const NS = 'http://www.w3.org/2000/svg';
  const pattern = document.createElementNS(NS, 'pattern');
  pattern.setAttribute('id', id);
  pattern.setAttribute('width', String(totalW));
  pattern.setAttribute('height', String(totalW));
  pattern.setAttribute('patternUnits', 'userSpaceOnUse');
  pattern.setAttribute('patternTransform', 'rotate(45)');
  colors.forEach((col, i) => {
    const r = document.createElementNS(NS, 'rect');
    r.setAttribute('x', String(i * bandW));
    r.setAttribute('width', String(bandW));
    r.setAttribute('height', String(totalW));
    r.setAttribute('fill', col || '#ccc');
    pattern.appendChild(r);
  });
  defs.appendChild(pattern);
  _tiePatternCache.add(id);
  return id;
}
// Voile dynamique dans la couleur du gagnant — remplace la barre verticale colorée des fiches.
// L'attribut --i (index) contrôle le stagger de l'animation reveal.
function ficheSail(color, mini) {
  // Accepte color = string (uni) ou [c1, c2] (bicolor : 5 rows haut = c1, 5 bas = c2).
  // Convention utilisée pour les binômes à 2 vrais partis (binomePartiColors).
  const isBicolor = Array.isArray(color);
  const c1 = isBicolor ? (color[0] || '#ccc') : (color || '#ccc');
  const c2 = isBicolor ? (color[1] || '#ccc') : null;
  const cls = 'fiche-sail' + (mini ? ' mini' : '') + (isBicolor ? ' bicolor' : '');
  const styleVars = '--c:' + c1 + (isBicolor ? (';--c1:' + c1 + ';--c2:' + c2) : '');
  let s = '<div class="' + cls + '" style="' + styleVars + '">';
  for (let k=1;k<=10;k++) s += '<div class="sail-row" style="--w:'+(k*10)+'%;--i:'+(10-k)+'"></div>';
  return s + '</div>';
}
// Helper : retourne la couleur à passer à ficheSail pour le winner d'un bureau /
// canton / quartier. Bicolor [c1, c2] si binôme à 2 vrais partis, couleur unique sinon.
function sailColorForWinner(winnerName) {
  if (!winnerName) return '#ccc';
  const cs = (typeof binomePartiColors === 'function') ? binomePartiColors(winnerName) : null;
  return cs || colorOfCandidate(winnerName);
}
// Synchronise la taille des voiles avec la hauteur du bloc-texte voisin.
// Pour préserver l'angle 45° avec un gap de 1 px entre les 10 rangs,
// la largeur doit valoir H + 1 (cf. calcul géométrique : W = 10·step,
// H = 10·rowH + 9·gap, et step = rowH + gap → W = H + gap).
function syncFicheSails() {
  const SAIL_GAP = 1;
  document.querySelectorAll('.fiche-id').forEach(fid => {
    const sail = fid.querySelector(':scope > .fiche-sail');
    const text = fid.querySelector(':scope > .fiche-text');
    if (!sail || !text) return;
    const h = text.offsetHeight;
    if (h > 0) {
      sail.style.height = h + 'px';
      sail.style.width  = (h + SAIL_GAP) + 'px';
      // (Re)déclenche l'animation reveal en cascade
      sail.classList.remove('reveal');
      void sail.offsetWidth; // force reflow
      sail.classList.add('reveal');
    }
  });
}
// MutationObserver : déclenche syncFicheSails + setupFicheMapHint dès qu'un container de fiche change.
// Au chargement : on cache les <option> du dropdown qui correspondent à des
// scrutins marqués `draft: true` dans donnees.js (cf. helper isDraftElection
// dans shared.js). Le scrutin reste pleinement accessible via deeplink direct
// (#election=...) pour l'autrice mais n'apparaît plus dans les listes publiques.
window.addEventListener('DOMContentLoaded', () => {
  const sel = document.getElementById('el-select');
  if (sel && typeof isDraftElection === 'function') {
    Array.from(sel.querySelectorAll('option')).forEach(o => {
      if (isDraftElection(o.value)) o.remove();
    });
  }
});

window.addEventListener('DOMContentLoaded', () => {
  const targets = ['sb-info', 'ov-body'].map(id => document.getElementById(id)).filter(Boolean);
  if (!targets.length) return;
  // Throttle via requestAnimationFrame : un seul appel par frame (≤16 ms), mais
  // l'exécution se fait AVANT le prochain paint, donc pas de FOUC visible sur
  // l'injection de la fiche (titraille puis voile). Un setTimeout(120) laissait
  // au browser le temps de peindre l'état "sans sail-rows" avant le sync.
  let _raf = 0;
  const _flush = () => { _raf = 0; syncFicheSails(); setupFicheMapHint(); };
  const mo = new MutationObserver(() => {
    if (_raf) return;
    _raf = requestAnimationFrame(_flush);
  });
  targets.forEach(t => mo.observe(t, { childList: true, subtree: true }));
  // resize → re-sync (fonts loading, layout reflow) — délai plus long acceptable ici
  // car aucun nouveau contenu n'est injecté pendant un resize.
  let _tResize;
  window.addEventListener('resize', () => { clearTimeout(_tResize); _tResize = setTimeout(syncFicheSails, 50); });
});

// Bouton flottant "Voir la carte" : observe le #mm-wrap de la fiche courante et cache le bouton
// (de manière permanente pour cette fiche) dès que la mini-carte entre dans le viewport.
// Re-armé à chaque ouverture/changement de fiche grâce au MutationObserver ci-dessus.
let _ficheMapHintObserver = null;
function setupFicheMapHint() {
  const hint = document.getElementById('fiche-map-hint');
  const mm   = document.getElementById('mm-wrap');
  // Sortir tôt SANS toucher à l'état si l'un des éléments manque (race avec Leaflet possible) :
  // sinon on déconnecte l'observer alors que mm-wrap est juste momentanément absent.
  if (!hint || !mm) return;
  hint.classList.remove('dismissed');                                     // reset pour la nouvelle fiche
  if (_ficheMapHintObserver) { _ficheMapHintObserver.disconnect(); _ficheMapHintObserver = null; }
  // root = #ov-body car le scroll est INTERNE à ce conteneur (overflow-y: auto),
  // pas global au viewport. Sans ça l'observer ne firerait jamais.
  const scrollRoot = document.getElementById('ov-body');
  _ficheMapHintObserver = new IntersectionObserver((entries) => {
    for (const e of entries) {
      if (e.isIntersecting) {                                             // visible même de 1 px
        hint.classList.add('dismissed');
        if (_ficheMapHintObserver) { _ficheMapHintObserver.disconnect(); _ficheMapHintObserver = null; }
        break;
      }
    }
  }, { root: scrollRoot, threshold: 0, rootMargin: '0px 0px 200px 0px' });   // fire ~200 px avant l'entrée réelle dans le viewport
  _ficheMapHintObserver.observe(mm);
}
function blocOfCandidate(name) {
  const ci = candInfo(name);
  if (ci.b) return ci.b;
  // Binôme : déduire du bloc des membres (mêmes blocs → ce bloc ; sinon premier
  // membre dont le bloc est défini, sinon "?").
  if (Array.isArray(ci.binome) && ci.binome.length === 2 && typeof binomeMembers === 'function') {
    const ms = binomeMembers(name);
    if (ms) {
      const b1 = ms[0].b || '';
      const b2 = ms[1].b || '';
      if (b1 && b1 === b2) return b1;
      return b1 || b2 || '?';
    }
  }
  return '?';
}
function computeBlocs(data) {
  const blocs = {};
  Object.entries(data.c || {}).forEach(([name, pct]) => {
    const b = blocOfCandidate(name); blocs[b] = (blocs[b] || 0) + pct;
  });
  return blocs;
}
// Calcule les blocs pour un scrutin adjacent (contexte d'élection explicite, indépendant de currentElection)
// Merge cascade générique → override |Élection (comme candInfo), pour que les
// overrides partiels (ex. CAND_DATA["Mandroux PS|Cantonales 2008"]={al:"PRG"})
// n'écrasent pas la fiche entière → sinon le candidat perd son `b` et tombe en `?`.
function computeBlocsAdj(data, elecLabel) {
  const _merge = name => ({
    ...(CAND_DATA[name] || {}),
    ...(CAND_DATA[name+'|'+elecLabel] || {})
  });
  const blocs = {};
  Object.entries(data.c || {}).forEach(([name, pct]) => {
    const info = _merge(name);
    let b = info.b || '';
    // Binôme : déduire des membres avec le même merge cascade.
    if (!b && Array.isArray(info.binome) && info.binome.length === 2) {
      const m1 = _merge(info.binome[0]);
      const m2 = _merge(info.binome[1]);
      const b1 = m1.b || '', b2 = m2.b || '';
      b = (b1 && b1 === b2) ? b1 : (b1 || b2 || '');
    }
    b = b || '?';
    blocs[b] = (blocs[b] || 0) + pct;
  });
  return blocs;
}
// Abrège un prénom en initiales pointées :
//   "Jean-Luc"     → "J.-L."
//   "Marie-George" → "M.-G."
//   "Emmanuel"     → "E."
//   "Marine"       → "M."
function abbreviatePrenom(prenom) {
  if (!prenom) return '';
  return prenom.split('-')
    .map(p => p.trim()).filter(p => p.length)
    .map(p => p.charAt(0).toUpperCase() + '.')
    .join('-');
}

// Variante HTML de candDisplayName : encapsule le prénom dans deux spans
// (version longue + version abrégée). Le swap se fait en CSS via @media :
// desktop affiche la version longue, mobile affiche les initiales.
// Pas de rerender JS au resize.
function candDisplayNameHtml(rawName) {
  const d = candInfo(rawName);
  // Binôme paritaire : on génère DEUX paires de spans cn-prenom-full / cn-prenom-short
  // (une par membre), pour que la cascade .cand-name.prenom-abbrev / .prenom-hidden
  // puisse réduire les prénoms des 2 membres simultanément (palier 1 → initiales,
  // palier 4 → masqués). Tirets ASCII → U+2011 dans les noms pour empêcher tout
  // break interne lors de la troncature.
  if (Array.isArray(d.binome) && d.binome.length === 2 && typeof binomeMembers === 'function') {
    const ms = binomeMembers(rawName);
    if (ms) {
      const parts = ms.map(m => {
        const nomNB = (m.n || '').replace(/-/g, '‑');
        if (!m.p) return nomNB;
        const short = (typeof abbreviatePrenom === 'function') ? abbreviatePrenom(m.p) : '';
        return '<span class="cn-prenom-full">' + m.p + ' </span>'
             + '<span class="cn-prenom-short">' + short + ' </span>'
             + nomNB;
      });
      return parts.join(' / ');
    }
  }
  let prenom, nom;
  if (d.p && d.n) { prenom = d.p; nom = d.n; }
  else if (d.p) { prenom = d.p; nom = rawName.replace(/\s*\([^)]*\)\s*$/, '').replace(/\s+\S+$/, '').trim(); }
  // Cas "nom connu mais prénom vide" (placeholder en attente) : on affiche
  // juste le nom plutôt que le cid brut "X@election" qui apparaîtrait en fallback.
  else if (d.n) return d.n;
  else return rawName.replace(/\s*\([^)]*\)\s*$/, '').trim();
  if (!prenom) return nom;
  const short = abbreviatePrenom(prenom);
  // Espace insécable en fin de span pour rester cohérent avec candDisplayName
  // (qui utilise   entre prénom et nom — visible dans l'audit od).
  return '<span class="cn-prenom-full">' + prenom + ' </span>'
       + '<span class="cn-prenom-short">' + short + ' </span>'
       + nom;
}

// Calcule la hauteur d'une ligne pour un élément donné.
// Retourne 0 si la mesure échoue (élément invisible / pas de font).
function lineHeightOf(el) {
  const styles = getComputedStyle(el);
  let lineH = parseFloat(styles.lineHeight);
  if (isNaN(lineH)) lineH = parseFloat(styles.fontSize) * 1.2;
  return lineH || 0;
}

// Vrai si l'élément déborde sur ≥ 2 lignes (offsetHeight > 1.5× lineHeight).
function isMultiline(el) {
  const lineH = lineHeightOf(el);
  if (!lineH) return false;
  return el.offsetHeight > lineH * 1.5;
}

// Détecte si .cand-sub est passé sur une ligne DIFFÉRENTE de .cand-name dans
// leur parent flex-wrap.
// ⚠️ Subtilité : .cand-name (font ~1.3rem) et .cand-sub (font ~0.66rem) sont
// alignés sur leur baseline (parent flex avec align-items:baseline). Comme leurs
// hauteurs de boîte diffèrent, leur offsetTop diffère TOUJOURS (~8 px d'écart)
// même sur la même ligne — sub se positionne plus bas dans la line-box pour
// que sa baseline matche celle de name. On ne peut donc PAS comparer
// directement offsetTop avec une petite tolérance.
// Approche correcte : sub est sur la ligne suivante ssi son top est au moins
// au niveau (ou en-dessous) du bottom du name. 4 px de tolérance pour les
// arrondis sub-pixels.
// ──
// Cas particulier MOBILE : sur mobile, .cand-row-namepart passe en
// flex-direction:column → name et sub sont stackés PAR CONSTRUCTION (pas par
// wrap manque-de-place). Détecter "sub sur ligne suivante" reviendrait à
// déclencher la cascade tout le temps, ce qui n'a pas de sens : sub a déjà
// toute la largeur du parent. On retourne false dans ce cas pour désactiver
// la cascade et garder l'affichage complet.
function isSubOnNextLine(nameEl, subEl) {
  if (!nameEl || !subEl) return false;
  const parent = nameEl.parentElement;
  if (parent) {
    const dir = getComputedStyle(parent).flexDirection;
    if (dir === 'column' || dir === 'column-reverse') return false;
  }
  return subEl.offsetTop >= nameEl.offsetTop + nameEl.offsetHeight - 4;
}

// Cascade unifiée : déclenchée par "le parti passe en 2e ligne" (signe que la
// place est trop juste). Tente progressivement d'abréger le contenu jusqu'à
// récupérer une seule ligne ; s'arrête dès que sub revient sur la ligne du nom.
//   Palier 1 — prénom complet → initiales (.prenom-abbrev sur .cand-name)
//   Palier 2 — parti long → code court (.parti-abbrev sur .cand-sub)
//   Palier 3 — badge "meilleur bureau" → "meilleur" (.extr-short sur .cand-sub)
//   Palier 4 — initiales du prénom totalement masquées (.prenom-hidden sur .cand-name)
//   Palier 5 — alliés "(LREM + UDI)" masqués (.allies-hidden sur .cand-sub)
// À chaque palier, on re-mesure : si OK on s'arrête, sinon palier suivant.
function applyCandTruncationCascade(rootEl) {
  const containers = (rootEl || document).querySelectorAll('.cand-row-namepart');
  containers.forEach(np => {
    const nameEl = np.querySelector('.cand-name');
    const subEl  = np.querySelector('.cand-sub');
    if (!nameEl || !subEl) return;
    // Reset les 5 classes — état "tout long"
    nameEl.classList.remove('prenom-abbrev', 'prenom-hidden');
    subEl.classList.remove('parti-abbrev', 'extr-short', 'allies-hidden');
    // Mode mobile : .cand-row-namepart passe en flex-direction:column → name et sub
    // sont stackés sur leur propre ligne. isSubOnNextLine retourne false par
    // construction (cf. garde dans isSubOnNextLine). On utilise alors la détection
    // de débordement HORIZONTAL individuelle pour appliquer la cascade.
    const parentDir = getComputedStyle(np).flexDirection;
    const isColumn = (parentDir === 'column' || parentDir === 'column-reverse');
    if (isColumn) {
      // En mobile column, le nom et le sub wrappent naturellement (pas de nowrap) :
      // scrollWidth == clientWidth → on détecte le multi-ligne via isMultiline.
      // void offsetHeight force un reflow synchrone pour offsetHeight fiable après
      // classList.add/remove.
      function nameOverflows() { void nameEl.offsetHeight; return isMultiline(nameEl); }
      function subOverflows()  { void subEl.offsetHeight;  return isMultiline(subEl);  }
      // Cascade nom : prenom complet → initiales → masqué
      if (nameOverflows()) {
        nameEl.classList.add('prenom-abbrev');
        if (nameOverflows()) {
          nameEl.classList.remove('prenom-abbrev');
          nameEl.classList.add('prenom-hidden');
        }
      }
      // Cascade sub : parti long → court ; "meilleur bureau" → "meilleur" ; alliés masqués
      if (subOverflows()) {
        subEl.classList.add('parti-abbrev');
        if (subOverflows()) {
          subEl.classList.add('extr-short');
          if (subOverflows()) {
            subEl.classList.add('allies-hidden');
          }
        }
      }
      return;
    }
    // Mode desktop : cascade unifiée déclenchée par "le sub passe sur la ligne d'après".
    if (!isSubOnNextLine(nameEl, subEl)) return;
    // Palier 1
    nameEl.classList.add('prenom-abbrev');
    if (!isSubOnNextLine(nameEl, subEl)) return;
    // Palier 2
    subEl.classList.add('parti-abbrev');
    if (!isSubOnNextLine(nameEl, subEl)) return;
    // Palier 3
    subEl.classList.add('extr-short');
    if (!isSubOnNextLine(nameEl, subEl)) return;
    // Palier 4
    nameEl.classList.add('prenom-hidden');
    if (!isSubOnNextLine(nameEl, subEl)) return;
    // Palier 5 (dernier recours)
    subEl.classList.add('allies-hidden');
  });
}

// Met en forme une dénomination longue pour qu'elle wrappe à un endroit
// logique (tiret central « – » ou « — ») plutôt qu'à une espace ou un trait
// d'union interne.
//   "Arsenal–Hôpital Saint-Louis"  →  "Arsenal–<wbr>Hôpital&nbsp;Saint‑Louis"
// Conséquence : le seul point de coupure possible est après le tiret central,
// ce qui donne "Arsenal–" / "Hôpital Saint-Louis" au lieu de "Arsenal–Hôpital
// Saint-" / "Louis". Pour les dénominations SANS tiret central, on retourne
// le texte inchangé : le navigateur garde ses libertés naturelles.
function formatDenomination(name) {
  if (!name) return '';
  // Pas de tiret central → comportement par défaut du navigateur
  if (!/[–—]/.test(name)) return name;
  // Découpage en conservant les séparateurs (tirets cadratin/demi-cadratin)
  const parts = name.split(/([–—])/);
  return parts.map((p, i) => {
    if (i % 2 === 1) {
      // Séparateur (impair) : on ajoute <wbr> pour offrir un point de coupure préféré ici
      return p + '<wbr>';
    }
    // Contenu (pair) : on rend insécables les espaces internes (NBSP U+00A0)
    // et les traits d'union internes (non-breaking hyphen U+2011)
    return p.replace(/ /g, ' ').replace(/-/g, '‑');
  }).join('');
}

// Déclenche la cascade unifiée d'abréviation. Trigger principal : le parti
// (.cand-sub) déborde sur une 2e ligne dans le flex parent — c'est le signe
// que la place est trop juste. Cf. applyCandTruncationCascade pour les paliers.
// Appelée après chaque rendu de fiche, et au resize de la fenêtre.
function adjustCandNameAbbreviation(scope) {
  applyCandTruncationCascade(scope);
}

// Re-mesure tous les noms au resize de la fenêtre (debounced 150 ms pour
// éviter de spammer pendant un drag). Couvre la rotation du téléphone et
// l'ouverture/fermeture de la barre d'URL Chrome mobile.
(function(){
  let t;
  window.addEventListener('resize', () => {
    clearTimeout(t);
    t = setTimeout(() => adjustCandNameAbbreviation(), 150);
  }, { passive: true });
})();

// MutationObserver sur #ov-body : à chaque mise à jour de contenu (changement
// de fiche bureau, switch d'onglet quartier/global, etc.), on relance la
// détection d'overflow sur les .cand-name nouvellement rendus.
// Plus DRY que d'appeler adjustCandNameAbbreviation() à chaque innerHTML.
(function setupCandNameObserver(){
  function attach() {
    const ov = document.getElementById('ov-body');
    if (!ov) { setTimeout(attach, 100); return; }
    let raf = 0;
    new MutationObserver(() => {
      if (raf) return;
      raf = requestAnimationFrame(() => {
        raf = 0;
        adjustCandNameAbbreviation(ov);
      });
    }).observe(ov, { childList: true, subtree: true });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', attach);
  } else {
    attach();
  }
})();

function candDisplayName(rawName) {
  const d = candInfo(rawName);
  // Binôme paritaire (Départementales/Cantonales) : "Prénom1 Nom1 / Prénom2 Nom2"
  // avec femme devant (selon `s` des 2 membres). Construit dynamiquement via binomeFullLabel.
  if (Array.isArray(d.binome) && d.binome.length === 2) {
    const full = (typeof binomeFullLabel === 'function') ? binomeFullLabel(rawName) : null;
    if (full) return full;
  }
  if (d.p && d.n) return d.p + ' ' + d.n;
  // Cas "nom de famille connu mais prénom vide" (placeholder en attente) :
  // on affiche juste le nom, plutôt que le cid brut 'X@election'.
  if (d.n) return d.n;
  if (d.p) return d.p + ' ' + rawName.replace(/\s*\([^)]*\)\s*$/, '').replace(/\s+\S+$/, '').trim();
  return rawName.replace(/\s*\([^)]*\)\s*$/, '').trim();
}

function fmtCanton(c) { if (!c || c === '') return ''; return 'La Rochelle-' + c; }


// ── MAP ───────────────────────────────────────────────────────────────────────

const map = L.map('map', {
  // Centre + zoom de fallback (valeurs réécrites immédiatement par fitMapToCity).
  // Servent uniquement si fitBounds échoue pour une raison rare.
  center: [46.1597, -1.190], zoom: 13.5, zoomSnap: 0.1, zoomControl: false
});

// Bornes géographiques approximatives de La Rochelle (englobe tous les bureaux,
// y compris Laleu à l'ouest et Villeneuve à l'est). Hardcoded car robustes :
// indépendantes de l'ère cartographique en cours.
const LR_BOUNDS = L.latLngBounds(L.latLng(46.133, -1.230), L.latLng(46.193, -1.135));

// Note : les verrous pan/zoom (setMaxBounds, setMinZoom, maxBoundsViscosity) sont
// appliqués APRÈS fitMapToCity (plus bas), pour éviter qu'un éventuel snap de
// position cause un mouvement visible juste après le fit initial.

// Cadre la carte sur La Rochelle, en tenant compte de l'espace visuel pris par
// la sidebar (à gauche, sur desktop) et la légende (en bas, sur mobile).
// Appelé au load + à chaque resize, donc le zoom s'adapte à la largeur dispo.
// Ajustements fins :
//  - paddingBottomRight asymétrique (plus grand que paddingTopLeft hors sidebar)
//    → la ville se décale légèrement vers la gauche dans la zone visible.
//  - setZoom(-0.3) après fitBounds → dézoom modéré (~25 % d'étendue en plus)
//    pour aérer le cadrage sur desktop.
function fitMapToCity(animate) {
  const isMobile = window.matchMedia && window.matchMedia('(max-width: 720px)').matches;
  const sidebar = document.getElementById('sidebar');
  const sbW = (!isMobile && sidebar) ? sidebar.offsetWidth : 0;
  // Décalage horizontal progressif : sur grand écran, on pousse la ville plus à
  // gauche pour qu'elle ne se retrouve pas centrée loin de la sidebar.
  // - Dans la fourchette 1300 px : 80 px de padding droit
  // - Au-delà : on ajoute 4 px de padding par tranche de 10 px de largeur (coef 0.4).
  const vw = window.innerWidth;
  // Mobile : pad droit progressif selon la largeur (la ville se décale plus à
  // gauche sur les petits écrans, type iPhone SE) — formule symétrique de celle
  // utilisée sur desktop, dans les bornes mobiles.
  //   720 px : 30 px  (frontière mobile)
  //   375 px : ~50 px (iPhone SE)
  //   320 px : ~53 px (minimum supporté)
  const rightPad = isMobile
    ? Math.round(30 + Math.max(0, (720 - vw) / 17))
    : Math.round(80 + Math.max(0, (vw - 1300) * 0.4));
  map.fitBounds(LR_BOUNDS, {
    paddingTopLeft: [sbW + 12, 30],
    paddingBottomRight: [rightPad, isMobile ? 90 : 30],
    animate: !!animate,
  });

    // Dézoom progressif : nul sur grands écrans (≥ 1600 px → on profite de la
    // place), modéré sur écrans étroits (jusqu'à -0.25 vers 950 px) pour ne
    // pas perdre la ville de vue dans une zone visible plus petite.
    const vw = window.innerWidth;
    const dezoom = vw >= 1600 ? 0 : Math.min(0.25, (1600 - vw) / 2600);
    if (dezoom > 0.01) {
      map.setZoom(map.getZoom() - dezoom, { animate: false });
    }
  } else {
    // Mobile : dézoom progressif (symétrique au desktop, dans les bornes mobiles).
    //   720 px : ~0    (frontière mobile, pas de dézoom)
    //   500 px : ~0.18
    //   375 px : ~0.29 (iPhone SE)
    //   320 px : ~0.33 (minimum)
    // Bornage à 0.4 max pour éviter un dézoom excessif sur les très petits écrans.
    const dezoomM = Math.min(0.4, Math.max(0, (720 - vw) / 1200));
    if (dezoomM > 0.01) {
      map.setZoom(map.getZoom() - dezoomM, { animate: false });
    }
  }
}
// Fit initial : on appelle invalidateSize() AVANT fitMapToCity pour forcer Leaflet
// à re-mesurer le container #map avec ses dimensions finales.
map.invalidateSize(false);
fitMapToCity(false);

// Verrous pan + zoom APRÈS le fit initial pour ne pas perturber le cadrage.
//  - maxBounds : pad(0.7) = ~70 % d'élargissement autour de La Rochelle. On peut
//    voir l'île de Ré, Rochefort, Île d'Aix, etc. dans le contexte régional,
//    mais pas se retrouver à Bordeaux ou Paris en draguant.
//  - maxBoundsViscosity 1.0 : le pan est strict (la carte rebondit au bord).
//  - minZoom 11.5 : on peut dézoomer un poil pour le contexte, mais pas voir
//    toute la France.
map.setMaxBounds(LR_BOUNDS.pad(0.7));
map.options.maxBoundsViscosity = 1.0;
map.setMinZoom(11.5);

// Tooltips figés pendant un pan/zoom : on combine 3 mécanismes pour éviter
// qu'ils n'apparaissent au mauvais endroit ou ne s'accumulent.
//  1) Pendant le mouvement, classe CSS qui masque l'ensemble du pane tooltip.
//  2) À chaque mouseover/openTooltip pendant le mouvement, on ferme aussitôt.
//  3) À la fin du mouvement, cleanup DOM différé (3 passes : immédiat, 50ms,
//     200ms) pour catcher les tooltips créés par Leaflet en post-moveend.

    try { mainLayer.eachLayer(function(l) { if (l.closeTooltip) l.closeTooltip(); }); } catch (_) {}
  }

    if (el.parentNode) el.parentNode.removeChild(el);

    _cleanupTooltips();

    _cleanupTooltips();

map.on('moveend zoomend',     function() { _setMapMoving(false); });

map.on('tooltipopen', function(e) {
  if (_mapIsMoving && e.tooltip && e.tooltip.close) e.tooltip.close();

// Le loader (#map-loader) est visible depuis le parse HTML. Une fois Leaflet
// prêt (whenReady fire après le premier layout), on le masque en douceur.
map.whenReady(() => {
  const _ldr = document.getElementById('map-loader');
  if (_ldr) {
    _ldr.classList.add('is-hidden');
    _ldr.setAttribute('aria-busy', 'false');
    // On retire complètement le nœud après l'anim pour libérer le DOM
    setTimeout(() => _ldr.remove(), 400);
  }

// Resize : recadrer la carte (debounce 150 ms). Cela permet au zoom de suivre
// les changements de largeur de viewport (passage 1920 → 1280 → 1024 par ex.)
// et de breakpoint mobile↔desktop sans perdre La Rochelle de vue.
// On ne recadre que si l'utilisateur n'a pas encore manipulé la carte (zoom/pan).
let _userInteracted = false;
['zoomstart', 'movestart'].forEach(ev => {
  map.on(ev, e => {
    // Ne pas marquer comme interaction utilisateur si c'est nous qui faisons
    // l'animation (e.flyTo, e.fitBounds programmatique). Heuristique : si l'event
    // est synthétique (déclenché par notre fitBounds), on l'ignore via un flag.
    if (!_inProgrammaticMove) _userInteracted = true;
  });
});
let _inProgrammaticMove = false;
let _resizeT;
window.addEventListener('resize', () => {
  clearTimeout(_resizeT);
  _resizeT = setTimeout(() => {
    if (_userInteracted) return;  // respecte le pan/zoom de l'utilisateur
    _inProgrammaticMove = true;
    fitMapToCity(false);
    setTimeout(() => { _inProgrammaticMove = false; }, 50);
  }, 150);
}, { passive: true });
// Tile layer adaptable au thème (light_all / dark_all CartoCDN).
// Deux couches : base SANS labels en dessous des choroplèthes (overlayPane),
// labels SEULS au-dessus des choroplèthes via un pane custom à zIndex 650.
// Effet : on voit les noms de rues, quartiers, POI MÊME sur les polygones colorés.
let _currentTileLayer = null;
let _currentLabelsLayer = null;
function applyMapTheme(){
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  if (_currentTileLayer) { try { map.removeLayer(_currentTileLayer); } catch(_) {} }
  if (_currentLabelsLayer) { try { map.removeLayer(_currentLabelsLayer); } catch(_) {} }
  // 1. Base : light_nolabels / dark_nolabels (polygones du fond uniquement)
  _currentTileLayer = L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/' + (dark ? 'dark_nolabels' : 'light_nolabels') + '/{z}/{x}/{y}{r}.png',
    { attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 19 }
  ).addTo(map);
  // 2. Labels overlay : pane custom à zIndex 425. Juste AU-DESSUS de overlayPane
  //    (400, où vivent les polygones SVG GeoJSON) mais SOUS shadowPane (500),
  //    markerPane (600), tooltipPane (650) et popupPane (700). Garantit que les
  //    labels apparaissent sur les polygones mais N'OCCULTENT PAS les tooltips
  //    et popups Leaflet. pointer-events: none → ne capture pas les clics.
  if (!map.getPane('labelsPane')) {
    map.createPane('labelsPane');
    map.getPane('labelsPane').style.zIndex = 425;
    map.getPane('labelsPane').style.pointerEvents = 'none';
  }
  _currentLabelsLayer = L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/' + (dark ? 'dark_only_labels' : 'light_only_labels') + '/{z}/{x}/{y}{r}.png',
    { pane: 'labelsPane', attribution: '', maxZoom: 19 }
  ).addTo(map);

applyMapTheme();
// Hook appelé par le toggle dans setupAppMenu()
window.onThemeChange = applyMapTheme;
L.control.zoom({ position: 'topright' }).addTo(map);

function getMapGeoJSON() {
  const el = ELECTIONS[currentElection];
  const yr = String(el ? el.my : 2026);
  return yr === CURRENT_ERA ? GEOJSON : (MAPS_DATA[yr] || GEOJSON);
}

// Cache du min/max d'abstention pour le scrutin courant (recomputed quand on change d'élection/tour)
let _abstRangeKey = '';
let currentAbstMin = 0, currentAbstMax = 60;
function ensureAbstRange() {
  const key = currentElection + '|' + currentSheet;
  if (key === _abstRangeKey) return;
  _abstRangeKey = key;
  const shData = getSheetData();
  const vals = [];
  Object.entries(shData).forEach(([ns,d]) => {
    if (ns === '0057') return;
    if (d && d.a != null) vals.push(d.a);
  });
  if (vals.length) {
    currentAbstMin = Math.min(...vals);
    currentAbstMax = Math.max(...vals);
  } else {
    currentAbstMin = 0; currentAbstMax = 60;
  }
}
function abstentionColor(pct, mn, mx) {
  // Dégradé blanc → #1a1a2e selon le taux d'abstention.
  // Si mn/mx fournis, échelle dynamique sur cette plage (contraste maximal).
  // Sinon, fallback sur l'échelle fixe 0-60 %.
  let t;
  if (mn != null && mx != null && mx > mn) {
    t = Math.min(Math.max(((pct||0) - mn) / (mx - mn), 0), 1);
  } else {
    t = Math.min(Math.max((pct||0)/60, 0), 1);
  }
  const r = Math.round(255 + (26-255)*t);
  const g = Math.round(255 + (26-255)*t);
  const b = Math.round(255 + (46-255)*t);

}
function blendToWhite(hex, t) { // t=0 → blanc, t=1 → couleur pleine

function getSelectionPct(data) {

  if (currentMapMode === 'bloc') return computeBlocs(data)[currentMapSelection] || 0;
  return 0;
}
function computeSelectionRange() {
  const shData = getSheetData(); let mn = Infinity, mx = 0;

    // CANTONALE/DÉPARTEMENTALE (binôme cantonal hors de son canton), on n'inclut pas
    // ce bureau — sinon min=0 (bureaux hors canton) fausse le gradient.

    // une clé absente = simplement 0 voix → on inclut dans le range.

      const _isCantonal = (typeof isCantonalElection === 'function') && isCantonalElection(currentElection);

    }

    // bureau, on exclut. Sinon min=0 (bureaux "pas de candidat") tire le bas
    // de la légende à 0% alors que les vrais bureaux votent à 5-15-30 %.
    if (currentMapMode === 'bloc' && currentMapSelection) {
      if (!hasBlocCandidates(d, currentMapSelection)) return;
    }
    const v = getSelectionPct(d);

function selectMapItem(key) {

}
function clearMapSelection() {
  currentMapSelection = null; currentSelectionMin = 0; currentSelectionMax = 0;

// Hover preview canton : id du canton survolé dans la sidebar (titraille canton),

// la légende mode "candidat" bascule sur le filtre canton correspondant.
let previewCantonId = null;
let _prevLegendCantonForHover = null;
function _onCantonTitrailleEnter(cid) {
  previewCantonId = String(cid);
  if (typeof mainLayer !== 'undefined' && mainLayer) mainLayer.setStyle(featureStyle);
  // Mémoriser le filtre légende courant pour le restaurer au mouseleave.
  // Capture UNIQUEMENT à la première entrée dans la zone des titrailles (= valeur
  // null). Si le user glisse rapidement d'une titraille à l'autre sans sortir, on
  // ne ré-écrase pas la valeur initiale avec le filtre déjà pollué par l'entrée
  // précédente. _prevLegendCantonForHover est reset à null par _onCantonTitrailleLeave.
  if (_prevLegendCantonForHover === null) {
    _prevLegendCantonForHover = (typeof legendCantonFilter !== 'undefined') ? legendCantonFilter : null;
  }

}

  previewCantonId = null;

  if (typeof setLegendCanton === 'function' && _prevLegendCantonForHover != null) {

  }

// Vrai si au moins un candidat présent dans data.c appartient au bloc demandé.
// Sert à distinguer "0 voix dans un bloc qui avait des candidats" (= rejet réel)
// d'"aucun candidat de ce bloc" (= choix impossible). Critique aux cantonales/
// départementales où le panel de candidats varie selon le canton.
function hasBlocCandidates(data, block) {
  if (!data || !data.c) return false;
  for (const cid of Object.keys(data.c)) {
    const ci = candInfo(cid);
    if (!ci || !ci.bk) continue;
    const b = (typeof BLOC_LEGACY !== 'undefined' && BLOC_LEGACY[ci.bk]) || '?';
    if (b === block) return true;
  }
  return false;

function featureStyle(feature) {
  const ns = numStr(feature);
  const data = getBureauData(ns);
  // Hover preview canton (sidebar titrailles canton) : on grise tous les bureaux
  // hors-canton pour ne mettre en évidence que ceux du canton survolé.
  // previewCantonId est posé par _onCantonTitrailleEnter et retiré au mouseleave.
  if (previewCantonId) {
    const el0 = ELECTIONS[currentElection];
    const mapYear = String(el0 ? el0.my : CURRENT_ERA);
    const yi = BUREAU_INFO[mapYear] || BUREAU_INFO[CURRENT_ERA] || {};
    if (String((yi[ns] || {}).c || '') !== previewCantonId) {
      return { fillColor: '#e8e8e8', fillOpacity: 0.15, color: '#fff', weight: 0.5 };
    }
  }
  if (!data) return { fillColor:'#ddd', fillOpacity:0.2, color:'#fff', weight:1 };
  let fillColor = '#ccc';
  if (currentMapSelection && (currentMapMode === 'candidat' || currentMapMode === 'bloc')) {
    // Cas binôme cantonal hors canton : le candidat n'est pas dans data.c → on
    // affiche un style neutre "pas de donnée" plutôt qu'une couleur 0 % trompeuse.
    // PAN-ROCHELAISE : clé absente = 0 voix réelles → on continue avec pct=0
    // (le bureau sera colorié au minimum du gradient).
    if (currentMapMode === 'candidat' && data.c && !Object.prototype.hasOwnProperty.call(data.c, currentMapSelection)) {
      const _isCantonal = (typeof isCantonalElection === 'function') && isCantonalElection(currentElection);
      if (_isCantonal) return { fillColor: '#ddd', fillOpacity: 0.2, color: '#fff', weight: 1 };
    }
    // Cas bloc sans candidat dans ce bureau (typique cantonales/départementales :
    // un canton peut n'avoir personne en exg ou exd). Style neutre plutôt qu'un
    // dégradé proche-blanc trompeur. Tooltip explicite via buildTooltipHtml.
    if (currentMapMode === 'bloc' && data.c && !hasBlocCandidates(data, currentMapSelection)) {
      return { fillColor: '#ddd', fillOpacity: 0.2, color: '#fff', weight: 1 };
    }
    const baseColor = currentMapMode === 'candidat'
      ? colorOfCandidate(currentMapSelection)
      : (BLOC_CONFIG[currentMapSelection] || BLOC_CONFIG['?']).color;
    const pct = getSelectionPct(data);
    const range = currentSelectionMax - currentSelectionMin;
    const t = range > 0 ? (pct - currentSelectionMin) / range : 0.5;
    fillColor = blendToWhite(baseColor, Math.max(0.08, Math.min(1, t)));
  } else if (currentMapMode === 'candidat') {
    fillColor = winnerColor(data);
    // Ex-aequo : remplacer la couleur unique par un pattern de hachures
    // diagonales aux couleurs des candidats à égalité en tête.
    const tied = tieCandidatesForBureau(data);
    if (tied) {
      const cols = tied.map(name => colorOfCandidate(name));
      const pid = ensureTiePattern(cols);
      if (pid) fillColor = 'url(#' + pid + ')';
    }
  } else if (currentMapMode === 'bloc') {
    const blocs = computeBlocs(data);
    const dom = Object.entries(blocs).sort((a,b)=>b[1]-a[1])[0];
    const b = dom ? dom[0] : '?';
    fillColor = (BLOC_CONFIG[b]||BLOC_CONFIG['?']).color;
  } else if (currentMapMode === 'abstention') {
    ensureAbstRange();
    fillColor = abstentionColor(data.a||0, currentAbstMin, currentAbstMax);
  } else if (currentMapMode === 'bv') {
    fillColor = bvColor(getBVPct(data));

function buildTooltipHtml(feature, ns, info) {

    +'<div style="font-size:0.82rem;font-weight:700;color:var(--text-modal);margin-bottom:7px">'+info.denomination+'</div>';

      // (mobile/tablette), le hover est une simulation de touchend → on l'ignore

      // après un swipe-down ou un tap.

          const ov = document.getElementById('overlay');

          if (!isFicheOpen) {

            if (sbInfo) sbInfo.innerHTML = buildBureauPreviewHTML(feature);

  // leur fill="url(#...)" tant qu'un changement de mode n'aurait pas
  // déclenché une re-stylisation.
  setTimeout(() => { if (mainLayer) mainLayer.setStyle(featureStyle); }, 0);

function onFeatureClick(feature, layer) {
  // B8 phase 2 : un clic sur un bureau ouvre directement la fiche overlay,
  // au lieu de l'étape intermédiaire "mise à jour de la sidebar puis re-clic".
  // Le hover (mouseover/mouseout) gère désormais la preview dans la bulle.
  if (selectedLayer) mainLayer.resetStyle(selectedLayer);
  selectedLayer = layer;
  layer.setStyle({ fillOpacity: 1, weight: 3, color: '#1a1a2e' });

}
