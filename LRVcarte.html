        + (partiToShow ? '<div style="font-size:'+dPartiSize+';color:'+_tc(0.7)+';margin-top:'+dGapParti+'">'+partiToShow+'</div>' : '')
        + (allie ? '<div style="font-size:'+dAllieSize+';color:'+_tc(0.55)+';margin-top:2px">'+allie+'</div>' : '')
        + '</div>'
    );
  }
  function blockLoser(col, name, pct, voix, prenom, nom, nomFull, parti, pa, allie, align, borderSide, c) {
    const bw = c ? '4px' : '5px';
    const arrow = arrowFor(name, c, false);
    // Mobile (full) ET binôme (full) : flèche côté score (cf. blockWinner).
    const isBinomeBlock = !!nomFull;
    // Pour les binômes : badge sur le score EN TOUS MODES (full + compact/sidebar).
    // Pour les candidats simples : comportement historique (mobile full → score, sinon → nom).
    const arrowOnScore = ((isMobileDuel && !c) || isBinomeBlock) ? arrow : '';
    const arrowOnNom   = ((isMobileDuel && !c) || isBinomeBlock) ? '' : arrow;
    // En mode full (!c), nomFull (binôme avec prénoms) prime sur nom (sans prénoms).
    const nomToUse = (!c && nomFull) ? nomFull : nom;
    const nomHtml = align === 'right' ? (arrowOnNom ? arrowOnNom+'\xa0\xa0' : '')+nomToUse : nomToUse+arrowOnNom;
    const scoreCore = pct.toFixed(1)+'<span style="font-size:0.5em;margin-left:0.12em">%</span>';
    // Espace insécable entre flèche et score UNIQUEMENT côté gauche (arrow + score
    // étaient collés). Côté droit, l'écart naturel suffit.
    const arrowSep = '\xa0\xa0';
    const scoreHtml = align === 'right'
      ? (arrowOnScore ? arrowOnScore + arrowSep : '') + scoreCore
      : scoreCore + arrowOnScore;
    const partiToShow = (isMobileDuel && !c) ? (pa || parti) : parti;
    // Marquise mobile sur la cellule nom (cf. blockWinner pour le détail).
    // Binôme : nomHtml contient un <br>, l'animation translateX d'un seul span ne marche pas.
    // On split en 2 sous-hosts marquise indépendants (un par ligne) si mobile full.
    const hasBr = nomHtml.indexOf('<br>') >= 0;
    // Binôme : on génère TOUJOURS 2 sous-hosts (mobile + desktop + compact) pour
    // que la cascade d'abréviation prénom soit applicable partout. La marquise
    // translateX reste réservée au mobile (gérée dans applyMarquee).
    // Candidat simple mobile : un seul host marquise classique (comportement actuel).
    const nomAttrs = (isMobileDuel && !c && !hasBr) ? ' class="duel-nom-host" data-align="'+align+'"' : '';
    let nomInner;
    if (hasBr) {
      // Sous-hosts binôme : alignement explicite (text-align) selon le côté du duel.
      // Le sous-host display:block ne propage pas toujours fiable l'héritage.
      nomInner = nomHtml.split('<br>').map(line =>
        '<div class="duel-nom-host" data-align="'+align+'" style="text-align:'+align+'"><span class="duel-nom-inner">'+line+'</span></div>'
      ).join('');
    } else if (isMobileDuel && !c) {
      nomInner = '<span class="duel-nom-inner">'+nomHtml+'</span>';
    } else {
      nomInner = nomHtml;
    }
    // Border du loser : bicolore si binôme à 2 vrais partis. Sur une bandelette
    // verticale étroite (5px × hauteur du bloc), un gradient diagonal 135° projette
    // sa zone de transition sur ~5px du centre, le reste apparaît uni en haut/bas.
    // → On force un split DIAGONAL adapté en passant par un pseudo-élément ::before
    // qui REMPLACE la border (pas qui se superpose dessus, sinon ::before est calé
    // sur le padding-box et ne couvre pas la zone border). On retire donc la border
    // et on convertit le bw en padding supplémentaire côté borderSide pour préserver
    // le layout du contenu.
    const _cs = (typeof binomePartiColors === 'function') ? binomePartiColors(name) : null;
    const _isBicolorBorder = !!_cs;
    // Si bicolor : pas de border, mais padding supplémentaire pour réserver les bw
    // (= largeur originale de la border). 2 pseudo-éléments (::before haut + ::after
    // bas) couvrent cette zone avec des fonds solides c1/c2.
    const _borderCss = _isBicolorBorder
      ? 'border-' + borderSide + ':0;padding-' + borderSide + ':calc(' + (c ? '12px' : dPad.split(' ').slice(-1)[0]) + ' + ' + bw + ')'
      : 'border-' + borderSide + ':' + bw + ' solid ' + col;
    const _bcbClass = _isBicolorBorder ? ' duel-loser-bcb bcb-' + borderSide : '';
    const _bcbVars = _isBicolorBorder
      ? ';--duel-loser-bcb-c1:' + _cs[0] + ';--duel-loser-bcb-c2:' + _cs[1] + ';--duel-loser-bcb-w:' + bw
      : '';
    // Idem blockWinner : 50/50 strict, VS centré, débordement clippé.
    // Si binôme à 2 vrais partis : la classe _bcbClass active un ::before qui couvre
    // la border avec le linear-gradient, via les variables CSS injectées dans _bcbVars.
    return (c
      ? '<div class="'+_bcbClass.trim()+'" style="flex:1 1 0;min-width:0;overflow:hidden;padding:10px 12px;text-align:'+align+';background:var(--bg-card);'+_borderCss+_bcbVars+'">'
        + '<div style="font-size:2.2rem;font-weight:900;color:'+col+';line-height:1">'+pct.toFixed(1)+'<span style="font-size:0.5em;margin-left:0.12em">%</span></div>'
        + diffLine(name, pct, false, align, c)
        + '<div style="font-size:0.82rem;color:var(--text-modal-muted);margin-top:3px">'+voix.toLocaleString('fr-FR')+' voix</div>'
        + '<div style="font-size:'+nomSizeC+';font-weight:700;color:var(--text-modal);margin-top:8px">'+(hasBr ? nomInner : nomHtml)+'</div>'
        + (pa ? '<div style="font-size:0.68rem;color:var(--text-modal-muted);margin-top:3px">'+pa+'</div>' : '')
        + '</div>'
      : '<div class="'+_bcbClass.trim()+'" style="flex:1 1 0;min-width:0;overflow:hidden;padding:'+dPad+';text-align:'+align+';background:var(--bg-card);'+_borderCss+_bcbVars+'">'
        + '<div style="font-size:'+dScoreSize+';font-weight:900;color:'+col+';line-height:1">'+scoreHtml+'</div>'
        + diffLine(name, pct, false, align, c)
        + '<div style="font-size:'+dVoixSize+';color:var(--text-modal-muted);margin-top:'+dGapVoix+'">'+voix.toLocaleString('fr-FR')+' voix</div>'
        + (prenom ? '<div style="font-size:'+dPrenomSize+';color:var(--text-modal-muted);margin-top:'+dGapPrenom+';line-height:1">'+prenom+'</div>' : '')
        + '<div'+nomAttrs+' style="font-size:'+nomSize+';font-weight:700;color:var(--text-modal);margin-top:'+(isRefDuel?dGapPrenom:'2px')+';line-height:1">'+nomInner+'</div>'
        + (partiToShow ? '<div style="font-size:'+dPartiSize+';color:var(--text-modal-muted);margin-top:'+dGapParti+'">'+partiToShow+'</div>' : '')
        + (allie ? '<div style="font-size:'+dAllieSize+';color:var(--text-modal-muted);margin-top:2px">'+allie+'</div>' : '')
        + '</div>'
    );
  }
  // Pour binôme à partis hétérogènes : code parti combiné "PA1+PA2"
  // (cohérent avec sidebar liste, légende, tooltip carte). Sinon pa simple.
  const paL = (typeof binomePartiLabel === 'function' ? binomePartiLabel(nameL) : '') || shortPa(ciL.pa) || '';
  const paR = (typeof binomePartiLabel === 'function' ? binomePartiLabel(nameR) : '') || shortPa(ciR.pa) || '';
  // Indicateurs meilleur/pire bureau (comme dans la vue normale)
  function arrowFor(name, c, onColor) {
    if (!extr || !ns || ns === 'ville') return '';
    const isBest  = extr.best  && extr.best[name]  && extr.best[name].num  === ns;
    const isWorst = extr.worst && extr.worst[name] && extr.worst[name].num === ns;
    if (!isBest && !isWorst) return '';
    const colBest  = onColor ? 'rgba(255,255,255,0.8)' : '#1a7a4a';
    const colWorst = onColor ? 'rgba(255,255,255,0.8)' : '#b91c1c';
    // Compact (sidebar) : juste le symbole, côté nom (prioritaire sur mobile car
    // la sidebar conserve le même layout compact à toutes les tailles d'écran).
    if (c) return isBest
      ? ' <span style="color:'+colBest+';font-size:0.7rem;font-weight:900">▲</span>'
      : ' <span style="color:'+colWorst+';font-size:0.7rem;font-weight:900">▼</span>';
    // Mobile (full) : symbole inline sizé en em, sera placé côté score (pas côté nom).
    if (isMobileDuel) {
      const sym = isBest ? '▲' : '▼';
      const col = isBest ? colBest : colWorst;
      return '<span style="color:'+col+';font-size:0.42em;font-weight:900;vertical-align:0.4em;margin:0 0.2em">'+sym+'</span>';
    }
    // Desktop full : symbole + étiquette texte, côté nom
    return isBest
      ? ' <span style="color:'+colBest+';font-size:0.68rem;font-weight:700">▲ meilleur '+_xLab+'</span>'
      : ' <span style="color:'+colWorst+';font-size:0.68rem;font-weight:700">▼ pire '+_xLab+'</span>';
  }
  const pad = compact ? '10px' : (isMobileDuel ? '8px' : '16px');
  const vsDiv = '<div style="padding:0 '+pad+';display:flex;align-items:center;flex-shrink:0">'
    + '<div style="font-size:'+(compact?'0.65rem':(isMobileDuel?'0.65rem':'0.75rem'))+';font-weight:700;color:#bbb">VS</div>'
    + '</div>';
  const radius = compact ? '8px' : '10px';
  const margin = compact ? '12px' : (isMobileDuel ? '12px' : '18px');
  // Côté gauche : text-align:right (texte vers le VS) ; côté droit : text-align:left
  // Cas particulier ex-aequo (50/50 EXACT en voix entières) : on affiche les
  // DEUX côtés en blockWinner (couleur pleine de chaque côté), pas de loser visuel.
  // tieCandidatesForBureau travaille sur _voix entiers pour éviter les faux ties
  // dus aux arrondis pct.
  const _tied = (typeof tieCandidatesForBureau === 'function') ? tieCandidatesForBureau(data) : null;
  const isTieDuel = !!(_tied && _tied.length === 2 && _tied.includes(nameW) && _tied.includes(nameLos));
  let leftBlock, rightBlock;
  if (isTieDuel) {
    leftBlock  = blockWinner(bgL, nameL, pctL, voixL, prenomL, nomL, nomLFull, partiL, paL, allieL, 'right', compact);
    rightBlock = blockWinner(bgR, nameR, pctR, voixR, prenomR, nomR, nomRFull, partiR, paR, allieR, 'left',  compact);
  } else if (winLeft) {
    leftBlock  = blockWinner(bgL, nameL, pctL, voixL, prenomL, nomL, nomLFull, partiL, paL, allieL, 'right', compact);
    rightBlock = blockLoser (colR, nameR, pctR, voixR, prenomR, nomR, nomRFull, partiR, paR, allieR, 'left', 'left', compact);
  } else {
    leftBlock  = blockLoser (colL, nameL, pctL, voixL, prenomL, nomL, nomLFull, partiL, paL, allieL, 'right', 'right', compact);
    rightBlock = blockWinner(bgR, nameR, pctR, voixR, prenomR, nomR, nomRFull, partiR, paR, allieR, 'left', compact);
  }
  // Grid minmax(0,1fr) auto minmax(0,1fr) : garantit MATHÉMATIQUEMENT que les deux
  // colonnes latérales sont strictement égales et que la colonne VS reste au centre
  // pixel-parfait. Le minmax(0, 1fr) est crucial : sans le min=0, une colonne 1fr
  // peut grandir au-delà de sa part si son contenu (min-content) est plus large,
  // ce qui décalerait le VS. Avec min=0, la colonne peut shrinker à 0 si besoin.
  return '<div style="display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);align-items:stretch;border-radius:'+radius+';overflow:hidden;margin-bottom:'+margin+'">'
    + leftBlock + vsDiv + rightBlock + '</div>';
}


function renderCandidates(data, ns, cityAvg, extr, compact, extrLabel) {
  const _xLab = extrLabel || 'bureau';
  const cands = Object.entries(data.c || {}).sort((a, b) => b[1] - a[1]);
  const duel = renderDuel(data, compact, cityAvg, ns, extr, extrLabel); if (duel !== null) return duel;
  const maxP  = cands.length ? cands[0][1] : 1;
  const FOLD  = 7; // show top-7, collapse the rest
  let h = '';

  function candRow(name, pct) {
    const col=colorOfCandidate(name); const isW=name===data.w;
    // Binôme à partis hétérogènes : background bicolore (split diagonal 135°) pour
    // la barre de progression. Pour candidat simple : couleur unique = col.
    const dotBg = (typeof dotBackground === 'function') ? dotBackground(name) : col;
    // Voix : si data._voix[name] est défini (= valeur entière exacte sommée depuis les
    // _voix des bureaux), on l'utilise directement. Sinon fallback reconstitution
    // depuis le pct arrondi (perte de précision : peut donner 782 au lieu de 781
    // sur les agrégations canton/quartier/ville).
    const voix = (data._voix && data._voix[name] != null)
      ? data._voix[name]
      : Math.round(pct*(data.e||0)/100);
    const isBest=extr.best[name]&&extr.best[name].num===ns;
    const isWorst=extr.worst[name]&&extr.worst[name].num===ns;
    const arrowCompact=isBest?' <span style="color:#1a7a4a;font-size:0.7rem;font-weight:900">&#9650;</span>'
      :isWorst?' <span style="color:#b91c1c;font-size:0.7rem;font-weight:900">&#9660;</span>':'';
    // Le suffixe " bureau" / " quartier" est encapsulé dans <span class="extr-suffix">
    // pour pouvoir le masquer via la classe .extr-short de la cascade d'abréviation.
    const arrowFull=isBest?' <span style="color:#1a7a4a;font-size:0.68rem;font-weight:700">&#9650; meilleur<span class="extr-suffix"> '+_xLab+'</span></span>'
      :isWorst?' <span style="color:#b91c1c;font-size:0.68rem;font-weight:700">&#9660; pire<span class="extr-suffix"> '+_xLab+'</span></span>':'';
    const ci=candInfo(name);
    const mCoal=name.match(/\(([^)]+)\)$/);
    const coal=mCoal?mCoal[1]:(name.trim().split(/\s+/).length>1?name.trim().split(/\s+/).pop():'');
    if(compact){
      // Binôme paritaire : on affiche le label court "Nom1 / Nom2" (femme devant),
      // le parti abrégé reste à côté comme pour un candidat simple.
      const isBinome = Array.isArray(ci.binome) && ci.binome.length === 2;
      // Tirets ASCII → tirets insécables (U+2011) pour empêcher tout break interne
      // ("Fleuret-Pagnoux" ne peut plus se scinder en "Fleuret-" + "Pagnoux").
      const nomFamille = isBinome
        ? ((binomeShortLabel(name) || ci.n || '').replace(/-/g, '‑'))
        : (ci.n || name.replace(/\s*\([^)]*\)\s*$/,'').trim().split(/\s+/).pop() || name);
      // Binôme à partis hétérogènes : étiquette "PA1+PA2" via binomePartiLabel
      // (sinon pa simple, statu quo).
      const partiAbr=(isBinome && typeof binomePartiLabel === 'function' ? binomePartiLabel(name) : '') || shortPa(ci.pa) || coal || '';
      // Sidebar preview : Nom (gros) + parti abrégé sur la même ligne, pct fer en bas à droite
      // Pour les binômes, classe .cand-name-binome (ellipsis CSS) + title HTML pour le full au survol.
      // Et classe .cand-namesub-binome sur le container parent pour forcer flex-wrap:nowrap
      // (sinon le parti pourrait passer en 2e ligne dans certains cas limites).
      const nameClass = isBinome ? ' cand-name-binome' : '';
      const nameTitle = isBinome ? ' title="'+nomFamille.replace(/"/g,'&quot;')+'"' : '';
      const subContClass = isBinome ? ' class="cand-namesub-binome"' : '';
      return '<div class="cand-row">'
        +'<div style="display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-bottom:3px">'
        +'<div'+subContClass+' style="flex:1;min-width:0;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">'
        +'<span class="cand-name'+nameClass+'"'+nameTitle+' style="font-size:1.3rem;line-height:1;font-weight:'+(isW?'800':'700')+'">'+nomFamille+'</span>'
        +((partiAbr||arrowCompact)?'<span class="cand-sub" style="color:var(--text-meta)">'+(partiAbr||'')+arrowCompact+'</span>':'')
        +'</div>'
        +'<div class="cand-pct" style="font-size:1.5rem;line-height:1;flex-shrink:0">'+pct.toFixed(1)+'<span style="font-size:0.5em;margin-left:2px">%</span></div>'
        +'</div>'
        +'<div class="bar-bg"><div class="bar-fg" style="width:'+pct.toFixed(1)+'%;background:'+dotBg+'"></div></div>'
        +'</div>';
    } else {
      const dV=+(pct-(cityAvg[name]||0)).toFixed(1);
      const fullName=candDisplayName(name);          // texte brut (pour tooltip)
      const fullNameHtml=candDisplayNameHtml(name);  // HTML avec spans (swap mobile)
      // Binôme à partis hétérogènes : paCode="PA1+PA2", paFull="Nom1 + Nom2"
      // (cohérent avec partiLabel). Sinon comportement standard.
      const _isBin = Array.isArray(ci.binome) && ci.binome.length === 2;
      const _binPa = (_isBin && typeof binomePartiLabel === 'function') ? binomePartiLabel(name) : '';
      const _isMixed = _binPa && _binPa.indexOf('+') >= 0;
      const paCode = _isMixed ? _binPa : (ci.pa || coal);
      const paFull = _isMixed
        ? _binPa.split('+').map(c => PARTI_NAMES[c] || c).join(' + ')
        : (PARTI_NAMES[paCode] || paCode);
      // Alliés : helper global binomeAllies (gère candidat simple + binôme avec
      // dérivation depuis les membres). Format brut = peut contenir "/" (binôme
      // hétérogène) ou "," (alliances multiples). On garde la cascade existante.
      const alStr = (typeof binomeAllies === 'function') ? binomeAllies(name) : (ci.al || '');
      const alFull=alStr?alStr.split(',').map(a=>PARTI_NAMES[a.trim()]||a.trim()).join(' + '):'';
      const alShort=alStr?alStr.split(',').map(a=>a.trim()).join(' + '):'';
      const tipParts=[fullName]; if(paFull)tipParts.push(paFull); if(alFull)tipParts.push('Avec : '+alFull);
      if(ci.t&&ci.t.length)tipParts.push(ci.t.join(', '));
      return '<div class="cand-row" title="'+tipParts.join(' — ').replace(/"/g,'&quot;')+'">'
        +'<div class="cand-row-head">'
        +'<div class="cand-row-namepart">'
        +'<span class="cand-name" style="font-size:1.3rem;line-height:1;font-weight:'+(isW?'800':'700')+'">'+fullNameHtml+'</span>'
        +'<span class="cand-sub" style="color:var(--text-meta)">'
          +'<span class="cand-parti-full">'+paFull+'</span>'
          +'<span class="cand-parti-short">'+paCode+'</span>'
          +(alShort?' <span class="cand-allies" style="color:var(--text-meta)">('+alShort+')</span>':'')
          +arrowFull
        +'</span>'
        +'</div>'
        +'<div class="cand-row-pctvoix">'
        +'<span class="cand-voix">'+voix.toLocaleString('fr-FR')+' voix</span>'
        +'<span class="cand-row-sep" style="color:var(--text-meta);font-size:0.7rem">·</span>'
        +'<span class="cand-pct" style="font-size:1.5rem;line-height:1">'+pct.toFixed(1)+'<span style="font-size:0.5em;margin-left:2px">%</span></span>'
        +'</div>'
        +'</div>'
        +'<div class="bar-bg bar-tall">'
        +'<div class="bar-fg" style="width:'+pct.toFixed(1)+'%;background:'+dotBg+'"></div>'
        +(ns!=='ville'&&(cityAvg[name]||0)>0.05?'<div class="bar-mark" style="left:'+Math.min(99.5,+(cityAvg[name]||0)).toFixed(2)+'%"></div>':'')
        +(ns!=='ville'&&(cityAvg[name]||0)>0.05?'<div class="bar-vs">vs '+((typeof refLabelForCurrent==='function')?refLabelForCurrent():'ville')+' <span class="'+(dV>=0?'dp':'dn')+'">'+(dV>=0?'+':'')+dV.toFixed(1)+' pts</span></div>':'')
        +'</div>'
        +'</div>';
    }
  }

  const visible = cands.slice(0, FOLD);
  const hidden  = cands.slice(FOLD);
  visible.forEach(([name, pct]) => { h += candRow(name, pct); });
  if (hidden.length) {
    const nb = hidden.length;
    // Les binômes paritaires existent uniquement à partir des Départementales 2015.
    // Pour les Cantonales pré-2015 (et partielles), on garde "candidat" — les
    // candidats étaient individuels à l'époque.
    const _isBinomeElec = /^Départementales\b/i.test(currentElection);
    const _noun = _isBinomeElec ? 'binôme' : 'candidat';
    const label = '+ ' + nb + ' autre' + (nb > 1 ? 's' : '') + ' ' + _noun + (nb > 1 ? 's' : '');
    if (compact) {
      const uid = 'cm_' + ns + '_c';
      h += '<div id="' + uid + '" style="display:none">';
      hidden.forEach(([name, pct]) => { h += candRow(name, pct); });
      h += '</div>';
      h += '<button class="show-more-btn" onclick="var e=document.getElementById(\'' + uid + '\'\);e.style.display=\'block\';this.remove()">' + label + '</button>';
    } else {
      let allHtml = '';
      hidden.forEach(([name, pct]) => { allHtml += candRow(name, pct); });
      const tf = currentElection + ' — ' + cands.length + ' ' + _noun + (cands.length > 1 ? 's' : '');
      h += '<button class="show-more-btn" onclick="openCandFloat(this,this.dataset.t,this.dataset.b)" data-t="' + tf.replace(/"/g,'&quot;') + '" data-b="' + allHtml.replace(/"/g,'&quot;') + '">' + label + '</button>';
    }
  }
  return h;
}

/**
 * B8 — Phase 1 : générateur unifié du contenu de la "bulle preview".
 * Prend en entrée soit un feature (mode bureau) soit null (mode ville globale).
 * Retourne une string HTML — ne touche pas au DOM lui-même.
 *
 * Cette fonction sera bientôt utilisée par le panneau flottant (B8 phase 3),
 * mais pour l'instant elle est juste un point d'entrée commun pour
 * showBureauSidebar() et renderGlobal() afin de factoriser la logique
 * sans rien casser de l'UX actuelle.
 */
// ── Sidebar mode normal : pour une élection cantonale/départementale, on
// remplace la titraille unique "ville" (qui agrégerait des binômes ne se
// croisant jamais, donc sans signification) par N titrailles superposées,
// une par canton, dont le clic ouvre la fiche canton modale.
// Le modèle visuel de chaque titraille est strictement aligné sur la titraille
// ville (fiche-id-link + partici-grid + renderCandidates compact), avec juste
// "La Rochelle-N" au lieu de "La Rochelle" et l'agrégation restreinte aux
// bureaux du canton.
function buildCantonsPreviewHTML() {
  const el0 = ELECTIONS[currentElection];
  const mapYear = String(el0 ? el0.my : CURRENT_ERA);
  const yearInfo = BUREAU_INFO[mapYear] || BUREAU_INFO[CURRENT_ERA] || {};
  const cantonEra = (typeof getCantonEraForElection === 'function') ? getCantonEraForElection(currentElection) : CURRENT_ERA_CANTON;
  const cantonsMeta = ((typeof CANTON_INFO !== 'undefined' && CANTON_INFO[cantonEra]) || {}).cantons || {};
  // Cantons présents pour l'ère bureau de l'élection (= cantons qui ont au moins
  // un bureau renseigné dans BUREAU_INFO[mapYear]).
  const cidsSet = new Set();
  Object.values(yearInfo).forEach(b => { if (b && b.c) cidsSet.add(String(b.c)); });
  const cids = [...cidsSet].sort((a,b) => parseInt(a) - parseInt(b));
  if (!cids.length) return '<div style="color:#aaa;font-style:italic;padding:16px 0;font-size:0.82rem">Aucun canton renseigné pour cette ère.</div>';
  const shData = getSheetData();
  // Container parent qui gère le mouseleave GLOBAL : la souris peut passer dans
  // les gaps entre titrailles (mouseleave des fiche-id-link individuels) sans
  // déclencher de reset du previewCantonId. Reset uniquement à la sortie totale.
  let html = '<div onmouseleave="_onCantonTitrailleLeave()">';
  cids.forEach(cid => {
    const bureauNums = Object.keys(yearInfo).filter(ns => String(yearInfo[ns].c || '') === cid);
    let totI=0, totE=0, totAbst=0, totBn=0;
    const candTotV = {}; const candTotVoix = {};
    bureauNums.forEach(ns2 => {
      const d = shData[ns2]; if (!d) return;
      const abst_nb = Math.round((d.i||0)*(d.a||0)/100);
      totI += d.i||0; totE += d.e||0; totAbst += abst_nb; totBn += d.bn||0;
      Object.entries(d.c || {}).forEach(([k,v]) => { candTotV[k] = (candTotV[k]||0) + v*(d.e||0)/100; });
      if (d._voix) {
        Object.entries(d._voix).forEach(([k,v]) => { candTotVoix[k] = (candTotVoix[k]||0) + v; });
      }
    });
    if (!totE) return; // skip canton sans données
    const cAvg = {};
    Object.entries(candTotV).forEach(([k,v]) => {
      const vExact = candTotVoix[k];
      cAvg[k] = vExact != null ? +(vExact/Math.max(totE,1)*100).toFixed(1) : +(v/Math.max(totE,1)*100).toFixed(1);
    });
    const cWinner = Object.entries(cAvg).sort((a,b) => b[1]-a[1])[0];
    const cWinCol = cWinner ? colorOfCandidate(cWinner[0]) : '#ccc';
    const cantonName = (cantonsMeta[cid] || {}).name || ('La Rochelle-' + cid);
    // Binôme leader du canton, rendu comme le badge du tooltip carte (au hover) :
    // span coloré avec background bicolore (split diagonal 135°) si binôme mixte,
    // uni sinon — texte blanc, nom binôme + score. Cohérent avec la convention
    // "tag candidat" utilisée partout (légende, listes leaders, hover map).
    const cWinName = cWinner ? cWinner[0] : '';
    const cWinCi = cWinName ? candInfo(cWinName) : {};
    const cWinIsBin = Array.isArray(cWinCi.binome) && cWinCi.binome.length === 2;
    const cWinLabel = cWinName
      ? (cWinIsBin ? (binomeShortLabel(cWinName) || cWinCi.n || cWinName) : (cWinCi.n || cWinName))
      : '';
    const cWinBg = cWinName ? ((typeof dotBackground === 'function') ? dotBackground(cWinName) : cWinCol) : '';
    const cWinPct = cWinner ? (cWinner[1].toFixed(1) + ' %') : '';
    const cWinBadge = cWinName
      ? '<span style="display:inline-block;max-width:100%;background:'+cWinBg+';color:'+pickTextColorForBg(cWinBg)+';font-size:0.88rem;font-weight:700;padding:4px 11px;border-radius:5px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;vertical-align:middle">'+cWinLabel+' '+cWinPct+'</span>'
      : '';
    // Titraille canton SEULE (pas de partici-grid ni de liste candidats) :
    // l'utilisateur clique pour accéder aux résultats détaillés via la fiche
    // canton modale. Modèle visuel identique à la titraille ville (fiche-id-link).
    // Border-left bicolore (binôme à 2 vrais partis gagnant) : retire la border
    // solide et utilise les pseudo-éléments .duel-loser-bcb (haut/bas) — même
    // technique que le loser duel. Sinon, border solide classique.
    const _cWinCs = cWinName && (typeof binomePartiColors === 'function') ? binomePartiColors(cWinName) : null;
    const _ctBcb = _cWinCs ? ' duel-loser-bcb bcb-left' : '';
    const _ctBorder = _cWinCs
      ? 'padding-left:17px;--duel-loser-bcb-c1:'+_cWinCs[0]+';--duel-loser-bcb-c2:'+_cWinCs[1]+';--duel-loser-bcb-w:5px'
      : 'border-left:5px solid '+cWinCol;
    html += '<div class="fiche-id-link'+_ctBcb+'" style="'+_ctBorder+'" onclick="selectCantonFromList(\''+cid+'\')" onmouseenter="_onCantonTitrailleEnter(\''+cid+'\')">'
      + '<div style="flex:1;min-width:0"><div class="fiche-num">Global</div><div class="fiche-name">'+cantonName+'</div>'
      + (cWinBadge
          ? '<div class="fiche-sub">'+cWinBadge+'</div><div class="fiche-sub" style="visibility:hidden;margin-top:6px;line-height:0;font-size:0">-</div>'
          : '<div class="fiche-sub" style="visibility:hidden">-</div><div class="fiche-sub" style="visibility:hidden">-</div>')
      + '</div>'
      + '<span class="fiche-id-chevron">›</span></div>';
    // Avertissement spécifique aux cantons historiques (ère 1985) qui débordaient
    // sur des communes voisines : 5 (Puilboreau, St-Xandre, Marsilly, Esnandes),
    // 8 (Périgny, Dompierre), 9 (L'Houmeau, Lagord, Nieul). Version courte
    // uniformisée pour la sidebar étroite ; détails dans la fiche (renderCanton).
    if (String(cantonEra) === '1985' && ['5','8','9'].includes(cid)) {
      html += '<div style="background:#fff8e1;border:1px solid #ffe082;border-radius:6px;padding:7px 10px;margin:-4px 0 10px;font-size:0.68rem;color:#7a6000;line-height:1.45">'
        + '<strong>Avertissement</strong> — Partie rochelaise uniquement.'
        + '</div>';
    }
  });
  html += '</div>';
  // Si aucun canton n'avait de données, html contient juste le wrapper vide → fallback.
  if (html === '<div onmouseleave="_onCantonTitrailleLeave()"></div>') {
    return '<div style="color:#aaa;font-style:italic;padding:16px 0;font-size:0.82rem">Aucune donnée disponible.</div>';
  }
  return html;
}

// Distingue "bureau non concerné" (élection cantonale partielle, ex. Cantonales
// 2011 où seuls 5 cantons sur 9 ont voté) de "données manquantes" (cas
// pathologique). Retourne true si le bureau ns appartient à un canton absent
// de l'élection courante.
function _bureauNonConcerne(ns) {
  if (typeof isCantonalElection !== 'function' || !isCantonalElection(currentElection)) return false;
  const el0 = ELECTIONS[currentElection];
  if (!el0) return false;
  const mapYear = String(el0.my || CURRENT_ERA);
  const yearInfo = BUREAU_INFO[mapYear] || {};
  const c = String((yearInfo[ns] || {}).c || '');
  if (!c) return false;
  let avail;
  if (el0.par_canton && Object.keys(el0.par_canton).length) {
    avail = new Set(Object.keys(el0.par_canton));
  } else {
    // Fallback legacy : inférer depuis les bureaux ayant des données
    avail = new Set();
    const sh = (el0.sheets && (el0.sheets.T1 || el0.sheets.TU)) || {};
    Object.keys(sh).forEach(b => {
      const cc = String((yearInfo[b] || {}).c || '');
      if (cc) avail.add(cc);
    });
  }
  return !avail.has(c);
}
// Le bureau est dans un canton qui A participé à l'élection, mais le canton a
// été pourvu dès le T1 (candidat élu d'office ≥50% + ≥25% inscrits). En T2 on
// affiche un message dédié et on désactive le clic, sinon ça ressemble à
// "données manquantes" alors que c'est un cas légitime.
function _cantonPourvuAuT1(ns) {
  if (currentSheet !== 'T2') return false;
  if (typeof isCantonalElection !== 'function' || !isCantonalElection(currentElection)) return false;
  const el0 = ELECTIONS[currentElection];
  if (!el0 || !el0.par_canton) return false;
  const mapYear = String(el0.my || CURRENT_ERA);
  const yearInfo = BUREAU_INFO[mapYear] || {};
  const c = String((yearInfo[ns] || {}).c || '');
  if (!c) return false;
  const cantonData = el0.par_canton[c];
  if (!cantonData || !cantonData.sheets) return false;
  return !!cantonData.sheets.T1 && !cantonData.sheets.T2;
}
// Helper unifié : clic et fiche détaillée inhibés.
function _bureauInerte(ns) {
  return _bureauNonConcerne(ns) || _cantonPourvuAuT1(ns);
}
function _noDataMsg(ns) {
  if (_bureauNonConcerne(ns)) return 'Bureau de vote non concerné par ce scrutin.';
  if (_cantonPourvuAuT1(ns))  return 'Bureau de vote d\'un canton pourvu au premier tour.';
  return 'Données non disponibles pour ce bureau.';
}

// Cache du HTML preview au scope module. Le hover sur la carte appelle
// buildBureauPreviewHTML 30-60×/sec lors d'un sweep (audit #2). Le résultat
// dépend uniquement de (bureau, election, sheet, mode) qui sont invariants
// pendant un sweep → cache hit garanti après le 1er calcul. Sur le mouseout
// vers la vue "ville globale" (la + chère, ~50 entries de candidats à somer)
// le gain est immédiat dès le 2e mouseout.
// Pas d'invalidation explicite : le cache key change automatiquement avec
// l'élection/le tour/le mode. Stale entries restent en mémoire (taille bornée
// par #élections × #tours × #modes × #bureaux ≈ ~40k max, négligeable).
const _bureauPreviewCache = new Map();
function buildBureauPreviewHTML(feature) {
  const _nsKey = feature ? (typeof numStr === 'function' ? numStr(feature) : '_feat') : '_global';
  const _cacheKey = _nsKey + '|' + currentElection + '|' + currentSheet + '|' + currentMapMode;
  const _hit = _bureauPreviewCache.get(_cacheKey);
  if (_hit != null) return _hit;
  const _html = _buildBureauPreviewHTMLImpl(feature);
  _bureauPreviewCache.set(_cacheKey, _html);
  return _html;
}
function _buildBureauPreviewHTMLImpl(feature) {
  // ── Mode "ville globale" (pas de bureau survolé/sélectionné) ──
  if (!feature) {
    // Élection cantonale/départementale : agrégation ville n'a pas de sens
    // (binômes différents par canton). On bascule sur 3 titrailles canton.
    if (typeof isCantonalElection === 'function' && isCantonalElection(currentElection)) {
      return buildCantonsPreviewHTML();
    }
    const shData = getSheetData();
    let totI = 0, totE = 0, totAbst = 0, totBn = 0;
    const candTotV = {}; const candTotVoix = {};
    Object.values(shData).forEach(d => {
      if (!d) return;
      const abst_nb = Math.round((d.i||0)*(d.a||0)/100);
      totI += d.i||0; totE += d.e||0; totAbst += abst_nb; totBn += d.bn||0;
      Object.entries(d.c||{}).forEach(([k,v]) => { candTotV[k] = (candTotV[k]||0) + v*(d.e||0)/100; });
      if (d._voix) Object.entries(d._voix).forEach(([k,v]) => { candTotVoix[k] = (candTotVoix[k]||0) + v; });
    });
    if (!totE) return '<div style="color:#aaa;font-style:italic;padding:16px 0;font-size:0.82rem">Aucune donnée disponible.</div>';
    const avg = {};
    Object.entries(candTotV).forEach(([k,v]) => {
      const ve = candTotVoix[k];
      avg[k] = ve != null ? +(ve/Math.max(totE,1)*100).toFixed(1) : +(v/Math.max(totE,1)*100).toFixed(1);
    });
    const winner = Object.entries(avg).sort((a,b) => b[1]-a[1])[0];
    const winCol = winner ? colorOfCandidate(winner[0]) : '#ccc';
    const abst_pct = totI>0 ? +(totAbst/totI*100).toFixed(1) : 0;
    const abst_nb = Math.round(totI*abst_pct/100);
    const gData = { c:avg, _voix:candTotVoix, e:totE, w: winner?winner[0]:null, i:totI, a:abst_pct, bn:totBn };
    const votG = totI - abst_nb;
    const blancsPctG = votG>0 ? +(totBn*100/votG).toFixed(1) : 0;
    let h = '<div class="fiche-id-link" style="border-left:5px solid '+winCol+'" onclick="openGlobalOverlay()">'
      + '<div style="flex:1"><div class="fiche-num">Global</div><div class="fiche-name">La Rochelle</div><div class="fiche-sub" style="visibility:hidden">-</div><div class="fiche-sub" style="visibility:hidden">-</div></div>'
      + '<span class="fiche-id-chevron">\u203a</span></div>';
    h += '<div class="partici-grid" style="grid-template-columns:repeat(2,1fr);gap:5px;margin-bottom:10px">'
      + '<div class="pbox" style="flex-direction:row;align-items:baseline;justify-content:center;gap:6px"><span class="pbox-lbl">Abstention</span><span class="pbox-val">'+abst_pct.toFixed(1)+'\u00a0%</span></div>'
      + '<div class="pbox" style="flex-direction:row;align-items:baseline;justify-content:center;gap:6px"><span class="pbox-lbl">Blancs et nuls</span><span class="pbox-val">'+blancsPctG.toFixed(1)+'\u00a0%</span></div></div>';
    h += renderCandidates(gData, 'ville', {}, {best:{}, worst:{}}, true);
    return h;
  }

  // ── Mode "bureau" (survolé ou sélectionné) ──
  const ns = numStr(feature);
  const info = bureauInfo(feature);
  const data = getBureauData(ns);
  const winCol = winnerColor(data);
  const isAgg = isAggNs(ns);
  const aggNums = isAgg ? aggNumList(ns) : null;
  const sbNum = isAgg ? 'Bureaux n\u00b0 ' + fmtAggNums(aggNums) : 'Bureau n\u00b0 ' + parseInt(ns);
  const sbName = isAgg ? 'Bureaux agrégés de ' + info.quartier : info.denomination;
  // B8 phase 4 : titraille bureau non-cliquable (la fiche s\'ouvre via clic carte).
  // Border-left bicolore si winner = binôme à 2 vrais partis (cf. titraille canton sidebar).
  const _bdCs = data && data.w && (typeof binomePartiColors === 'function') ? binomePartiColors(data.w) : null;
  const _bdBcb = _bdCs ? ' duel-loser-bcb bcb-left' : '';
  const _bdBorder = _bdCs
    ? 'padding-left:17px;--duel-loser-bcb-c1:'+_bdCs[0]+';--duel-loser-bcb-c2:'+_bdCs[1]+';--duel-loser-bcb-w:5px'
    : 'border-left:5px solid '+winCol;
  let h = '<div class="fiche-id-static'+_bdBcb+'" style="'+_bdBorder+'">'
    + '<div style="flex:1">'
    + '<div class="fiche-num">'+sbNum+'</div>'
    + '<div class="fiche-name">'+formatDenomination(sbName)+'</div>'
    + (info.quartier ? '<div class="fiche-sub">'+(getQuartiersForInfo(info).join(' \u00b7 ')||info.quartier)+'</div>' : '')
    + (info.canton ? '<div class="fiche-sub" style="color:#aaa">'+fmtCanton(info.canton)+'</div>' : '')
    + '</div>'
    + '</div>';
  const _mapYrSB = String((ELECTIONS[currentElection]||{}).my || 2026);
  if (data) {
    const abst_nb = Math.round((data.i||0)*(data.a||0)/100);
    const votSB = (data.i||0) - abst_nb;
    const blancsPctS = votSB>0 ? +((data.bn||0)*100/votSB).toFixed(1) : 0;
    h += '<div class="partici-grid" style="grid-template-columns:repeat(2,1fr);gap:5px;margin-bottom:10px">'
      + '<div class="pbox" style="flex-direction:row;align-items:baseline;justify-content:center;gap:6px"><span class="pbox-lbl">Abstention</span><span class="pbox-val">'+(data.a||0).toFixed(1)+' %</span></div>'
      + '<div class="pbox" style="flex-direction:row;align-items:baseline;justify-content:center;gap:6px"><span class="pbox-lbl">Blancs et nuls</span><span class="pbox-val">'+blancsPctS.toFixed(1)+' %</span></div></div>';
    h += renderCandidates(data, ns, refAverageForBureau(ns), getExtremes(), true);
  } else {
    h += '<div style="color:#aaa;font-style:italic;padding:10px 0">'+_noDataMsg(ns)+'</div>';
  }
  // B8 phase 4 : section "Aller plus loin" retirée — accès quartier via la fiche elle-même.
  return h;
}

function showBureauSidebar(feature) {
  document.getElementById('sb-info').innerHTML = buildBureauPreviewHTML(feature);
  showNavBar(numStr(feature));
}

function showNavBar(ns) {
  const info = bureauInfo(currentFeature);
  const allNums = Object.keys(getSheetData()).sort();
  const idx = allNums.indexOf(ns);
  if (allNums.length < 2 || idx < 0) { document.getElementById('sb-nav').innerHTML = ''; return; }
  const prev = allNums[(idx - 1 + allNums.length) % allNums.length];
  const next = allNums[(idx + 1) % allNums.length];
  const nav = '<div class="nav-bar">'
    + '<button class="nav-btn" onclick="navToBureau(\'' + prev + '\')">&#8249; Prec.</button>'
    + '<span class="nav-cur">Bureau ' + parseInt(ns) + '</span>'
    + '<button class="nav-btn" onclick="navToBureau(\'' + next + '\')">Suiv. &#8250;</button>'
    + '</div>';
  document.getElementById('sb-nav').innerHTML = nav;
}

function navToBureau(ns) {
  const gj = getMapGeoJSON();
  const feat = gj.features.find(f => numStr(f) === ns);
  if (!feat) return;
  if (mainLayer) {
    mainLayer.eachLayer(layer => {
      if (numStr(layer.feature) === ns) {
        onFeatureClick(feat, layer);
        if (document.getElementById('overlay').style.display !== 'none') {
          renderFiche(feat);
        }
      }
    });
  }
}

// ── OVERLAY ────────────────────────────────────────────────────────────────────

function openOverlay() {
  if (!currentFeature) return;
  overlayTab = 'bureau';
  const info = bureauInfo(currentFeature);
  document.getElementById('ov-title').textContent = 'Fiche bureau — ' + info.denomination;
  setOverlayDisplay('flex');
  showBureauListSidebar();
  renderFiche(currentFeature);
  updateAccentColor();
  updateOverlayTabs();
  if (typeof writeURLState === 'function') writeURLState();
}

function openOverlayQuartierNamed(qName){
  // Élection cantonale : pas de fiche quartier (cf. updateOverlayTabs / showBureauListSidebar).
  // Si on arrive ici via URL ou navigation, on retombe sur la fiche canton du bureau ancre.
  if (typeof isCantonalElection === 'function' && isCantonalElection(currentElection)) {
    if (currentFeature) {
      const info = bureauInfo(currentFeature);
      const cid = info && info.canton ? String(info.canton) : null;
      if (cid && typeof selectCantonFromList === 'function') {
        selectCantonFromList(cid);
        return;
      }
    }
    return;
  }
  if(!currentFeature)return;
  overlayTab='quartier'; currentQuartier=qName;
  document.getElementById('ov-title').textContent=qName?'Quartier — '+qName:'Quartier';
  setOverlayDisplay('flex');
  showBureauListSidebar();
  renderQuartier();
  updateAccentColor();
  updateOverlayTabs();
  if (typeof writeURLState === 'function') writeURLState();
}

function closeOverlay() {
  setOverlayDisplay('none');
  setOverlayAccent(null);
  document.getElementById('ov-tabs').style.display='flex';
  overlayTab='bureau';
  if (mmMap) { mmMap.remove(); mmMap = null; }
  // Fermer manuellement tous les tooltips Leaflet : sinon celui du bureau
  // d'origine reste affiché tant que la souris ne bouge pas hors du polygone
  // (Leaflet ne déclenche mouseout que sur mouvement réel du curseur).
  if (typeof mainLayer !== 'undefined' && mainLayer) {
    try { mainLayer.eachLayer(l => l.closeTooltip && l.closeTooltip()); } catch(_) {}
  }
  hideBureauListSidebar();
  // B8 phase 2 : on retire la surbrillance "selected" sur le polygone à la fermeture.
  // Avec la nouvelle UX (click direct → fiche), il n'y a plus de bureau "sélectionné"
  // sur la carte une fois la fiche refermée — la carte revient à un état vierge.
  if (selectedLayer && mainLayer) {
    try { mainLayer.resetStyle(selectedLayer); } catch(_) {}
    selectedLayer = null;
  }
  // Reset complet : on oublie le bureau précédemment ciblé et la sidebar bascule
  // en mode global (ville). Cohérent avec le commentaire ci-dessus — sans ça, la
  // sidebar restait en mode "preview du bureau" alors que la carte était vierge.
  currentFeature = null;
  renderGlobal();
  if (typeof writeURLState === 'function') writeURLState();
}

// Met à jour les onglets de la fiche : "Ce bureau" + 1 bouton par quartier du bureau actuel
function updateOverlayTabs(){
  const c = document.getElementById('otab-quartiers');
  const tabB = document.getElementById('otab-b');
  if (!c || !tabB) return;
  // Bouton "Ce bureau"
  tabB.className = (overlayTab === 'bureau' ? 'otab on' : 'otab');
  tabB.setAttribute('aria-selected', overlayTab === 'bureau' ? 'true' : 'false');
  // Boutons quartier (1 ou plusieurs si bureau partagé) puis bouton canton.
  // Deux préfixes pour chaque label : version longue desktop / version courte mobile.
  // Le swap se fait en CSS via @media (pas de détection JS, cohérent au resize).
  // Élections cantonales : pas d'onglet quartier (ambiguïté quartier × canton —
  // un quartier peut chevaucher 2 cantons, agréger des binômes différents n'a pas de sens).
  const isCantonal = (typeof isCantonalElection === 'function') && isCantonalElection(currentElection);
  let html = '';
  if (currentFeature) {
    const info = bureauInfo(currentFeature);
    const quartiers = isCantonal ? [] : ((typeof getQuartiersForInfo === 'function') ? getQuartiersForInfo(info) : []);
    quartiers.forEach((q) => {
      const isActive = (overlayTab === 'quartier' && currentQuartier === q);
      const label =
        '<span class="otab-prefix-full">Le quartier : </span>' +
        '<span class="otab-prefix-short">Q. </span>' + q;
      const safeQ = q.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      html += '<button class="otab' + (isActive?' on':'') + '" role="tab" aria-selected="'+(isActive?'true':'false')+'" onclick="switchTabQ(\'' + safeQ + '\')">' + label + '</button>';
    });
    // Bouton canton : déduit du champ .c du bureau courant pour l'ère de l'élection.
    const cid = (typeof getCantonOfBureau === 'function')
      ? getCantonOfBureau(numStr(currentFeature), String(ELECTIONS[currentElection]?.my || CURRENT_ERA))
      : null;
    if (cid) {
      const cantonEra = (typeof getCantonEraForElection === 'function') ? getCantonEraForElection(currentElection) : CURRENT_ERA_CANTON;
      const cantonsMeta = ((typeof CANTON_INFO !== 'undefined' && CANTON_INFO[cantonEra]) || {}).cantons || {};
      const cantonName = (cantonsMeta[cid] || {}).name || ('La Rochelle-' + cid);
      const isActive = (overlayTab === 'canton' && currentCanton === cid);

        '<span class="otab-prefix-full">Le canton : </span>' +

    }
  }
  c.innerHTML = html;
}

// Délégation : on n'écoute mousemove QUE quand on est sur un .btip

// BLOC_LEGACY est désormais déclaré dans donnees.js (récupéré ici via le backup,
// la déclaration dupliquée a été retirée).
function remapBlocs(raw){const out={};Object.entries(raw||{}).forEach(([k,v])=>{const nk=BLOC_LEGACY[k]||k;out[nk]=(out[nk]||0)+v;});return out;}

// ─── Helpers de résolution cross-ère (mêmes helpers que LRVanalyse) ─────
// Quand on regarde un bureau 2026 dans une élection ancienne, son ID était
// différent. BUREAU_CORRESPONDANCES[bid2026][era] donne l'ID historique.
// Peut être : null (pas existait), string (un bureau), array (fusion).
function _mergeBureauData(refs, sheet) {
  const resolved = refs.map(r => {
    const id = typeof r === 'string' ? r : r.id;
    const w  = typeof r === 'object' && r.w != null ? r.w : null;
    const data = sheet[id];
    return data ? { data, w } : null;
  }).filter(Boolean);
  if (resolved.length === 0) return null;
  if (resolved.length === 1) return resolved[0].data;
  const totalW = resolved.reduce((s, r) => s + (r.w != null ? r.w : (r.data.i || 1)), 0);
  const merged = { c: {}, i: 0, e: 0, a: null, bn: 0, _aW: 0, _aTot: 0 };
  resolved.forEach(({ data, w }) => {
    const weight = (w != null ? w : (data.i || 1)) / totalW;
    Object.entries(data.c || {}).forEach(([k, v]) => { merged.c[k] = (merged.c[k] || 0) + v * weight; });
    if (data.a != null) { merged._aW += weight; merged._aTot += data.a * weight; }
    merged.i += data.i || 0;
    merged.e += data.e || 0;
    merged.bn += data.bn || 0;
  });
  merged.a = merged._aW > 0 ? merged._aTot / merged._aW : null;
  delete merged._aW; delete merged._aTot;
  return merged;
}
function _resolveBureauForEra(ref, sheet, fallbackId) {
  const r = ref !== undefined ? ref : fallbackId;
  if (r === null) return null;
  if (Array.isArray(r)) return _mergeBureauData(r, sheet);
  if (typeof r === 'string') return sheet[r] || null;
  return null;
}

// ─── Référendums européens 1992/2005 — comparaison croisée ────────────────
// Pour ces 2 référendums uniquement (Maastricht et TCE), on remplace le panel
// "Blocs politiques" par 2 bandeaux Oui/Non : courant (gros) + pendant (petit).
// Réf. 2000 (quinquennat) n'a pas de pendant comparable et reste sans panel.
function _refPendant(label) {
  if (label === 'Référendum 1992') return 'Référendum 2005';
  if (label === 'Référendum 2005') return 'Référendum 1992';
  return null;
}
// Récupère les pcts Oui/Non pour un bureau dans une élection-référendum,
// avec résolution cross-ère via BUREAU_CORRESPONDANCES.
function _refDataForBureau(elecLabel, bureauKey) {
  const el = ELECTIONS[elecLabel];
  if (!el) return null;
  const sh = el.sheets.TU || el.sheets.T1;
  if (!sh) return null;
  const myAdj = String(el.my);
  const corr = (typeof BUREAU_CORRESPONDANCES !== 'undefined' && BUREAU_CORRESPONDANCES[bureauKey]) || {};
  const ref = corr[myAdj] !== undefined ? corr[myAdj] : bureauKey;
  return _resolveBureauForEra(ref, sh, bureauKey);
}
// Agrège un référendum sur un ensemble de bureaux 2026 (quartier/canton/global).
// Retourne { Oui: pct, Non: pct } à partir des voix entières (cf. CLAUDE.md).
function _refAggregateForBureaux(elecLabel, bureauKeys) {
  let sOui = 0, sNon = 0, sE = 0;
  bureauKeys.forEach(bk => {
    const d = _refDataForBureau(elecLabel, bk);
    if (!d) return;
    const v = d._voix || {};
    sOui += v.Oui || 0;
    sNon += v.Non || 0;
    sE += d.e || 0;
  });
  if (sE <= 0) return null;
  return { Oui: sOui / sE * 100, Non: sNon / sE * 100 };
}
// Construit une bandeau Oui/Non. `isComparison` → opacité 0.38, cliquable,
// label "Réf. 1992" (ou 2005) en surimpression à gauche.
function _refOuiNonBar(cData, height, refLabel, isComparison) {
  const ouiPct = (cData && cData.Oui) || 0;
  const nonPct = (cData && cData.Non) || 0;
  const tot = (ouiPct + nonPct) || 1;
  const ouiCol = '#0F8A8A', nonCol = '#8E2C5C';
  const LINE = '<div style="position:absolute;top:0;bottom:0;left:50%;width:0;border-left:1.5px dashed rgba(255,255,255,0.65);pointer-events:none;z-index:2"></div>';
  let segs = '';
  if (ouiPct > 0) segs += '<div class="btip" data-color="'+ouiCol+'" data-label="Oui" data-pct="'+ouiPct.toFixed(1)+' %" data-elec="'+refLabel+'" style="width:'+(ouiPct/tot*100).toFixed(2)+'%;background:'+ouiCol+';cursor:default"></div>';
  if (nonPct > 0) segs += '<div class="btip" data-color="'+nonCol+'" data-label="Non" data-pct="'+nonPct.toFixed(1)+' %" data-elec="'+refLabel+'" style="width:'+(nonPct/tot*100).toFixed(2)+'%;background:'+nonCol+';cursor:default"></div>';
  const inner = '<div style="position:relative"><div style="display:flex;height:'+height+'px;width:100%">'+segs+'</div>'+LINE+'</div>';
  if (!isComparison) return inner;
  const yr = (refLabel.match(/\d{4}/) || ['?'])[0];
  return '<div style="position:relative;opacity:0.38;cursor:pointer" class="sidebar-elec" onclick="setElection(\''+refLabel+'\')">'+inner
    + '<span style="position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:0.58rem;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5);letter-spacing:0.03em;pointer-events:none">Réf. '+yr+'</span></div>';
}
// Construit le panel "Référendums européens" (courant + pendant) à partir de
// 2 objets { Oui, Non }. Ordre chronologique : antérieur en haut, postérieur
// en bas (cohérent avec triptych "scrutin suivant" / "scrutin précédent").
function _renderRefPairPanel(curData, pendData, curLabel, pendLabel) {
  if (!curData) return '';
  const curYr = parseInt(curLabel.match(/\d{4}/)[0]);
  const pendYr = parseInt(pendLabel.match(/\d{4}/)[0]);
  const pendIsAfter = pendYr > curYr;
  const mainBar = _refOuiNonBar(curData, 72, curLabel, false);
  const sideBar = pendData
    ? _refOuiNonBar(pendData, 20, pendLabel, true)
    : '<div style="position:relative;opacity:0.38"><div style="height:20px;background:#f0f0f0;border-radius:4px;border:1.5px dashed #ddd"></div><span style="position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:0.58rem;font-weight:700;color:#999;pointer-events:none">Réf. '+(pendLabel.match(/\d{4}/) || ['?'])[0]+' — pas de données</span></div>';
  let h = '<div style="border-radius:6px;overflow:hidden">';
  h += pendIsAfter ? (sideBar + mainBar) : (mainBar + sideBar);
  return h + '</div>';
}

function renderBlocTriptych(data, histoKey) {
  // Cas spécial : référendums européens 1992/2005 — duo Oui/Non courant + pendant.
  // Sinon (réf. 2000 quinquennat → pas de pendant) : on n'affiche rien plutôt
  // qu'un triptych de blocs politiques incohérent avec Oui/Non.
  if (typeof isReferendum === 'function' && isReferendum(currentElection)) {
    const pendant = _refPendant(currentElection);
    if (!pendant) return '';
    const curOuiPct = (data && data.c && data.c.Oui) || 0;
    const curNonPct = (data && data.c && data.c.Non) || 0;
    const pendBureauData = _refDataForBureau(pendant, histoKey);
    const pendData = pendBureauData ? { Oui: pendBureauData.c.Oui || 0, Non: pendBureauData.c.Non || 0 } : null;
    return _renderRefPairPanel({ Oui: curOuiPct, Non: curNonPct }, pendData, currentElection, pendant);
  }
  function getBlocsForAdj(elecLabel, bureauKey){
    const el = ELECTIONS[elecLabel];
    if (el) {
      const sh = currentSheet === 'T2' ? (el.sheets['T2'] || el.sheets['TU'] || el.sheets['T1'])
                                       : (el.sheets['TU'] || el.sheets['T1']);
      if (sh) {
        // Résolution cross-ère via BUREAU_CORRESPONDANCES
        const myAdj = String(el.my || CURRENT_ERA);
        const corr = (typeof BUREAU_CORRESPONDANCES !== 'undefined' && BUREAU_CORRESPONDANCES[bureauKey]) || {};
        const ref = corr[myAdj] !== undefined ? corr[myAdj] : bureauKey;
        const d = _resolveBureauForEra(ref, sh, bureauKey);
        if (d) return computeBlocsAdj(d, elecLabel);
      }
    }
    const entry = (HISTORIQUE[bureauKey] || []).find(r => r.l === elecLabel);
    return entry ? remapBlocs(entry.b) : null;
  }
  function barSegs(blocs,elec){const tot=Object.values(blocs).reduce((s,v)=>s+v,0)||1;let s='';
    Object.entries(BLOC_CONFIG).forEach(([k,v])=>{const p=blocs[k]||0;if(p<=0)return;
      s+='<div class="btip" data-color="'+v.color+'" data-label="'+v.label+'" data-pct="'+p.toFixed(1)+'\u00a0%" data-elec="'+(elec||'')+'" style="width:'+(p/tot*100).toFixed(2)+'%;background:'+v.color+';cursor:default"></div>';});return s;}
  function sideBar(blocs, h, label, elec){
    const inner = blocs
      ? '<div style="position:relative"><div style="display:flex;height:'+h+'px;width:100%">'+barSegs(blocs, elec)+'</div><div style="position:absolute;top:0;bottom:0;left:50%;width:0;border-left:1.5px dashed rgba(255,255,255,0.65);pointer-events:none;z-index:2"></div></div>'
      : '<div style="height:'+h+'px;background:#f0f0f0;border-radius:4px;border:1.5px dashed #ddd"></div>';
    const clickable = blocs && elec;
    return '<div style="position:relative;opacity:0.38'+(clickable?';cursor:pointer':'')+'" class="'+(clickable?'sidebar-elec':'')+'" '+(clickable?'onclick="setElection(\''+elec+'\')"':'')+'>'+inner+'<span style="position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:0.58rem;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5);letter-spacing:0.03em;pointer-events:none">'+label+'</span></div>';
  }
  function mainBar(blocs,elec){return '<div style="position:relative"><div style="display:flex;height:72px;width:100%">'+barSegs(blocs,elec)+'</div><div style="position:absolute;top:0;bottom:0;left:50%;width:0;border-left:1.5px dashed rgba(255,255,255,0.65);pointer-events:none;z-index:2"></div></div>';}
  // Fiche BUREAU : on enchaîne Cantonales et Départementales pour suivre le
  // même bureau à travers la réforme 2015. Au lieu de prendre juste le scrutin
  // chronologiquement adjacent, on itère pour trouver le plus proche AVEC des
  // données effectives — utile pour les cantonales partielles (série A vs B :
  // un bureau du canton 7 sauté en 2011 doit remonter à Cantonales 2008).
  const curType = elecType(currentElection);
  const curYear = parseInt(currentElection.match(/\d{4}$/) || [0]);
  // Famille cantonale-like : on regroupe Cantonale/Cantonales/Départementale/
  // Départementales (singulier pour les partielles) via isCantonalElection.
  let family;
  if (typeof isCantonalElection === 'function' && isCantonalElection(currentElection)) {
    family = Object.keys(ELECTIONS)
      .filter(l => isCantonalElection(l))
      .sort((a, b) => parseInt(a.match(/\d{4}$/)) - parseInt(b.match(/\d{4}$/)));
  } else {
    family = allElecOfType(curType);
  }
  const myIdx = family.indexOf(currentElection);
  // Cherche le 1er précédent dans family avec des données pour ce bureau
  let prev = null, prevBlocs = null;
  for (let i = myIdx - 1; i >= 0; i--) {
    const b = getBlocsForAdj(family[i], histoKey);
    if (b) { prev = family[i]; prevBlocs = b; break; }
  }
  // Cherche le 1er suivant dans family avec des données pour ce bureau
  let next = null, nextBlocs = null;
  for (let i = myIdx + 1; i < family.length; i++) {
    const b = getBlocsForAdj(family[i], histoKey);
    if (b) { next = family[i]; nextBlocs = b; break; }
  }
  const curBlocs  = computeBlocs(data);
  let h = '<div style="border-radius:6px;overflow:hidden">';
  if (next) h += sideBar(nextBlocs, 20, 'Scrutin suivant', next);
  h += mainBar(curBlocs, currentElection);
  if (prev) h += sideBar(prevBlocs, 20, 'Scrutin précédent', prev);
  return h + '</div>';
}

function renderBlocTriptychQuartier(qData,bureauNums,currentCantonId){
  // Cas spécial : référendums européens 1992/2005 — duo Oui/Non courant + pendant.
  // Agrégat à partir des voix entières sur les bureaux 2026 du quartier/canton.
  if (typeof isReferendum === 'function' && isReferendum(currentElection)) {
    const pendantQ = _refPendant(currentElection);
    if (!pendantQ) return '';
    const curAgg = _refAggregateForBureaux(currentElection, bureauNums);
    const pendAgg = _refAggregateForBureaux(pendantQ, bureauNums);
    if (!curAgg) return '';
    return _renderRefPairPanel(curAgg, pendAgg, currentElection, pendantQ);
  }
  function aggregateBlocs(elecLabel){
    const adjEl=ELECTIONS[elecLabel];
    const adjSh=adjEl?(currentSheet==='T2'?(adjEl.sheets['T2']||adjEl.sheets['TU']||adjEl.sheets['T1']):(adjEl.sheets['TU']||adjEl.sheets['T1'])):null;
    const totals={};let count=0;
    bureauNums.forEach(ns2=>{
      let blocs=null;
      if(adjSh){const d=adjSh[ns2];if(d)blocs=computeBlocsAdj(d,elecLabel);}
      if(!blocs){const entry=(HISTORIQUE[ns2]||[]).find(r=>r.l===elecLabel);if(!entry||!entry.b)return;
        blocs=remapBlocs(entry.b);}
      if(!blocs)return;
      count++;Object.entries(blocs).forEach(([k,v])=>{totals[k]=(totals[k]||0)+v;});});
    if(!count)return null;const avg={};Object.entries(totals).forEach(([k,v])=>{avg[k]=+(v/count).toFixed(1);});return avg;}
  function barSegs(blocs,elec){const tot=Object.values(blocs).reduce((s,v)=>s+v,0)||1;let s='';
    Object.entries(BLOC_CONFIG).forEach(([k,v])=>{const p=blocs[k]||0;if(p<=0)return;
      s+='<div class="btip" data-color="'+v.color+'" data-label="'+v.label+'" data-pct="'+p.toFixed(1)+'\u00a0%" data-elec="'+(elec||'')+'" style="width:'+(p/tot*100).toFixed(2)+'%;background:'+v.color+';cursor:default"></div>';});return s;}
  function sideBar(blocs,h,label,elec){
    const inner=blocs?'<div style="position:relative"><div style="display:flex;height:'+h+'px;width:100%">'+barSegs(blocs,elec)+'</div><div style="position:absolute;top:0;bottom:0;left:50%;width:0;border-left:1.5px dashed rgba(255,255,255,0.65);pointer-events:none;z-index:2"></div></div>':'<div style="height:'+h+'px;background:#f0f0f0;border-radius:4px;border:1.5px dashed #ddd"></div>';
    const clickable=blocs&&elec;
    return '<div style="position:relative;opacity:0.38'+(clickable?';cursor:pointer':'')+'" class="'+(clickable?'sidebar-elec':'')+'" '+(clickable?'onclick="setElection(\''+elec+'\')"':'')+'>'+inner+'<span style="position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:0.58rem;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5);pointer-events:none">'+label+'</span></div>';}
  function mainBar(blocs,elec){return '<div style="position:relative"><div style="display:flex;height:72px;width:100%">'+barSegs(blocs,elec)+'</div><div style="position:absolute;top:0;bottom:0;left:50%;width:0;border-left:1.5px dashed rgba(255,255,255,0.65);pointer-events:none;z-index:2"></div></div>';}
  const { prev: prevLabel, next: nextLabel } = _adjacentElections(currentElection, currentCantonId);
  const curBlocs=qData.bp?remapBlocs(qData.bp):computeBlocs(qData);
  // On précalcule les agrégats adjacents : si l'agrégat est null (aucun des
  // bureaux du quartier/canton n'a de données dans le scrutin adjacent), on
  // n'affiche pas le sideBar (sinon placeholder gris trompeur). _adjacentElections
  // filtre déjà sur la même série pour les cantonales, donc ce double check est
  // surtout utile pour les quartiers qui peuvent chevaucher plusieurs cantons.
  const nextAgg = nextLabel ? aggregateBlocs(nextLabel) : null;
  const prevAgg = prevLabel ? aggregateBlocs(prevLabel) : null;
  let h='<div style="border-radius:6px;overflow:hidden">';
  if(nextAgg) h+=sideBar(nextAgg,20,'Scrutin suivant',nextLabel);
  h+=mainBar(curBlocs,currentElection);
  if(prevAgg) h+=sideBar(prevAgg,20,'Scrutin précédent',prevLabel);
  return h+'</div>';
}

function initGlobalMinimap(winCol) {
  if (mmMap) { mmMap.remove(); mmMap = null; }
  var wrap = document.getElementById('mm-wrap');
  if (!wrap) return;
  wrap.innerHTML = '<div id="mm-inner" style="width:100%;height:100%;min-height:220px;border-radius:8px;overflow:hidden"></div>';
  mmMap = L.map('mm-inner', { zoomControl:false, attributionControl:false, dragging:false, scrollWheelZoom:false, zoomSnap:0 });
  // Tile adapté au thème (sombre = dark_all CartoCDN)
  var _mmDark = document.documentElement.getAttribute('data-theme') === 'dark';
  L.tileLayer('https://{s}.basemaps.cartocdn.com/' + (_mmDark ? 'dark_all' : 'light_all') + '/{z}/{x}/{y}{r}.png', { maxZoom:19 }).addTo(mmMap);
  var gj = getMapGeoJSON();
  var layer = L.geoJSON(gj, {
    filter: function(feature) { return numStr(feature) !== '0057'; },
    style: function(feature) {
      var ns = numStr(feature);
      var data = getBureauData(ns);
      if (!data) return { fillColor:'#ddd', fillOpacity:0.2, color:'#fff', weight:1 };
      var fillColor = winnerColor(data);
      // Ex-aequo : même traitement hachuré que sur la carte principale.
      // Le pattern est partagé via le SVG host global (lrv-tie-patterns).
      var tied = tieCandidatesForBureau(data);
      if (tied) {
        var cols = tied.map(function(name) { return colorOfCandidate(name); });
        var pid = ensureTiePattern(cols);
        if (pid) fillColor = 'url(#' + pid + ')';
      }
      return { fillColor: fillColor, fillOpacity:0.85, color:'#fff', weight:1 };
    }
  }).addTo(mmMap);
  mmMap.fitBounds(layer.getBounds().pad(0.06));
}

// Helper : barre histogramme horizontale (height 14px) pour la liste de bureaux/quartiers.
// • Élections normales : segments par bloc politique (BLOC_CONFIG via computeBlocs).
// • Référendums : 2 segments Oui/Non.
// `dashedAt50` ajoute une ligne pointillée verticale à 50 % (utile pour les seconds tours / référendums).
function _blocsBarHTML(d, opts) {
  opts = opts || {};
  var height = opts.height || 14;
  var isRef = (typeof isReferendum === 'function' && isReferendum(currentElection));
  var LINE = '<div style="position:absolute;top:0;bottom:0;left:50%;width:0;border-left:1.5px dashed rgba(255,255,255,0.65);pointer-events:none;z-index:2"></div>';
  var bar = '<div style="position:relative"><div style="display:flex;height:'+height+'px;border-radius:3px;overflow:hidden;gap:1px;width:100%">';
  if (isRef) {
    var ouiPct = (d && d.c && d.c.Oui) || 0;
    var nonPct = (d && d.c && d.c.Non) || 0;
    var totRef = (ouiPct + nonPct) || 1;
    var ouiCol = colorOfCandidate('Oui');
    var nonCol = colorOfCandidate('Non');
    if (ouiPct > 0) bar += '<div class="btip" data-color="'+ouiCol+'" data-label="Oui" data-pct="'+ouiPct.toFixed(1)+' %" style="width:'+(ouiPct/totRef*100).toFixed(1)+'%;background:'+ouiCol+'"></div>';
    if (nonPct > 0) bar += '<div class="btip" data-color="'+nonCol+'" data-label="Non" data-pct="'+nonPct.toFixed(1)+' %" style="width:'+(nonPct/totRef*100).toFixed(1)+'%;background:'+nonCol+'"></div>';
  } else {
    var bData = d ? computeBlocs(d) : {};
    var totB = Object.values(bData).reduce(function(s,v){return s+v;},0) || 1;
    Object.entries(BLOC_CONFIG).forEach(function(kv) {
      var p = bData[kv[0]] || 0; if (p <= 0) return;
      bar += '<div class="btip" data-color="'+kv[1].color+'" data-label="'+kv[1].label+'" data-pct="'+p.toFixed(1)+' %" style="width:'+(p/totB*100).toFixed(1)+'%;background:'+kv[1].color+'"></div>';
    });
  }
  bar += '</div>'+LINE+'</div>';
  return bar;
}

function renderGlobalFiche() {
  var shData = getSheetData();
  var sheetLabel = currentSheet === 'TU' ? 'Tour unique' : currentSheet === 'T2' ? '2e tour' : '1er tour';
  var totI=0, totE=0, totAbst=0, totBn=0;
  var candTotV = {}; var candTotVoix = {};
  Object.values(shData).forEach(function(d) {
    if (!d) return;
    var an = Math.round((d.i||0)*(d.a||0)/100);
    totI+=d.i||0; totE+=d.e||0; totAbst+=an; totBn+=d.bn||0;
    Object.entries(d.c||{}).forEach(function(kv) {
      candTotV[kv[0]] = (candTotV[kv[0]]||0) + kv[1]*(d.e||0)/100;
    });
    if (d._voix) Object.entries(d._voix).forEach(function(kv) {
      candTotVoix[kv[0]] = (candTotVoix[kv[0]]||0) + kv[1];
    });
  });
  var avg = {};
  Object.entries(candTotV).forEach(function(kv) {
    var ve = candTotVoix[kv[0]];
    avg[kv[0]] = ve != null ? +(ve/Math.max(totE,1)*100).toFixed(1) : +(kv[1]/Math.max(totE,1)*100).toFixed(1);
  });
  var winner = Object.entries(avg).sort(function(a,b){return b[1]-a[1];})[0];
  var winCol = winner ? colorOfCandidate(winner[0]) : '#ccc';
  var abst_pct = totI > 0 ? +(totAbst/totI*100).toFixed(1) : 0;
  var abst_nb = Math.round(totI*abst_pct/100);
  var blancsPct = (totI-abst_nb) > 0 ? +(totBn*100/(totI-abst_nb)).toFixed(1) : 0;
  var gData = { c:avg, _voix:candTotVoix, e:totE, w:winner?winner[0]:null, i:totI, a:abst_pct, bn:totBn };
  var cityAvg = cityAverage();

  // Header — même style que bureau
  var nbBureaux = Object.values(shData).filter(function(d){return !!d;}).length;
  var h = '<div class="fiche-id">'
    + ficheSail(sailColorForWinner(winner && winner[0]), false)
    + '<div class="fiche-text">'
    + '<div class="fiche-num">Global</div>'
    + '<div class="fiche-name">La Rochelle</div>'
    + '<div class="fiche-meta"><span>'+nbBureaux+' bureau'+(nbBureaux>1?'x':'')+'</span></div>'
    + '</div>'
    + '</div>';

  // Split : minimap ville | résultats
  h += '<div class="fiche-section-participation" style="margin-bottom:14px">' + particiHTML(totI, abst_pct, abst_nb, blancsPct, totBn, totE) + '</div>';

  var sig = '<div class="sig-block">';
  // Encart "question soumise au vote" pour les référendums (au-dessus du duel)
  if (typeof isReferendum === 'function' && isReferendum(currentElection)) {
    var qRefG = (ELECTIONS[currentElection] || {}).q || '';
    if (qRefG) sig += '<div class="ref-question">' + qRefG + '</div>';
  }
  sig += renderCandidates(gData, 'ville', cityAvg, {best:{},worst:{}}, false);
  sig += '</div>';
  h += '<div class="split"><div id="mm-wrap"></div>' + sig + '</div>';

  // Blocs politiques — triptych global
  var LEGACY = {'exg':'G','grg':'G','g':'G','eco':'G','E':'G','c':'C','d':'D','ds':'D','exd':'EXD','autre':'?'};
  function globalHistoBlocs(elecLabel) {
    var adjEl=ELECTIONS[elecLabel];
    var adjSh=adjEl?(currentSheet==='T2'?(adjEl.sheets['T2']||adjEl.sheets['TU']||adjEl.sheets['T1']):(adjEl.sheets['TU']||adjEl.sheets['T1'])):null;
    var totals={}; var count=0;
    Object.keys(HISTORIQUE).forEach(function(bk) {
      var blocs=null;
      if(adjSh){var d=adjSh[bk];if(d)blocs=computeBlocsAdj(d,elecLabel);}
      if(!blocs){var entry=(HISTORIQUE[bk]||[]).find(function(r){return r.l===elecLabel;});
        if(!entry||!entry.b)return;
        blocs=remapBlocs(entry.b);}
      if(!blocs)return;
      count++;
      Object.entries(blocs).forEach(function(kv){totals[kv[0]]=(totals[kv[0]]||0)+kv[1];});
    });
    if(!count)return null;
    var a={};Object.entries(totals).forEach(function(kv){a[kv[0]]=+(kv[1]/count).toFixed(1);});
    return a;
  }
  function barSegsG(blocs, elec) {
    var tot=Object.values(blocs).reduce(function(s,v){return s+v;},0)||1;
    var s='';
    Object.entries(BLOC_CONFIG).forEach(function(kv) {
      var p=blocs[kv[0]]||0; if(p<=0) return;
      s += '<div class="btip"'
        + ' data-color="'+kv[1].color+'"'
        + ' data-label="'+kv[1].label+'"'
        + ' data-pct="'+p.toFixed(1)+'\u00a0%"'
        + ' data-elec="'+(elec||'')+'"'
        + ' style="width:'+(p/tot*100).toFixed(2)+'%;background:'+kv[1].color+';cursor:default"></div>';
    });
    return s;
  }
  function sideBarG(blocs,ht,label,elec) {
    var inner = blocs
      ? '<div style="position:relative"><div style="display:flex;height:'+ht+'px;width:100%">'+barSegsG(blocs,elec)+'</div><div style="position:absolute;top:0;bottom:0;left:50%;width:0;border-left:1.5px dashed rgba(255,255,255,0.65);pointer-events:none;z-index:2"></div></div>'
      : '<div style="height:'+ht+'px;background:#f0f0f0;border-radius:4px;border:1.5px dashed #ddd"></div>';
    var clickable=blocs&&elec;
    return '<div style="position:relative;opacity:0.38'+(clickable?';cursor:pointer':'')+'" class="'+(clickable?'sidebar-elec':'')+'" '+(clickable?'onclick="setElection(\''+elec+'\')"':'')+'>'+inner
      +'<span style="position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:0.58rem;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5);pointer-events:none">'+label+'</span></div>';
  }
  // Section "Blocs politiques" : skippée pour la plupart des référendums,
  // mais réactivée pour les 2 référendums européens (1992 Maastricht / 2005 TCE)
  // en duo Oui/Non courant + pendant.
  if (typeof isReferendum === 'function' && isReferendum(currentElection)) {
    var pendantG = _refPendant(currentElection);
    if (pendantG) {
      var curCityData = { Oui: (gData.c && gData.c.Oui) || 0, Non: (gData.c && gData.c.Non) || 0 };
      // Bureau keys 2026 pour agréger le pendant sur le même périmètre ville
      var bk2026 = Object.keys(BUREAU_INFO[CURRENT_ERA] || {});
      var pendCityData = _refAggregateForBureaux(pendantG, bk2026);
      h += '<div class="fiche-section-blocs" style="margin-bottom:18px"><div class="sec-ttl">Blocs politiques</div>'
        + _renderRefPairPanel(curCityData, pendCityData, currentElection, pendantG) + '</div>';
    }
  } else {
    var _adj = _adjacentElections(currentElection);
    var prev = _adj.prev, next = _adj.next;
    var curBlocs=computeBlocs(gData);
    // Précalcule pour pouvoir skipper si l'agrégat ville est vide (rare en ville
    // globale mais sécurise les cas où l'élection adj. ne couvre aucun bureau).
    var nextBlocsG = next ? globalHistoBlocs(next) : null;
    var prevBlocsG = prev ? globalHistoBlocs(prev) : null;
    var triptych='<div style="border-radius:6px;overflow:hidden">';
    if (nextBlocsG) triptych += sideBarG(nextBlocsG,20,'Scrutin suivant',next);
    triptych += '<div style="position:relative"><div style="display:flex;height:72px;width:100%">'+barSegsG(curBlocs,currentElection)+'</div><div style="position:absolute;top:0;bottom:0;left:50%;width:0;border-left:1.5px dashed rgba(255,255,255,0.65);pointer-events:none;z-index:2"></div></div>';
    if (prevBlocsG) triptych += sideBarG(prevBlocsG,20,'Scrutin précédent',prev);
    triptych += '</div>';
    h += '<div class="fiche-section-blocs" style="margin-bottom:18px"><div class="sec-ttl">Blocs politiques</div>'+triptych+'</div>';
  }

  // Liste des quartiers
  h += renderQuartierListGlobal();

  // Liste des cantons (juste après les quartiers, uniquement si l'ère canton est définie)
  h += renderCantonListGlobal();

  h += renderMoreLinks('ville', null, 'de ', 'La Rochelle');
  document.getElementById('ov-body').innerHTML = h; document.getElementById('ov-body').scrollTop = 0;
  initGlobalMinimap(winCol);
}


function renderQuartierListGlobal() {
  var shData = getSheetData();
  var el0 = ELECTIONS[currentElection];
  var mapYear = String(el0 ? el0.my : 2026);
  var yearInfo = BUREAU_INFO[mapYear] || BUREAU_INFO[CURRENT_ERA] || {};
  var LINE = '<div style="position:absolute;top:0;bottom:0;left:50%;width:0;border-left:1.5px dashed rgba(255,255,255,0.65);pointer-events:none;z-index:2"></div>';

  // Collecter les quartiers et leurs bureaux (en tenant compte de getQuartierParts)
  var quartierBureaux = {};
  Object.keys(yearInfo).forEach(function(ns) {
    var q = yearInfo[ns].q || '';
    if (!q) return;
    var parts = getQuartierParts(q);
    parts.forEach(function(qp) {
      if (!quartierBureaux[qp]) quartierBureaux[qp] = [];
      quartierBureaux[qp].push(ns);
    });
  });

  var quartierNames = Object.keys(quartierBureaux).sort();

  var h = '<div class="fiche-section-bureaux-list" data-list-type="quartiers" style="margin-top:18px">';

  // En-tête identique à celle de la page quartier
  h += '<div style="display:flex;align-items:center;gap:10px;padding:4px 10px;margin-bottom:2px">'
    + '<span style="font-size:0.6rem;font-weight:700;color:var(--text-meta);flex:1">Quartier</span>'
    + '<span style="font-size:0.6rem;font-weight:700;color:var(--text-meta);width:68px;text-align:right;flex-shrink:0">Abstention</span>'
    + '<span style="font-size:0.6rem;font-weight:700;color:var(--text-meta);flex:2;margin-left:12px">'+((typeof isReferendum === 'function' && isReferendum(currentElection)) ? 'Oui / Non' : 'Blocs')+'</span>'
    + '</div>';

  quartierNames.forEach(function(qp) {
    var nums = quartierBureaux[qp] || [];

    // Agréger : abstention + (blocs OU Oui/Non selon scrutin)
    var totI=0, totAbst=0, totEr=0;
    var blocsAgg = {};
    var ouiW = 0, nonW = 0;
    var isRefG = (typeof isReferendum === 'function' && isReferendum(currentElection));
    nums.forEach(function(ns) {
      var d = shData[ns]; if (!d) return;
      var an = Math.round((d.i||0)*(d.a||0)/100);
      totI += d.i||0; totAbst += an; totEr += d.e||0;
      if (isRefG) {
        if (d.c) { ouiW += (d.c.Oui||0)*(d.e||0)/100; nonW += (d.c.Non||0)*(d.e||0)/100; }
      } else {
        var blocs = computeBlocs(d);
        Object.entries(blocs).forEach(function(kv) {
          blocsAgg[kv[0]] = (blocsAgg[kv[0]]||0) + kv[1];
        });
      }
    });

    if (!totI) return;
    var abst_pct = +(totAbst/totI*100).toFixed(1);

    var bar;
    if (isRefG) {
      var ouiP = totEr > 0 ? +(ouiW/totEr*100).toFixed(1) : 0;
      var nonP = totEr > 0 ? +(nonW/totEr*100).toFixed(1) : 0;
      var totRefP = (ouiP + nonP) || 1;
      var ouiCol = colorOfCandidate('Oui');
      var nonCol = colorOfCandidate('Non');
      bar = '<div style="position:relative"><div style="display:flex;height:14px;border-radius:3px;overflow:hidden;gap:1px;width:100%">';
      if (ouiP > 0) bar += '<div class="btip" data-color="'+ouiCol+'" data-label="Oui" data-pct="'+ouiP.toFixed(1)+' %" style="width:'+(ouiP/totRefP*100).toFixed(1)+'%;background:'+ouiCol+'"></div>';
      if (nonP > 0) bar += '<div class="btip" data-color="'+nonCol+'" data-label="Non" data-pct="'+nonP.toFixed(1)+' %" style="width:'+(nonP/totRefP*100).toFixed(1)+'%;background:'+nonCol+'"></div>';
      bar += '</div>'+LINE+'</div>';
    } else {
      // Normaliser blocs (moyenne sur nb bureaux)
      var nb = nums.filter(function(ns){return !!shData[ns];}).length || 1;
      var blocsNorm = {};
      Object.entries(blocsAgg).forEach(function(kv){ blocsNorm[kv[0]] = +(kv[1]/nb).toFixed(1); });
      var totBN = Object.values(blocsNorm).reduce(function(s,v){return s+v;},0)||1;
      bar = '<div style="position:relative"><div style="display:flex;height:14px;border-radius:3px;overflow:hidden;gap:1px;width:100%">';
      Object.entries(BLOC_CONFIG).forEach(function(kv) {
        var p = blocsNorm[kv[0]]||0; if (p<=0) return;
        bar += '<div class="btip" data-color="'+kv[1].color+'" data-label="'+kv[1].label+'" data-pct="'+p.toFixed(1)+' %"'
             + ' style="width:'+(p/totBN*100).toFixed(1)+'%;background:'+kv[1].color+'"></div>';
      });
      bar += '</div>'+LINE+'</div>';
    }

    h += '<div class="q-brow" onclick="openQuartierFromGlobal(\''+qp.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\')"> '
      + '<span style="font-size:0.74rem;font-weight:500;color:var(--text-modal);flex:1;line-height:1.35">'+qp+'</span>'
      + '<span style="font-size:0.72rem;font-weight:700;color:var(--text-modal-muted);width:68px;text-align:right;flex-shrink:0;padding-top:1px">'+abst_pct.toFixed(1)+'\u00a0%</span>'
      + '<div style="flex:2;min-width:0;margin-left:12px;padding-top:3px">'+bar+'</div>'
      + '</div>';
  });

  h += '</div>';
  return h;
}

function openQuartierFromGlobal(qName) {
  var el0 = ELECTIONS[currentElection];
  var mapYear = String(el0 ? el0.my : 2026);
  var yearInfo = BUREAU_INFO[mapYear] || BUREAU_INFO[CURRENT_ERA] || {};
  var ns = null;
  Object.keys(yearInfo).forEach(function(num) {
    if (ns) return;
    var q = yearInfo[num].q || '';
    var parts = getQuartierParts(q);
    if (parts.indexOf(qName) >= 0) ns = num;
  });
  if (!ns) return;
  var gj = getMapGeoJSON();
  var feat = gj.features.find(function(f){ return numStr(f) === ns; });
  if (!feat) return;
  currentFeature = feat;
  openOverlayQuartierNamed(qName);
}


// Liste des cantons dans la fiche globale (sous la liste des quartiers).
// Calque le pattern de renderQuartierListGlobal : agrégation par canton + barre blocs/Oui-Non.
// Clic → selectCantonFromList(cid) qui ouvre la fiche canton.
function renderCantonListGlobal() {
  var shData = getSheetData();
  var el0 = ELECTIONS[currentElection];
  var mapYear = String(el0 ? el0.my : CURRENT_ERA);
  var yearInfo = BUREAU_INFO[mapYear] || BUREAU_INFO[CURRENT_ERA] || {};
  var cantonEra = (typeof getCantonEraForElection === 'function') ? getCantonEraForElection(currentElection) : null;
  if (!cantonEra) return '';
  var cantonsMeta = ((typeof CANTON_INFO !== 'undefined' && CANTON_INFO[cantonEra]) || {}).cantons || {};
  var LINE = '<div style="position:absolute;top:0;bottom:0;left:50%;width:0;border-left:1.5px dashed rgba(255,255,255,0.65);pointer-events:none;z-index:2"></div>';

  // Aggrégation par canton (champ .c de chaque bureau dans l'ère bureau).
  var cAgg = {};
  Object.keys(yearInfo).forEach(function(ns) {
    var c = yearInfo[ns].c;
    if (!c) return;
    var cid = String(c);
    var d = shData[ns]; if (!d) return;
    if (!cAgg[cid]) cAgg[cid] = { totI: 0, totE: 0, totAbst: 0, blocsAgg: {}, ouiW: 0, nonW: 0, nb: 0 };
    var an = Math.round((d.i || 0) * (d.a || 0) / 100);
    cAgg[cid].totI += d.i || 0;
    cAgg[cid].totE += d.e || 0;
    cAgg[cid].totAbst += an;
    cAgg[cid].nb++;
    var isRefG = (typeof isReferendum === 'function' && isReferendum(currentElection));
    if (isRefG) {
      if (d.c) {
        cAgg[cid].ouiW += (d.c.Oui || 0) * (d.e || 0) / 100;
        cAgg[cid].nonW += (d.c.Non || 0) * (d.e || 0) / 100;
      }
    } else {
      var blocs = computeBlocs(d);
      Object.entries(blocs).forEach(function(kv) {
        cAgg[cid].blocsAgg[kv[0]] = (cAgg[cid].blocsAgg[kv[0]] || 0) + kv[1];
      });
    }
  });

  // Tri numérique par id canton
  var cIds = Object.keys(cAgg).sort(function(a, b) { return parseInt(a) - parseInt(b); });
  if (!cIds.length) return '';
  var isRefG = (typeof isReferendum === 'function' && isReferendum(currentElection));

  var h = '<div class="fiche-section-bureaux-list" data-list-type="cantons" style="margin-top:18px">';
  h += '<div style="display:flex;align-items:center;gap:10px;padding:4px 10px;margin-bottom:2px">'
    + '<span style="font-size:0.6rem;font-weight:700;color:var(--text-meta);flex:1">Canton</span>'
    + '<span style="font-size:0.6rem;font-weight:700;color:var(--text-meta);width:68px;text-align:right;flex-shrink:0">Abstention</span>'
    + '<span style="font-size:0.6rem;font-weight:700;color:var(--text-meta);flex:2;margin-left:12px">' + (isRefG ? 'Oui / Non' : 'Blocs') + '</span>'
    + '</div>';

  cIds.forEach(function(cid) {
    var ag = cAgg[cid];
    if (!ag.totI) return;
    var cantonName = (cantonsMeta[cid] || {}).name || ('La Rochelle-' + cid);
    var abst_pct = +(ag.totAbst / ag.totI * 100).toFixed(1);

    var bar;
    if (isRefG) {
      var ouiP = ag.totE > 0 ? +(ag.ouiW / ag.totE * 100).toFixed(1) : 0;
      var nonP = ag.totE > 0 ? +(ag.nonW / ag.totE * 100).toFixed(1) : 0;
      var totRefP = (ouiP + nonP) || 1;
      var ouiCol = colorOfCandidate('Oui');
      var nonCol = colorOfCandidate('Non');
      bar = '<div style="position:relative"><div style="display:flex;height:14px;border-radius:3px;overflow:hidden;gap:1px;width:100%">';
      if (ouiP > 0) bar += '<div class="btip" data-color="' + ouiCol + '" data-label="Oui" data-pct="' + ouiP.toFixed(1) + ' %" style="width:' + (ouiP / totRefP * 100).toFixed(1) + '%;background:' + ouiCol + '"></div>';
      if (nonP > 0) bar += '<div class="btip" data-color="' + nonCol + '" data-label="Non" data-pct="' + nonP.toFixed(1) + ' %" style="width:' + (nonP / totRefP * 100).toFixed(1) + '%;background:' + nonCol + '"></div>';
      bar += '</div>' + LINE + '</div>';
    } else {
      // Normaliser blocs (moyenne sur nb bureaux du canton)
      var nb = ag.nb || 1;
      var blocsNorm = {};
      Object.entries(ag.blocsAgg).forEach(function(kv) { blocsNorm[kv[0]] = +(kv[1] / nb).toFixed(1); });
      var totBN = Object.values(blocsNorm).reduce(function(s, v) { return s + v; }, 0) || 1;
      bar = '<div style="position:relative"><div style="display:flex;height:14px;border-radius:3px;overflow:hidden;gap:1px;width:100%">';
      Object.entries(BLOC_CONFIG).forEach(function(kv) {
        var p = blocsNorm[kv[0]] || 0; if (p <= 0) return;
        bar += '<div class="btip" data-color="' + kv[1].color + '" data-label="' + kv[1].label + '" data-pct="' + p.toFixed(1) + ' %"'
             + ' style="width:' + (p / totBN * 100).toFixed(1) + '%;background:' + kv[1].color + '"></div>';
      });
      bar += '</div>' + LINE + '</div>';
    }

    h += '<div class="q-brow" onclick="selectCantonFromList(\'' + cid.replace(/'/g, "\\'") + '\')"> '
      + '<span style="font-size:0.74rem;font-weight:500;color:var(--text-modal);flex:1;line-height:1.35">' + cantonName + '</span>'
      + '<span style="font-size:0.72rem;font-weight:700;color:var(--text-modal-muted);width:68px;text-align:right;flex-shrink:0;padding-top:1px">' + abst_pct.toFixed(1) + ' %</span>'
      + '<div style="flex:2;min-width:0;margin-left:12px;padding-top:3px">' + bar + '</div>'
      + '</div>';
  });

  h += '</div>';
