      + '.cmdk-item .sub{color:var(--text-modal-muted);font-size:.78rem;flex-shrink:0;max-width:40%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}'
      + '#cmdk-tip{position:fixed;background:var(--bg-tooltip);color:var(--text-tooltip);padding:6px 10px;border-radius:4px;font-size:.72rem;font-weight:500;white-space:nowrap;pointer-events:none;z-index:10002;opacity:0;transition:opacity .15s;transform:translateX(-50%)}'
      + '#cmdk-foot{padding:8px 16px;border-top:1px solid var(--border-modal);font-size:.72rem;color:var(--text-modal-muted);display:flex;gap:14px;justify-content:flex-end;background:var(--bg-modal-hover)}'
      + '#cmdk-foot kbd{display:inline-block;background:var(--bg-modal);border:1px solid var(--border-modal);border-radius:3px;padding:1px 5px;font:inherit;font-size:.72rem;color:var(--text-modal)}'
      + '#cmdk-empty{padding:20px 16px;color:var(--text-modal-muted);text-align:center;font-size:.85rem}';
    const st = document.createElement('style'); st.textContent = css; document.head.appendChild(st);
    overlayEl = document.createElement('div'); overlayEl.id = 'cmdk-overlay';
    overlayEl.innerHTML = '<div id="cmdk-card">'
      + '<input id="cmdk-input" type="text" placeholder="Rechercher un bureau, un quartier, une élection, un·e candidat·e…" autocomplete="off" spellcheck="false">'
      + '<div id="cmdk-list"></div>'
      + '<div id="cmdk-foot"><span><kbd>↑</kbd><kbd>↓</kbd> naviguer</span><span><kbd>Entrée</kbd> sélectionner</span><span><kbd>Échap</kbd> fermer</span></div>'
      + '</div>';
    document.body.appendChild(overlayEl);
    inputEl = overlayEl.querySelector('#cmdk-input');
    listEl  = overlayEl.querySelector('#cmdk-list');
    overlayEl.addEventListener('click', e => { if (e.target === overlayEl) closeOverlayUI(); });
    inputEl.addEventListener('input', () => { runSearch(); });
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'ArrowDown') { e.preventDefault(); moveCursor(1); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); moveCursor(-1); }
      else if (e.key === 'Enter')   { e.preventDefault(); if (results[cursor]) pickItem(results[cursor]); }
      else if (e.key === 'Escape')  { e.preventDefault(); closeOverlayUI(); }
    });
  }
  function runSearch(){
    results = filter(inputEl.value);
    cursor = 0;
    render();
  }
  function render(){
    if (!results.length) {
      listEl.innerHTML = '<div id="cmdk-empty">Aucun résultat</div>';
      return;
    }
    listEl.innerHTML = results.map((r, i) =>
      '<div class="cmdk-item' + (i === cursor ? ' cur' : '') + '" data-i="' + i + '">'
      + '<span class="ico">' + r.icon + '</span>'
      + '<span class="lbl"><span class="lbl-text">' + escapeHTML(r.label) + '</span>'
      + (r.badge ? '<span class="badge" data-tip="' + (r.badgeTip ? escapeHTML(r.badgeTip) : '') + '">' + escapeHTML(r.badge) + '</span>' : '')
      + '</span>'
      + '<span class="sub">' + escapeHTML(r.sub) + '</span>'
      + '</div>').join('');
    [...listEl.querySelectorAll('.cmdk-item')].forEach(el => {
      el.addEventListener('click', () => { cursor = parseInt(el.dataset.i); pickItem(results[cursor]); });
      el.addEventListener('mousemove', () => { const i = parseInt(el.dataset.i); if (i !== cursor) { cursor = i; render(); } });
    });
    // Tooltip flottant pour le badge (position fixe pour échapper à l'overflow de la liste)
    [...listEl.querySelectorAll('.cmdk-item .badge')].forEach(b => {
      const tip = b.dataset.tip;
      if (!tip) return;
      b.addEventListener('mouseenter', () => {
        let t = document.getElementById('cmdk-tip');
        if (!t) { t = document.createElement('div'); t.id = 'cmdk-tip'; document.body.appendChild(t); }
        t.textContent = tip;
        const r = b.getBoundingClientRect();
        t.style.left = (r.left + r.width/2) + 'px';
        t.style.top  = (r.bottom + 6) + 'px';
        t.style.opacity = '1';
      });
      b.addEventListener('mouseleave', () => {
        const t = document.getElementById('cmdk-tip');
        if (t) t.style.opacity = '0';
      });
    });
    // Scroll-into-view pour l'élément courant
    const cur = listEl.querySelector('.cmdk-item.cur');
    if (cur) cur.scrollIntoView({ block: 'nearest' });
  }
  function escapeHTML(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
  function moveCursor(d){
    if (!results.length) return;
    cursor = (cursor + d + results.length) % results.length;
    render();
  }
  let _cmdkTrap = null;
  function openOverlayUI(){
    ensureUI();
    overlayEl.style.display = 'flex';
    inputEl.value = '';
    runSearch();
    setTimeout(() => inputEl.focus(), 0);
    // A11y : focus trap (cmdk a son propre input focus, le trap garde Tab dedans).
    if (!_cmdkTrap && typeof createFocusTrap === 'function') _cmdkTrap = createFocusTrap(overlayEl);
    if (_cmdkTrap) _cmdkTrap.activate();
  }
  function closeOverlayUI(){
    if (overlayEl) overlayEl.style.display = 'none';
    if (_cmdkTrap) _cmdkTrap.deactivate();
  }
  // Raccourci global Cmd/Ctrl + K
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')) {
      e.preventDefault();
      if (overlayEl && overlayEl.style.display === 'flex') closeOverlayUI();
      else openOverlayUI();
    }
  });
  // Expose pour usage externe (cheatsheet)
  window.openCmdK = openOverlayUI;
})();


// ─── Raccourcis clavier ──────────────────────────────────────────────────
(function setupShortcuts(){
  function isTypingTarget(t){
    if (!t) return false;
    const tag = (t.tagName || '').toUpperCase();
    return tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || t.isContentEditable;
  }
  // elecTypePriority(label) : départage les élections de même année. Définie dans shared.js.
  function neighborElection(dir){
    const all = Object.keys(ELECTIONS);
    // Garde-fou : si un label n'a pas d'année à 4 chiffres (cas non attendu mais
    // possible si on ajoute une élection mal nommée), on tombe à 0 au lieu de crash.
    const _y = lab => { const m = lab.match(/\d{4}/); return m ? parseInt(m[0]) : 0; };
    const sorted = all.slice().sort((a,b) => {
      const ya = _y(a), yb = _y(b);
      if (ya !== yb) return ya - yb;
      return elecTypePriority(a) - elecTypePriority(b);
    });
    const idx = sorted.indexOf(currentElection);
    if (idx < 0) return null;
    return sorted[idx + dir] || null;
  }
  // Expose pour les boutons chevrons + mise à jour disabled state
  window.navigateElection = function(dir){
    const next = neighborElection(dir);
    if (next) setElection(next);
  };
  window.updateElectionNavButtons = function(){
    const prev = document.getElementById('tb-elec-prev');
    const next = document.getElementById('tb-elec-next');
    if (prev) prev.disabled = !neighborElection(-1);
    if (next) next.disabled = !neighborElection(1);
  };
  function neighborBureau(dir){
    if (!currentFeature) return null;
    const cur = numStr(currentFeature);
    const sortedNums = Object.keys(BUREAU_INFO[CURRENT_ERA] || {})
      .filter(id => (BUREAU_INFO[CURRENT_ERA][id].q || '') !== 'Nul')
      .sort((a,b) => parseInt(a) - parseInt(b));
    const i = sortedNums.indexOf(cur);
    const tgt = sortedNums[i + dir];
    if (!tgt) return null;
    const gj = getMapGeoJSON();
    return gj.features.find(f => numStr(f) === tgt) || null;
  }
  function selectFeature(feat){
    if (!feat) return;
    currentFeature = feat;
    currentQuartier = null;
    overlayTab = 'bureau';
    const info = bureauInfo(feat);
    const t = isAggNs(numStr(feat)) ? 'Bureaux agrégés — ' + info.quartier : 'Fiche bureau — ' + info.denomination;
    document.getElementById('ov-title').textContent = t;
    document.getElementById('ov-tabs').style.display = 'flex';
    setOverlayDisplay('flex');
    showBureauListSidebar();
    renderFiche(feat);
    updateAccentColor();
    updateOverlayTabs();
    if (mainLayer) mainLayer.setStyle(featureStyle);
    if (typeof writeURLState === 'function') writeURLState();
  }

  // A11y : Enter / Space déclenchent un click() sur les éléments role="button"
  // (les <button> natifs s'auto-gèrent et sont skippés). Avant les raccourcis
  // perso pour ne pas écraser leur comportement (sauf si la cible est un button-like).
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const t = e.target;
    if (!t || t.getAttribute('role') !== 'button') return;
    if (t.tagName === 'BUTTON') return;
    if (isTypingTarget(t)) return;
    e.preventDefault();
    t.click();
  });

  document.addEventListener('keydown', (e) => {
    if (isTypingTarget(e.target)) return;
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    const k = e.key;
    if (k === 'ArrowLeft' || k === 'ArrowRight') {
      const next = neighborElection(k === 'ArrowLeft' ? -1 : 1);
      if (next) { setElection(next); e.preventDefault(); }
    } else if (k === 'ArrowUp' || k === 'ArrowDown') {
      const feat = neighborBureau(k === 'ArrowUp' ? -1 : 1);
      if (feat) { selectFeature(feat); e.preventDefault(); }
    } else if (k === 'Escape') {
      const ov = document.getElementById('overlay');
      if (ov && ov.style.display !== 'none' && typeof closeOverlay === 'function') {
        closeOverlay(); e.preventDefault();
      }
    } else if (k === '?' || (e.shiftKey && k === '/')) {
      toggleShortcutsCheat(); e.preventDefault();
    }
  });

  // Cheatsheet overlay
  const cs = document.createElement('div');
  cs.id = 'shortcuts-cheat';
  cs.setAttribute('role', 'dialog');
  cs.setAttribute('aria-modal', 'true');
  cs.setAttribute('aria-label', 'Raccourcis clavier');
  cs.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:10000;font-family:Space Grotesk,system-ui,sans-serif';
  cs.innerHTML = '<div style="background:#fff;border-radius:10px;padding:24px 28px;max-width:420px;box-shadow:0 12px 40px rgba(0,0,0,.25)">'
    + '<h3 style="margin:0 0 14px;font-size:1.1rem">Raccourcis clavier</h3>'
    + '<table style="font-size:.85rem;color:#333;border-collapse:collapse;width:100%">'
    + '<tr><td style="padding:5px 8px"><kbd>⌘</kbd> <kbd>K</kbd></td><td>Recherche universelle (bureau, quartier, candidat·e, élection)</td></tr>'
    + '<tr><td style="padding:5px 8px"><kbd>←</kbd> <kbd>→</kbd></td><td>Élection précédente / suivante (chevrons en haut)</td></tr>'
    + '<tr><td style="padding:5px 8px"><kbd>↑</kbd> <kbd>↓</kbd></td><td>Bureau précédent / suivant</td></tr>'
    + '<tr><td style="padding:5px 8px"><kbd>Échap</kbd></td><td>Fermer la fiche</td></tr>'
    + '<tr><td style="padding:5px 8px"><kbd>?</kbd></td><td>Afficher / masquer ce panneau</td></tr>'
    + '</table>'
    + '<button onclick="document.getElementById(\'shortcuts-cheat\').style.display=\'none\'" style="margin-top:14px;padding:6px 14px;border:1px solid #ddd;border-radius:6px;background:#f5f5f5;cursor:pointer;font:inherit">Fermer</button>'
    + '</div>';
  cs.addEventListener('click', e => { if (e.target === cs) cs.style.display = 'none'; });
  document.body.appendChild(cs);
  // Style des kbd
  const st = document.createElement('style');
  st.textContent = '#shortcuts-cheat kbd{display:inline-block;background:#f5f5f5;border:1px solid #ddd;border-radius:4px;padding:2px 7px;font-family:Space Grotesk,system-ui,sans-serif;font-size:.8rem;color:#333;font-weight:600}';
  document.head.appendChild(st);

  let _shortcutsTrap = null;
  window.toggleShortcutsCheat = () => {
    const willOpen = cs.style.display !== 'flex';
    cs.style.display = willOpen ? 'flex' : 'none';
    // A11y : focus trap actif quand le modal s'ouvre.
    if (!_shortcutsTrap && typeof createFocusTrap === 'function') _shortcutsTrap = createFocusTrap(cs);
    if (_shortcutsTrap) {
      if (willOpen) _shortcutsTrap.activate();
      else _shortcutsTrap.deactivate();
    }
  };

  // État initial des boutons chevrons (setupShortcuts s'exécute après updateTopbar)
  updateElectionNavButtons();
})();

// ─────────────────────────────────────────────────────────────────────────
// Swipe-down sur la fiche overlay (mobile uniquement) : tirer vers le bas
// pour fermer la fiche, à la manière d'un bottom sheet iOS/Android.
// Logique :
//   • On démarre le drag quand l'utilisateur touche la zone "handle" du
//     topbar de la fiche, OU le contenu lui-même si la fiche est scrollée
//     tout en haut (sinon on laisse le scroll natif faire son boulot).
//   • Pendant le drag, on translateY l'overlay 1:1 avec le doigt pour
//     un feedback temps réel.
//   • Au relâchement : si tiré > 25 % de la hauteur viewport → fermeture
//     animée jusqu'en bas + closeOverlay(). Sinon spring-back à zéro.
// Le bouton "← Retour" reste opérationnel (les utilisateurs habitués à
// taper en haut à gauche ne perdent rien).
// ─────────────────────────────────────────────────────────────────────────
(function setupSwipeDownToClose(){
  function isMobile() {
    return window.matchMedia && window.matchMedia('(max-width: 720px)').matches;
  }
  const overlay = document.getElementById('overlay');
  const ovBody  = document.getElementById('ov-body');
  const ovTop   = document.getElementById('ov-topbar');
  if (!overlay || !ovBody || !ovTop) return;

  let startY = 0, currentY = 0;
  let dragging = false;

  function canStartDrag(target) {
    if (!isMobile()) return false;
    // Drag autorisé depuis le topbar (zone "handle") quoi qu'il arrive
    if (ovTop.contains(target)) return true;
    // Sinon, uniquement si on est au sommet du scroll du contenu
    return ovBody.scrollTop <= 0;
  }

  overlay.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) { dragging = false; return; }
    if (!canStartDrag(e.target)) { dragging = false; return; }
    startY   = e.touches[0].clientY;
    currentY = startY;
    dragging = true;
    overlay.style.transition = 'none'; // suivi temps réel, pas d'easing
  }, { passive: true });

  overlay.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    currentY = e.touches[0].clientY;
    const dy = currentY - startY;
    if (dy <= 0) {
      // Drag vers le haut : on abandonne pour ne pas bloquer le scroll natif
      overlay.style.transform = '';
      dragging = false;
      return;
    }
    overlay.style.transform = 'translateY(' + dy + 'px)';
  }, { passive: true });

  function endDrag() {
    if (!dragging) return;
    dragging = false;
    const dy = currentY - startY;
    const threshold = window.innerHeight * 0.25;  // 25 % de la viewport
    overlay.style.transition = 'transform 0.25s ease-out';
    if (dy > threshold) {
      // Glissée suffisante → on slide jusqu'en bas puis on ferme
      overlay.style.transform = 'translateY(100%)';
      setTimeout(() => {
        overlay.style.transition = '';
        overlay.style.transform  = '';
        if (typeof closeOverlay === 'function') closeOverlay();
      }, 250);
    } else {
      // Spring-back vers la position d'origine
      overlay.style.transform = '';
      setTimeout(() => { overlay.style.transition = ''; }, 250);
    }
  }
  overlay.addEventListener('touchend',    endDrag, { passive: true });
  overlay.addEventListener('touchcancel', endDrag, { passive: true });
})();

/* ─────────────────────────────────────────────────────────────────
   DUEL — setup tourniquet (marquise) sur les noms qui débordent.
   Pattern emprunté à LRVanalyse / setMarqueeText. Différences ici :
   - on cible tous les .duel-nom-host (rendus par blockWinner/blockLoser
     en mode mobile full),
   - on adapte le sens du défilement à data-align (right→+, left→−),
   - on déclenche automatiquement (MutationObserver) — pas besoin de
     hooker chaque site d'appel de renderDuel.
   ───────────────────────────────────────────────────────────────── */
(function setupDuelMarquees(){
  // Garde : si quelqu'un désactive volontairement la fonctionnalité.
  if (window._noDuelMarquees) return;
  const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduceMotion) return; // accessibilité : on laisse simplement le clip CSS

  // Largeur du fade côté extérieur (DOIT correspondre au gradient des règles
  // .has-marquee[data-align="..."] dans le CSS). On overshoote la translation
  // de cette valeur pour que la portion révélée à l'extrême de l'animation
  // dépasse la zone de fade et soit totalement opaque.
  const FADE_PX = 10;

  // Calcule l'overflow d'un host et applique/retire la marquise.
  function applyMarquee(host) {
    if (!host || !host.isConnected) return;
    const inner = host.querySelector('.duel-nom-inner');
    if (!inner) return;
    // Reset complet pour re-mesurer proprement (resize, orientation, etc.).
    host.classList.remove('has-marquee', 'prenom-abbrev', 'prenom-hidden');
    host.style.removeProperty('--duel-marquee-d');
    const containerW = host.clientWidth;
    if (!containerW) return;
    // Cascade d'abréviation AVANT la marquise (cohérence avec le mode liste) :
    //   Palier 1 — prénom complet → initiales (.prenom-abbrev)
    //   Palier 2 — prénom masqué (.prenom-hidden)
    //   Palier 3 — marquise translateX (animation)
    // ⚠️ Après chaque classList.add/remove, on FORCE un reflow synchrone via
    // offsetWidth, sinon scrollWidth peut renvoyer la mesure d'avant le swap.
    function fits() {
      // void(inner.offsetWidth) force le navigateur à recalculer le layout maintenant
      void inner.offsetWidth;
      return inner.scrollWidth <= containerW + 5;
    }
    if (fits()) return;
    // Le host a-t-il un prénom (binôme avec membre.p) ? Si oui on tente la cascade.
    const hasPrenom = !!host.querySelector('.cn-prenom-full');
    if (hasPrenom) {
      host.classList.add('prenom-abbrev');
      if (fits()) return;
      host.classList.remove('prenom-abbrev');
      host.classList.add('prenom-hidden');
      if (fits()) return;
    }
    // Sinon (ou si encore débordement) : marquise translateX
    void inner.offsetWidth; // dernier reflow avant la mesure définitive
    const overflow = inner.scrollWidth - containerW;
    if (overflow <= 5) return;
    // Overshoot de 2× FADE_PX : avec +FADE_PX seul, le bout du texte arrive pile sur
    // le bord du fade gradient et reste partiellement transparent. En doublant, le
    // bout dépasse la zone fade et est rendu 100% opaque à l'amplitude max.
    const distance = overflow + FADE_PX * 2;
    const align = host.getAttribute('data-align') || 'left';
    const sign  = (align === 'right') ? '+' : '-';
    host.style.setProperty('--duel-marquee-d', sign + distance + 'px');
    host.classList.add('has-marquee');
  }

  // Scanne le sous-arbre et applique sur chaque host non encore mesuré.
  // L'idempotence est gérée via has-marquee + data-mq-done (on remesure quand même
  // au resize, mais pas à chaque mutation parasite).
  function scanAndApply(root) {
    if (!root || !root.querySelectorAll) return;
    const hosts = root.querySelectorAll('.duel-nom-host');
    hosts.forEach(h => {
      if (h.dataset.mqDone === '1' && !h._needsRemeasure) return;
      // Double rAF : on attend que le layout soit stable (le duel vient d'être inséré).
      requestAnimationFrame(() => requestAnimationFrame(() => {
        applyMarquee(h);
        h.dataset.mqDone = '1';
        h._needsRemeasure = false;
      }));
    });
  }

  // Observateur : déclenché à chaque insertion DOM. Filtre les noeuds pertinents.
  const obs = new MutationObserver(muts => {
    for (const m of muts) {
      if (m.type !== 'childList') continue;
      m.addedNodes.forEach(n => {
        if (n.nodeType !== 1) return;
        if (n.classList && n.classList.contains('duel-nom-host')) {
          scanAndApply(n.parentNode || document.body);
        } else if (n.querySelector && n.querySelector('.duel-nom-host')) {
          scanAndApply(n);
        }
      });
    }
  });
  function startObs() {
    obs.observe(document.body, { childList: true, subtree: true });
    // Premier scan au cas où des duels seraient déjà dans le DOM.
    scanAndApply(document.body);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', startObs);
  } else {
    startObs();
  }

  // Resize / orientationchange : on remesure tout (les largeurs des blocs changent).
  // On débrouille les flags d'idempotence pour forcer un re-calcul.
  let resizeT;
  function onResize() {
    clearTimeout(resizeT);
    resizeT = setTimeout(() => {
      document.querySelectorAll('.duel-nom-host').forEach(h => { h._needsRemeasure = true; });
      scanAndApply(document.body);
    }, 150);
  }
  window.addEventListener('resize', onResize, { passive: true });
  window.addEventListener('orientationchange', onResize, { passive: true });
})();

</script>

<script>
/* ── Animation du logo voile mini (topbar) ── */
(function () {
  // PARTI_COLORS : palette des partis. Définie dans shared.js.
  const rows = Array.from(document.querySelectorAll('.sail-mini .sail-row')).reverse();
  if (!rows.length) return;
  // a11y : respect de prefers-reduced-motion → on fixe une couleur unique sans animation.
  const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduceMotion) {
    const fixed = PARTI_COLORS[Math.floor(Math.random() * PARTI_COLORS.length)];
    rows.forEach(r => { r.style.setProperty('--c1', fixed); r.style.setProperty('--c2', fixed); });
    return;
  }
  const NB = rows.length, SLIDE_DUR = 550, STEP = 200, PAUSE_END = 4000;
  function pickColor(prev) {
    let c; do { c = PARTI_COLORS[Math.floor(Math.random()*PARTI_COLORS.length)]; }
    while (c === prev); return c;
  }
  let curColor = pickColor(null), nextColor = pickColor(curColor), cursor = 0;
  rows.forEach(r => { r.style.setProperty('--c1', curColor); r.style.setProperty('--c2', nextColor); });
  function tick() {
    const row = rows[cursor], target = nextColor;
    row.classList.add('sliding');
    setTimeout(() => {
      row.classList.add('no-trans');
      row.style.setProperty('--c1', target);
      row.classList.remove('sliding');
      void row.offsetWidth;
      row.classList.remove('no-trans');
    }, SLIDE_DUR + 30);
    cursor++;
    let nextDelay = STEP;
    if (cursor >= NB) {
      cursor = 0;
      curColor = nextColor;
      nextColor = pickColor(curColor);
      const newC2 = nextColor;
      setTimeout(() => rows.forEach(r => r.style.setProperty('--c2', newC2)), SLIDE_DUR + 60);
      nextDelay = SLIDE_DUR - STEP + PAUSE_END;
    }
    setTimeout(tick, nextDelay);
  }
  tick();
})();
</script>

<script>
/* ── API export Puppeteer (?mode=export dans le hash) ── */
(function() {
  const hash = new URLSearchParams(window.location.hash.slice(1));
  if (hash.get('mode') !== 'export') return;

  window._exportMode = true;

  function tryExport() {
    if (typeof window.exportShareImage !== 'function' ||
        typeof ELECTIONS === 'undefined' ||
        Object.keys(ELECTIONS).length === 0) {
      return setTimeout(tryExport, 300);
    }
    setTimeout(async function() {
      try {
        window.downloadCanvas = function(canvas) {
          window._exportDataUrl = canvas.toDataURL('image/png');
          window._exportDone = true;
          return Promise.resolve(true);
        };
        await window.exportShareImage();
      } catch(e) {
        window._exportError = String(e);
        window._exportDone = true;
      }
    }, 2000);
  }
  tryExport();
})();
</script>

<!-- Bottom sheet mobile pour changer d'élection -->
<div id="elec-sheet" aria-hidden="true">
  <div class="elec-sheet-overlay" onclick="closeElecSheet()"></div>
  <div class="elec-sheet-panel" role="dialog" aria-modal="true" aria-label="Choisir une élection">
    <div class="elec-sheet-handle" onclick="closeElecSheet()" aria-hidden="true"></div>
    <div class="elec-sheet-title">Choisir un scrutin</div>
    <div class="elec-sheet-list" id="elec-sheet-list"></div>
  </div>
</div>

<script>
/* Bottom sheet mobile pour le sélecteur d'élection.
   Génère la liste depuis le <select id="el-select"> existant (qui contient les optgroups). */
function openElecSheet() {
  const sheet = document.getElementById('elec-sheet');
  const listEl = document.getElementById('elec-sheet-list');
  const sel = document.getElementById('el-select');
  if (!sheet || !listEl || !sel) return;
  // (Re)build le contenu — currentElection peut avoir changé entre 2 ouvertures.
  let html = '';
  for (const child of sel.children) {
    if (child.tagName !== 'OPTGROUP') continue;
    html += '<div class="elec-group"><div class="elec-group-label">' + child.label + '</div>';
    for (const opt of child.children) {
      if (opt.tagName !== 'OPTION') continue;
      const label = opt.value;
      const sheets = (typeof ELECTIONS !== 'undefined' && ELECTIONS[label] && ELECTIONS[label].sheets) || {};
      const has2Tours = !!sheets['T2'];
      const isCurrent = label === currentElection;
      // Italique pour les partielles (cf. CSS .is-partielle sur .elec-item / .elec-item-2t).
      const isPartielle = /partielle/i.test(label);
      const partielleCls = isPartielle ? ' is-partielle' : '';
      const safeVal = label.replace(/'/g, "\\'");
      if (has2Tours) {
        // Élection à 2 tours : nom de l'élection + 2 chips T1 / T2
        html += '<div class="elec-item-2t' + (isCurrent ? ' is-current-elec' : '') + partielleCls + '">'
              + '<div class="elec-item-name">' + opt.textContent + '</div>'
              + '<div class="elec-tour-chips">'
              +   '<button class="elec-tour-chip' + (isCurrent && currentSheet === 'T1' ? ' is-current' : '') + '"'
              +     ' onclick="setElection(\'' + safeVal + '\'); setTour(1); closeElecSheet();">1ᵉʳ tour</button>'
              +   '<button class="elec-tour-chip' + (isCurrent && currentSheet === 'T2' ? ' is-current' : '') + '"'
              +     ' onclick="setElection(\'' + safeVal + '\'); setTour(2); closeElecSheet();">2ᵉ tour</button>'
              + '</div></div>';
      } else {
        // Tour unique (TU ou T1 seul) : bouton simple
        html += '<button class="elec-item' + (isCurrent ? ' is-current' : '') + partielleCls + '"'
              + ' onclick="setElection(\'' + safeVal + '\'); closeElecSheet();">'
              + opt.textContent + '</button>';
      }
    }
    html += '</div>';
  }
  listEl.innerHTML = html;
  sheet.classList.add('open');
  sheet.setAttribute('aria-hidden', 'false');
  // Scroll vers l'élection active
  const cur = listEl.querySelector('.elec-item.is-current');
  if (cur) cur.scrollIntoView({ block: 'center' });
  // A11y : focus trap
  if (!_elecSheetTrap && typeof createFocusTrap === 'function') _elecSheetTrap = createFocusTrap(sheet);
  if (_elecSheetTrap) _elecSheetTrap.activate();
}
let _elecSheetTrap = null;
function closeElecSheet() {
  const sheet = document.getElementById('elec-sheet');
  if (!sheet) return;
  sheet.classList.remove('open');
  sheet.setAttribute('aria-hidden', 'true');
  if (_elecSheetTrap) _elecSheetTrap.deactivate();
}

// ═══════════ Side drawer mobile : nav bureaux / quartiers ═══════════
// Synchronise le contenu des listes desktop (#sb-bureau-list / #sb-quartier-list)
// vers les containers du drawer mobile (#nav-sheet-bureaux / #nav-sheet-quartiers).
// Appelée à l'ouverture du drawer pour avoir le contenu à jour.
function syncNavSheetContent() {
  const srcB = document.getElementById('sb-bureau-list');
  const srcQ = document.getElementById('sb-quartier-list');
  const srcC = document.getElementById('sb-canton-list');
  const dstB = document.getElementById('nav-sheet-bureaux');
  const dstQ = document.getElementById('nav-sheet-quartiers');
  const dstC = document.getElementById('nav-sheet-cantons');
  if (srcB && dstB) dstB.innerHTML = srcB.innerHTML;
  if (srcQ && dstQ) dstQ.innerHTML = srcQ.innerHTML;
  if (srcC && dstC) dstC.innerHTML = srcC.innerHTML;
}

function switchNavSheetTab(type) {
  const sheet = document.getElementById('nav-sheet');
  if (!sheet) return;
  const lists = {
    bureau:   document.getElementById('nav-sheet-bureaux'),
    quartier: document.getElementById('nav-sheet-quartiers'),
    canton:   document.getElementById('nav-sheet-cantons'),
  };
  const tabs = sheet.querySelectorAll('.nav-sheet-tab');
  tabs.forEach(t => t.classList.toggle('is-current', t.dataset.navType === type));
  Object.entries(lists).forEach(([k, el]) => {
    if (!el) return;
    el.style.display = (k === type) ? '' : 'none';
  });
  // Scroll vers la ligne active du nouvel onglet
  const activeList = lists[type];
  const cur = activeList && activeList.querySelector('.blist-row.cur');
  if (cur) cur.scrollIntoView({ block: 'center' });
}

let _navSheetTrap = null;
function openNavSheet() {
  const sheet = document.getElementById('nav-sheet');
  if (!sheet) return;
  syncNavSheetContent();
  // Choisir l'onglet pertinent selon le type de fiche en cours
  let initialTab = 'bureau';
  if (typeof overlayTab === 'string') {
    if (overlayTab === 'quartier') initialTab = 'quartier';
    else if (overlayTab === 'canton') initialTab = 'canton';
  }
  switchNavSheetTab(initialTab);
  sheet.classList.add('open');
  sheet.setAttribute('aria-hidden', 'false');
  // A11y : focus trap
  if (!_navSheetTrap && typeof createFocusTrap === 'function') _navSheetTrap = createFocusTrap(sheet);
  if (_navSheetTrap) _navSheetTrap.activate();
}

function closeNavSheet() {
  const sheet = document.getElementById('nav-sheet');
  if (!sheet) return;
  sheet.classList.remove('open');
  if (_navSheetTrap) _navSheetTrap.deactivate();
  sheet.setAttribute('aria-hidden', 'true');
}

// Délégation : clic sur une row dans le drawer
document.addEventListener('click', function(e) {
  const sheet = document.getElementById('nav-sheet');
  if (!sheet || !sheet.classList.contains('open')) return;
  const row = e.target.closest && e.target.closest('.blist-row');
  if (!row || !sheet.contains(row)) return;
  if (row.dataset.ns) {
    if (typeof selectBureauFromList === 'function') selectBureauFromList(row.dataset.ns);
    closeNavSheet();
  } else if (row.dataset.q) {
    if (typeof selectQuartierFromList === 'function') selectQuartierFromList(row.dataset.q);
    closeNavSheet();
  } else if (row.dataset.c) {
    if (typeof selectCantonFromList === 'function') selectCantonFromList(row.dataset.c);
    closeNavSheet();
  }
});

// Échap ferme le sheet
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeElecSheet();
    closeNavSheet();
  }
});
</script>
</div><!-- /main -->
