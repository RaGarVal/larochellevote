  const cantonName = (cantonsMeta[cid] || {}).name || ('La Rochelle-' + cid);
  // Bureaux du canton pour cette ère
  const bureauNums = Object.keys(yearInfo).filter(ns => String(yearInfo[ns].c || '') === String(cid));
  const shData = getSheetData();

      if (cFeats.length) mmMap.fitBounds(L.geoJSON({ type:'FeatureCollection', features:cFeats }).getBounds().pad(0.06));
    }
  }
}

function getQuartierParts(q){
  if(!q)return[];
  var parts=q.split('/').map(function(s){return s.trim();}).filter(Boolean);
  if(parts.length<=1)return parts;
  var el0=ELECTIONS[currentElection];var mapYear0=String(el0?el0.my:2026);
  var yearInfo=BUREAU_INFO[mapYear0]||BUREAU_INFO[CURRENT_ERA]||{};var allQ={};
  Object.values(yearInfo).forEach(function(b){if(b.q)allQ[b.q]=1;});
  return parts.every(function(p){return allQ[p];})?parts:[q];
}
// Liste tous les quartiers d'un bureau : q officiel (split sur "/") + overrides
// via QUARTIER_CORRESPONDANCES (bureaux partagés entre plusieurs quartiers)
function getQuartiersForInfo(info){
  if(!info||!info.quartier)return[];
  var quartiers=getQuartierParts(info.quartier);
  if(typeof QUARTIER_CORRESPONDANCES==='undefined')return quartiers;
  var el=ELECTIONS[currentElection];var mapYear=String(el?el.my:2026);
  Object.keys(QUARTIER_CORRESPONDANCES).forEach(function(qName){
    if(qName.indexOf('/')>=0)return;
    var arr=QUARTIER_CORRESPONDANCES[qName]&&QUARTIER_CORRESPONDANCES[qName][mapYear];
    if(arr&&arr.indexOf(info.num2026)>=0&&quartiers.indexOf(qName)<0){
      quartiers.push(qName);
    }
  });
  return quartiers;
}
function setOverlayDisplay(v) {
  const ov = document.getElementById('overlay');
  const wasVisible = ov.style.display && ov.style.display !== 'none';
  ov.style.display = v;

  ov.classList.toggle('show', v !== 'none');
  // Synchronise data-tab (bureau / quartier / global) pour les sélecteurs CSS différenciés.
  if (v !== 'none' && typeof overlayTab === 'string') ov.dataset.tab = overlayTab;
  const leg = document.getElementById('map-legend');
  if (leg) leg.style.display = (v === 'none') ? '' : 'none';
  // A11y : focus trap actif quand le modal s'ouvre (Tab/Shift+Tab boucle dans le
  // modal au lieu de tabber les éléments derrière), désactivé à la fermeture.
  if (v !== 'none' && !wasVisible) {
    _enableOverlayFocusTrap();

    _disableOverlayFocusTrap();

}

function renderMapLegend() {

      // Liste DYNAMIQUE des cantons disponibles : pour les Départementales modernes

    }
    const wins = {}, ties = {}, totals = {}, counts = {};
    Object.entries(filteredShData).forEach(([ns,d]) => {
      if (!d || ns==='0057') return;
      // Ex-aequo : tous les candidats à égalité en tête comptent +1 chacun

      const tied = tieCandidatesForBureau(d);

      const pa = (isBinome && typeof binomePartiLabel === 'function' ? binomePartiLabel(name) : '') || ci.pa || (coal&&coal[1]) || '';
      const dotBg = (typeof dotBackground === 'function') ? dotBackground(name) : col;

        +'<div class="leg-dot" style="background:'+dotBg+';'+(isSel?'box-shadow:0 0 0 2px #fff,0 0 0 4px '+col:'')+'"></div>'

        +'<span class="leg-pct">'+(isSel?'✓ ':'')+burLabel+'</span></div>';
    }).join('');
    let grad = '';
    if (currentMapSelection && currentSelectionMax > 0) {
      const col = colorOfCandidate(currentMapSelection);
      grad = '<div style="margin-top:6px;padding-top:6px;border-top:1px solid #eee">'
        +'<div class="leg-grad" style="background:linear-gradient(to right,'+blendToWhite(col,0.08)+','+col+')"></div>'
        +'<div class="leg-grad-labels"><span>'+currentSelectionMin.toFixed(1)+'%</span><span style="color:'+col+';font-weight:700">'+currentSelectionMax.toFixed(1)+'%</span></div>'
        +'</div>';
    }
    // Ordre des blocs dans la légende :
    //   - Desktop : tabs canton en HAUT, puis rows, puis gradient
    //   - Mobile  : rows + gradient en haut, tabs canton en BAS (mieux à proximité
    //               du pouce sur petit écran, et la liste candidats reste visible).
    const _isMobLegOrder = window.matchMedia && window.matchMedia('(max-width: 720px)').matches;
    el.innerHTML = _isMobLegOrder ? (rows + grad + cantonTabsHtml) : (cantonTabsHtml + rows + grad);
  } else if (currentMapMode === 'bloc') {
    const wins = {}, present = new Set();
    Object.entries(shData).forEach(([ns,d]) => {
      if (!d || ns==='0057') return;
      const bc = computeBlocs(d);
      Object.keys(bc).forEach(k => present.add(k));
      const dom = Object.entries(bc).sort((a,b)=>b[1]-a[1])[0];
      if (dom) wins[dom[0]] = (wins[dom[0]]||0)+1;
    });
    const rows = Object.entries(BLOC_CONFIG).map(([k,v]) => {
      if (!present.has(k)) return '';

        +'<div class="leg-grad" style="background:linear-gradient(to right,'+blendToWhite(col,0.08)+','+col+')"></div>'

  } else if (currentMapMode === 'bv') {
    const vals = Object.entries(shData).filter(([ns,d])=>ns!=='0057'&&d&&d.i).map(([,d])=>getBVPct(d));

function setElection(label){
  const prevFeature=currentFeature;
  const overlayWasOpen=document.getElementById('overlay').style.display!=='none';
  const prevSheet=currentSheet;
  // Si on bascule vers un référendum alors qu'on était en mode bloc, switch automatique en mode candidat
  // (le mode bloc n'a pas de sens pour un référendum Oui/Non).
  if (currentMapMode === 'bloc' && typeof isReferendum === 'function' && isReferendum(label)) {
    currentMapMode = 'candidat';
    clearMapSelection();
  }
  // Conserver la sélection bloc entre élections (les blocs sont stables d'un scrutin à l'autre)
  const preservedBlocSel = (currentMapMode === 'bloc' && currentMapSelection) ? currentMapSelection : null;
  // Mémoriser l'ère de l'ancienne élection AVANT de basculer
  const oldEra = String(ELECTIONS[currentElection]?.my || CURRENT_ERA);
  const newEra = String(ELECTIONS[label]?.my || CURRENT_ERA);
  const prevNumero = prevFeature ? numStr(prevFeature) : null;
  const prevB2026 = prevFeature ? (prevFeature.properties.b2026 || prevNumero) : null;
  currentElection=label; currentFeature=null;
  if (typeof _invalidateExtremesCache === 'function') _invalidateExtremesCache();
  if (preservedBlocSel) {
    // On garde la sélection ; on recomputera le range après avoir fixé currentSheet
    currentMapSelection = preservedBlocSel;
  } else {
    clearMapSelection();
  }
  const _sel=document.getElementById('el-select'); if(_sel)_sel.value=label;
  // Tenter de conserver le tour en cours ; sinon revenir au T1
  const newEl=ELECTIONS[label];
  const newSheets=newEl?Object.keys(newEl.sheets||{}):[];
  if(prevSheet==='T2'&&newSheets.includes('T2')) currentSheet='T2';
  else if(prevSheet==='TU'&&newSheets.includes('TU')) currentSheet='TU';
  else currentSheet='T1';
  // Recalcul du range pour la nouvelle élection (impose le nouveau dégradé)
  if (preservedBlocSel) {
    [currentSelectionMin, currentSelectionMax] = computeSelectionRange();
  }
  updateTourUI(); updateFooter(); updateTopbar(); loadMap();
  if (typeof updateModeButtonsAvailability === 'function') updateModeButtonsAvailability();

  // Trouver le feature équivalent dans la nouvelle ère.
  // Logique : continuité d'identité (même numéro) > continuité territoriale.
  // - Forward (oldEra → newEra plus récent) : recherche inverse dans BUREAU_CORRESPONDANCES.
  //   Plusieurs 2026 IDs peuvent dériver du même bureau historique → préférer celui qui
  //   conserve le numéro actuel (= continuité d'identité).
  // - Backward (vers ancien) : utiliser BUREAU_CORRESPONDANCES[bid2026][newEra] direct
  //   (continuité territoriale, car le bureau actuel peut avoir un autre numéro historique).
  let newFeature = null;
  if (prevFeature) {
    const gj = getMapGeoJSON();
    if (oldEra === newEra) {
      // Même ère : conserver simplement le bureau (par numero ou b2026)
      newFeature = gj.features.find(f => numStr(f) === prevNumero)
                || gj.features.find(f => f.properties.b2026 === prevB2026);
    } else if (parseInt(newEra) < parseInt(oldEra)) {
      // Backward : suivre le bureau 2026 actuel jusqu'à son ancêtre territorial.
      // Mais d'abord on cherche la continuité d'IDENTITÉ : un bureau 2026 dont la chaîne
      // historique contient prevNumero à oldEra. Cette identité prime sur b2026 (territorial),
      // car certains bureaux 1993 ont un b2026 qui pointe vers un voisin actuel (ex 1993 0023
      // « Coligny / Genette » a b2026=0027 « Parc Charruyer », alors que la vraie chaîne est
      // BUREAU_CORRESPONDANCES["0023"] avec 1988=["0017","0018","0019"]).
      let bestB26 = null;
      Object.entries(BUREAU_CORRESPONDANCES).forEach(([b26, c]) => {
        if (!c || typeof c !== 'object') return;
        const v = c[oldEra];
        if (v === undefined) return;
        const ids = Array.isArray(v) ? v.map(r => typeof r==='string'?r:r.id) : [v];
        if (ids.includes(prevNumero)) {
          // Préférer un match qui partage l'ID 2026 ou le b2026 territorial déjà trouvé
          if (!bestB26 || b26 === prevB2026 || b26 === prevNumero) bestB26 = b26;
        }
      });
      const baseB26 = bestB26 || prevB2026;
      const corr = BUREAU_CORRESPONDANCES[baseB26] || {};
      const ref = corr[newEra];
      const targets = ref === undefined ? [prevNumero]
                    : Array.isArray(ref) ? ref.map(r => typeof r==='string'?r:r.id)
                    : [ref];
      // Préférer la cible qui partage le numero actuel (rare en backward mais possible)
      const sortedT = targets.includes(prevNumero) ? [prevNumero, ...targets.filter(t=>t!==prevNumero)] : targets;
      for (const t of sortedT) {
        newFeature = gj.features.find(f => numStr(f) === t);
        if (newFeature) break;
      }
      // Fallback agrégat : certaines ères (ex 1988) ne contiennent pas les bureaux individuels
      // 0035, 0036, 0037 mais une seule feature agrégée "0035-37". On vérifie si l'une des
      // cibles est couverte par un tel agrégat dans le GeoJSON.
      if (!newFeature) {
        for (const f of gj.features) {
          const ns = numStr(f);
          if (typeof isAggNs === 'function' && isAggNs(ns)) {
            const nums = (typeof aggNumList === 'function' ? aggNumList(ns) : [])
                          .map(n => String(n).padStart(4, '0'));
            if (sortedT.some(t => nums.includes(t))) { newFeature = f; break; }
          }
        }
      }
    } else {
      // Forward : recherche inverse — quels 2026 IDs descendent de prevNumero à oldEra ?
      // Si prevNumero est un agrégat (ex "0035-37" en 1988), on l'éclate en numéros individuels
      // pour interroger BUREAU_CORRESPONDANCES (qui ne connaît que les numéros individuels).
      const prevNumList = (typeof isAggNs === 'function' && isAggNs(prevNumero) && typeof aggNumList === 'function')
        ? aggNumList(prevNumero).map(n => String(n).padStart(4, '0'))
        : [prevNumero];
      const candidates = [];
      Object.entries(BUREAU_CORRESPONDANCES).forEach(([b26, c]) => {
        if (!c || typeof c !== 'object') return;
        const v = c[oldEra];
        if (v === undefined) return;
        const ids = Array.isArray(v) ? v.map(r => typeof r==='string'?r:r.id) : [v];
        if (prevNumList.some(p => ids.includes(p))) candidates.push(b26);
      });
      // Préférer le candidat qui partage le numero actuel (continuité d'identité)
      let target = candidates.includes(prevNumero) ? prevNumero : candidates[0];
      if (!target) target = prevB2026 || prevNumero;
      newFeature = gj.features.find(f => f.properties.b2026 === target)
                || gj.features.find(f => numStr(f) === target);
    }
  }

  if(overlayWasOpen && newFeature){
    currentFeature=newFeature; showBureauSidebar(currentFeature); refreshOverlayIfOpen();
  } else if(overlayWasOpen&&overlayTab==='global') {
    renderGlobal(); renderGlobalFiche(); updateAccentColor();
  } else if (overlayWasOpen && overlayTab === 'canton') {
    // Fiche canton sans newFeature (bureau ancre perdu) : on garde currentCanton et on
    // laisse refreshOverlayIfOpen re-mapper sur la nouvelle ère (avec garde-fou intégré).
    refreshOverlayIfOpen();
  } else if (newFeature) {
    currentFeature=newFeature; showBureauSidebar(currentFeature);
  } else { currentFeature=null; renderGlobal(); }
  if(document.getElementById('sb-bureau-list').style.display!=='none') renderBureauList();
  if(document.getElementById('sb-quartier-list').style.display!=='none') renderQuartierList();
  if (typeof writeURLState === 'function') writeURLState();
}

// ─── URL state ─────────────────────────────────────────────────────────────
// Encode l'état complet de l'UI dans le hash pour permettre le partage de liens profonds.
// Rétro-compatible : les hashes existants (election/tour/bureau/quartier) continuent de marcher.
let _urlStateInit = false;        // évite d'écrire le hash pendant la lecture initiale
let _urlStateRaf = 0;             // throttle via requestAnimationFrame
function writeURLState() {
  if (!_urlStateInit) return;
  if (_urlStateRaf) return;
  _urlStateRaf = requestAnimationFrame(() => {
    _urlStateRaf = 0;
    const params = new URLSearchParams();
    // Élection / tour : toujours sérialisés pour partage explicite
    if (currentElection) params.set('election', currentElection);
    if (currentSheet && currentSheet !== 'T1') params.set('tour', currentSheet);
    // Mode de coloration de la carte
    if (currentMapMode && currentMapMode !== 'candidat') params.set('mode', currentMapMode);
    // Sélection choroplèthe (candidat ou bloc)
    if (currentMapSelection) params.set('selection', currentMapSelection);
    // État de l'overlay (fiche ouverte)
    const ov = document.getElementById('overlay');
    const ovOpen = ov && ov.style.display !== 'none';
    if (ovOpen) {
      if (overlayTab === 'bureau' && currentFeature) {
        params.set('bureau', numStr(currentFeature));
      } else if (overlayTab === 'quartier') {
        // Fallback : si currentQuartier null, récupérer depuis le currentFeature
        let q = currentQuartier;
        if (!q && currentFeature && typeof bureauInfo === 'function' && typeof getQuartierParts === 'function') {
          const info = bureauInfo(currentFeature);
          const parts = getQuartierParts(info.quartier || '');
          if (parts.length) q = parts[0];
        }
        if (q) params.set('quartier', q);
      } else if (overlayTab === 'canton' && currentCanton) {
        params.set('canton', currentCanton);
      } else if (overlayTab === 'global') {
        params.set('tab', 'global');
      }
    }
    const newHash = params.toString();
    const target = newHash ? '#' + newHash : location.pathname + location.search;
    const desired = newHash ? location.pathname + location.search + '#' + newHash : location.pathname + location.search;
    if (location.href.split('#')[0] + (newHash ? '#' + newHash : '') !== location.href) {
      try { history.replaceState(null, '', desired); } catch(_) {}
    }
    // Met à jour aussi le lien "L'analyse" pour qu'il transmette le bureau/quartier
    // courant à la page d'analyse (sens inverse du lien existant analyse→carte).
    updateAnalyseLink();
  });
}

// Met à jour le href du lien "L'analyse" en y ajoutant le hash correspondant à
// la fiche actuellement ouverte (bureau ou quartier). Permet à l'utilisateur de
// passer sur la page d'analyse en gardant son contexte.
function updateAnalyseLink() {
  const a = document.getElementById('tb-link-analyse');
  if (!a) return;
  let suffix = '';
  const ov = document.getElementById('overlay');
  const ovOpen = ov && ov.style.display !== 'none';
  if (ovOpen) {
    if (overlayTab === 'bureau' && currentFeature) {
      suffix = '#bureau=' + encodeURIComponent(numStr(currentFeature));
    } else if (overlayTab === 'quartier') {
      let q = currentQuartier;
      if (!q && currentFeature && typeof bureauInfo === 'function' && typeof getQuartierParts === 'function') {
        const info = bureauInfo(currentFeature);
        const parts = getQuartierParts(info.quartier || '');
        if (parts.length) q = parts[0];
      }
      if (q) suffix = '#quartier=' + encodeURIComponent(q);
    }
  }
  a.href = 'LRVanalyse.html' + suffix;
}

// Lecture du hash (#bureau=XXXX ou #quartier=NomDuQuartier) — vient depuis la page analyse.
// On reste sur l'élection courante (la plus récente) et on ouvre directement la fiche.
(function applyHashSelection(){
  const hash = (location.hash || '').replace(/^#/, '');
  // On marquera _urlStateInit = true à la fin, qu'il y ait un hash ou non
  if (!hash) { _urlStateInit = true; writeURLState(); return; }
  const params = new URLSearchParams(hash);
  const bid = params.get('bureau');
  const qname = params.get('quartier');
  const elec = params.get('election');
  const tour = params.get('tour');
  let mode = params.get('mode');
  const selection = params.get('selection');
  const tab = params.get('tab');
  // Bascule d'élection si demandé (avant ouverture du fiche)
  if (elec && ELECTIONS[elec]) {
    currentElection = elec;
    const _sel = document.getElementById('el-select'); if (_sel) _sel.value = elec;
    const newSheets = Object.keys(ELECTIONS[elec].sheets || {});
    if (tour && newSheets.includes(tour)) currentSheet = tour;
    else if (newSheets.includes('T1')) currentSheet = 'T1';
    else if (newSheets.includes('TU')) currentSheet = 'TU';
    updateTourUI(); updateFooter(); updateTopbar(); loadMap();
    updateModeButtonsAvailability();
    // Rafraîchir la sidebar globale avec la nouvelle élection (sinon elle garde le preview
    // de l'élection initiale au reload — sera écrasée plus loin si une fiche est ouverte).
    renderGlobal();
  }
  // Mode de coloration
  if (mode && ['candidat','bloc','abstention','bv'].includes(mode)) {
    // Sécurité reload : si le mode hash est "bloc" mais l'élection est un référendum, on tombe sur "candidat".
    if (mode === 'bloc' && typeof isReferendum === 'function' && isReferendum(currentElection)) {
      mode = 'candidat';
    }
    currentMapMode = mode;
    document.querySelectorAll('.mmbtn').forEach(b => b.classList.toggle('on', b.textContent.toLowerCase().startsWith(mode === 'candidat' ? 'cand' : mode === 'bloc' ? 'bloc' : mode === 'abstention' ? 'abst' : 'blanc')));
  }
  // Sélection choroplèthe (appliquée après loadMap pour avoir mainLayer)
  // Délai léger pour laisser le map et le DOM se stabiliser
  setTimeout(() => {
    if (selection && (currentMapMode === 'candidat' || currentMapMode === 'bloc')) {
      currentMapSelection = selection;
      [currentSelectionMin, currentSelectionMax] = computeSelectionRange();
    }
    // Ré-appliquer style + légende avec le mode courant (et la sélection si active).
    // Important pour les modes abstention/bv au reload : mainLayer a été créé en mode 'candidat'
    // par défaut, il faut le restyler avec le mode lu dans l'URL.
    if (mainLayer) mainLayer.setStyle(featureStyle);
    renderMapLegend();
    if (bid) {
      const gj = getMapGeoJSON();
      // Priorité au match DIRECT dans l'ère affichée : `bureau=XXXX` dans le hash
      // désigne le numéro de bureau dans l'ère de l'élection courante (c'est ce
      // que produisent daily-capture et l'analyse). Le fallback via `b2026`
      // (projection vers la numérotation 2026) ne sert que quand quelqu'un partage
      // un lien construit avec un numéro 2026 vers une élection d'une autre ère.
      // ──
      // Avant : on essayait b2026 d'abord, ce qui ouvrait le MAUVAIS bureau quand
      // l'hash venait de daily-capture sur une élection ancienne (ex. bureau=0003
      // pour Législatives 2012 ouvrait le bureau qui était n°4 en 2012 mais
      // renuméroté 0003 en 2026, donc texte du tweet ≠ image générée).
      const feat = gj.features.find(f => numStr(f) === bid)
                || gj.features.find(f => f.properties.b2026 === bid);
      if (feat) {
        currentFeature = feat;
        overlayTab = 'bureau';
        const info = bureauInfo(feat);
        document.getElementById('ov-title').textContent = isAggNs(numStr(feat)) ? 'Bureaux agrégés — ' + info.quartier : 'Fiche bureau — ' + info.denomination;
        setOverlayDisplay('flex');
        renderFiche(feat);
        // Sidebar en mode "liste de bureaux" (cohérent avec openOverlay() — pas de preview du bureau actuel)
        showBureauListSidebar();
        updateAccentColor();
        // Génère les onglets « Le quartier : XXX » en haut de fiche (sinon ils manquent au reload).
        updateOverlayTabs();
      }
    } else if (tab === 'global') {
      // Ouvrir directement la fiche globale (cohérent avec openGlobalOverlay)
      overlayTab = 'global';
      currentFeature = null;
      document.getElementById('ov-title').textContent = 'La Rochelle — Résultats globaux';
      document.getElementById('ov-tabs').style.display = 'none';
      setOverlayDisplay('flex');
      if (typeof renderGlobalFiche === 'function') renderGlobalFiche();
      showBureauListSidebar();
      updateAccentColor();
    } else if (qname) {
      // Construire un currentFeature « factice » via le 1er bureau du quartier
      const yearInfo = BUREAU_INFO[CURRENT_ERA] || {};
      const ids = Object.entries(yearInfo)
        .filter(([, b]) => getQuartierParts(b.q || '').includes(qname))
        .map(([id]) => id);
      if (ids.length) {
        const gj = getMapGeoJSON();
        const feat = gj.features.find(f => numStr(f) === ids[0]);
        if (feat) {
          currentFeature = feat;
          openOverlayQuartierNamed(qname);
        }
      }
    } else {
      // #canton=X : ouvrir directement la fiche canton via selectCantonFromList.
      // On le traite en dernier car les autres hooks (bureau/quartier/global) sont
      // plus fréquents — le canton est plus rare.
      const cname = params.get('canton');
      if (cname) selectCantonFromList(cname);
    }
    // Activation de l'écriture du hash après lecture initiale
    _urlStateInit = true;
    writeURLState();
  }, 50);
})();

  const styleEl = document.createElement('style');
  styleEl.textContent = css;
  document.head.appendChild(styleEl);

  function placeCard(card, rect, placement){
    const cw = card.offsetWidth, ch = card.offsetHeight;
    const vw = window.innerWidth, vh = window.innerHeight;
    let x, y;
    if (!rect || placement === 'center') {
      x = (vw - cw) / 2; y = (vh - ch) / 2;
    } else {
      const gap = 14;
      switch (placement) {
        case 'top':    x = rect.left + rect.width/2 - cw/2; y = rect.top - ch - gap; break;
        case 'left':   x = rect.left - cw - gap; y = rect.top + rect.height/2 - ch/2; break;
        case 'right':  x = rect.right + gap; y = rect.top + rect.height/2 - ch/2; break;
        case 'bottom':
        default:       x = rect.left + rect.width/2 - cw/2; y = rect.bottom + gap; break;
      }
    }
    // Clamp dans le viewport
    x = Math.max(12, Math.min(x, vw - cw - 12));
    y = Math.max(12, Math.min(y, vh - ch - 12));
    card.style.left = x + 'px';
    card.style.top  = y + 'px';
  }

  window.startGuidedTour = function(steps, opts) {
    opts = opts || {};
    if (!steps || !steps.length) return;
    let i = 0, finished = false;

    const back = document.createElement('div'); back.className = 'tour-back';
    const spot = document.createElement('div'); spot.className = 'tour-spot'; spot.style.display = 'none';
    const card = document.createElement('div'); card.className = 'tour-card';
    document.body.appendChild(back);
    document.body.appendChild(spot);
    document.body.appendChild(card);

    function destroy(skipped){
      if (finished) return;

      document.removeEventListener('keydown', onKey);
      window.removeEventListener('resize', onResize);
      if (opts.tourId) {
        try { localStorage.setItem('lrvote_tour_' + opts.tourId + '_seen', '1'); } catch(_) {}
      }
      if (!skipped && opts.onFinish) opts.onFinish();
    }
    function next(){ if (i < steps.length - 1) { i++; show(); } else destroy(false); }
    function prev(){ if (i > 0) { i--; show(); } }
    function skip(){ destroy(true); }

    // Calcule le rect englobant — gère cible unique, liste de cibles, et padding optionnel
    function resolveTargetRect(target, pad) {
      if (!target) return null;
      const sels = Array.isArray(target) ? target : [target];
      const rects = [];
      sels.forEach(s => document.querySelectorAll(s).forEach(el => rects.push(el.getBoundingClientRect())));
      if (!rects.length) return null;
      let base;
      if (rects.length === 1) {
        const r = rects[0];

      } else {

      }
      if (pad) {
        if (pad.top)    { base.top    -= pad.top;    base.height += pad.top;    }
        if (pad.bottom) {                            base.height += pad.bottom; }
        if (pad.left)   { base.left   -= pad.left;   base.width  += pad.left;   }
        if (pad.right)  {                            base.width  += pad.right;  }
        base.right  = base.left + base.width;
        base.bottom = base.top  + base.height;
      }
      return base;
    }
    function show(){
      const step = steps[i];
      // Setup hook (peut modifier le DOM avant le rendu)
      if (step.setup) { try { step.setup(); } catch(_) {} }
      requestAnimationFrame(() => render(step));
    }
    function render(step){
      const isLast = i === steps.length - 1;
      const rect = (step.placement !== 'center') ? resolveTargetRect(step.target, step.targetPad) : null;

      // Spotlight
      if (rect) {
        const pad = 0;
        spot.style.display = 'block';
        spot.style.left   = (rect.left - pad) + 'px';
        spot.style.top    = (rect.top - pad) + 'px';
        spot.style.width  = (rect.width + pad*2) + 'px';
        spot.style.height = (rect.height + pad*2) + 'px';
        back.style.display = 'none';
      } else {
        spot.style.display = 'none';
        back.style.display = 'block';
      }

      // Card content
      const total = steps.length;
      const cta = step.finalCta || opts.finalCta;
      let actionsHtml = '<div class="tour-actions">';
      actionsHtml += '<button class="skip" data-act="skip">Passer</button>';
      if (i > 0) actionsHtml += '<button class="prev" data-act="prev">‹ Précédent</button>';
      if (isLast && cta) {
        actionsHtml += '<button class="finish" data-act="finish">Terminer</button>';
        actionsHtml += '<button class="cta" data-act="cta">' + cta.label + '</button>';
      } else if (isLast) {
        actionsHtml += '<button class="finish" data-act="finish">Terminer</button>';
      } else {
        actionsHtml += '<button class="next" data-act="next">Suivant ›</button>';
      }
      actionsHtml += '</div>';

      card.innerHTML = '<div class="tour-step-num">Étape ' + (i+1) + ' / ' + total + '</div>'
        + '<h3>' + step.title + '</h3>'
        + '<p>' + step.body + '</p>'
        + actionsHtml;

      // Position
      placeCard(card, rect, step.placement || 'bottom');
      requestAnimationFrame(() => card.classList.add('visible'));

      // Bind actions
      card.querySelectorAll('[data-act]').forEach(b => {
        b.addEventListener('click', () => {
          const act = b.dataset.act;
          if (act === 'next') next();
          else if (act === 'prev') prev();
          else if (act === 'skip') skip();
          else if (act === 'finish') destroy(false);
          else if (act === 'cta' && cta) {
            // Mark as seen, then navigate
            if (opts.tourId) {
              try { localStorage.setItem('lrvote_tour_' + opts.tourId + '_seen', '1'); } catch(_) {}
            }
            if (cta.href) location.href = cta.href;
          }
        });
      });
    }
    function onKey(e){
      if (e.key === 'Escape') skip();
      else if (e.key === 'ArrowRight') next();
      else if (e.key === 'ArrowLeft') prev();
    }
    function onResize(){
      if (i < steps.length) {
        const step = steps[i];
        const rect = (step.placement !== 'center') ? resolveTargetRect(step.target, step.targetPad) : null;
        if (rect) {
          const pad = 0;
          spot.style.left = (rect.left - pad) + 'px';
          spot.style.top  = (rect.top - pad) + 'px';
          spot.style.width  = (rect.width + pad*2) + 'px';
          spot.style.height = (rect.height + pad*2) + 'px';
        }
        placeCard(card, rect, step.placement || 'bottom');
      }
    }
    document.addEventListener('keydown', onKey);
    window.addEventListener('resize', onResize);
    show();
  };
})();

      + '</div></div>';
    document.body.appendChild(modal);

    modal.querySelector('.sm-overlay').addEventListener('click', closeModal);

    if (typeof navigator.share === 'function') {
      const nb = modal.querySelector('#sm-native');

    const url = location.href;

      if (success) btn.classList.add('copied');
      setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1800);
    }
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(url).then(() => flash(true)).catch(() => fallbackCopy(url, flash));
    } else {
      fallbackCopy(url, flash);

  }
  function fallbackCopy(text, cb){
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      const ok = document.execCommand('copy');
      ta.remove();
      cb(ok);

  }

    if (typeof navigator.share === 'function') {
      navigator.share({
        title: document.title,
        text: 'Vue partagée depuis La Rochelle Vote',
        url: location.href
      }).catch(() => {});

  function exportImg(){
    if (typeof window.exportShareImage !== 'function') return;
    const btn = modal.querySelector('#sm-export');
    const orig = btn.textContent;
    btn.classList.add('busy');
    btn.textContent = '⏳ Génération en cours…';
    Promise.resolve().then(() => window.exportShareImage())
      .then(() => {
        btn.textContent = '✓ Image téléchargée';

        setTimeout(() => { btn.textContent = orig; btn.classList.remove('busy'); }, 2500);
      });
  }
  function openModal(){

    document.getElementById('sm-url').textContent = location.href;
    modal.classList.add('open');
  }
  function closeModal(){ if (modal) modal.classList.remove('open'); }
  window.openShareModal = openModal;
})();

// ─── Export image (LRVcarte) ─────────────────────────────────────────────
(function setupExportImage(){
  const W = 1200, H = 675;
  const PAD = 40;
  const HEADER_H = 100;
  const FOOTER_H = 50;

  function slug(s){
    return String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  }

  // PARTI_COLORS : palette des partis (25 teintes). Définie dans shared.js.

  // Dessine le logo LR ⚓ Vote sur canvas. Retourne la largeur totale dessinée.
  // Reproduit la mise en page du logo HTML : "LR" à 95% de "Vote", voile alignée
  // bas-baseline et remontée d'1px, couleur aléatoire depuis la palette parti.
  function drawLogo(ctx, x, baselineY) {
    const fontSize = 32;            // taille de "Vote" (référence)
    const lrSize = fontSize * 0.95; // "LR" à 95%
    const sailSize = 22;            // ≈ cap-height
    const gap = 4;
    const sailColor = PARTI_COLORS[Math.floor(Math.random() * PARTI_COLORS.length)];

    ctx.textBaseline = 'alphabetic';

    // "LR" à 95%
    ctx.fillStyle = '#1A1A1A';
    ctx.font = '400 ' + lrSize + 'px "Space Grotesk", system-ui, sans-serif';
    ctx.fillText('LR', x, baselineY);
    const lrW = ctx.measureText('LR').width;

    // Voile : 6 barres alignées à droite, bas de la voile à la baseline du texte
    const sailX = x + lrW + gap;
    const sailTop = baselineY - sailSize;
    const widths = [0.17, 0.33, 0.50, 0.67, 0.83, 1.0];
    const barH = (sailSize - 5) / 6;
    ctx.fillStyle = sailColor;
    widths.forEach((wp, i) => {
      const bw = wp * sailSize;
      const by = sailTop + i * (barH + 1);
      const bx = sailX + (sailSize - bw);
      ctx.fillRect(bx, by, bw, barH);
    });

    // "Vote" à 100%
    ctx.fillStyle = '#1A1A1A';
    ctx.font = '700 ' + fontSize + 'px "Space Grotesk", system-ui, sans-serif';
    const voteX = sailX + sailSize + gap;
    ctx.fillText('Vote', voteX, baselineY);
    const voteW = ctx.measureText('Vote').width;

    return (voteX + voteW) - x; // largeur totale du logo
  }

  // Texte du sous-titre selon le mode courant
  function getCarteSubtitle() {
    const m = currentMapMode, s = currentMapSelection;
    if (m === 'candidat') {
      if (s) {
        const cd = (typeof CAND_DATA !== 'undefined' && (CAND_DATA[s + '|' + currentElection] || CAND_DATA[s])) || {};
        const nom = cd.n || s.replace(/\s*\([^)]*\)$/, '');
        const prenom = cd.p ? cd.p + ' ' : '';
        const pa = cd.pa ? ' (' + cd.pa + ')' : '';
        return 'Score de ' + prenom + nom + pa;
      }
      return 'Vainqueur·e par bureau';
    }
    if (m === 'bloc') {
      if (s) {
        const cfg = (typeof BLOC_CONFIG !== 'undefined' && BLOC_CONFIG[s]) || {};
        return 'Score du bloc « ' + (cfg.label || s) + ' »';
      }
      return 'Bloc dominant par bureau';
    }
    if (m === 'abstention') return 'Taux d’abstention par bureau';
    if (m === 'bv')         return 'Bulletins blancs et nuls par bureau';
    return '';
  }

  function getCarteTitle() {
    let t = currentElection;
    // Pas de mention de tour pour un référendum (notion non pertinente).
    if (typeof isReferendum === 'function' && isReferendum(currentElection)) return t;
    if (currentSheet === 'T1') t += ' · 1ᵉʳ tour';
    else if (currentSheet === 'T2') t += ' · 2ᵉ tour';
    else if (currentSheet === 'TU') t += ' · Tour unique';
    return t;
  }

  // Projection Web Mercator (lng et lat convertis en radians pour avoir un ratio cohérent)
  function lngToX(lng){ return lng * Math.PI / 180; }
  function latToY(lat){ return Math.log(Math.tan(Math.PI/4 + (lat * Math.PI/180)/2)); }

  // Repères géographiques pour les exports cartes :
  //  • `points`      : 10 repères principaux pour la carte GLOBALE (vue d'ensemble lisible)
  //  • `pointsFiche` : 37 repères détaillés pour les MINI-CARTES de fiches (zoom plus serré,
  //                    plus de repères pour aider au repérage local)
  // Le filtrage hors-cadre est fait par drawReperesOnCarte via le bbox passé.
